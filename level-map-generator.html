<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; }
body { width: 1920px; height: 1080px; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
.scene { width: 1920px; height: 1080px; position: relative; }
.scene img { width: 100%; height: 100%; display: block; }

.node-overlay {
  position: absolute;
  width: 96px;
  height: 96px;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: 800;
  border: 4px solid rgba(0,0,0,0.25);
}

.node-overlay.cleared {
  background: radial-gradient(circle at 40% 35%, #a0e8a0, #3cb43c 70%, #2a8a2a);
  color: white;
  border-color: #228822;
  box-shadow: 0 3px 8px rgba(0,0,0,0.35);
  text-shadow: 0 1px 3px rgba(0,0,0,0.4);
}

.node-overlay.current {
  background: radial-gradient(circle at 40% 35%, #fff5b0, #f0c030 50%, #d4a020);
  color: #5a3800;
  border-color: #c89820;
  box-shadow: 0 0 24px rgba(255,210,50,0.7), 0 3px 8px rgba(0,0,0,0.35);
  text-shadow: 0 1px 2px rgba(255,255,255,0.3);
}

.node-overlay.locked {
  background: radial-gradient(circle at 40% 35%, #b0b0b0, #808080 70%, #606060);
  color: #ccc;
  border-color: #555;
  box-shadow: 0 3px 8px rgba(0,0,0,0.35);
}

.lock-icon {
  font-size: 36px;
  opacity: 0.7;
}

.node-label {
  position: absolute;
  bottom: -28px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 18px;
  font-weight: 700;
  color: white;
  text-shadow: 0 1px 4px rgba(0,0,0,0.7), 0 0 2px rgba(0,0,0,0.5);
  white-space: nowrap;
  pointer-events: none;
}

</style>
</head>
<body>
<div class="scene" id="scene">
  <img src="Assets/Textures/intro/level-map-base.png" />
</div>

<script>
const params = new URLSearchParams(window.location.search);
const cleared = parseInt(params.get('cleared') || '0', 10);
const total = 10;

const scene = document.getElementById('scene');

// Node positions detected via canvas pixel analysis
const nodes = [
  { x: 50,   y: 915 },
  { x: 267,  y: 800 },
  { x: 470,  y: 668 },
  { x: 694,  y: 591 },
  { x: 940,  y: 628 },
  { x: 1130, y: 777 },
  { x: 1318, y: 833 },
  { x: 1485, y: 658 },
  { x: 1676, y: 610 },
  { x: 1871, y: 804 },
];

// Add progression overlays
nodes.forEach((n, i) => {
  const level = i + 1;
  const isClearedNode = i < cleared;
  const isCurrentNode = (i === cleared) && cleared < total;
  const allCleared = cleared >= total;

  let cls = 'node-overlay';
  if (allCleared || isClearedNode) cls += ' cleared';
  else if (isCurrentNode) cls += ' current';
  else cls += ' locked';

  const overlay = document.createElement('div');
  overlay.className = cls;
  overlay.style.left = n.x + 'px';
  overlay.style.top = n.y + 'px';

  if (allCleared || isClearedNode) {
    overlay.innerHTML = `<span>\u2714</span>`;
  } else if (isCurrentNode) {
    overlay.textContent = level.toString();
  } else {
    overlay.innerHTML = `<span class="lock-icon">\u{1F512}</span>`;
  }

  // Level number label below the node
  const label = document.createElement('div');
  label.className = 'node-label';
  label.textContent = level;
  overlay.appendChild(label);

  scene.appendChild(overlay);
});
</script>
</body>
</html>
