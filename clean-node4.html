<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; }
body { width: 1920px; height: 1080px; overflow: hidden; }
canvas { display: block; width: 1920px; height: 1080px; }
</style>
</head>
<body>
<canvas id="c" width="1920" height="1080"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const img = new Image();
img.onload = () => {
  ctx.drawImage(img, 0, 0, 1920, 1080);

  const cx = 694, cy = 591;

  // Paint over node 4's gold ring + node interior with surrounding colors
  for (let y = cy - 70; y <= cy + 70; y++) {
    for (let x = cx - 70; x <= cx + 70; x++) {
      const dx = x - cx;
      const dy = y - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 65) continue;

      const p = ctx.getImageData(x, y, 1, 1).data;
      const isGold = p[0] > 170 && p[1] > 140 && p[2] < 130 && (p[0] - p[2]) > 60;
      const isNodeInterior = p[0] > 200 && p[1] > 190 && p[2] > 150 && dist < 30;
      const isDarkDetail = p[0] < 90 && p[1] < 90 && p[2] < 80 && dist < 25;

      if (isGold || isNodeInterior || isDarkDetail) {
        const angle = Math.atan2(dy, dx);
        const sx = Math.round(cx + 75 * Math.cos(angle));
        const sy = Math.round(cy + 75 * Math.sin(angle));
        const csx = Math.max(0, Math.min(1919, sx));
        const csy = Math.max(0, Math.min(1079, sy));
        const sp = ctx.getImageData(csx, csy, 1, 1).data;
        ctx.fillStyle = `rgb(${sp[0]},${sp[1]},${sp[2]})`;
        ctx.fillRect(x, y, 1, 1);
      }
    }
  }

  window._cleaned = true;
};
img.src = 'Assets/Textures/intro/level-map.png';
</script>
</body>
</html>
