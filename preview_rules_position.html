<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }

  .canvas {
    /* Match Unity reference resolution aspect ratio 1920x1080 */
    position: relative;
    width: 1440px;
    height: 810px;
    overflow: hidden;
  }

  .canvas img {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: fill;
  }

  /* ContentArea: anchors (0.05, 0.18) to (0.95, 0.95) */
  .content-area {
    position: absolute;
    left: 5%;
    bottom: 18%;
    width: 90%;   /* 0.95 - 0.05 */
    height: 77%;  /* 0.95 - 0.18 */
  }

  /* Equation row: centered in content area */
  .equation {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    align-items: center;
    gap: 30px;
    color: white;
    font-size: 72px;
    font-family: 'Arial', sans-serif;
  }

  .fraction {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 140px;
  }
  .fraction .num, .fraction .den { text-align: center; }
  .fraction .bar { width: 100%; height: 4px; background: white; }

  /* Answer circles */
  .circles {
    position: absolute;
    bottom: 5%;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 160px;
  }
  .circle {
    width: 120px; height: 120px;
    background: #d9d9d9;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; color: #333;
  }

  /* Rules container — draggable */
  .rules {
    position: absolute;
    border: 2px dashed rgba(255,255,0,0.4);
    cursor: move;
    padding: 8px 12px;
    display: flex;
    flex-direction: column;
    user-select: none;
  }
  .rules-title {
    font-size: 24px;
    color: rgb(255, 242, 102);
    margin-bottom: 6px;
    font-family: sans-serif;
  }
  .rule-line {
    font-size: 20px;
    color: rgb(255, 242, 102);
    margin-bottom: 4px;
    line-height: 1.35;
    font-family: sans-serif;
  }

  /* Subtitle bar */
  .subtitle-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 8%;
    background: rgba(0,0,0,0.55);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .subtitle-bar span {
    color: white;
    font-size: 28px;
    font-family: sans-serif;
  }
  .subtitle-bar .highlight { color: #e53535; }

  .controls {
    margin-top: 16px;
    color: #ccc;
    font-family: monospace;
    font-size: 14px;
    text-align: center;
    line-height: 1.8;
  }
  .controls code {
    background: #333;
    padding: 2px 8px;
    border-radius: 3px;
    color: #ff6;
  }
  .controls button {
    background: #444;
    color: #fff;
    border: 1px solid #666;
    padding: 4px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-family: monospace;
    font-size: 13px;
    margin: 0 4px;
  }
  .controls button:hover { background: #555; }
</style>
</head>
<body>
  <div class="canvas" id="canvas">
    <!-- Chalkboard layers -->
    <img src="Assets/Textures/variants/chalkboard-layers/layer-0-background.png" />
    <img src="Assets/Textures/variants/chalkboard-layers/layer-1-frame.png" />
    <img src="Assets/Textures/variants/chalkboard-layers/layer-2-board.png" />
    <img src="Assets/Textures/variants/chalkboard-layers/layer-3-tray.png" />
    <img src="Assets/Textures/variants/chalkboard-layers/layer-4-border.png" />

    <!-- Content area (invisible, just for positioning) -->
    <div class="content-area" id="contentArea">

      <!-- Equation -->
      <div class="equation">
        <div class="fraction"><span class="num">3</span><div class="bar"></div><span class="den">5</span></div>
        <span>=</span>
        <div class="fraction"><span class="num">?</span><div class="bar"></div><span class="den">20</span></div>
      </div>

      <!-- Answer circles -->
      <div class="circles">
        <div class="circle">10</div>
        <div class="circle">12</div>
        <div class="circle">14</div>
      </div>

      <!-- Rules (draggable) -->
      <div class="rules" id="rules">
        <div class="rules-title">Rules:</div>
        <div class="rule-line">1. Look at the bottom</div>
        <div class="rule-line">2. Find the times number</div>
        <div class="rule-line">3. Multiply the top by<br>&nbsp;&nbsp;&nbsp;the times number</div>
      </div>
    </div>

    <!-- Subtitle -->
    <div class="subtitle-bar">
      <span>How many twentieths is <span class="highlight">three</span> fifths?</span>
    </div>
  </div>

  <div class="controls" id="controls">
    Drag the rules box to reposition | Current anchors: <code id="anchorDisplay">...</code>
    <br>
    <button id="copyBtn">Copy anchor code to clipboard</button>
  </div>

  <script>
    const rules = document.getElementById('rules');
    const contentArea = document.getElementById('contentArea');
    const anchorDisplay = document.getElementById('anchorDisplay');
    const copyBtn = document.getElementById('copyBtn');

    // Initial position from current code: anchorMin(0.15, 0.55) anchorMax(0.48, 0.98)
    let anchorMinX = 0.22, anchorMinY = 0.55, anchorMaxX = 0.52, anchorMaxY = 0.84;

    function applyAnchors() {
      const cw = contentArea.offsetWidth;
      const ch = contentArea.offsetHeight;
      // Unity Y: 0=bottom, 1=top. CSS Y: 0=top.
      rules.style.left = (anchorMinX * cw - 84) + 'px';
      rules.style.top = ((1 - anchorMaxY) * ch + 13) + 'px';
      rules.style.width = ((anchorMaxX - anchorMinX) * cw) + 'px';
      rules.style.height = ((anchorMaxY - anchorMinY) * ch) + 'px';
      updateDisplay();
    }

    function updateDisplay() {
      anchorDisplay.textContent =
        `anchorMin(${anchorMinX.toFixed(2)}, ${anchorMinY.toFixed(2)}) anchorMax(${anchorMaxX.toFixed(2)}, ${anchorMaxY.toFixed(2)})`;
    }

    function recalcAnchors() {
      const cw = contentArea.offsetWidth;
      const ch = contentArea.offsetHeight;
      const left = rules.offsetLeft;
      const top = rules.offsetTop;
      const w = rules.offsetWidth;
      const h = rules.offsetHeight;

      anchorMinX = left / cw;
      anchorMaxX = (left + w) / cw;
      anchorMaxY = 1 - (top / ch);
      anchorMinY = 1 - ((top + h) / ch);
      updateDisplay();
    }

    // Dragging
    let dragging = false, dragOffX, dragOffY;
    rules.addEventListener('mousedown', e => {
      dragging = true;
      dragOffX = e.clientX - rules.getBoundingClientRect().left;
      dragOffY = e.clientY - rules.getBoundingClientRect().top;
      e.preventDefault();
    });
    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      const cr = contentArea.getBoundingClientRect();
      let x = e.clientX - dragOffX - cr.left;
      let y = e.clientY - dragOffY - cr.top;
      // Clamp
      x = Math.max(0, Math.min(x, contentArea.offsetWidth - rules.offsetWidth));
      y = Math.max(0, Math.min(y, contentArea.offsetHeight - rules.offsetHeight));
      rules.style.left = x + 'px';
      rules.style.top = y + 'px';
      recalcAnchors();
    });
    document.addEventListener('mouseup', () => { dragging = false; });

    // Resizing via bottom-right corner (simple)
    let resizing = false;
    rules.addEventListener('mousedown', e => {
      const rect = rules.getBoundingClientRect();
      if (e.clientX > rect.right - 16 && e.clientY > rect.bottom - 16) {
        resizing = true;
        dragging = false;
        e.preventDefault();
        e.stopPropagation();
      }
    }, true);
    document.addEventListener('mousemove', e => {
      if (!resizing) return;
      const cr = contentArea.getBoundingClientRect();
      let w = e.clientX - rules.getBoundingClientRect().left;
      let h = e.clientY - rules.getBoundingClientRect().top;
      w = Math.max(100, Math.min(w, cr.width - rules.offsetLeft));
      h = Math.max(80, Math.min(h, cr.height - rules.offsetTop));
      rules.style.width = w + 'px';
      rules.style.height = h + 'px';
      recalcAnchors();
    });
    document.addEventListener('mouseup', () => { resizing = false; });

    copyBtn.addEventListener('click', () => {
      const code = `rulesContainer.anchorMin = new Vector2(${anchorMinX.toFixed(2)}f, ${anchorMinY.toFixed(2)}f);\nrulesContainer.anchorMax = new Vector2(${anchorMaxX.toFixed(2)}f, ${anchorMaxY.toFixed(2)}f);`;
      navigator.clipboard.writeText(code).then(() => {
        copyBtn.textContent = 'Copied!';
        setTimeout(() => { copyBtn.textContent = 'Copy anchor code to clipboard'; }, 1500);
      });
    });

    applyAnchors();
  </script>
</body>
</html>
