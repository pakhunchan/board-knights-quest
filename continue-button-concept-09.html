<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concept 09: Polished UI Button</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: linear-gradient(180deg, #87CEEB 0%, #B0E0F0 30%, #D4EEDA 55%, #A8D98A 65%, #7BC462 75%, #5AAF45 100%);
    position: relative;
    font-family: 'Fredoka One', sans-serif;
  }

  /* Sky with soft clouds */
  body::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse 220px 60px at 15% 18%, rgba(255,255,255,0.45) 0%, transparent 70%),
      radial-gradient(ellipse 180px 50px at 75% 12%, rgba(255,255,255,0.35) 0%, transparent 70%),
      radial-gradient(ellipse 260px 55px at 50% 25%, rgba(255,255,255,0.3) 0%, transparent 70%),
      radial-gradient(ellipse 140px 40px at 85% 30%, rgba(255,255,255,0.25) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Rolling hills layers */
  .hills {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .hill-back {
    position: absolute;
    bottom: 0; left: -10%; right: -10%;
    height: 45%;
    background:
      radial-gradient(ellipse 50% 100% at 20% 100%, #6BBF5E 0%, transparent 70%),
      radial-gradient(ellipse 60% 110% at 55% 100%, #5DAF50 0%, transparent 70%),
      radial-gradient(ellipse 45% 90% at 85% 100%, #6BBF5E 0%, transparent 70%);
  }

  .hill-mid {
    position: absolute;
    bottom: 0; left: -10%; right: -10%;
    height: 35%;
    background:
      radial-gradient(ellipse 55% 120% at 10% 100%, #5AAF45 0%, transparent 65%),
      radial-gradient(ellipse 50% 100% at 45% 100%, #4FA03D 0%, transparent 65%),
      radial-gradient(ellipse 60% 110% at 80% 100%, #5AAF45 0%, transparent 65%);
  }

  .hill-front {
    position: absolute;
    bottom: 0; left: -10%; right: -10%;
    height: 22%;
    background:
      radial-gradient(ellipse 70% 140% at 30% 100%, #4A9E3E 0%, transparent 60%),
      radial-gradient(ellipse 65% 130% at 75% 100%, #459838 0%, transparent 60%);
  }

  /* Warm sun glow */
  .sun-glow {
    position: absolute;
    top: -40px;
    right: 60px;
    width: 180px;
    height: 180px;
    background: radial-gradient(circle, rgba(255,220,120,0.5) 0%, rgba(255,200,80,0.15) 40%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  .label {
    font-size: 16px;
    color: rgba(255,255,255,0.92);
    text-shadow: 0 1px 4px rgba(0,0,0,0.3);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-weight: 400;
  }

  /* --- The Button --- */
  .continue-btn {
    position: relative;
    width: 280px;
    height: 75px;
    border: none;
    border-radius: 16px;
    cursor: pointer;
    font-family: 'Fredoka One', sans-serif;
    font-size: 30px;
    letter-spacing: 1.5px;
    color: #FFFDF5;
    text-shadow:
      0 2px 0 rgba(50, 100, 30, 0.5),
      0 0 12px rgba(255, 255, 200, 0.25);
    outline: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;

    /* Warm green gradient fill */
    background:
      linear-gradient(180deg,
        rgba(255,255,255,0.28) 0%,
        rgba(255,255,255,0.08) 45%,
        rgba(0,0,0,0.0) 46%,
        rgba(0,0,0,0.1) 100%),
      linear-gradient(180deg, #78CC68 0%, #6BBF5E 30%, #55AD48 70%, #4A9E3E 100%);

    /* Thick golden-amber border */
    box-shadow:
      /* Outer drop shadow for 3D depth */
      0 6px 0 0 #3A7E2E,
      0 8px 16px rgba(40, 80, 25, 0.4),
      /* Golden border via box-shadow (inset + outline trick) */
      inset 0 0 0 4px #D4A843,
      /* Inner top highlight */
      inset 0 3px 0 0 rgba(255, 255, 220, 0.35),
      /* Subtle inner bottom shadow */
      inset 0 -3px 6px rgba(40, 80, 25, 0.2);

    /* Bounce-in animation */
    animation: bounceIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
               breathe 3s ease-in-out 1.2s infinite;

    transition:
      transform 0.12s ease,
      box-shadow 0.12s ease,
      background 0.15s ease,
      filter 0.15s ease;
  }

  /* Inner highlight line at top */
  .continue-btn::before {
    content: '';
    position: absolute;
    top: 7px;
    left: 20px;
    right: 20px;
    height: 4px;
    border-radius: 4px;
    background: linear-gradient(90deg,
      rgba(255,255,255,0) 0%,
      rgba(255,255,255,0.45) 30%,
      rgba(255,255,255,0.5) 50%,
      rgba(255,255,255,0.45) 70%,
      rgba(255,255,255,0) 100%);
    pointer-events: none;
  }

  /* Shine sweep overlay */
  .continue-btn::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    border-radius: 12px;
    background: linear-gradient(
      105deg,
      transparent 40%,
      rgba(255,255,255,0.12) 45%,
      rgba(255,255,255,0.18) 50%,
      rgba(255,255,255,0.12) 55%,
      transparent 60%
    );
    pointer-events: none;
  }

  /* Hover */
  .continue-btn:hover {
    transform: scale(1.05) translateY(-1px);
    filter: brightness(1.08);
    box-shadow:
      0 8px 0 0 #3A7E2E,
      0 12px 24px rgba(40, 80, 25, 0.45),
      inset 0 0 0 4px #DEBB55,
      inset 0 3px 0 0 rgba(255, 255, 220, 0.4),
      inset 0 -3px 6px rgba(40, 80, 25, 0.2);
    animation: none;
  }

  /* Pressed */
  .continue-btn:active {
    transform: scale(1.02) translateY(3px);
    filter: brightness(0.97);
    box-shadow:
      0 2px 0 0 #3A7E2E,
      0 3px 8px rgba(40, 80, 25, 0.35),
      inset 0 0 0 4px #C99B3A,
      inset 0 2px 4px rgba(40, 80, 25, 0.25),
      inset 0 -2px 4px rgba(40, 80, 25, 0.15);
    transition: transform 0.05s ease, box-shadow 0.05s ease, filter 0.05s ease;
    animation: none;
  }

  /* Focus ring */
  .continue-btn:focus-visible {
    outline: none;
    box-shadow:
      0 6px 0 0 #3A7E2E,
      0 8px 16px rgba(40, 80, 25, 0.4),
      inset 0 0 0 4px #D4A843,
      inset 0 3px 0 0 rgba(255, 255, 220, 0.35),
      inset 0 -3px 6px rgba(40, 80, 25, 0.2),
      0 0 0 5px rgba(212, 168, 67, 0.5),
      0 0 20px rgba(212, 168, 67, 0.3);
  }

  @keyframes bounceIn {
    0%   { opacity: 0; transform: scale(0.85); }
    60%  { opacity: 1; transform: scale(1.06); }
    80%  { transform: scale(0.98); }
    100% { transform: scale(1); }
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.02); }
  }
</style>
</head>
<body>
  <div class="hills">
    <div class="hill-back"></div>
    <div class="hill-mid"></div>
    <div class="hill-front"></div>
  </div>
  <div class="sun-glow"></div>

  <div class="content">
    <div class="label">Concept 09: Polished UI</div>
    <button class="continue-btn" type="button">CONTINUE</button>
  </div>
</body>
</html>
