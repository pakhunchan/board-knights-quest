<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; }
body { width: 1920px; height: 1080px; overflow: hidden; }
canvas { display: block; width: 1920px; height: 1080px; }
</style>
</head>
<body>
<canvas id="c" width="1920" height="1080"></canvas>
<script>
const W = 1920, H = 1080;
const canvas = document.getElementById('c');
const dpr = window.devicePixelRatio || 1;
canvas.width = W * dpr;
canvas.height = H * dpr;
canvas.style.width = W + 'px';
canvas.style.height = H + 'px';
const ctx = canvas.getContext('2d');
ctx.scale(dpr, dpr);

// Path node positions (no graphics drawn, just for path routing)
const nodes = [
  { x: 50,   y: 915 },
  { x: 267,  y: 800 },
  { x: 470,  y: 668 },
  { x: 694,  y: 591 },
  { x: 940,  y: 628 },
  { x: 1130, y: 777 },
  { x: 1318, y: 833 },
  { x: 1485, y: 658 },
  { x: 1676, y: 610 },
  { x: 1871, y: 804 },
];

// ── Sky gradient ──
const skyGrad = ctx.createLinearGradient(0, 0, 0, 420);
skyGrad.addColorStop(0, '#c2e6c8');
skyGrad.addColorStop(0.5, '#b0ddb8');
skyGrad.addColorStop(1, '#8cc6a0');
ctx.fillStyle = skyGrad;
ctx.fillRect(0, 0, W, 420);

// ── Ground gradient ──
const groundGrad = ctx.createLinearGradient(0, 380, 0, H);
groundGrad.addColorStop(0, '#7ab87a');
groundGrad.addColorStop(0.3, '#6aaa6a');
groundGrad.addColorStop(0.7, '#5a9a5a');
groundGrad.addColorStop(1, '#4a8a4a');
ctx.fillStyle = groundGrad;
ctx.fillRect(0, 380, W, H - 380);

// ── Clouds ──
function drawCloud(cx, cy, w, h) {
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.beginPath();
  ctx.ellipse(cx, cy, w * 0.5, h * 0.5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx - w * 0.3, cy + h * 0.1, w * 0.35, h * 0.4, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx + w * 0.3, cy + h * 0.05, w * 0.3, h * 0.35, 0, 0, Math.PI * 2);
  ctx.fill();
}
drawCloud(200, 70, 140, 50);
drawCloud(620, 100, 110, 40);
drawCloud(950, 55, 160, 55);
drawCloud(1350, 90, 120, 45);
drawCloud(1700, 65, 140, 50);

// ── Mountains ──
function drawMountain(cx, w, h, color, snowColor) {
  const baseY = 420;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(cx - w / 2, baseY);
  ctx.lineTo(cx, baseY - h);
  ctx.lineTo(cx + w / 2, baseY);
  ctx.closePath();
  ctx.fill();
  // Snow cap
  if (snowColor) {
    ctx.fillStyle = snowColor;
    ctx.beginPath();
    const capH = h * 0.15;
    const capW = w * 0.15;
    ctx.moveTo(cx - capW, baseY - h + capH);
    ctx.lineTo(cx, baseY - h);
    ctx.lineTo(cx + capW, baseY - h + capH);
    ctx.closePath();
    ctx.fill();
  }
}

const mountains = [
  { cx: 100,  w: 200, h: 180, color: '#6b6b6b', snow: '#9a9a9a' },
  { cx: 250,  w: 170, h: 210, color: '#5e5e5e', snow: '#8e8e8e' },
  { cx: 390,  w: 200, h: 250, color: '#707070', snow: '#a0a0a0' },
  { cx: 530,  w: 180, h: 230, color: '#585858', snow: '#8a8a8a' },
  { cx: 680,  w: 210, h: 270, color: '#636363', snow: '#959595' },
  { cx: 830,  w: 190, h: 240, color: '#6e6e6e', snow: null },
  { cx: 960,  w: 220, h: 260, color: '#5a5a5a', snow: '#8c8c8c' },
  { cx: 1110, w: 200, h: 230, color: '#666666', snow: null },
  { cx: 1250, w: 240, h: 280, color: '#555555', snow: '#888888' },
  { cx: 1400, w: 190, h: 220, color: '#6a6a6a', snow: '#9a9a9a' },
  { cx: 1540, w: 210, h: 250, color: '#606060', snow: null },
  { cx: 1680, w: 230, h: 270, color: '#585858', snow: '#8a8a8a' },
  { cx: 1850, w: 200, h: 230, color: '#656565', snow: null },
];
mountains.forEach(m => drawMountain(m.cx, m.w, m.h, m.color, m.snow));

// ── Rolling hills (layered ellipses) ──
function drawHill(cx, cy, rx, ry, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
  ctx.fill();
}
drawHill(-30, 620, 280, 160, '#6aaa6a');
drawHill(350, 580, 220, 140, '#5e9e5e');
drawHill(700, 540, 260, 150, '#6baa6b');
drawHill(1050, 600, 240, 160, '#5a9a5a');
drawHill(1400, 560, 220, 140, '#64a464');
drawHill(1750, 530, 250, 150, '#5e9e5e');
drawHill(200, 750, 300, 180, '#528e52');
drawHill(600, 800, 280, 170, '#4d8d4d');
drawHill(1000, 780, 260, 160, '#508f50');
drawHill(1400, 820, 280, 170, '#4a8a4a');
drawHill(1800, 780, 250, 160, '#4e8e4e');

// ── Winding path ──
ctx.save();
ctx.lineWidth = 52;
ctx.lineCap = 'round';
ctx.lineJoin = 'round';

// Path shadow
ctx.strokeStyle = 'rgba(80,60,30,0.3)';
ctx.lineWidth = 58;
ctx.beginPath();
ctx.moveTo(nodes[0].x, nodes[0].y + 4);
for (let i = 1; i < nodes.length; i++) {
  const prev = nodes[i - 1];
  const cur = nodes[i];
  const cpx = (prev.x + cur.x) / 2;
  const cpy = (prev.y + cur.y) / 2;
  ctx.quadraticCurveTo(prev.x, prev.y + 4, cpx, cpy + 4);
}
ctx.lineTo(nodes[nodes.length - 1].x, nodes[nodes.length - 1].y + 4);
ctx.stroke();

// Path edge (darker border)
ctx.strokeStyle = '#a08050';
ctx.lineWidth = 54;
ctx.beginPath();
ctx.moveTo(nodes[0].x, nodes[0].y);
for (let i = 1; i < nodes.length; i++) {
  const prev = nodes[i - 1];
  const cur = nodes[i];
  const cpx = (prev.x + cur.x) / 2;
  const cpy = (prev.y + cur.y) / 2;
  ctx.quadraticCurveTo(prev.x, prev.y, cpx, cpy);
}
ctx.lineTo(nodes[nodes.length - 1].x, nodes[nodes.length - 1].y);
ctx.stroke();

// Path fill (sandy color)
ctx.strokeStyle = '#c9a96e';
ctx.lineWidth = 46;
ctx.beginPath();
ctx.moveTo(nodes[0].x, nodes[0].y);
for (let i = 1; i < nodes.length; i++) {
  const prev = nodes[i - 1];
  const cur = nodes[i];
  const cpx = (prev.x + cur.x) / 2;
  const cpy = (prev.y + cur.y) / 2;
  ctx.quadraticCurveTo(prev.x, prev.y, cpx, cpy);
}
ctx.lineTo(nodes[nodes.length - 1].x, nodes[nodes.length - 1].y);
ctx.stroke();

// Path highlight (lighter center stripe)
ctx.strokeStyle = 'rgba(220,195,140,0.4)';
ctx.lineWidth = 20;
ctx.beginPath();
ctx.moveTo(nodes[0].x, nodes[0].y - 3);
for (let i = 1; i < nodes.length; i++) {
  const prev = nodes[i - 1];
  const cur = nodes[i];
  const cpx = (prev.x + cur.x) / 2;
  const cpy = (prev.y + cur.y) / 2;
  ctx.quadraticCurveTo(prev.x, prev.y - 3, cpx, cpy - 3);
}
ctx.lineTo(nodes[nodes.length - 1].x, nodes[nodes.length - 1].y - 3);
ctx.stroke();

ctx.restore();

// ── Trees ──
function drawTree(x, y, scale) {
  const s = scale || 1;
  // Trunk
  ctx.fillStyle = '#5a4a2a';
  ctx.fillRect(x - 4 * s, y, 8 * s, 28 * s);
  // Foliage layers
  const greens = ['#3a7a3a', '#2d6d2d', '#408040'];
  for (let layer = 0; layer < 3; layer++) {
    ctx.fillStyle = greens[layer];
    ctx.beginPath();
    const layerY = y - layer * 14 * s;
    const layerW = (22 - layer * 3) * s;
    const layerH = (20 + layer * 2) * s;
    ctx.moveTo(x - layerW, layerY);
    ctx.lineTo(x, layerY - layerH);
    ctx.lineTo(x + layerW, layerY);
    ctx.closePath();
    ctx.fill();
  }
}
const trees = [
  { x: 80, y: 590, s: 1.2 },
  { x: 160, y: 640, s: 0.9 },
  { x: 330, y: 540, s: 1.0 },
  { x: 420, y: 710, s: 0.8 },
  { x: 580, y: 650, s: 1.1 },
  { x: 640, y: 760, s: 0.7 },
  { x: 850, y: 580, s: 0.9 },
  { x: 960, y: 700, s: 0.8 },
  { x: 1060, y: 650, s: 1.0 },
  { x: 1200, y: 720, s: 0.9 },
  { x: 1380, y: 600, s: 0.8 },
  { x: 1550, y: 560, s: 1.0 },
  { x: 1700, y: 500, s: 0.9 },
  { x: 1830, y: 660, s: 0.8 },
];
trees.forEach(t => drawTree(t.x, t.y, t.s));

// ── Castle ──
function drawCastle(x, y) {
  const bodyW = 90, bodyH = 80;
  const towerW = 30, towerH = 55;

  // Main body
  ctx.fillStyle = '#4a4a4a';
  ctx.fillRect(x - bodyW / 2, y - bodyH, bodyW, bodyH);

  // Towers
  ctx.fillStyle = '#555555';
  ctx.fillRect(x - bodyW / 2 - 10, y - towerH - 15, towerW, towerH + 15);
  ctx.fillRect(x + bodyW / 2 - 20, y - towerH - 15, towerW, towerH + 15);

  // Tower tops (pointed)
  [x - bodyW / 2 + 5, x + bodyW / 2 - 5].forEach(tx => {
    ctx.fillStyle = '#666666';
    ctx.beginPath();
    ctx.moveTo(tx - 18, y - towerH - 15);
    ctx.lineTo(tx, y - towerH - 35);
    ctx.lineTo(tx + 18, y - towerH - 15);
    ctx.closePath();
    ctx.fill();
  });

  // Battlements
  for (let i = 0; i < 5; i++) {
    ctx.fillStyle = '#555';
    ctx.fillRect(x - bodyW / 2 + i * 20, y - bodyH - 12, 12, 12);
  }

  // Door
  ctx.fillStyle = '#2a2a2a';
  ctx.beginPath();
  ctx.arc(x, y - 22, 14, Math.PI, 0);
  ctx.fillRect(x - 14, y - 22, 28, 22);
  ctx.fill();

  // Windows
  ctx.fillStyle = '#3a3a3a';
  [x - 22, x + 22].forEach(wx => {
    ctx.beginPath();
    ctx.arc(wx, y - 50, 9, 0, Math.PI * 2);
    ctx.fill();
  });

  // Flag
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x + bodyW / 2 - 5, y - towerH - 35);
  ctx.lineTo(x + bodyW / 2 - 5, y - towerH - 65);
  ctx.stroke();
  // Flag cloth
  ctx.fillStyle = '#cc3333';
  ctx.beginPath();
  ctx.moveTo(x + bodyW / 2 - 5, y - towerH - 65);
  ctx.lineTo(x + bodyW / 2 + 20, y - towerH - 57);
  ctx.lineTo(x + bodyW / 2 - 5, y - towerH - 49);
  ctx.closePath();
  ctx.fill();
}
drawCastle(1230, 430);

window._ready = true;
</script>
</body>
</html>
