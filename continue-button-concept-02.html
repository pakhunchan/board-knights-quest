<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concept 02: Gold Fantasy Plaque - Knight's Quest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Fondamento&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background:
      /* warm sky: peach-gold to soft blue */
      linear-gradient(180deg,
        #f5d6a8 0%,
        #f7e2b8 15%,
        #fae8c8 30%,
        #d4e4f0 55%,
        #b8d4e8 70%,
        #a0c8a0 82%,
        #7aaa6a 90%,
        #5a9050 100%
      );
    position: relative;
    font-family: 'Fondamento', cursive;
  }

  /* rolling hills overlay */
  body::before {
    content: '';
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 35%;
    background:
      radial-gradient(ellipse 80% 60% at 15% 100%, #6a9e55 0%, transparent 70%),
      radial-gradient(ellipse 90% 70% at 85% 100%, #5d9148 0%, transparent 65%),
      radial-gradient(ellipse 120% 50% at 50% 100%, #78a862 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 35% 95%, #8ab87a 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* warm golden haze near horizon */
  body::after {
    content: '';
    position: fixed;
    bottom: 25%;
    left: 0;
    right: 0;
    height: 15%;
    background: linear-gradient(180deg, transparent 0%, rgba(244, 220, 160, 0.3) 50%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .concept-label {
    position: relative;
    z-index: 1;
    font-family: 'Fondamento', cursive;
    font-size: 14px;
    color: rgba(120, 90, 40, 0.7);
    letter-spacing: 1.5px;
    margin-bottom: 32px;
    text-transform: uppercase;
  }

  .button-wrapper {
    position: relative;
    z-index: 1;
  }

  /* ---- THE BUTTON ---- */
  .continue-btn {
    position: relative;
    display: block;
    min-width: 280px;
    min-height: 80px;
    padding: 20px 56px;
    border: none;
    cursor: pointer;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 26px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: #4a3520;
    text-shadow:
      0 1px 0 rgba(255, 240, 200, 0.8),
      0 -1px 0 rgba(100, 60, 10, 0.15);
    background:
      /* top highlight */
      linear-gradient(180deg,
        rgba(255, 245, 210, 0.7) 0%,
        rgba(255, 245, 210, 0.0) 40%,
        rgba(160, 110, 30, 0.10) 80%,
        rgba(140, 90, 20, 0.18) 100%
      ),
      /* base gold */
      linear-gradient(180deg,
        #f0d060 0%,
        #e8c44a 25%,
        #d4a843 55%,
        #c49535 80%,
        #b8860b 100%
      );
    border-radius: 12px;
    /* multi-layer bevel */
    box-shadow:
      /* outer glow */
      0 0 20px rgba(212, 168, 67, 0.35),
      /* top edge highlight */
      inset 0 2px 3px rgba(255, 245, 210, 0.9),
      /* left edge highlight */
      inset 2px 0 2px rgba(255, 240, 190, 0.4),
      /* bottom edge shadow (bevel) */
      inset 0 -3px 4px rgba(120, 70, 10, 0.4),
      /* right edge shadow */
      inset -2px 0 2px rgba(140, 85, 10, 0.2),
      /* drop shadow */
      0 6px 16px rgba(80, 50, 10, 0.35),
      0 2px 4px rgba(80, 50, 10, 0.25);
    /* ornamental double border */
    outline: 3px solid rgba(180, 130, 40, 0.6);
    outline-offset: 4px;
    transition: all 0.15s ease;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  /* inner ornamental border */
  .continue-btn::before {
    content: '';
    position: absolute;
    inset: 5px;
    border: 2px solid rgba(255, 240, 190, 0.5);
    border-radius: 7px;
    pointer-events: none;
    box-shadow:
      inset 0 1px 1px rgba(255, 245, 210, 0.3),
      inset 0 -1px 1px rgba(120, 80, 20, 0.15);
  }

  /* shimmer sweep */
  .continue-btn::after {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(
      105deg,
      transparent 20%,
      rgba(255, 255, 240, 0.0) 35%,
      rgba(255, 255, 240, 0.45) 45%,
      rgba(255, 255, 250, 0.6) 50%,
      rgba(255, 255, 240, 0.45) 55%,
      rgba(255, 255, 240, 0.0) 65%,
      transparent 80%
    );
    pointer-events: none;
    animation: shimmer 4s ease-in-out infinite;
    animation-delay: 1s;
  }

  @keyframes shimmer {
    0%   { left: -100%; opacity: 0; }
    10%  { opacity: 1; }
    40%  { left: 150%; opacity: 1; }
    50%  { left: 150%; opacity: 0; }
    100% { left: 150%; opacity: 0; }
  }

  /* decorative corner flourishes */
  .corner {
    position: absolute;
    width: 18px;
    height: 18px;
    pointer-events: none;
    z-index: 2;
  }
  .corner svg { width: 100%; height: 100%; }
  .corner-tl { top: -10px; left: -10px; }
  .corner-tr { top: -10px; right: -10px; transform: scaleX(-1); }
  .corner-bl { bottom: -10px; left: -10px; transform: scaleY(-1); }
  .corner-br { bottom: -10px; right: -10px; transform: scale(-1, -1); }

  /* outer decorative ring via wrapper */
  .button-wrapper::before {
    content: '';
    position: absolute;
    inset: -12px;
    border: 2px solid rgba(180, 130, 40, 0.3);
    border-radius: 18px;
    pointer-events: none;
  }

  /* ---- INTERACTION STATES ---- */

  .continue-btn:hover {
    background:
      linear-gradient(180deg,
        rgba(255, 250, 220, 0.85) 0%,
        rgba(255, 248, 215, 0.0) 40%,
        rgba(170, 120, 30, 0.08) 80%,
        rgba(150, 100, 20, 0.14) 100%
      ),
      linear-gradient(180deg,
        #f5da6e 0%,
        #eece58 25%,
        #dab44e 55%,
        #cca040 80%,
        #c49218 100%
      );
    box-shadow:
      0 0 30px rgba(220, 180, 70, 0.5),
      0 0 50px rgba(212, 168, 67, 0.2),
      inset 0 2px 3px rgba(255, 250, 220, 0.95),
      inset 2px 0 2px rgba(255, 245, 200, 0.5),
      inset 0 -3px 4px rgba(120, 70, 10, 0.35),
      inset -2px 0 2px rgba(140, 85, 10, 0.15),
      0 8px 20px rgba(80, 50, 10, 0.4),
      0 3px 6px rgba(80, 50, 10, 0.25);
    transform: translateY(-1px);
  }

  .continue-btn:hover::after {
    animation-duration: 2.5s;
  }

  .continue-btn:active {
    transform: translateY(2px);
    background:
      linear-gradient(180deg,
        rgba(180, 140, 50, 0.2) 0%,
        rgba(200, 160, 60, 0.0) 40%,
        rgba(140, 95, 20, 0.15) 80%,
        rgba(120, 75, 10, 0.25) 100%
      ),
      linear-gradient(180deg,
        #c9a030 0%,
        #c49535 25%,
        #b8860b 55%,
        #a67808 80%,
        #936a05 100%
      );
    box-shadow:
      0 0 12px rgba(180, 140, 50, 0.3),
      inset 0 3px 5px rgba(100, 60, 10, 0.5),
      inset 2px 0 3px rgba(100, 60, 10, 0.2),
      inset 0 -1px 1px rgba(255, 240, 200, 0.3),
      inset -2px 0 2px rgba(100, 60, 10, 0.1),
      0 1px 3px rgba(80, 50, 10, 0.3);
    outline-color: rgba(160, 115, 30, 0.5);
  }

  .continue-btn:active::after {
    animation: none;
    opacity: 0;
  }

  .continue-btn:focus-visible {
    outline: 3px solid rgba(180, 130, 40, 0.6);
    outline-offset: 4px;
    box-shadow:
      0 0 0 8px rgba(240, 208, 96, 0.35),
      0 0 25px rgba(212, 168, 67, 0.45),
      inset 0 2px 3px rgba(255, 245, 210, 0.9),
      inset 2px 0 2px rgba(255, 240, 190, 0.4),
      inset 0 -3px 4px rgba(120, 70, 10, 0.4),
      inset -2px 0 2px rgba(140, 85, 10, 0.2),
      0 6px 16px rgba(80, 50, 10, 0.35),
      0 2px 4px rgba(80, 50, 10, 0.25);
  }

  /* small decorative diamond above the button */
  .diamond {
    width: 10px;
    height: 10px;
    background: linear-gradient(135deg, #f0d060, #b8860b);
    transform: rotate(45deg);
    margin: 0 auto 14px;
    box-shadow: 0 0 6px rgba(212, 168, 67, 0.5);
    border: 1px solid rgba(255, 240, 200, 0.5);
    position: relative;
    z-index: 1;
  }
</style>
</head>
<body>

<div class="concept-label">Concept 02: Gold Fantasy Plaque</div>

<div class="diamond"></div>

<div class="button-wrapper" style="position:relative; display:inline-block;">
  <!-- corner ornaments -->
  <div class="corner corner-tl">
    <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 16 C2 8, 8 2, 16 2" stroke="rgba(180,130,40,0.5)" stroke-width="2" fill="none" stroke-linecap="round"/>
      <circle cx="16" cy="2" r="2" fill="rgba(212,168,67,0.6)"/>
    </svg>
  </div>
  <div class="corner corner-tr">
    <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 16 C2 8, 8 2, 16 2" stroke="rgba(180,130,40,0.5)" stroke-width="2" fill="none" stroke-linecap="round"/>
      <circle cx="16" cy="2" r="2" fill="rgba(212,168,67,0.6)"/>
    </svg>
  </div>
  <div class="corner corner-bl">
    <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 16 C2 8, 8 2, 16 2" stroke="rgba(180,130,40,0.5)" stroke-width="2" fill="none" stroke-linecap="round"/>
      <circle cx="16" cy="2" r="2" fill="rgba(212,168,67,0.6)"/>
    </svg>
  </div>
  <div class="corner corner-br">
    <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 16 C2 8, 8 2, 16 2" stroke="rgba(180,130,40,0.5)" stroke-width="2" fill="none" stroke-linecap="round"/>
      <circle cx="16" cy="2" r="2" fill="rgba(212,168,67,0.6)"/>
    </svg>
  </div>

  <button class="continue-btn" type="button" onclick="void(0)">CONTINUE</button>
</div>

</body>
</html>
