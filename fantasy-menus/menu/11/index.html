<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sum Fun — Place a Robot to Play</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}
body{font-family:'Cinzel',serif}
.scene{position:relative;width:100%;height:100%;background:linear-gradient(180deg,#a8dde0 0%,#c5e8d5 40%,#c5e8d5 100%)}


/* Mountains */
.mountains{position:absolute;bottom:30%;width:100%;height:45%}
.mt{position:absolute;bottom:0;width:0;height:0;border-style:solid}
.mt1{border-width:0 140px 220px 140px;border-color:transparent transparent #8a9a7c transparent;left:5%}
.mt2{border-width:0 180px 280px 180px;border-color:transparent transparent #7a8a6e transparent;left:18%}
.mt3{border-width:0 160px 250px 160px;border-color:transparent transparent #8e9e80 transparent;left:40%}
.mt4{border-width:0 190px 300px 190px;border-color:transparent transparent #7a8a6e transparent;left:58%}
.mt5{border-width:0 130px 200px 130px;border-color:transparent transparent #8a9a7c transparent;left:82%}
.mt6{border-width:0 150px 240px 150px;border-color:transparent transparent #7a8a6e transparent;left:-8%}

/* Clouds */
.cloud{position:absolute;background:#fff;border-radius:50%;opacity:0.85;z-index:1}
.cloud::before,.cloud::after{content:'';position:absolute;background:#fff;border-radius:50%}
.c1{width:130px;height:48px;top:7%;left:8%}
.c1::before{width:65px;height:45px;top:-22px;left:25px}
.c1::after{width:55px;height:32px;top:-12px;left:65px}
.c2{width:100px;height:38px;top:4%;left:48%}
.c2::before{width:50px;height:35px;top:-18px;left:18px}
.c2::after{width:40px;height:26px;top:-10px;left:50px}
.c3{width:80px;height:30px;top:10%;left:82%}
.c3::before{width:40px;height:28px;top:-14px;left:12px}
.c3::after{width:32px;height:20px;top:-8px;left:38px}
.c4{width:70px;height:26px;top:12%;left:62%}
.c4::before{width:35px;height:24px;top:-12px;left:10px}
.c4::after{width:28px;height:18px;top:-6px;left:32px}

/* Trees - rounded bushes */
.trees{position:absolute;bottom:28%;width:100%;height:15%}
.bush{position:absolute;border-radius:50%;bottom:0}
.b1{width:90px;height:75px;background:radial-gradient(circle at 40% 40%,#6abf69,#4a8f49);left:8%;bottom:5px}
.b2{width:110px;height:85px;background:radial-gradient(circle at 40% 40%,#5eb85d,#3d7f3c);left:15%;bottom:-5px}
.b3{width:80px;height:65px;background:radial-gradient(circle at 40% 40%,#6abf69,#4a8f49);left:28%}
.b4{width:100px;height:80px;background:radial-gradient(circle at 40% 40%,#5eb85d,#3d7f3c);left:38%;bottom:3px}
.b5{width:70px;height:60px;background:radial-gradient(circle at 40% 40%,#6abf69,#4a8f49);left:50%}
.b6{width:95px;height:75px;background:radial-gradient(circle at 40% 40%,#5aad59,#3a7a39);left:58%;bottom:-3px}
.b7{width:85px;height:70px;background:radial-gradient(circle at 40% 40%,#6abf69,#4a8f49);left:70%}
.b8{width:105px;height:82px;background:radial-gradient(circle at 40% 40%,#5eb85d,#3d7f3c);left:80%;bottom:2px}
.b9{width:75px;height:62px;background:radial-gradient(circle at 40% 40%,#6abf69,#4a8f49);left:92%}

/* Foreground hills */
.hills{position:absolute;bottom:0;width:100%;height:35%}
.hill{position:absolute;border-radius:50%;bottom:-50%}
.h1{width:120%;height:100%;background:linear-gradient(180deg,#6a9f5c,#5a8a4c);left:-10%}
.h2{width:60%;height:80%;background:linear-gradient(180deg,#5e9450,#4e7e40);left:50%;bottom:-40%}

/* Dirt path */
.path{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:8%;height:30%;background:linear-gradient(180deg,#b8a88c,#c4b496);clip-path:polygon(35% 0,65% 0,80% 100%,20% 100%);z-index:2}

/* Small flowers */
.flower{position:absolute;width:8px;height:8px;border-radius:50%;z-index:3}
.f1{background:#e8d44d;bottom:22%;left:30%}
.f2{background:#e86b6b;bottom:20%;left:35%}
.f3{background:#e8d44d;bottom:18%;left:62%}
.f4{background:#d4a0d4;bottom:21%;left:70%}
.f5{background:#e8d44d;bottom:19%;left:25%}

/* UI */
.ui{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;z-index:10}
.title{margin-top:8vh;text-align:center}
.title h1{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(2.5rem,6vw,5rem);
  color:#2d4a1e;
  text-shadow:0 2px 0 #a8c898,0 4px 8px rgba(0,0,0,0.15);
  letter-spacing:4px;
  line-height:1.1;
}
.title .sub{
  font-family:'Cinzel',serif;
  font-size:clamp(0.9rem,2vw,1.4rem);
  color:#4a6a3a;
  letter-spacing:8px;
  margin-top:8px;
  text-transform:uppercase;
}

/* Play Zone — replaces the shield PLAY button */
.play-zone{
  margin-top:auto;
  margin-bottom:22vh;
  position:relative;
  width:min(520px, 55vw);
  padding:24px 20px 20px;
  background:rgba(26,26,46,0.55);
  border-radius:20px;
  border:2px solid rgba(255,255,255,0.12);
  backdrop-filter:blur(6px);
  cursor:pointer;
  transition:background 0.4s ease, border-color 0.4s ease, transform 0.3s ease;
}
.play-zone:hover{
  background:rgba(26,26,46,0.7);
  border-color:rgba(255,255,255,0.25);
  transform:scale(1.02);
}

.play-zone .instruction{
  font-family:'Cinzel',serif;
  font-size:clamp(0.75rem,1.4vw,1rem);
  color:rgba(255,255,255,0.85);
  text-align:center;
  letter-spacing:2px;
  margin-bottom:16px;
}

.robots-row{
  display:flex;
  justify-content:center;
  align-items:flex-end;
  gap:clamp(10px, 3vw, 30px);
}

.robot-slot{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
  transition:transform 0.3s ease, filter 0.3s ease;
}
.robot-slot:hover{
  transform:translateY(-6px) scale(1.08);
  filter:drop-shadow(0 4px 12px rgba(255,255,255,0.3));
}
.robot-slot svg{
  width:clamp(50px, 8vw, 80px);
  height:auto;
  filter:drop-shadow(0 2px 6px rgba(0,0,0,0.3));
}
.robot-slot .robot-label{
  font-family:'Cinzel',serif;
  font-size:clamp(0.5rem, 0.9vw, 0.7rem);
  color:rgba(255,255,255,0.6);
  letter-spacing:1px;
  text-transform:uppercase;
}

/* Glow around play zone */
.play-zone .glow{
  position:absolute;inset:-15px;
  background:radial-gradient(ellipse,rgba(120,200,100,0.25),transparent 70%);
  animation:pulse 2.5s ease-in-out infinite;
  pointer-events:none;
  border-radius:30px;
}
@keyframes pulse{0%,100%{opacity:0.4;transform:scale(1)}50%{opacity:1;transform:scale(1.04)}}

/* Floating particles */
.particle{position:absolute;border-radius:50%;background:rgba(255,255,200,0.6);animation:float 8s ease-in-out infinite;z-index:5}
.p1{width:4px;height:4px;left:20%;top:40%;animation-delay:0s}
.p2{width:3px;height:3px;left:35%;top:55%;animation-delay:1.5s}
.p3{width:5px;height:5px;left:65%;top:45%;animation-delay:3s}
.p4{width:3px;height:3px;left:75%;top:35%;animation-delay:4.5s}
.p5{width:4px;height:4px;left:45%;top:50%;animation-delay:2s}
@keyframes float{0%,100%{transform:translateY(0) translateX(0);opacity:0.4}25%{transform:translateY(-20px) translateX(5px);opacity:1}50%{transform:translateY(-35px) translateX(-3px);opacity:0.7}75%{transform:translateY(-15px) translateX(8px);opacity:0.9}}

.back{position:fixed;top:20px;left:20px;z-index:100;font-family:'Cinzel',serif;font-size:0.85rem;color:#2d4a1e;text-decoration:none;opacity:0.6;transition:opacity 0.3s}
.back:hover{opacity:1}
</style>
</head>
