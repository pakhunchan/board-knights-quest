<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knight's Quest — Moonlit Ruins</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}
body{font-family:'Cinzel',serif}
.scene{position:relative;width:100%;height:100%;background:linear-gradient(180deg,#0a1628 0%,#152040 25%,#1a3050 45%,#284858 60%,#2a4848 75%,#1a3030 100%)}

/* Stars */
.star{position:absolute;background:#e0e8f8;border-radius:50%;animation:twinkle 4s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:0.2}50%{opacity:1}}

/* Moon */
.moon{position:absolute;top:8%;left:30%;width:90px;height:90px;background:radial-gradient(circle at 40% 35%,#e8e0d0,#c8c0b0);border-radius:50%;box-shadow:0 0 50px rgba(200,200,180,0.3),0 0 100px rgba(200,200,180,0.15)}
.moon-crater{position:absolute;border-radius:50%;background:rgba(180,170,150,0.3)}
.mc1{width:15px;height:15px;top:25px;left:30px}
.mc2{width:10px;height:10px;top:45px;left:50px}
.mc3{width:8px;height:8px;top:35px;left:20px}

/* Moon beam */
.moonbeam{position:absolute;top:15%;left:30%;width:200px;height:70%;background:linear-gradient(180deg,rgba(200,200,180,0.08),transparent);transform:rotate(5deg);transform-origin:top left}

/* Mountains */
.mountains{position:absolute;bottom:30%;width:100%;height:45%}
.mt{position:absolute;bottom:0;width:0;height:0;border-style:solid}
.mt1{border-width:0 180px 260px 180px;border-color:transparent transparent #1a2838 transparent;left:-2%}
.mt2{border-width:0 150px 220px 150px;border-color:transparent transparent #1e2c3c transparent;left:22%}
.mt3{border-width:0 200px 300px 200px;border-color:transparent transparent #162030 transparent;left:50%}
.mt4{border-width:0 170px 250px 170px;border-color:transparent transparent #1a2838 transparent;left:78%}

/* Ruins */
.ruins{position:absolute;bottom:28%;left:50%;transform:translateX(-50%);z-index:3}
.pillar{position:absolute;background:linear-gradient(90deg,#4a5868,#5a6878,#4a5868);border-radius:3px 3px 0 0;bottom:0}
.p1{width:14px;height:90px;left:-60px}
.p2{width:14px;height:70px;left:-35px}
.p3{width:14px;height:80px;left:25px}
.p4{width:14px;height:55px;left:50px}
/* Broken arch */
.arch{position:absolute;bottom:60px;left:-50px;width:90px;height:30px;border:8px solid #4a5868;border-bottom:none;border-radius:50px 50px 0 0}
/* Rubble */
.rubble{position:absolute;bottom:0;background:#4a5868;border-radius:30%}
.rb1{width:20px;height:12px;left:-70px}
.rb2{width:15px;height:8px;left:60px}
.rb3{width:25px;height:10px;left:-20px}

/* Ivy glow on ruins */
.ivy{position:absolute;width:8px;height:20px;background:linear-gradient(180deg,#3a8a50,transparent);border-radius:0 0 4px 4px;z-index:4}
.iv1{bottom:calc(28% + 70px);left:calc(50% - 57px)}
.iv2{bottom:calc(28% + 55px);left:calc(50% + 28px)}

/* Trees */
.trees{position:absolute;bottom:22%;width:100%;height:16%}
.bush{position:absolute;border-radius:50%;bottom:0}
.b1{width:100px;height:80px;background:radial-gradient(circle at 40% 40%,#1e3830,#142820);left:2%}
.b2{width:80px;height:65px;background:radial-gradient(circle at 40% 40%,#1a3428,#10241c);left:15%}
.b3{width:90px;height:72px;background:radial-gradient(circle at 40% 40%,#1e3830,#142820);left:75%}
.b4{width:110px;height:85px;background:radial-gradient(circle at 40% 40%,#1a3428,#10241c);left:86%}

/* Ground */
.ground{position:absolute;bottom:0;width:100%;height:28%;background:linear-gradient(180deg,#1a3030,#102020);z-index:2}

/* Mist */
.mist{position:absolute;bottom:24%;width:200%;height:10%;background:linear-gradient(90deg,transparent,rgba(100,140,160,0.08),rgba(120,160,180,0.12),rgba(100,140,160,0.08),transparent);animation:mistdrift 25s linear infinite;z-index:3}
@keyframes mistdrift{from{transform:translateX(-50%)}to{transform:translateX(0%)}}

/* Wisps */
.wisp{position:absolute;width:8px;height:8px;border-radius:50%;background:rgba(120,200,180,0.5);box-shadow:0 0 12px rgba(120,200,180,0.4);z-index:5;animation:wispfloat 10s ease-in-out infinite}
.w1{bottom:35%;left:40%;animation-delay:0s}
.w2{bottom:40%;left:55%;animation-delay:3s}
.w3{bottom:32%;left:48%;animation-delay:6s}
@keyframes wispfloat{0%,100%{transform:translate(0,0);opacity:0.3}33%{transform:translate(15px,-20px);opacity:0.8}66%{transform:translate(-10px,-30px);opacity:0.5}}

/* UI */
.ui{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;z-index:10}
.title{margin-top:10vh;text-align:center}
.title h1{
  font-family:'Cinzel Decorative',serif;font-size:clamp(2.5rem,6vw,5rem);
  color:#b0c8d8;
  text-shadow:0 0 20px rgba(120,180,200,0.3),0 2px 0 #0a1020,0 4px 12px rgba(0,0,0,0.4);
  letter-spacing:4px;line-height:1.1;
}
.title .sub{
  font-family:'Cinzel',serif;font-size:clamp(0.9rem,2vw,1.4rem);
  color:#6898a8;letter-spacing:8px;margin-top:8px;text-transform:uppercase;
}

.play-btn{
  margin-top:auto;margin-bottom:24vh;position:relative;cursor:pointer;border:none;background:none;outline:none;
}
.play-btn .rune{
  width:120px;height:120px;position:relative;
  display:flex;align-items:center;justify-content:center;
  transition:transform 0.3s ease;
}
.play-btn:hover .rune{transform:scale(1.1)}
.play-btn .rune-ring{
  position:absolute;inset:0;border:3px solid rgba(120,200,180,0.4);border-radius:50%;
  animation:runespin 20s linear infinite;
}
.play-btn .rune-ring::before{content:'';position:absolute;top:-5px;left:50%;transform:translateX(-50%);width:8px;height:8px;background:#78c8b4;border-radius:50%;box-shadow:0 0 8px rgba(120,200,180,0.6)}
.play-btn .rune-inner{
  width:90px;height:90px;border-radius:50%;
  background:radial-gradient(circle at 45% 45%,#2a5858,#1a3838);
  border:2px solid rgba(120,200,180,0.3);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 20px rgba(120,200,180,0.2),inset 0 -3px 8px rgba(0,0,0,0.3);
}
@keyframes runespin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.play-btn .play-text{
  font-family:'Cinzel',serif;font-size:1.1rem;font-weight:700;
  color:#a0d8c8;letter-spacing:3px;text-shadow:0 0 8px rgba(120,200,180,0.3);
}
.play-btn .aura{
  position:absolute;inset:-30px;background:radial-gradient(ellipse,rgba(120,200,180,0.1),transparent 60%);
  animation:aura 3s ease-in-out infinite;pointer-events:none;
}
@keyframes aura{0%,100%{opacity:0.3;transform:scale(1)}50%{opacity:0.7;transform:scale(1.1)}}

.back{position:fixed;top:20px;left:20px;z-index:100;font-family:'Cinzel',serif;font-size:0.85rem;color:#6898a8;text-decoration:none;opacity:0.6;transition:opacity 0.3s}
.back:hover{opacity:1}
</style>
</head>
<body>
<a href="/" class="back">← Gallery</a>
<div class="scene">
  <div class="star" style="width:2px;height:2px;top:4%;left:10%;animation-delay:0s"></div>
  <div class="star" style="width:3px;height:3px;top:8%;left:25%;animation-delay:0.8s"></div>
  <div class="star" style="width:2px;height:2px;top:3%;left:50%;animation-delay:1.5s"></div>
  <div class="star" style="width:2px;height:2px;top:12%;left:65%;animation-delay:0.3s"></div>
  <div class="star" style="width:3px;height:3px;top:6%;left:78%;animation-delay:2s"></div>
  <div class="star" style="width:2px;height:2px;top:15%;left:88%;animation-delay:1s"></div>
  <div class="star" style="width:2px;height:2px;top:10%;left:5%;animation-delay:2.5s"></div>
  <div class="star" style="width:2px;height:2px;top:18%;left:42%;animation-delay:0.5s"></div>
  <div class="star" style="width:3px;height:3px;top:2%;left:92%;animation-delay:1.8s"></div>
  <div class="moon">
    <div class="moon-crater mc1"></div><div class="moon-crater mc2"></div><div class="moon-crater mc3"></div>
  </div>
  <div class="moonbeam"></div>
  <div class="mountains">
    <div class="mt mt1"></div><div class="mt mt2"></div><div class="mt mt3"></div><div class="mt mt4"></div>
  </div>
  <div class="ruins">
    <div class="arch"></div>
    <div class="pillar p1"></div><div class="pillar p2"></div>
    <div class="pillar p3"></div><div class="pillar p4"></div>
    <div class="rubble rb1"></div><div class="rubble rb2"></div><div class="rubble rb3"></div>
  </div>
  <div class="ivy iv1"></div><div class="ivy iv2"></div>
  <div class="trees">
    <div class="bush b1"></div><div class="bush b2"></div><div class="bush b3"></div><div class="bush b4"></div>
  </div>
  <div class="mist"></div>
  <div class="wisp w1"></div><div class="wisp w2"></div><div class="wisp w3"></div>
  <div class="ground"></div>
  <div class="ui">
    <div class="title">
      <h1>Knight's Quest</h1>
      <div class="sub">Moonlit Ruins</div>
    </div>
    <button class="play-btn">
      <div class="aura"></div>
      <div class="rune">
        <div class="rune-ring"></div>
        <div class="rune-inner">
          <span class="play-text">PLAY</span>
        </div>
      </div>
    </button>
  </div>
</div>
</body>
</html>
