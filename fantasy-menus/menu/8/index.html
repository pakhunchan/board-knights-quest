<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knight's Quest — Storm Banner</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}
body{font-family:'Cinzel',serif}
.scene{position:relative;width:100%;height:100%;background:linear-gradient(180deg,#1a1a28 0%,#2a2a3a 15%,#3a3848 30%,#58505a 50%,#6a6068 65%,#4a4850 100%)}

/* Storm clouds */
.scloud{position:absolute;border-radius:50%;background:rgba(60,55,70,0.8)}
.sc1{width:300px;height:80px;top:3%;left:5%}
.sc2{width:250px;height:70px;top:8%;left:30%}
.sc3{width:350px;height:90px;top:2%;left:55%}
.sc4{width:200px;height:60px;top:10%;left:80%}
.sc5{width:280px;height:75px;top:5%;left:-5%}

/* Lightning flash */
.lightning{position:absolute;top:12%;left:65%;width:3px;height:0;background:linear-gradient(180deg,rgba(200,200,255,0.8),transparent);z-index:5;animation:bolt 8s ease-in-out infinite}
@keyframes bolt{0%,95%,100%{height:0;opacity:0}96%{height:120px;opacity:1}97%{height:0;opacity:0}98%{height:100px;opacity:0.7}99%{height:0;opacity:0}}

/* Mountains */
.mountains{position:absolute;bottom:28%;width:100%;height:48%}
.mt{position:absolute;bottom:0;width:0;height:0;border-style:solid}
.mt1{border-width:0 170px 280px 170px;border-color:transparent transparent #2a2830 transparent;left:-5%}
.mt2{border-width:0 200px 330px 200px;border-color:transparent transparent #222028 transparent;left:18%}
.mt3{border-width:0 180px 300px 180px;border-color:transparent transparent #2a2830 transparent;left:42%}
.mt4{border-width:0 220px 360px 220px;border-color:transparent transparent #222028 transparent;left:60%}
.mt5{border-width:0 160px 260px 160px;border-color:transparent transparent #2a2830 transparent;left:85%}

/* Battle banners */
.banner-pole{position:absolute;bottom:25%;z-index:4}
.pole{width:4px;height:120px;background:linear-gradient(90deg,#5a5060,#7a7080,#5a5060);margin:0 auto}
.flag{width:50px;height:35px;position:absolute;top:5px;left:4px;animation:wave 3s ease-in-out infinite}
.flag-red{background:linear-gradient(180deg,#a03030,#802020);clip-path:polygon(0 0,85% 10%,80% 50%,90% 90%,0 100%)}
.flag-black{background:linear-gradient(180deg,#2a2a30,#1a1a20);clip-path:polygon(0 0,85% 10%,80% 50%,90% 90%,0 100%)}
@keyframes wave{0%,100%{transform:skewY(0deg)}50%{transform:skewY(-3deg)}}
.bp1{left:15%}.bp2{left:30%}.bp3{left:65%}.bp4{left:82%}

/* War camp fires */
.campfire{position:absolute;bottom:22%;z-index:5}
.cf-flame{width:14px;height:20px;background:radial-gradient(ellipse at 50% 70%,#f8c040,#e88020,#c04010);border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;margin:0 auto;animation:flicker 0.4s ease-in-out infinite alternate}
.cf-glow{position:absolute;top:-10px;left:50%;transform:translateX(-50%);width:60px;height:60px;background:radial-gradient(circle,rgba(248,160,40,0.15),transparent 60%)}
@keyframes flicker{0%{transform:scaleY(1) scaleX(1)}100%{transform:scaleY(1.15) scaleX(0.85)}}
.cf1{left:22%}.cf2{left:48%}.cf3{left:74%}

/* Trees */
.trees{position:absolute;bottom:20%;width:100%;height:14%}
.bush{position:absolute;border-radius:50%;bottom:0}
.b1{width:90px;height:70px;background:radial-gradient(circle at 40% 40%,#282830,#1a1a22);left:8%}
.b2{width:70px;height:55px;background:radial-gradient(circle at 40% 40%,#242428,#161618);left:35%}
.b3{width:85px;height:68px;background:radial-gradient(circle at 40% 40%,#282830,#1a1a22);left:55%}
.b4{width:100px;height:75px;background:radial-gradient(circle at 40% 40%,#242428,#161618);left:88%}

/* Ground */
.ground{position:absolute;bottom:0;width:100%;height:25%;background:linear-gradient(180deg,#2a2830,#1a1820);z-index:2}

/* Rain */
.rain{position:absolute;inset:0;z-index:6;overflow:hidden;pointer-events:none}
.drop{position:absolute;width:1px;background:linear-gradient(180deg,transparent,rgba(180,180,200,0.3));animation:fall linear infinite}
@keyframes fall{0%{transform:translateY(-20px)}100%{transform:translateY(100vh)}}

/* UI */
.ui{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;z-index:10}
.title{margin-top:10vh;text-align:center}
.title h1{
  font-family:'Cinzel Decorative',serif;font-size:clamp(2.5rem,6vw,5rem);
  color:#c8c0d0;
  text-shadow:0 0 15px rgba(180,170,200,0.3),0 2px 0 #1a1820,0 4px 12px rgba(0,0,0,0.5);
  letter-spacing:4px;line-height:1.1;
}
.title .sub{
  font-family:'Cinzel',serif;font-size:clamp(0.9rem,2vw,1.4rem);
  color:#888090;letter-spacing:8px;margin-top:8px;text-transform:uppercase;
}

.play-btn{
  margin-top:auto;margin-bottom:22vh;position:relative;cursor:pointer;border:none;background:none;outline:none;
}
.play-btn .sword-btn{
  width:160px;height:55px;position:relative;
  background:linear-gradient(180deg,#4a4450,#3a3440);
  border:2px solid rgba(180,170,200,0.3);
  clip-path:polygon(5% 0%,95% 0%,100% 50%,95% 100%,5% 100%,0% 50%);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 15px rgba(0,0,0,0.4);
  transition:transform 0.3s ease,box-shadow 0.3s ease,border-color 0.3s ease;
}
.play-btn:hover .sword-btn{transform:scale(1.08);box-shadow:0 6px 25px rgba(0,0,0,0.5);border-color:rgba(200,48,48,0.5)}
.play-btn .sword-btn::before{content:'';position:absolute;top:3px;left:8px;right:8px;bottom:3px;border:1px solid rgba(180,170,200,0.15);clip-path:polygon(5% 0%,95% 0%,100% 50%,95% 100%,5% 100%,0% 50%)}
.play-btn .play-text{
  font-family:'Cinzel',serif;font-size:1.2rem;font-weight:700;
  color:#d0c8d8;letter-spacing:5px;text-shadow:0 1px 3px rgba(0,0,0,0.5);
}
.play-btn .stormglow{
  position:absolute;inset:-15px;background:radial-gradient(ellipse,rgba(180,170,200,0.1),transparent 60%);
  animation:sglow 4s ease-in-out infinite;pointer-events:none;
}
@keyframes sglow{0%,100%{opacity:0.2}50%{opacity:0.6}}

.back{position:fixed;top:20px;left:20px;z-index:100;font-family:'Cinzel',serif;font-size:0.85rem;color:#888090;text-decoration:none;opacity:0.6;transition:opacity 0.3s}
.back:hover{opacity:1}
</style>
</head>
<body>
<a href="/" class="back">← Gallery</a>
<div class="scene">
  <div class="scloud sc1"></div><div class="scloud sc2"></div><div class="scloud sc3"></div>
  <div class="scloud sc4"></div><div class="scloud sc5"></div>
  <div class="lightning"></div>
  <div class="mountains">
    <div class="mt mt1"></div><div class="mt mt2"></div><div class="mt mt3"></div>
    <div class="mt mt4"></div><div class="mt mt5"></div>
  </div>
  <div class="banner-pole bp1"><div class="flag flag-red"></div><div class="pole"></div></div>
  <div class="banner-pole bp2"><div class="flag flag-black"></div><div class="pole"></div></div>
  <div class="banner-pole bp3"><div class="flag flag-red"></div><div class="pole"></div></div>
  <div class="banner-pole bp4"><div class="flag flag-black"></div><div class="pole"></div></div>
  <div class="campfire cf1"><div class="cf-glow"></div><div class="cf-flame"></div></div>
  <div class="campfire cf2"><div class="cf-glow"></div><div class="cf-flame"></div></div>
  <div class="campfire cf3"><div class="cf-glow"></div><div class="cf-flame"></div></div>
  <div class="trees">
    <div class="bush b1"></div><div class="bush b2"></div><div class="bush b3"></div><div class="bush b4"></div>
  </div>
  <div class="ground"></div>
  <div class="rain">
    <div class="drop" style="left:5%;height:15px;animation-duration:0.8s;animation-delay:0.1s"></div>
    <div class="drop" style="left:12%;height:12px;animation-duration:0.7s;animation-delay:0.3s"></div>
    <div class="drop" style="left:20%;height:18px;animation-duration:0.9s;animation-delay:0s"></div>
    <div class="drop" style="left:28%;height:14px;animation-duration:0.75s;animation-delay:0.2s"></div>
    <div class="drop" style="left:35%;height:16px;animation-duration:0.85s;animation-delay:0.4s"></div>
    <div class="drop" style="left:42%;height:13px;animation-duration:0.7s;animation-delay:0.15s"></div>
    <div class="drop" style="left:50%;height:17px;animation-duration:0.8s;animation-delay:0.35s"></div>
    <div class="drop" style="left:58%;height:15px;animation-duration:0.9s;animation-delay:0.05s"></div>
    <div class="drop" style="left:65%;height:12px;animation-duration:0.75s;animation-delay:0.25s"></div>
    <div class="drop" style="left:72%;height:16px;animation-duration:0.85s;animation-delay:0.45s"></div>
    <div class="drop" style="left:80%;height:14px;animation-duration:0.7s;animation-delay:0.1s"></div>
    <div class="drop" style="left:88%;height:18px;animation-duration:0.8s;animation-delay:0.3s"></div>
    <div class="drop" style="left:95%;height:13px;animation-duration:0.9s;animation-delay:0.2s"></div>
  </div>
  <div class="ui">
    <div class="title">
      <h1>Knight's Quest</h1>
      <div class="sub">Storm Banner</div>
    </div>
    <button class="play-btn">
      <div class="stormglow"></div>
      <div class="sword-btn">
        <span class="play-text">PLAY</span>
      </div>
    </button>
  </div>
</div>
</body>
</html>
