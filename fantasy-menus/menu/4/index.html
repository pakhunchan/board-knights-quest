<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knight's Quest — Enchanted Forest</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}
body{font-family:'Cinzel',serif}
.scene{position:relative;width:100%;height:100%;background:linear-gradient(180deg,#1a3a2a 0%,#2a5a3a 30%,#3a7a4a 55%,#4a8a5a 75%,#2a5030 100%)}

/* Canopy light rays */
.ray{position:absolute;top:0;background:linear-gradient(180deg,rgba(180,220,150,0.15),transparent);transform-origin:top center;z-index:2}
.r1{left:20%;width:80px;height:70%;transform:rotate(-5deg);animation:rayflicker 8s ease-in-out infinite}
.r2{left:45%;width:100px;height:80%;transform:rotate(2deg);animation:rayflicker 10s ease-in-out infinite 2s}
.r3{left:70%;width:70px;height:65%;transform:rotate(-3deg);animation:rayflicker 7s ease-in-out infinite 4s}
@keyframes rayflicker{0%,100%{opacity:0.3}50%{opacity:0.7}}

/* Tall trees */
.tree{position:absolute;bottom:0;z-index:1}
.trunk{background:linear-gradient(90deg,#3a2a1a,#4a3a2a,#3a2a1a);border-radius:3px}
.canopy{border-radius:50%}

.t1{left:3%}.t1 .trunk{width:18px;height:200px;margin:0 auto}.t1 .canopy{width:120px;height:160px;background:radial-gradient(ellipse at 50% 60%,#2a6a30,#1a4a20);margin-left:-51px}
.t2{left:12%}.t2 .trunk{width:22px;height:250px;margin:0 auto}.t2 .canopy{width:140px;height:180px;background:radial-gradient(ellipse at 50% 60%,#256828,#154218);margin-left:-59px}
.t3{left:25%}.t3 .trunk{width:16px;height:180px;margin:0 auto}.t3 .canopy{width:100px;height:140px;background:radial-gradient(ellipse at 50% 60%,#2a6a30,#1a4a20);margin-left:-42px}
.t4{left:72%}.t4 .trunk{width:20px;height:230px;margin:0 auto}.t4 .canopy{width:130px;height:170px;background:radial-gradient(ellipse at 50% 60%,#256828,#154218);margin-left:-55px}
.t5{left:85%}.t5 .trunk{width:18px;height:210px;margin:0 auto}.t5 .canopy{width:110px;height:150px;background:radial-gradient(ellipse at 50% 60%,#2a6a30,#1a4a20);margin-left:-46px}
.t6{left:93%}.t6 .trunk{width:15px;height:190px;margin:0 auto}.t6 .canopy{width:95px;height:130px;background:radial-gradient(ellipse at 50% 60%,#256828,#154218);margin-left:-40px}

/* Forest floor bushes */
.bush{position:absolute;border-radius:50%;bottom:0;z-index:3}
.b1{width:160px;height:80px;background:radial-gradient(circle at 40% 40%,#2a6030,#1a4020);left:0%;bottom:8%}
.b2{width:140px;height:70px;background:radial-gradient(circle at 40% 40%,#256828,#153818);left:30%;bottom:5%}
.b3{width:170px;height:85px;background:radial-gradient(circle at 40% 40%,#2a6030,#1a4020);left:55%;bottom:10%}
.b4{width:130px;height:65px;background:radial-gradient(circle at 40% 40%,#256828,#153818);left:82%;bottom:6%}

/* Forest floor */
.floor{position:absolute;bottom:0;width:100%;height:20%;background:linear-gradient(180deg,#2a5030,#1a3820);z-index:2}

/* Mushrooms */
.mush{position:absolute;z-index:4}
.mush-stem{width:8px;height:14px;background:#d8c8a0;border-radius:0 0 3px 3px;margin:0 auto}
.mush-cap{width:22px;height:12px;background:radial-gradient(ellipse at 50% 80%,#c85050,#a03030);border-radius:50% 50% 0 0}
.mush-dot{position:absolute;width:4px;height:4px;background:rgba(255,255,255,0.7);border-radius:50%}
.m1{bottom:18%;left:35%}.m2{bottom:16%;left:60%}.m3{bottom:19%;left:80%}

/* Fireflies */
.firefly{position:absolute;width:6px;height:6px;border-radius:50%;background:rgba(200,230,120,0.8);box-shadow:0 0 8px rgba(200,230,120,0.5);z-index:5;animation:flyaround 12s ease-in-out infinite}
.ff1{top:30%;left:30%;animation-delay:0s}
.ff2{top:45%;left:55%;animation-delay:3s}
.ff3{top:35%;left:70%;animation-delay:6s}
.ff4{top:50%;left:20%;animation-delay:9s}
.ff5{top:40%;left:45%;animation-delay:1.5s}
@keyframes flyaround{
  0%{transform:translate(0,0);opacity:0.3}
  25%{transform:translate(20px,-15px);opacity:1}
  50%{transform:translate(-10px,-25px);opacity:0.5}
  75%{transform:translate(15px,-10px);opacity:0.9}
  100%{transform:translate(0,0);opacity:0.3}
}

/* UI */
.ui{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;z-index:10}
.title{margin-top:10vh;text-align:center}
.title h1{
  font-family:'Cinzel Decorative',serif;font-size:clamp(2.5rem,6vw,5rem);
  color:#c8e8a0;
  text-shadow:0 0 20px rgba(100,180,80,0.4),0 2px 0 #1a3a10,0 4px 12px rgba(0,0,0,0.3);
  letter-spacing:4px;line-height:1.1;
}
.title .sub{
  font-family:'Cinzel',serif;font-size:clamp(0.9rem,2vw,1.4rem);
  color:#88b868;letter-spacing:8px;margin-top:8px;text-transform:uppercase;
}

.play-btn{
  margin-top:auto;margin-bottom:26vh;position:relative;cursor:pointer;border:none;background:none;outline:none;
}
.play-btn .leaf{
  width:140px;height:55px;
  background:linear-gradient(135deg,#4a8a38,#3a7a28);
  border-radius:5px 40px 5px 40px;
  border:2px solid rgba(160,210,120,0.4);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 15px rgba(0,0,0,0.3),inset 0 1px 0 rgba(200,240,160,0.2);
  transition:transform 0.3s ease,box-shadow 0.3s ease;
}
.play-btn:hover .leaf{transform:scale(1.1);box-shadow:0 6px 25px rgba(0,0,0,0.4),0 0 20px rgba(100,180,60,0.3)}
.play-btn .play-text{
  font-family:'Cinzel',serif;font-size:1.2rem;font-weight:700;
  color:#e0f8c0;letter-spacing:4px;text-shadow:0 1px 3px rgba(0,0,0,0.4);
}
.play-btn .sparkle{
  position:absolute;inset:-20px;
  background:radial-gradient(ellipse,rgba(180,230,120,0.2),transparent 60%);
  animation:sparkle 2s ease-in-out infinite;pointer-events:none;
}
@keyframes sparkle{0%,100%{opacity:0.3;transform:scale(1)}50%{opacity:0.8;transform:scale(1.1)}}

.back{position:fixed;top:20px;left:20px;z-index:100;font-family:'Cinzel',serif;font-size:0.85rem;color:#88b868;text-decoration:none;opacity:0.6;transition:opacity 0.3s}
.back:hover{opacity:1}
</style>
</head>
<body>
<a href="/" class="back">← Gallery</a>
<div class="scene">
  <div class="ray r1"></div><div class="ray r2"></div><div class="ray r3"></div>
  <div class="tree t1"><div class="canopy"></div><div class="trunk"></div></div>
  <div class="tree t2"><div class="canopy"></div><div class="trunk"></div></div>
  <div class="tree t3"><div class="canopy"></div><div class="trunk"></div></div>
  <div class="tree t4"><div class="canopy"></div><div class="trunk"></div></div>
  <div class="tree t5"><div class="canopy"></div><div class="trunk"></div></div>
  <div class="tree t6"><div class="canopy"></div><div class="trunk"></div></div>
  <div class="bush b1"></div><div class="bush b2"></div><div class="bush b3"></div><div class="bush b4"></div>
  <div class="floor"></div>
  <div class="mush m1"><div class="mush-cap"><div class="mush-dot" style="top:3px;left:4px"></div><div class="mush-dot" style="top:5px;left:13px"></div></div><div class="mush-stem"></div></div>
  <div class="mush m2"><div class="mush-cap"><div class="mush-dot" style="top:2px;left:6px"></div><div class="mush-dot" style="top:6px;left:14px"></div></div><div class="mush-stem"></div></div>
  <div class="mush m3"><div class="mush-cap"><div class="mush-dot" style="top:3px;left:5px"></div></div><div class="mush-stem"></div></div>
  <div class="firefly ff1"></div><div class="firefly ff2"></div><div class="firefly ff3"></div>
  <div class="firefly ff4"></div><div class="firefly ff5"></div>
  <div class="ui">
    <div class="title">
      <h1>Knight's Quest</h1>
      <div class="sub">Enchanted Forest</div>
    </div>
    <button class="play-btn">
      <div class="sparkle"></div>
      <div class="leaf">
        <span class="play-text">PLAY</span>
      </div>
    </button>
  </div>
</div>
</body>
</html>
