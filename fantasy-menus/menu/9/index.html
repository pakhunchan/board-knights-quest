<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knight's Quest — Ancient Scroll</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}
body{font-family:'Cinzel',serif}
.scene{position:relative;width:100%;height:100%;background:linear-gradient(180deg,#d8c8a0 0%,#e0d0b0 20%,#e8d8b8 50%,#d8c8a0 80%,#c8b890 100%)}

/* Parchment texture overlay */
.parchment{position:absolute;inset:0;background:
  radial-gradient(ellipse at 20% 30%,rgba(180,160,120,0.15),transparent 50%),
  radial-gradient(ellipse at 70% 60%,rgba(160,140,100,0.12),transparent 40%),
  radial-gradient(ellipse at 40% 80%,rgba(180,160,120,0.1),transparent 45%);
  z-index:1}

/* Scroll border decorations */
.scroll-border{position:absolute;z-index:2}
.sb-top{top:0;left:0;right:0;height:40px;background:linear-gradient(180deg,#a08860,#c8b080,#a08860);border-bottom:3px solid #8a7050}
.sb-bot{bottom:0;left:0;right:0;height:40px;background:linear-gradient(180deg,#a08860,#c8b080,#a08860);border-top:3px solid #8a7050}
.sb-left{top:40px;bottom:40px;left:0;width:40px;background:linear-gradient(90deg,#a08860,#c8b080,#a08860);border-right:3px solid #8a7050}
.sb-right{top:40px;bottom:40px;right:0;width:40px;background:linear-gradient(90deg,#a08860,#c8b080,#a08860);border-left:3px solid #8a7050}

/* Corner ornaments */
.corner{position:absolute;width:40px;height:40px;z-index:3}
.corner-tl{top:0;left:0;background:radial-gradient(circle at 100% 100%,#8a7050,#a08860)}
.corner-tr{top:0;right:0;background:radial-gradient(circle at 0% 100%,#8a7050,#a08860)}
.corner-bl{bottom:0;left:0;background:radial-gradient(circle at 100% 0%,#8a7050,#a08860)}
.corner-br{bottom:0;right:0;background:radial-gradient(circle at 0% 0%,#8a7050,#a08860)}

/* Illustrated map elements */
.map-mountains{position:absolute;bottom:35%;width:100%;height:25%;z-index:2}
.map-mt{position:absolute;bottom:0;width:0;height:0;border-style:solid;opacity:0.4}
.mm1{border-width:0 60px 100px 60px;border-color:transparent transparent #8a7050 transparent;left:15%}
.mm2{border-width:0 80px 130px 80px;border-color:transparent transparent #7a6040 transparent;left:30%}
.mm3{border-width:0 70px 110px 70px;border-color:transparent transparent #8a7050 transparent;left:55%}
.mm4{border-width:0 90px 140px 90px;border-color:transparent transparent #7a6040 transparent;left:68%}

/* Map trees */
.map-tree{position:absolute;z-index:2;opacity:0.35}
.map-tree .mt-canopy{border-radius:50%}
.map-tree .mt-trunk{background:#7a6040;margin:0 auto}
.mtr1{bottom:32%;left:10%}.mtr1 .mt-canopy{width:30px;height:25px;background:#6a8050}.mtr1 .mt-trunk{width:4px;height:12px}
.mtr2{bottom:30%;left:45%}.mtr2 .mt-canopy{width:25px;height:20px;background:#5a7040}.mtr2 .mt-trunk{width:3px;height:10px}
.mtr3{bottom:33%;left:82%}.mtr3 .mt-canopy{width:28px;height:22px;background:#6a8050}.mtr3 .mt-trunk{width:4px;height:11px}

/* Map path (dotted) */
.map-path{position:absolute;bottom:28%;left:20%;width:60%;height:2px;border-bottom:2px dashed rgba(138,112,80,0.4);z-index:2}

/* Compass rose */
.compass{position:absolute;bottom:12%;right:12%;width:60px;height:60px;z-index:3;opacity:0.3}
.compass-ring{width:100%;height:100%;border:2px solid #8a7050;border-radius:50%;position:relative}
.compass-n{position:absolute;top:-8px;left:50%;transform:translateX(-50%);font-size:0.6rem;color:#8a7050;font-family:'Cinzel',serif}
.compass-arrow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-bottom:25px solid #a03030}

/* "X marks the spot" */
.x-mark{position:absolute;bottom:30%;left:70%;font-size:1.5rem;color:#a03030;font-family:'Cinzel Decorative',serif;opacity:0.5;z-index:3;animation:xpulse 3s ease-in-out infinite}
@keyframes xpulse{0%,100%{opacity:0.3;transform:scale(1)}50%{opacity:0.6;transform:scale(1.1)}}

/* Wax seal */
.seal{position:absolute;bottom:15%;left:15%;width:45px;height:45px;background:radial-gradient(circle at 40% 40%,#c84040,#8a2020);border-radius:50%;z-index:3;opacity:0.5;box-shadow:0 2px 6px rgba(0,0,0,0.2)}
.seal-inner{position:absolute;inset:8px;border:1px solid rgba(200,100,100,0.3);border-radius:50%}

/* Ink stain */
.ink{position:absolute;top:60%;left:25%;width:30px;height:25px;background:rgba(40,30,20,0.08);border-radius:40% 50% 45% 55%;z-index:2}

/* UI */
.ui{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;z-index:10}
.title{margin-top:12vh;text-align:center}
.title h1{
  font-family:'Cinzel Decorative',serif;font-size:clamp(2.5rem,6vw,5rem);
  color:#4a3820;
  text-shadow:0 2px 0 rgba(200,180,140,0.5),0 4px 8px rgba(0,0,0,0.1);
  letter-spacing:4px;line-height:1.1;
}
.title .sub{
  font-family:'Cinzel',serif;font-size:clamp(0.9rem,2vw,1.4rem);
  color:#7a6040;letter-spacing:8px;margin-top:8px;text-transform:uppercase;
}

/* Decorative line under title */
.title-deco{width:200px;height:1px;background:linear-gradient(90deg,transparent,#8a7050,transparent);margin:15px auto 0;position:relative}
.title-deco::before{content:'';position:absolute;top:-3px;left:50%;transform:translateX(-50%);width:8px;height:8px;background:#8a7050;transform:translateX(-50%) rotate(45deg)}

.play-btn{
  margin-top:auto;margin-bottom:30vh;position:relative;cursor:pointer;border:none;background:none;outline:none;
}
.play-btn .scroll-btn{
  width:170px;height:55px;position:relative;
  background:linear-gradient(180deg,#c8b080,#b8a070);
  border:2px solid #8a7050;
  border-radius:3px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 10px rgba(0,0,0,0.15),inset 0 1px 0 rgba(255,255,255,0.2);
  transition:transform 0.3s ease,box-shadow 0.3s ease;
}
.play-btn:hover .scroll-btn{transform:scale(1.06);box-shadow:0 5px 20px rgba(0,0,0,0.2),inset 0 1px 0 rgba(255,255,255,0.2)}
/* Scroll roll ends */
.play-btn .scroll-btn::before,.play-btn .scroll-btn::after{content:'';position:absolute;width:12px;height:65px;background:linear-gradient(90deg,#a08860,#c8b080,#a08860);border-radius:4px;top:-5px;border:1px solid #8a7050}
.play-btn .scroll-btn::before{left:-8px}
.play-btn .scroll-btn::after{right:-8px}
.play-btn .play-text{
  font-family:'Cinzel',serif;font-size:1.2rem;font-weight:700;
  color:#4a3820;letter-spacing:5px;
}

.back{position:fixed;top:50px;left:50px;z-index:100;font-family:'Cinzel',serif;font-size:0.85rem;color:#7a6040;text-decoration:none;opacity:0.6;transition:opacity 0.3s}
.back:hover{opacity:1}
</style>
</head>
<body>
<a href="/" class="back">← Gallery</a>
<div class="scene">
  <div class="parchment"></div>
  <div class="scroll-border sb-top"></div><div class="scroll-border sb-bot"></div>
  <div class="scroll-border sb-left"></div><div class="scroll-border sb-right"></div>
  <div class="corner corner-tl"></div><div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div><div class="corner corner-br"></div>
  <div class="map-mountains">
    <div class="map-mt mm1"></div><div class="map-mt mm2"></div>
    <div class="map-mt mm3"></div><div class="map-mt mm4"></div>
  </div>
  <div class="map-tree mtr1"><div class="mt-canopy"></div><div class="mt-trunk"></div></div>
  <div class="map-tree mtr2"><div class="mt-canopy"></div><div class="mt-trunk"></div></div>
  <div class="map-tree mtr3"><div class="mt-canopy"></div><div class="mt-trunk"></div></div>
  <div class="map-path"></div>
  <div class="x-mark">X</div>
  <div class="compass">
    <div class="compass-ring">
      <div class="compass-n">N</div>
      <div class="compass-arrow"></div>
    </div>
  </div>
  <div class="seal"><div class="seal-inner"></div></div>
  <div class="ink"></div>
  <div class="ui">
    <div class="title">
      <h1>Knight's Quest</h1>
      <div class="sub">Ancient Scroll</div>
      <div class="title-deco"></div>
    </div>
    <button class="play-btn">
      <div class="scroll-btn">
        <span class="play-text">PLAY</span>
      </div>
    </button>
  </div>
</div>
</body>
</html>
