<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knight's Quest — Twilight Peaks</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}
body{font-family:'Cinzel',serif}
.scene{position:relative;width:100%;height:100%;background:linear-gradient(180deg,#2a1b3d 0%,#44318d 25%,#8265a7 45%,#c4a6d7 60%,#e8c4a8 75%,#d4a07a 100%)}

/* Stars */
.stars{position:absolute;top:0;left:0;width:100%;height:45%}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle 3s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:0.3}50%{opacity:1}}

/* Moon */
.moon{position:absolute;top:8%;right:15%;width:80px;height:80px;background:radial-gradient(circle at 35% 35%,#f5f0e0,#e8d8b8);border-radius:50%;box-shadow:0 0 40px rgba(245,240,224,0.4),0 0 80px rgba(245,240,224,0.2)}

/* Mountains - purple/dark tones */
.mountains{position:absolute;bottom:25%;width:100%;height:50%}
.mt{position:absolute;bottom:0;width:0;height:0;border-style:solid}
.mt-cap{position:absolute;width:0;height:0;border-style:solid}
.mt1{border-width:0 160px 260px 160px;border-color:transparent transparent #4a3a5e transparent;left:2%}
.mt1 .mt-cap{border-width:0 38px 55px 38px;border-color:transparent transparent #d8d0e0 transparent;top:-260px;left:-38px}
.mt2{border-width:0 200px 320px 200px;border-color:transparent transparent #3a2a4e transparent;left:20%}
.mt2 .mt-cap{border-width:0 48px 70px 48px;border-color:transparent transparent #e0d8e8 transparent;top:-320px;left:-48px}
.mt3{border-width:0 170px 280px 170px;border-color:transparent transparent #4a3a5e transparent;left:45%}
.mt3 .mt-cap{border-width:0 40px 58px 40px;border-color:transparent transparent #d8d0e0 transparent;top:-280px;left:-40px}
.mt4{border-width:0 220px 350px 220px;border-color:transparent transparent #3a2a4e transparent;left:62%}
.mt4 .mt-cap{border-width:0 52px 75px 52px;border-color:transparent transparent #e0d8e8 transparent;top:-350px;left:-52px}
.mt5{border-width:0 140px 230px 140px;border-color:transparent transparent #4a3a5e transparent;left:85%}
.mt5 .mt-cap{border-width:0 34px 50px 34px;border-color:transparent transparent #d8d0e0 transparent;top:-230px;left:-34px}

/* Dark tree line */
.treeline{position:absolute;bottom:22%;width:100%;height:12%}
.dtree{position:absolute;border-radius:50%;bottom:0}
.dt1{width:100px;height:80px;background:radial-gradient(circle at 40% 40%,#3a4a5a,#2a3a4a);left:5%}
.dt2{width:120px;height:90px;background:radial-gradient(circle at 40% 40%,#354558,#253545);left:14%}
.dt3{width:85px;height:70px;background:radial-gradient(circle at 40% 40%,#3a4a5a,#2a3a4a);left:26%}
.dt4{width:110px;height:85px;background:radial-gradient(circle at 40% 40%,#354558,#253545);left:36%}
.dt5{width:95px;height:75px;background:radial-gradient(circle at 40% 40%,#3a4a5a,#2a3a4a);left:48%}
.dt6{width:115px;height:88px;background:radial-gradient(circle at 40% 40%,#354558,#253545);left:58%}
.dt7{width:90px;height:72px;background:radial-gradient(circle at 40% 40%,#3a4a5a,#2a3a4a);left:70%}
.dt8{width:105px;height:82px;background:radial-gradient(circle at 40% 40%,#354558,#253545);left:80%}
.dt9{width:80px;height:65px;background:radial-gradient(circle at 40% 40%,#3a4a5a,#2a3a4a);left:92%}

/* Foreground */
.fg{position:absolute;bottom:0;width:100%;height:28%}
.fg-hill{position:absolute;border-radius:50%;bottom:-55%}
.fh1{width:130%;height:100%;background:linear-gradient(180deg,#2a3040,#1e2430);left:-15%}

/* Fog */
.fog{position:absolute;bottom:20%;width:200%;height:15%;background:linear-gradient(90deg,transparent,rgba(180,160,200,0.15),rgba(200,180,220,0.2),rgba(180,160,200,0.15),transparent);animation:fogmove 30s linear infinite}
@keyframes fogmove{from{transform:translateX(-50%)}to{transform:translateX(0)}}

/* UI */
.ui{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;z-index:10}
.title{margin-top:10vh;text-align:center}
.title h1{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(2.5rem,6vw,5rem);
  background:linear-gradient(180deg,#f0e0c8,#c8a878);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 3px 6px rgba(0,0,0,0.4));
  letter-spacing:4px;line-height:1.1;
}
.title .sub{
  font-family:'Cinzel',serif;font-size:clamp(0.9rem,2vw,1.4rem);
  color:#c8a8d8;letter-spacing:8px;margin-top:8px;text-transform:uppercase;
}

.play-btn{
  margin-top:auto;margin-bottom:28vh;position:relative;cursor:pointer;border:none;background:none;outline:none;
}
.play-btn .orb{
  width:130px;height:130px;border-radius:50%;
  background:radial-gradient(circle at 40% 40%,#9070b8,#6040a0);
  border:3px solid rgba(200,180,230,0.5);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 30px rgba(120,80,180,0.4),inset 0 -3px 8px rgba(0,0,0,0.3);
  transition:transform 0.3s ease,box-shadow 0.3s ease;
}
.play-btn:hover .orb{transform:scale(1.1);box-shadow:0 0 50px rgba(120,80,180,0.6),inset 0 -3px 8px rgba(0,0,0,0.3)}
.play-btn .play-text{
  font-family:'Cinzel',serif;font-size:1.3rem;font-weight:700;
  color:#f0e8f8;letter-spacing:3px;text-shadow:0 2px 4px rgba(0,0,0,0.4);
}
.play-btn .ring{
  position:absolute;inset:-20px;border:2px solid rgba(200,180,230,0.2);border-radius:50%;
  animation:ringpulse 3s ease-in-out infinite;
}
@keyframes ringpulse{0%,100%{transform:scale(1);opacity:0.3}50%{transform:scale(1.15);opacity:0.7}}

.back{position:fixed;top:20px;left:20px;z-index:100;font-family:'Cinzel',serif;font-size:0.85rem;color:#c8a8d8;text-decoration:none;opacity:0.6;transition:opacity 0.3s}
.back:hover{opacity:1}
</style>
</head>
<body>
<a href="/" class="back">← Gallery</a>
<div class="scene">
  <div class="stars">
    <div class="star" style="width:2px;height:2px;top:5%;left:12%;animation-delay:0s"></div>
    <div class="star" style="width:3px;height:3px;top:10%;left:30%;animation-delay:0.5s"></div>
    <div class="star" style="width:2px;height:2px;top:3%;left:45%;animation-delay:1s"></div>
    <div class="star" style="width:2px;height:2px;top:15%;left:55%;animation-delay:1.5s"></div>
    <div class="star" style="width:3px;height:3px;top:8%;left:72%;animation-delay:0.7s"></div>
    <div class="star" style="width:2px;height:2px;top:18%;left:85%;animation-delay:2s"></div>
    <div class="star" style="width:2px;height:2px;top:12%;left:92%;animation-delay:0.3s"></div>
    <div class="star" style="width:3px;height:3px;top:20%;left:8%;animation-delay:1.8s"></div>
    <div class="star" style="width:2px;height:2px;top:6%;left:38%;animation-delay:2.5s"></div>
    <div class="star" style="width:2px;height:2px;top:22%;left:62%;animation-delay:1.2s"></div>
  </div>
  <div class="moon"></div>
  <div class="mountains">
    <div class="mt mt1"><div class="mt-cap"></div></div>
    <div class="mt mt2"><div class="mt-cap"></div></div>
    <div class="mt mt3"><div class="mt-cap"></div></div>
    <div class="mt mt4"><div class="mt-cap"></div></div>
    <div class="mt mt5"><div class="mt-cap"></div></div>
  </div>
  <div class="treeline">
    <div class="dtree dt1"></div><div class="dtree dt2"></div><div class="dtree dt3"></div>
    <div class="dtree dt4"></div><div class="dtree dt5"></div><div class="dtree dt6"></div>
    <div class="dtree dt7"></div><div class="dtree dt8"></div><div class="dtree dt9"></div>
  </div>
  <div class="fog"></div>
  <div class="fg"><div class="fg-hill fh1"></div></div>
  <div class="ui">
    <div class="title">
      <h1>Knight's Quest</h1>
      <div class="sub">Twilight Peaks</div>
    </div>
    <button class="play-btn">
      <div class="ring"></div>
      <div class="orb">
        <span class="play-text">PLAY</span>
      </div>
    </button>
  </div>
</div>
</body>
</html>
