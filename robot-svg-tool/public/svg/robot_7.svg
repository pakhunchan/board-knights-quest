<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" fill="none">
  <!-- Antenna stem -->
  <rect x="96" y="18" width="8" height="20" rx="3" fill="#C0392B"/>
  <!-- Antenna ball -->
  <circle cx="100" cy="14" r="10" fill="#FF6B6B"/>
  <circle cx="97" cy="11" r="3" fill="#FFAAAA" opacity="0.6"/>

  <!-- Head -->
  <rect x="60" y="38" width="80" height="60" rx="16" fill="#E74C3C"/>
  <!-- Head highlight -->
  <rect x="66" y="42" width="68" height="20" rx="10" fill="#FF6B6B" opacity="0.35"/>
  <!-- Left eye socket -->
  <circle cx="82" cy="62" r="14" fill="#FFFFFF"/>
  <circle cx="82" cy="62" r="9" fill="#2C3E50"/>
  <circle cx="79" cy="59" r="3" fill="#FFFFFF"/>
  <!-- Right eye socket -->
  <circle cx="118" cy="62" r="14" fill="#FFFFFF"/>
  <circle cx="118" cy="62" r="9" fill="#2C3E50"/>
  <circle cx="115" cy="59" r="3" fill="#FFFFFF"/>
  <!-- Mouth -->
  <rect x="85" y="82" width="30" height="6" rx="3" fill="#C0392B"/>

  <!-- Neck / collar band -->
  <rect x="55" y="98" width="90" height="14" rx="5" fill="#C0392B"/>
  <rect x="60" y="100" width="80" height="4" rx="2" fill="#FF6B6B" opacity="0.3"/>

  <!-- Body -->
  <path d="M52,112 Q42,112 40,130 L36,200 Q34,220 55,222 L145,222 Q166,220 164,200 L160,130 Q158,112 148,112 Z" fill="#E74C3C"/>
  <!-- Body highlight -->
  <path d="M62,118 Q56,118 54,130 L52,160 Q80,165 100,162 Q110,160 112,130 Q112,118 106,118 Z" fill="#FF6B6B" opacity="0.25"/>
  <!-- Chest panel -->
  <rect x="72" y="140" width="56" height="50" rx="8" fill="#C0392B"/>
  <!-- Chest detail lines -->
  <rect x="80" y="150" width="40" height="4" rx="2" fill="#FF6B6B" opacity="0.4"/>
  <rect x="80" y="160" width="40" height="4" rx="2" fill="#FF6B6B" opacity="0.4"/>
  <rect x="80" y="170" width="40" height="4" rx="2" fill="#FF6B6B" opacity="0.4"/>
  <!-- Chest circle indicator -->
  <circle cx="100" cy="182" r="4" fill="#FF6B6B"/>

  <!-- Left arm -->
  <rect x="26" y="120" width="18" height="55" rx="9" fill="#E74C3C"/>
  <rect x="26" y="120" width="18" height="20" rx="9" fill="#FF6B6B" opacity="0.25"/>
  <circle cx="35" cy="180" r="11" fill="#C0392B"/>

  <!-- Right arm -->
  <rect x="156" y="120" width="18" height="55" rx="9" fill="#E74C3C"/>
  <rect x="156" y="120" width="18" height="20" rx="9" fill="#FF6B6B" opacity="0.25"/>
  <circle cx="165" cy="180" r="11" fill="#C0392B"/>

  <!-- Left leg -->
  <rect x="62" y="222" width="28" height="40" rx="8" fill="#C0392B"/>
  <!-- Left foot -->
  <rect x="56" y="252" width="38" height="20" rx="8" fill="#E74C3C"/>
  <rect x="56" y="252" width="38" height="8" rx="4" fill="#FF6B6B" opacity="0.25"/>

  <!-- Right leg -->
  <rect x="110" y="222" width="28" height="40" rx="8" fill="#C0392B"/>
  <!-- Right foot -->
  <rect x="106" y="252" width="38" height="20" rx="8" fill="#E74C3C"/>
  <rect x="106" y="252" width="38" height="8" rx="4" fill="#FF6B6B" opacity="0.25"/>

  <!-- Side bolts on body -->
  <circle cx="52" cy="150" r="5" fill="#C0392B"/>
  <circle cx="148" cy="150" r="5" fill="#C0392B"/>
</svg>
