<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" fill="none">
  <!-- Antenna stem -->
  <rect x="96" y="18" width="8" height="22" rx="3" fill="#C4186F"/>
  <!-- Antenna ball -->
  <circle cx="100" cy="14" r="10" fill="#FF4DA6"/>
  <circle cx="96" cy="11" r="3" fill="#FFB3D9" opacity="0.6"/>

  <!-- Head -->
  <rect x="60" y="40" width="80" height="65" rx="18" fill="#E91E8C"/>
  <!-- Head highlight -->
  <rect x="68" y="46" width="30" height="12" rx="6" fill="#FF4DA6" opacity="0.4"/>

  <!-- Left eye socket -->
  <circle cx="82" cy="68" r="15" fill="#C4186F"/>
  <!-- Left eye white -->
  <circle cx="82" cy="68" r="12" fill="#FFFFFF"/>
  <!-- Left pupil -->
  <circle cx="85" cy="66" r="5" fill="#2D2D2D"/>
  <!-- Left eye shine -->
  <circle cx="88" cy="63" r="2" fill="#FFFFFF"/>

  <!-- Right eye socket -->
  <circle cx="118" cy="68" r="15" fill="#C4186F"/>
  <!-- Right eye white -->
  <circle cx="118" cy="68" r="12" fill="#FFFFFF"/>
  <!-- Right pupil -->
  <circle cx="121" cy="66" r="5" fill="#2D2D2D"/>
  <!-- Right eye shine -->
  <circle cx="124" cy="63" r="2" fill="#FFFFFF"/>

  <!-- Mouth -->
  <rect x="85" y="88" width="30" height="6" rx="3" fill="#C4186F"/>

  <!-- Neck collar -->
  <rect x="55" y="105" width="90" height="16" rx="6" fill="#C4186F"/>
  <!-- Collar detail lines -->
  <rect x="65" y="111" width="70" height="3" rx="1.5" fill="#E91E8C"/>

  <!-- Body -->
  <path d="M52,130 Q48,130 46,145 L42,210 Q40,225 58,228 L142,228 Q160,225 158,210 L154,145 Q152,130 148,130 Z" fill="#E91E8C"/>
  <!-- Body highlight -->
  <path d="M62,135 Q58,135 57,148 L55,185 Q55,188 62,188 L80,188 Q84,188 84,185 L82,148 Q81,135 78,135 Z" fill="#FF4DA6" opacity="0.3"/>

  <!-- Chest panel -->
  <rect x="75" y="150" width="50" height="40" rx="8" fill="#C4186F"/>
  <!-- Chest panel inner -->
  <rect x="80" y="155" width="40" height="30" rx="5" fill="#A8135E"/>
  <!-- Chest buttons -->
  <circle cx="92" cy="165" r="4" fill="#FF4DA6"/>
  <circle cx="108" cy="165" r="4" fill="#FF4DA6"/>
  <rect x="88" y="175" width="24" height="4" rx="2" fill="#FF4DA6"/>

  <!-- Left arm -->
  <rect x="30" y="135" width="18" height="55" rx="9" fill="#E91E8C"/>
  <!-- Left hand -->
  <circle cx="39" cy="195" r="11" fill="#C4186F"/>

  <!-- Right arm -->
  <rect x="152" y="135" width="18" height="55" rx="9" fill="#E91E8C"/>
  <!-- Right hand -->
  <circle cx="161" cy="195" r="11" fill="#C4186F"/>

  <!-- Left leg -->
  <rect x="65" y="225" width="26" height="40" rx="10" fill="#E91E8C"/>
  <!-- Left foot -->
  <rect x="58" y="255" width="38" height="22" rx="10" fill="#C4186F"/>

  <!-- Right leg -->
  <rect x="109" y="225" width="26" height="40" rx="10" fill="#E91E8C"/>
  <!-- Right foot -->
  <rect x="104" y="255" width="38" height="22" rx="10" fill="#C4186F"/>
</svg>
