<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" fill="none">
  <!-- Antenna stem -->
  <rect x="95" y="18" width="10" height="22" rx="3" fill="#689F38"/>
  <!-- Antenna ball -->
  <circle cx="100" cy="14" r="10" fill="#9CCC65"/>
  <circle cx="97" cy="11" r="3" fill="#C5E1A5" opacity="0.6"/>

  <!-- Head -->
  <rect x="60" y="40" width="80" height="65" rx="18" fill="#8BC34A"/>
  <!-- Head highlight -->
  <rect x="68" y="46" width="64" height="30" rx="12" fill="#9CCC65" opacity="0.4"/>
  <!-- Left eye socket -->
  <circle cx="82" cy="70" r="16" fill="#E8F5E9"/>
  <!-- Left pupil -->
  <circle cx="85" cy="70" r="8" fill="#33691E"/>
  <!-- Left eye shine -->
  <circle cx="82" cy="67" r="3" fill="#FFFFFF"/>
  <!-- Right eye socket -->
  <circle cx="118" cy="70" r="16" fill="#E8F5E9"/>
  <!-- Right pupil -->
  <circle cx="121" cy="70" r="8" fill="#33691E"/>
  <!-- Right eye shine -->
  <circle cx="118" cy="67" r="3" fill="#FFFFFF"/>
  <!-- Mouth -->
  <rect x="85" y="90" width="30" height="6" rx="3" fill="#689F38"/>

  <!-- Neck collar -->
  <rect x="55" y="105" width="90" height="14" rx="5" fill="#689F38"/>
  <rect x="60" y="108" width="80" height="8" rx="3" fill="#558B2F" opacity="0.4"/>

  <!-- Body -->
  <rect x="48" y="119" width="104" height="100" rx="22" fill="#8BC34A"/>
  <!-- Body highlight -->
  <rect x="58" y="126" width="84" height="50" rx="16" fill="#9CCC65" opacity="0.4"/>
  <!-- Chest panel -->
  <rect x="72" y="145" width="56" height="40" rx="10" fill="#689F38" opacity="0.5"/>
  <!-- Chest buttons -->
  <circle cx="88" cy="160" r="6" fill="#C5E1A5"/>
  <circle cx="112" cy="160" r="6" fill="#C5E1A5"/>
  <!-- Belly indicator -->
  <rect x="90" y="173" width="20" height="6" rx="3" fill="#C5E1A5"/>

  <!-- Left arm -->
  <rect x="30" y="130" width="22" height="55" rx="11" fill="#8BC34A"/>
  <rect x="34" y="135" width="14" height="25" rx="7" fill="#9CCC65" opacity="0.35"/>
  <!-- Left hand -->
  <circle cx="41" cy="190" r="12" fill="#689F38"/>

  <!-- Right arm -->
  <rect x="148" y="130" width="22" height="55" rx="11" fill="#8BC34A"/>
  <rect x="152" y="135" width="14" height="25" rx="7" fill="#9CCC65" opacity="0.35"/>
  <!-- Right hand -->
  <circle cx="159" cy="190" r="12" fill="#689F38"/>

  <!-- Left leg -->
  <rect x="65" y="215" width="28" height="50" rx="12" fill="#8BC34A"/>
  <rect x="69" y="220" width="20" height="22" rx="8" fill="#9CCC65" opacity="0.35"/>
  <!-- Left foot -->
  <ellipse cx="79" cy="270" rx="20" ry="12" fill="#689F38"/>

  <!-- Right leg -->
  <rect x="107" y="215" width="28" height="50" rx="12" fill="#8BC34A"/>
  <rect x="111" y="220" width="20" height="22" rx="8" fill="#9CCC65" opacity="0.35"/>
  <!-- Right foot -->
  <ellipse cx="121" cy="270" rx="20" ry="12" fill="#689F38"/>
</svg>
