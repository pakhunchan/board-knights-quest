<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" fill="none">
  <!-- Antenna stem -->
  <rect x="96" y="18" width="8" height="20" rx="3" fill="#1B6BBF"/>
  <!-- Antenna ball -->
  <circle cx="100" cy="14" r="10" fill="#54A0FF"/>
  <circle cx="96" cy="10" r="3" fill="#7DB8FF" opacity="0.6"/>

  <!-- Head -->
  <rect x="58" y="38" width="84" height="64" rx="18" fill="#2E86DE"/>
  <!-- Head highlight -->
  <rect x="64" y="42" width="72" height="28" rx="14" fill="#54A0FF" opacity="0.3"/>
  <!-- Left eye socket -->
  <circle cx="80" cy="66" r="16" fill="#1B6BBF"/>
  <!-- Left eye white -->
  <circle cx="80" cy="66" r="12" fill="#FFFFFF"/>
  <!-- Left pupil -->
  <circle cx="83" cy="64" r="6" fill="#1A1A2E"/>
  <!-- Left eye shine -->
  <circle cx="86" cy="61" r="2.5" fill="#FFFFFF"/>
  <!-- Right eye socket -->
  <circle cx="120" cy="66" r="16" fill="#1B6BBF"/>
  <!-- Right eye white -->
  <circle cx="120" cy="66" r="12" fill="#FFFFFF"/>
  <!-- Right pupil -->
  <circle cx="123" cy="64" r="6" fill="#1A1A2E"/>
  <!-- Right eye shine -->
  <circle cx="126" cy="61" r="2.5" fill="#FFFFFF"/>
  <!-- Mouth -->
  <rect x="82" y="86" width="36" height="6" rx="3" fill="#1B6BBF"/>

  <!-- Neck collar -->
  <rect x="52" y="102" width="96" height="14" rx="5" fill="#1B6BBF"/>
  <!-- Collar highlight -->
  <rect x="56" y="104" width="88" height="5" rx="2.5" fill="#54A0FF" opacity="0.35"/>

  <!-- Body -->
  <path d="M54,116 Q42,116 40,138 L36,200 Q34,220 56,224 L144,224 Q166,220 164,200 L160,138 Q158,116 146,116 Z" fill="#2E86DE"/>
  <!-- Body highlight -->
  <path d="M60,120 Q52,120 50,136 L48,170 Q70,176 100,176 Q130,176 152,170 L150,136 Q148,120 140,120 Z" fill="#54A0FF" opacity="0.2"/>
  <!-- Chest panel -->
  <rect x="72" y="140" width="56" height="50" rx="10" fill="#1B6BBF"/>
  <!-- Chest panel inner -->
  <rect x="78" y="146" width="44" height="38" rx="7" fill="#2E86DE"/>
  <!-- Chest light top -->
  <circle cx="92" cy="158" r="5" fill="#54A0FF"/>
  <circle cx="92" cy="158" r="3" fill="#7DB8FF"/>
  <!-- Chest light bottom -->
  <circle cx="108" cy="158" r="5" fill="#54A0FF"/>
  <circle cx="108" cy="158" r="3" fill="#7DB8FF"/>
  <!-- Chest meter -->
  <rect x="86" y="170" width="28" height="6" rx="3" fill="#1B6BBF"/>
  <rect x="88" y="171.5" width="16" height="3" rx="1.5" fill="#54A0FF"/>

  <!-- Left arm -->
  <rect x="24" y="124" width="20" height="56" rx="10" fill="#2E86DE"/>
  <rect x="26" y="126" width="16" height="20" rx="8" fill="#54A0FF" opacity="0.25"/>
  <!-- Left hand -->
  <circle cx="34" cy="186" r="12" fill="#1B6BBF"/>
  <circle cx="34" cy="186" r="8" fill="#2E86DE"/>

  <!-- Right arm -->
  <rect x="156" y="124" width="20" height="56" rx="10" fill="#2E86DE"/>
  <rect x="158" y="126" width="16" height="20" rx="8" fill="#54A0FF" opacity="0.25"/>
  <!-- Right hand -->
  <circle cx="166" cy="186" r="12" fill="#1B6BBF"/>
  <circle cx="166" cy="186" r="8" fill="#2E86DE"/>

  <!-- Left leg -->
  <rect x="62" y="224" width="28" height="40" rx="10" fill="#1B6BBF"/>
  <rect x="64" y="226" width="24" height="16" rx="8" fill="#54A0FF" opacity="0.25"/>
  <!-- Left foot -->
  <rect x="54" y="258" width="40" height="20" rx="10" fill="#2E86DE"/>
  <rect x="56" y="260" width="36" height="8" rx="4" fill="#54A0FF" opacity="0.25"/>

  <!-- Right leg -->
  <rect x="110" y="224" width="28" height="40" rx="10" fill="#1B6BBF"/>
  <rect x="112" y="226" width="24" height="16" rx="8" fill="#54A0FF" opacity="0.25"/>
  <!-- Right foot -->
  <rect x="106" y="258" width="40" height="20" rx="10" fill="#2E86DE"/>
  <rect x="108" y="260" width="36" height="8" rx="4" fill="#54A0FF" opacity="0.25"/>
</svg>
