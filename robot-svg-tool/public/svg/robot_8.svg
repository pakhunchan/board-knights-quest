<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Antenna stem -->
  <rect x="96" y="18" width="8" height="22" rx="3" ry="3" fill="#0097A7"/>
  <!-- Antenna ball -->
  <circle cx="100" cy="14" r="10" fill="#26C6DA"/>
  <circle cx="97" cy="11" r="3" fill="#4DD0E1" opacity="0.6"/>

  <!-- Head -->
  <rect x="58" y="40" width="84" height="64" rx="18" ry="18" fill="#00BCD4"/>
  <!-- Head highlight -->
  <rect x="64" y="44" width="72" height="28" rx="14" ry="14" fill="#26C6DA" opacity="0.4"/>

  <!-- Left eye socket -->
  <circle cx="80" cy="68" r="16" fill="#E0F7FA"/>
  <!-- Left pupil -->
  <circle cx="83" cy="68" r="8" fill="#263238"/>
  <!-- Left eye shine -->
  <circle cx="78" cy="64" r="3" fill="#FFFFFF"/>

  <!-- Right eye socket -->
  <circle cx="120" cy="68" r="16" fill="#E0F7FA"/>
  <!-- Right pupil -->
  <circle cx="123" cy="68" r="8" fill="#263238"/>
  <!-- Right eye shine -->
  <circle cx="118" cy="64" r="3" fill="#FFFFFF"/>

  <!-- Mouth -->
  <rect x="82" y="86" width="36" height="6" rx="3" ry="3" fill="#0097A7"/>

  <!-- Neck collar -->
  <rect x="52" y="104" width="96" height="14" rx="5" ry="5" fill="#0097A7"/>
  <!-- Collar detail line -->
  <rect x="56" y="109" width="88" height="3" rx="1.5" ry="1.5" fill="#00838F" opacity="0.5"/>

  <!-- Body -->
  <rect x="44" y="118" width="112" height="108" rx="22" ry="22" fill="#00BCD4"/>
  <!-- Body highlight -->
  <rect x="52" y="124" width="96" height="40" rx="16" ry="16" fill="#26C6DA" opacity="0.35"/>

  <!-- Chest panel -->
  <rect x="70" y="148" width="60" height="44" rx="10" ry="10" fill="#0097A7"/>
  <!-- Chest screen -->
  <rect x="78" y="156" width="44" height="28" rx="6" ry="6" fill="#E0F7FA" opacity="0.7"/>
  <!-- Chest buttons -->
  <circle cx="90" cy="170" r="5" fill="#26C6DA"/>
  <circle cx="110" cy="170" r="5" fill="#FF7043"/>

  <!-- Left arm -->
  <rect x="26" y="128" width="22" height="60" rx="11" ry="11" fill="#0097A7"/>
  <!-- Left hand -->
  <circle cx="37" cy="194" r="12" fill="#26C6DA"/>

  <!-- Right arm -->
  <rect x="152" y="128" width="22" height="60" rx="11" ry="11" fill="#0097A7"/>
  <!-- Right hand -->
  <circle cx="163" cy="194" r="12" fill="#26C6DA"/>

  <!-- Left leg -->
  <rect x="60" y="222" width="28" height="44" rx="12" ry="12" fill="#0097A7"/>
  <!-- Left foot -->
  <rect x="52" y="254" width="40" height="22" rx="10" ry="10" fill="#00838F"/>
  <!-- Left foot highlight -->
  <rect x="56" y="256" width="32" height="8" rx="4" ry="4" fill="#0097A7" opacity="0.5"/>

  <!-- Right leg -->
  <rect x="112" y="222" width="28" height="44" rx="12" ry="12" fill="#0097A7"/>
  <!-- Right foot -->
  <rect x="108" y="254" width="40" height="22" rx="10" ry="10" fill="#00838F"/>
  <!-- Right foot highlight -->
  <rect x="112" y="256" width="32" height="8" rx="4" ry="4" fill="#0097A7" opacity="0.5"/>
</svg>
