<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <defs>
    <linearGradient id="p1-body-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9B4FDE"/>
      <stop offset="100%" stop-color="#7B2FBE"/>
    </linearGradient>
    <linearGradient id="p1-head-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9B4FDE"/>
      <stop offset="100%" stop-color="#7B2FBE"/>
    </linearGradient>
    <linearGradient id="p1-panel-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A1078"/>
      <stop offset="100%" stop-color="#3A0A5E"/>
    </linearGradient>
  </defs>

  <!-- Antenna stem -->
  <rect x="96" y="12" width="8" height="22" rx="4" ry="4" fill="#7B2FBE"/>
  <!-- Antenna ball -->
  <circle cx="100" cy="10" r="9" fill="#B47FEE"/>
  <circle cx="97" cy="7" r="3" fill="#D4BFFF" opacity="0.6"/>

  <!-- Ear protrusions -->
  <rect x="30" y="52" width="18" height="28" rx="9" ry="9" fill="#9B4FDE"/>
  <rect x="152" y="52" width="18" height="28" rx="9" ry="9" fill="#9B4FDE"/>
  <!-- Ear inner detail -->
  <circle cx="39" cy="66" r="5" fill="#4A1078" opacity="0.4"/>
  <circle cx="161" cy="66" r="5" fill="#4A1078" opacity="0.4"/>

  <!-- Head (big rounded rect) -->
  <rect x="42" y="34" width="116" height="80" rx="24" ry="24" fill="url(#p1-head-grad)" stroke="#4A1078" stroke-width="2"/>
  <!-- Head highlight -->
  <rect x="54" y="40" width="70" height="12" rx="6" ry="6" fill="#B47FEE" opacity="0.35"/>

  <!-- Left eye socket -->
  <ellipse cx="72" cy="72" rx="18" ry="17" fill="#4A1078"/>
  <!-- Left eye white -->
  <ellipse cx="72" cy="72" rx="14" ry="13" fill="#FFFFFF"/>
  <!-- Left pupil -->
  <circle cx="76" cy="72" r="7" fill="#2A0050"/>
  <!-- Left eye shine -->
  <circle cx="79" cy="68" r="3" fill="#FFFFFF"/>

  <!-- Right eye socket -->
  <ellipse cx="128" cy="72" rx="18" ry="17" fill="#4A1078"/>
  <!-- Right eye white -->
  <ellipse cx="128" cy="72" rx="14" ry="13" fill="#FFFFFF"/>
  <!-- Right pupil -->
  <circle cx="132" cy="72" r="7" fill="#2A0050"/>
  <!-- Right eye shine -->
  <circle cx="135" cy="68" r="3" fill="#FFFFFF"/>

  <!-- Mouth (wide friendly grin) -->
  <rect x="72" y="92" width="56" height="14" rx="7" ry="7" fill="#4A1078"/>
  <!-- Teeth -->
  <rect x="80" y="92" width="10" height="7" rx="2" ry="2" fill="#FFFFFF"/>
  <rect x="93" y="92" width="10" height="7" rx="2" ry="2" fill="#FFFFFF"/>
  <rect x="106" y="92" width="10" height="7" rx="2" ry="2" fill="#FFFFFF"/>

  <!-- Neck/collar -->
  <rect x="72" y="114" width="56" height="14" rx="6" ry="6" fill="#4A1078"/>
  <!-- Collar bolts -->
  <circle cx="80" cy="121" r="3" fill="#B47FEE"/>
  <circle cx="120" cy="121" r="3" fill="#B47FEE"/>

  <!-- Body (wide stocky) -->
  <rect x="36" y="126" width="128" height="96" rx="22" ry="22" fill="url(#p1-body-grad)" stroke="#4A1078" stroke-width="2"/>
  <!-- Body highlight -->
  <rect x="48" y="132" width="50" height="10" rx="5" ry="5" fill="#B47FEE" opacity="0.3"/>

  <!-- Chest panel -->
  <rect x="62" y="142" width="76" height="60" rx="12" ry="12" fill="url(#p1-panel-grad)"/>
  <!-- Panel border glow -->
  <rect x="62" y="142" width="76" height="60" rx="12" ry="12" fill="none" stroke="#B47FEE" stroke-width="1.5" opacity="0.5"/>

  <!-- Buttons on chest -->
  <circle cx="82" cy="160" r="7" fill="#FF6B8A"/>
  <circle cx="82" cy="160" r="4" fill="#FF8FA8" opacity="0.6"/>
  <circle cx="100" cy="160" r="7" fill="#FFD93D"/>
  <circle cx="100" cy="160" r="4" fill="#FFE57A" opacity="0.6"/>
  <circle cx="118" cy="160" r="7" fill="#6BCB77"/>
  <circle cx="118" cy="160" r="4" fill="#8FDB95" opacity="0.6"/>

  <!-- Chest meter/bar -->
  <rect x="74" y="178" width="52" height="8" rx="4" ry="4" fill="#2A0050"/>
  <rect x="76" y="180" width="20" height="4" rx="2" ry="2" fill="#6BCB77"/>
  <rect x="98" y="180" width="12" height="4" rx="2" ry="2" fill="#FFD93D"/>

  <!-- Left arm (stubby) -->
  <rect x="14" y="138" width="24" height="52" rx="12" ry="12" fill="#9B4FDE" stroke="#4A1078" stroke-width="1.5"/>
  <!-- Left hand -->
  <circle cx="26" cy="196" r="14" fill="#B47FEE" stroke="#7B2FBE" stroke-width="1.5"/>
  <circle cx="26" cy="196" r="7" fill="#9B4FDE"/>

  <!-- Right arm (stubby) -->
  <rect x="162" y="138" width="24" height="52" rx="12" ry="12" fill="#9B4FDE" stroke="#4A1078" stroke-width="1.5"/>
  <!-- Right hand -->
  <circle cx="174" cy="196" r="14" fill="#B47FEE" stroke="#7B2FBE" stroke-width="1.5"/>
  <circle cx="174" cy="196" r="7" fill="#9B4FDE"/>

  <!-- Left leg (short) -->
  <rect x="56" y="218" width="30" height="38" rx="12" ry="12" fill="#7B2FBE" stroke="#4A1078" stroke-width="1.5"/>
  <!-- Left foot -->
  <ellipse cx="64" cy="268" rx="24" ry="14" fill="#9B4FDE" stroke="#4A1078" stroke-width="1.5"/>
  <ellipse cx="58" cy="266" rx="6" ry="4" fill="#B47FEE" opacity="0.4"/>

  <!-- Right leg (short) -->
  <rect x="114" y="218" width="30" height="38" rx="12" ry="12" fill="#7B2FBE" stroke="#4A1078" stroke-width="1.5"/>
  <!-- Right foot -->
  <ellipse cx="136" cy="268" rx="24" ry="14" fill="#9B4FDE" stroke="#4A1078" stroke-width="1.5"/>
  <ellipse cx="130" cy="266" rx="6" ry="4" fill="#B47FEE" opacity="0.4"/>

  <!-- Belly bolt -->
  <circle cx="100" cy="200" r="5" fill="#B47FEE"/>
  <circle cx="100" cy="200" r="2.5" fill="#7B2FBE"/>
</svg>
