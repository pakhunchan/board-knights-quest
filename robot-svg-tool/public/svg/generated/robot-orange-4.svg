<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Robot 4: Peach-Orange — Round Belly, Small Head, Waddle Legs, Very Cute -->

  <!-- Antenna -->
  <rect x="96" y="20" width="8" height="28" rx="4" fill="#CC6030"/>
  <circle cx="100" cy="15" r="10" fill="#FFA878"/>
  <circle cx="100" cy="13" r="5" fill="#FFD0B0"/>

  <!-- Small Head -->
  <rect x="68" y="48" width="64" height="48" rx="20" fill="#F08050"/>
  <rect x="72" y="52" width="56" height="16" rx="8" fill="#FFA878" opacity="0.35"/>

  <!-- Left Eye -->
  <circle cx="86" cy="68" r="11" fill="#CC6030"/>
  <circle cx="86" cy="68" r="9" fill="white"/>
  <circle cx="88" cy="70" r="5" fill="#222"/>
  <circle cx="84" cy="66" r="2.5" fill="white"/>

  <!-- Right Eye -->
  <circle cx="114" cy="68" r="11" fill="#CC6030"/>
  <circle cx="114" cy="68" r="9" fill="white"/>
  <circle cx="116" cy="70" r="5" fill="#222"/>
  <circle cx="112" cy="66" r="2.5" fill="white"/>

  <!-- Mouth (cute small smile) -->
  <path d="M90 82 Q100 92 110 82" stroke="#CC6030" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Cheek blush -->
  <ellipse cx="74" cy="78" rx="7" ry="4" fill="#FFA878" opacity="0.6"/>
  <ellipse cx="126" cy="78" rx="7" ry="4" fill="#FFA878" opacity="0.6"/>

  <!-- Neck (short connector) -->
  <rect x="88" y="96" width="24" height="12" rx="6" fill="#CC6030"/>

  <!-- Large Round Belly Body -->
  <ellipse cx="100" cy="168" rx="68" ry="72" fill="#F08050"/>
  <!-- Top body highlight -->
  <ellipse cx="100" cy="140" rx="48" ry="24" fill="#FFA878" opacity="0.3"/>

  <!-- Belly Panel (round) -->
  <ellipse cx="100" cy="168" rx="42" ry="44" fill="#CC6030"/>
  <ellipse cx="100" cy="168" rx="38" ry="40" fill="#FFA878"/>

  <!-- Belly details — buttons in a vertical line -->
  <circle cx="100" cy="142" r="7" fill="#F08050"/>
  <circle cx="100" cy="142" r="4" fill="#FFD0B0"/>
  <circle cx="100" cy="162" r="7" fill="#F08050"/>
  <circle cx="100" cy="162" r="4" fill="#FFD0B0"/>
  <circle cx="100" cy="182" r="7" fill="#F08050"/>
  <circle cx="100" cy="182" r="4" fill="#FFD0B0"/>

  <!-- Speaker grille on belly -->
  <rect x="82" y="196" width="36" height="10" rx="5" fill="#CC6030" opacity="0.5"/>
  <line x1="87" y1="201" x2="113" y2="201" stroke="#F08050" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="89" y1="198" x2="111" y2="198" stroke="#F08050" stroke-width="1" stroke-linecap="round"/>
  <line x1="89" y1="204" x2="111" y2="204" stroke="#F08050" stroke-width="1" stroke-linecap="round"/>

  <!-- Left Arm (short, sticking out) -->
  <g transform="rotate(20, 34, 155)">
    <rect x="8" y="148" width="28" height="14" rx="7" fill="#F08050"/>
    <!-- Hand -->
    <circle cx="12" cy="155" r="11" fill="#FFA878"/>
    <circle cx="12" cy="155" r="6.5" fill="#FFD0B0"/>
  </g>

  <!-- Right Arm (short, sticking out) -->
  <g transform="rotate(-20, 166, 155)">
    <rect x="164" y="148" width="28" height="14" rx="7" fill="#F08050"/>
    <!-- Hand -->
    <circle cx="188" cy="155" r="11" fill="#FFA878"/>
    <circle cx="188" cy="155" r="6.5" fill="#FFD0B0"/>
  </g>

  <!-- Left Leg (short waddle) -->
  <g transform="rotate(5, 76, 238)">
    <rect x="64" y="234" width="24" height="28" rx="12" fill="#F08050"/>
    <!-- Foot (wide and flat) -->
    <ellipse cx="72" cy="268" rx="22" ry="12" fill="#CC6030"/>
    <ellipse cx="72" cy="270" rx="18" ry="8" fill="#FFA878" opacity="0.45"/>
  </g>

  <!-- Right Leg (short waddle) -->
  <g transform="rotate(-5, 124, 238)">
    <rect x="112" y="234" width="24" height="28" rx="12" fill="#F08050"/>
    <!-- Foot (wide and flat) -->
    <ellipse cx="128" cy="268" rx="22" ry="12" fill="#CC6030"/>
    <ellipse cx="128" cy="270" rx="18" ry="8" fill="#FFA878" opacity="0.45"/>
  </g>

  <!-- Overall belly shine -->
  <ellipse cx="84" cy="148" rx="16" ry="28" fill="#FFD0B0" opacity="0.12"/>
</svg>
