<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <defs>
    <linearGradient id="p2-body-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A78BDB"/>
      <stop offset="100%" stop-color="#8B6CC1"/>
    </linearGradient>
    <linearGradient id="p2-head-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A78BDB"/>
      <stop offset="100%" stop-color="#8B6CC1"/>
    </linearGradient>
    <linearGradient id="p2-panel-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5C3D99"/>
      <stop offset="100%" stop-color="#4A2E80"/>
    </linearGradient>
  </defs>

  <!-- Antenna stem (tall pointed) -->
  <polygon points="100,2 96,18 104,18" fill="#8B6CC1"/>
  <rect x="97" y="16" width="6" height="20" rx="3" ry="3" fill="#8B6CC1"/>
  <!-- Antenna tip glow -->
  <circle cx="100" cy="4" r="5" fill="#C4ABF0"/>
  <circle cx="99" cy="3" r="2" fill="#E0D0FF" opacity="0.7"/>

  <!-- Head (small, narrow) -->
  <rect x="64" y="36" width="72" height="56" rx="18" ry="18" fill="url(#p2-head-grad)" stroke="#5C3D99" stroke-width="2"/>
  <!-- Head highlight -->
  <rect x="72" y="41" width="40" height="8" rx="4" ry="4" fill="#C4ABF0" opacity="0.35"/>

  <!-- Left eye socket -->
  <ellipse cx="84" cy="62" rx="13" ry="12" fill="#5C3D99"/>
  <!-- Left eye white -->
  <ellipse cx="84" cy="62" rx="10" ry="9.5" fill="#FFFFFF"/>
  <!-- Left pupil -->
  <circle cx="87" cy="62" r="5.5" fill="#2A1050"/>
  <!-- Left shine -->
  <circle cx="89" cy="59" r="2.5" fill="#FFFFFF"/>

  <!-- Right eye socket -->
  <ellipse cx="116" cy="62" rx="13" ry="12" fill="#5C3D99"/>
  <!-- Right eye white -->
  <ellipse cx="116" cy="62" rx="10" ry="9.5" fill="#FFFFFF"/>
  <!-- Right pupil -->
  <circle cx="119" cy="62" r="5.5" fill="#2A1050"/>
  <!-- Right shine -->
  <circle cx="121" cy="59" r="2.5" fill="#FFFFFF"/>

  <!-- Mouth (small smile arc) -->
  <path d="M88,80 Q100,90 112,80" fill="none" stroke="#5C3D99" stroke-width="3" stroke-linecap="round"/>
  <!-- Cheek dots -->
  <circle cx="78" cy="76" r="4" fill="#C4ABF0" opacity="0.5"/>
  <circle cx="122" cy="76" r="4" fill="#C4ABF0" opacity="0.5"/>

  <!-- Neck/collar (narrow) -->
  <rect x="86" y="92" width="28" height="12" rx="6" ry="6" fill="#5C3D99"/>
  <!-- Collar accent line -->
  <rect x="90" y="96" width="20" height="3" rx="1.5" ry="1.5" fill="#C4ABF0" opacity="0.4"/>

  <!-- Body (narrow, tall) -->
  <rect x="60" y="102" width="80" height="100" rx="18" ry="18" fill="url(#p2-body-grad)" stroke="#5C3D99" stroke-width="2"/>
  <!-- Body highlight -->
  <rect x="68" y="108" width="36" height="8" rx="4" ry="4" fill="#C4ABF0" opacity="0.3"/>

  <!-- Chest panel -->
  <rect x="72" y="118" width="56" height="66" rx="10" ry="10" fill="url(#p2-panel-grad)"/>
  <rect x="72" y="118" width="56" height="66" rx="10" ry="10" fill="none" stroke="#C4ABF0" stroke-width="1" opacity="0.5"/>

  <!-- Buttons (vertical column) -->
  <circle cx="100" cy="132" r="6" fill="#FF6B8A"/>
  <circle cx="100" cy="132" r="3.5" fill="#FF8FA8" opacity="0.6"/>
  <circle cx="100" cy="148" r="6" fill="#FFD93D"/>
  <circle cx="100" cy="148" r="3.5" fill="#FFE57A" opacity="0.6"/>
  <circle cx="100" cy="164" r="6" fill="#6BCB77"/>
  <circle cx="100" cy="164" r="3.5" fill="#8FDB95" opacity="0.6"/>

  <!-- Chest screen/display -->
  <rect x="84" y="172" width="32" height="6" rx="3" ry="3" fill="#2A1050"/>
  <rect x="86" y="173.5" width="14" height="3" rx="1.5" ry="1.5" fill="#6BCB77" opacity="0.8"/>

  <!-- Left arm (long, thin) -->
  <rect x="34" y="108" width="18" height="70" rx="9" ry="9" fill="#A78BDB" stroke="#5C3D99" stroke-width="1.5"/>
  <!-- Left elbow joint -->
  <circle cx="43" cy="148" r="5" fill="#8B6CC1" stroke="#5C3D99" stroke-width="1"/>
  <!-- Left forearm -->
  <rect x="36" y="152" width="14" height="38" rx="7" ry="7" fill="#A78BDB" stroke="#5C3D99" stroke-width="1.5"/>
  <!-- Left hand -->
  <circle cx="43" cy="196" r="11" fill="#C4ABF0" stroke="#8B6CC1" stroke-width="1.5"/>
  <circle cx="43" cy="196" r="5" fill="#A78BDB"/>

  <!-- Right arm (long, thin) -->
  <rect x="148" y="108" width="18" height="70" rx="9" ry="9" fill="#A78BDB" stroke="#5C3D99" stroke-width="1.5"/>
  <!-- Right elbow joint -->
  <circle cx="157" cy="148" r="5" fill="#8B6CC1" stroke="#5C3D99" stroke-width="1"/>
  <!-- Right forearm -->
  <rect x="150" y="152" width="14" height="38" rx="7" ry="7" fill="#A78BDB" stroke="#5C3D99" stroke-width="1.5"/>
  <!-- Right hand -->
  <circle cx="157" cy="196" r="11" fill="#C4ABF0" stroke="#8B6CC1" stroke-width="1.5"/>
  <circle cx="157" cy="196" r="5" fill="#A78BDB"/>

  <!-- Left leg (long, thin) -->
  <rect x="70" y="198" width="22" height="58" rx="11" ry="11" fill="#8B6CC1" stroke="#5C3D99" stroke-width="1.5"/>
  <!-- Left knee joint -->
  <circle cx="81" cy="230" r="4.5" fill="#A78BDB" stroke="#5C3D99" stroke-width="1"/>
  <!-- Left shin -->
  <rect x="72" y="234" width="18" height="30" rx="9" ry="9" fill="#8B6CC1" stroke="#5C3D99" stroke-width="1.5"/>
  <!-- Left foot -->
  <ellipse cx="76" cy="274" rx="18" ry="11" fill="#A78BDB" stroke="#5C3D99" stroke-width="1.5"/>
  <ellipse cx="72" cy="272" rx="4" ry="3" fill="#C4ABF0" opacity="0.4"/>

  <!-- Right leg (long, thin) -->
  <rect x="108" y="198" width="22" height="58" rx="11" ry="11" fill="#8B6CC1" stroke="#5C3D99" stroke-width="1.5"/>
  <!-- Right knee joint -->
  <circle cx="119" cy="230" r="4.5" fill="#A78BDB" stroke="#5C3D99" stroke-width="1"/>
  <!-- Right shin -->
  <rect x="110" y="234" width="18" height="30" rx="9" ry="9" fill="#8B6CC1" stroke="#5C3D99" stroke-width="1.5"/>
  <!-- Right foot -->
  <ellipse cx="124" cy="274" rx="18" ry="11" fill="#A78BDB" stroke="#5C3D99" stroke-width="1.5"/>
  <ellipse cx="120" cy="272" rx="4" ry="3" fill="#C4ABF0" opacity="0.4"/>

  <!-- Belly bolt -->
  <circle cx="100" cy="192" r="4" fill="#C4ABF0"/>
  <circle cx="100" cy="192" r="2" fill="#8B6CC1"/>
</svg>
