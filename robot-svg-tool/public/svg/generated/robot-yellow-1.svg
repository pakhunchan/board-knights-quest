<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <defs>
    <linearGradient id="y1body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD040"/>
      <stop offset="100%" stop-color="#F5B800"/>
    </linearGradient>
    <linearGradient id="y1head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD040"/>
      <stop offset="100%" stop-color="#F5B800"/>
    </linearGradient>
    <linearGradient id="y1panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C49000"/>
      <stop offset="100%" stop-color="#B08000"/>
    </linearGradient>
  </defs>

  <!-- Antenna stem -->
  <rect x="96" y="18" width="8" height="24" rx="4" ry="4" fill="#C49000"/>
  <!-- Antenna ball -->
  <circle cx="100" cy="14" r="10" fill="#FFE888"/>
  <circle cx="97" cy="11" r="3" fill="#FFF5CC" opacity="0.7"/>

  <!-- Head -->
  <rect x="52" y="42" width="96" height="72" rx="22" ry="22" fill="url(#y1head)" stroke="#C49000" stroke-width="2"/>
  <!-- Head highlight -->
  <rect x="60" y="46" width="60" height="16" rx="8" ry="8" fill="#FFE888" opacity="0.45"/>

  <!-- Left eye socket -->
  <ellipse cx="76" cy="74" rx="16" ry="17" fill="#C49000"/>
  <!-- Left eye white -->
  <ellipse cx="76" cy="74" rx="13" ry="14" fill="#FFFFFF"/>
  <!-- Left pupil -->
  <circle cx="79" cy="74" r="7" fill="#2D2D2D"/>
  <!-- Left shine -->
  <circle cx="82" cy="70" r="3" fill="#FFFFFF"/>

  <!-- Right eye socket -->
  <ellipse cx="124" cy="74" rx="16" ry="17" fill="#C49000"/>
  <!-- Right eye white -->
  <ellipse cx="124" cy="74" rx="13" ry="14" fill="#FFFFFF"/>
  <!-- Right pupil -->
  <circle cx="127" cy="74" r="7" fill="#2D2D2D"/>
  <!-- Right shine -->
  <circle cx="130" cy="70" r="3" fill="#FFFFFF"/>

  <!-- Mouth - happy smile -->
  <path d="M78 94 Q100 112 122 94" fill="none" stroke="#C49000" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Cheek blush left -->
  <ellipse cx="62" cy="90" rx="8" ry="5" fill="#FFB366" opacity="0.35"/>
  <!-- Cheek blush right -->
  <ellipse cx="138" cy="90" rx="8" ry="5" fill="#FFB366" opacity="0.35"/>

  <!-- Neck / collar -->
  <rect x="78" y="114" width="44" height="14" rx="7" ry="7" fill="#C49000"/>
  <rect x="74" y="122" width="52" height="10" rx="5" ry="5" fill="#F5B800" stroke="#C49000" stroke-width="1.5"/>

  <!-- Body -->
  <rect x="46" y="130" width="108" height="96" rx="20" ry="20" fill="url(#y1body)" stroke="#C49000" stroke-width="2"/>
  <!-- Body highlight -->
  <rect x="54" y="134" width="50" height="14" rx="7" ry="7" fill="#FFE888" opacity="0.35"/>

  <!-- Chest panel -->
  <rect x="66" y="148" width="68" height="56" rx="12" ry="12" fill="url(#y1panel)"/>
  <rect x="70" y="152" width="60" height="48" rx="10" ry="10" fill="#C49000" stroke="#A07000" stroke-width="1"/>

  <!-- Star emblem on chest -->
  <polygon points="100,158 104,168 115,168 106,174 110,185 100,178 90,185 94,174 85,168 96,168" fill="#FFE888"/>
  <polygon points="100,162 103,169 110,169 104,173 107,181 100,176 93,181 96,173 90,169 97,169" fill="#FFD040"/>

  <!-- Chest buttons -->
  <circle cx="82" cy="194" r="4" fill="#FFD040" stroke="#A07000" stroke-width="1"/>
  <circle cx="100" cy="194" r="4" fill="#FFD040" stroke="#A07000" stroke-width="1"/>
  <circle cx="118" cy="194" r="4" fill="#FFD040" stroke="#A07000" stroke-width="1"/>

  <!-- Left arm -->
  <rect x="22" y="140" width="22" height="60" rx="11" ry="11" fill="#F5B800" stroke="#C49000" stroke-width="2"/>
  <!-- Left hand -->
  <circle cx="33" cy="206" r="14" fill="#FFD040" stroke="#C49000" stroke-width="2"/>
  <circle cx="33" cy="206" r="7" fill="#FFE888" opacity="0.4"/>

  <!-- Right arm -->
  <rect x="156" y="140" width="22" height="60" rx="11" ry="11" fill="#F5B800" stroke="#C49000" stroke-width="2"/>
  <!-- Right hand -->
  <circle cx="167" cy="206" r="14" fill="#FFD040" stroke="#C49000" stroke-width="2"/>
  <circle cx="167" cy="206" r="7" fill="#FFE888" opacity="0.4"/>

  <!-- Left leg -->
  <rect x="62" y="222" width="26" height="44" rx="13" ry="13" fill="#F5B800" stroke="#C49000" stroke-width="2"/>
  <!-- Left foot -->
  <ellipse cx="70" cy="272" rx="22" ry="12" fill="#C49000"/>
  <ellipse cx="70" cy="270" rx="22" ry="12" fill="#F5B800" stroke="#C49000" stroke-width="2"/>
  <ellipse cx="66" cy="268" rx="10" ry="5" fill="#FFE888" opacity="0.35"/>

  <!-- Right leg -->
  <rect x="112" y="222" width="26" height="44" rx="13" ry="13" fill="#F5B800" stroke="#C49000" stroke-width="2"/>
  <!-- Right foot -->
  <ellipse cx="130" cy="272" rx="22" ry="12" fill="#C49000"/>
  <ellipse cx="130" cy="270" rx="22" ry="12" fill="#F5B800" stroke="#C49000" stroke-width="2"/>
  <ellipse cx="126" cy="268" rx="10" ry="5" fill="#FFE888" opacity="0.35"/>
</svg>
