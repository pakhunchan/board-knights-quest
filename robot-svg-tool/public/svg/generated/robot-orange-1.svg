<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Antenna stem -->
  <rect x="96" y="18" width="8" height="20" rx="3" ry="3" fill="#C45A10"/>
  <!-- Antenna ball -->
  <circle cx="100" cy="14" r="10" fill="#FFAB3D"/>
  <circle cx="97" cy="11" r="3" fill="#FFD080" opacity="0.6"/>

  <!-- Head -->
  <rect x="58" y="38" width="84" height="60" rx="18" ry="18" fill="#F5921B"/>
  <!-- Head highlight -->
  <rect x="64" y="42" width="72" height="28" rx="14" ry="14" fill="#FFAB3D" opacity="0.35"/>

  <!-- Left eye socket -->
  <circle cx="80" cy="65" r="16" fill="#C45A10"/>
  <!-- Left eye white -->
  <circle cx="80" cy="65" r="12" fill="#EEEEFF"/>
  <!-- Left pupil -->
  <circle cx="83" cy="64" r="6" fill="#2A1A08"/>
  <!-- Left eye shine -->
  <circle cx="86" cy="61" r="2.5" fill="#FFFFFF"/>

  <!-- Right eye socket -->
  <circle cx="120" cy="65" r="16" fill="#C45A10"/>
  <!-- Right eye white -->
  <circle cx="120" cy="65" r="12" fill="#EEEEFF"/>
  <!-- Right pupil -->
  <circle cx="123" cy="64" r="6" fill="#2A1A08"/>
  <!-- Right eye shine -->
  <circle cx="126" cy="61" r="2.5" fill="#FFFFFF"/>

  <!-- Mouth (cheerful smile) -->
  <path d="M82,84 Q100,96 118,84" stroke="#C45A10" stroke-width="4" stroke-linecap="round" fill="none"/>

  <!-- Neck / collar band -->
  <rect x="70" y="98" width="60" height="14" rx="5" ry="5" fill="#C45A10"/>
  <rect x="76" y="101" width="48" height="8" rx="3" ry="3" fill="#FFAB3D" opacity="0.3"/>

  <!-- Body -->
  <rect x="48" y="112" width="104" height="110" rx="22" ry="22" fill="#F5921B"/>
  <!-- Body highlight -->
  <rect x="56" y="118" width="88" height="50" rx="16" ry="16" fill="#FFAB3D" opacity="0.25"/>

  <!-- Chest panel -->
  <rect x="72" y="135" width="56" height="45" rx="10" ry="10" fill="#C45A10"/>
  <!-- Chest button left -->
  <circle cx="88" cy="150" r="6" fill="#FFAB3D"/>
  <circle cx="88" cy="150" r="3" fill="#FFD080"/>
  <!-- Chest button right -->
  <circle cx="112" cy="150" r="6" fill="#FFAB3D"/>
  <circle cx="112" cy="150" r="3" fill="#FFD080"/>
  <!-- Chest meter bar background -->
  <rect x="82" y="164" width="36" height="8" rx="4" ry="4" fill="#8B3D08"/>
  <!-- Chest meter bar fill -->
  <rect x="84" y="166" width="20" height="4" rx="2" ry="2" fill="#FFAB3D"/>

  <!-- Left arm -->
  <rect x="28" y="120" width="24" height="60" rx="12" ry="12" fill="#F5921B"/>
  <rect x="30" y="122" width="20" height="24" rx="10" ry="10" fill="#FFAB3D" opacity="0.25"/>
  <!-- Left hand -->
  <circle cx="40" cy="182" r="12" fill="#C45A10"/>
  <circle cx="38" cy="179" r="3" fill="#FFAB3D" opacity="0.3"/>

  <!-- Right arm -->
  <rect x="148" y="120" width="24" height="60" rx="12" ry="12" fill="#F5921B"/>
  <rect x="150" y="122" width="20" height="24" rx="10" ry="10" fill="#FFAB3D" opacity="0.25"/>
  <!-- Right hand -->
  <circle cx="160" cy="182" r="12" fill="#C45A10"/>
  <circle cx="158" cy="179" r="3" fill="#FFAB3D" opacity="0.3"/>

  <!-- Left leg -->
  <rect x="62" y="218" width="30" height="45" rx="12" ry="12" fill="#C45A10"/>
  <rect x="64" y="220" width="26" height="18" rx="10" ry="10" fill="#FFAB3D" opacity="0.2"/>
  <!-- Left foot -->
  <rect x="56" y="255" width="40" height="22" rx="10" ry="10" fill="#F5921B"/>
  <rect x="58" y="257" width="36" height="10" rx="8" ry="8" fill="#FFAB3D" opacity="0.25"/>

  <!-- Right leg -->
  <rect x="108" y="218" width="30" height="45" rx="12" ry="12" fill="#C45A10"/>
  <rect x="110" y="220" width="26" height="18" rx="10" ry="10" fill="#FFAB3D" opacity="0.2"/>
  <!-- Right foot -->
  <rect x="104" y="255" width="40" height="22" rx="10" ry="10" fill="#F5921B"/>
  <rect x="106" y="257" width="36" height="10" rx="8" ry="8" fill="#FFAB3D" opacity="0.25"/>
</svg>
