<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 300">

  <!-- ANTENNA -->
  <!-- Antenna ball (slightly larger r=10 for this variant) -->
  <circle cx="60" cy="12" r="10" fill="#E0A0C0"/>
  <!-- Antenna stem -->
  <rect x="57" y="22" width="6" height="28" rx="3" ry="3" fill="#C080A0"/>
  <!-- Stem ridges/rings -->
  <rect x="54" y="27" width="12" height="3" rx="1.5" ry="1.5" fill="#986080"/>
  <rect x="54" y="34" width="12" height="3" rx="1.5" ry="1.5" fill="#986080"/>
  <rect x="54" y="41" width="12" height="3" rx="1.5" ry="1.5" fill="#986080"/>

  <!-- HEAD -->
  <rect x="20" y="52" width="80" height="55" rx="10" ry="10" fill="#C080A0"/>
  <!-- Eye sockets (darker recessed area) -->
  <rect x="27" y="58" width="66" height="40" rx="8" ry="8" fill="#986080"/>
  <!-- Left eye white (larger eye, 17px radius — quirky asymmetry) -->
  <circle cx="44" cy="78" r="17" fill="#FFFFFF"/>
  <!-- Left pupil -->
  <circle cx="44" cy="75" r="9" fill="#280A18"/>
  <!-- Left eye shine -->
  <circle cx="48" cy="71" r="3.5" fill="#FFFFFF"/>
  <!-- Right eye white (smaller eye, 15px radius — curious look) -->
  <circle cx="76" cy="78" r="15" fill="#FFFFFF"/>
  <!-- Right pupil -->
  <circle cx="76" cy="75" r="8" fill="#280A18"/>
  <!-- Right eye shine -->
  <circle cx="79" cy="71" r="3" fill="#FFFFFF"/>

  <!-- NECK -->
  <rect x="42" y="107" width="36" height="8" rx="4" ry="4" fill="#986080"/>

  <!-- BODY -->
  <rect x="20" y="115" width="80" height="70" rx="10" ry="10" fill="#C080A0"/>
  <!-- Belly panel (lighter accent) -->
  <rect x="32" y="128" width="56" height="44" rx="8" ry="8" fill="#E0A0C0"/>
  <!-- Power button (unique trait for variant 4) -->
  <circle cx="60" cy="134" r="6" fill="#986080"/>
  <circle cx="60" cy="134" r="3.5" fill="#C080A0"/>
  <!-- Power symbol line on button -->
  <line x1="60" y1="130" x2="60" y2="133" stroke="#E0A0C0" stroke-width="1.5" stroke-linecap="round"/>

  <!-- LEGS -->
  <!-- Arch shadow between legs -->
  <ellipse cx="60" cy="191" rx="12" ry="6" fill="#986080"/>
  <!-- Body bottom overlap to clean up leg join -->
  <rect x="20" y="180" width="80" height="10" fill="#C080A0"/>
  <!-- Left leg -->
  <rect x="24" y="185" width="25" height="50" rx="12.5" ry="12.5" fill="#C080A0"/>
  <!-- Left leg subtle highlight -->
  <rect x="30" y="194" width="13" height="22" rx="6.5" ry="6.5" fill="#E0A0C0" opacity="0.35"/>
  <!-- Right leg -->
  <rect x="71" y="185" width="25" height="50" rx="12.5" ry="12.5" fill="#C080A0"/>
  <!-- Right leg subtle highlight -->
  <rect x="77" y="194" width="13" height="22" rx="6.5" ry="6.5" fill="#E0A0C0" opacity="0.35"/>

</svg>
