<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Robot 5: Orange Builder — hard hat, sturdy build, tool belt, work boots -->
  <defs>
    <linearGradient id="o5body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F08040"/>
      <stop offset="100%" stop-color="#D06020"/>
    </linearGradient>
    <linearGradient id="o5head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F08040"/>
      <stop offset="100%" stop-color="#D06020"/>
    </linearGradient>
    <linearGradient id="o5hat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFB080"/>
      <stop offset="100%" stop-color="#D06020"/>
    </linearGradient>
  </defs>

  <!-- Hard hat — flat wide top -->
  <!-- Hat brim -->
  <ellipse cx="100" cy="44" rx="58" ry="10" fill="#A04518" stroke="#802E10" stroke-width="1.5"/>
  <!-- Hat dome -->
  <path d="M 56 44 Q 56 16 100 12 Q 144 16 144 44 Z" fill="url(#o5hat)" stroke="#A04518" stroke-width="1.5"/>
  <!-- Hat highlight -->
  <path d="M 72 28 Q 90 18 116 22" stroke="#FFB080" stroke-width="2.5" fill="none" opacity="0.5" stroke-linecap="round"/>
  <!-- Hat front emblem -->
  <circle cx="100" cy="32" r="6" fill="#A04518"/>
  <rect x="97" y="28" width="6" height="8" rx="1" fill="#FFB080" opacity="0.7"/>

  <!-- Head — sturdy square-ish rounded rect -->
  <rect x="46" y="44" width="108" height="74" rx="24" fill="url(#o5head)" stroke="#A04518" stroke-width="2"/>
  <!-- Head highlight -->
  <ellipse cx="82" cy="58" rx="28" ry="8" fill="#FFB080" opacity="0.25"/>

  <!-- Left eye socket -->
  <ellipse cx="72" cy="76" rx="18" ry="19" fill="#A04518"/>
  <!-- Left eye white -->
  <ellipse cx="72" cy="76" rx="15" ry="16" fill="#FFFFFF"/>
  <!-- Left pupil — confident look -->
  <circle cx="76" cy="78" r="8" fill="#4A2008"/>
  <!-- Left eye shine -->
  <circle cx="80" cy="72" r="3.5" fill="#FFFFFF"/>
  <circle cx="76" cy="82" r="1.8" fill="#FFFFFF" opacity="0.5"/>

  <!-- Right eye socket -->
  <ellipse cx="128" cy="76" rx="18" ry="19" fill="#A04518"/>
  <!-- Right eye white -->
  <ellipse cx="128" cy="76" rx="15" ry="16" fill="#FFFFFF"/>
  <!-- Right pupil -->
  <circle cx="132" cy="78" r="8" fill="#4A2008"/>
  <!-- Right eye shine -->
  <circle cx="136" cy="72" r="3.5" fill="#FFFFFF"/>
  <circle cx="132" cy="82" r="1.8" fill="#FFFFFF" opacity="0.5"/>

  <!-- Mouth — confident wide grin -->
  <path d="M 72 100 Q 86 114 100 112 Q 114 114 128 100" stroke="#A04518" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Tooth highlight -->
  <rect x="92" y="104" width="16" height="6" rx="2" fill="#FFFFFF" opacity="0.7"/>

  <!-- Neck / collar — thick sturdy -->
  <rect x="76" y="116" width="48" height="16" rx="8" fill="#A04518"/>
  <rect x="80" y="118" width="40" height="12" rx="6" fill="#D06020" opacity="0.6"/>

  <!-- Body — wide sturdy rectangle -->
  <rect x="38" y="130" width="124" height="96" rx="26" fill="url(#o5body)" stroke="#A04518" stroke-width="2"/>
  <!-- Body highlight -->
  <ellipse cx="82" cy="148" rx="30" ry="10" fill="#FFB080" opacity="0.2"/>

  <!-- Chest panel — blueprint/gauge area -->
  <rect x="60" y="146" width="80" height="48" rx="12" fill="#A04518" stroke="#802E10" stroke-width="1"/>
  <rect x="64" y="150" width="72" height="40" rx="10" fill="#FFB080"/>

  <!-- Gauge 1 -->
  <circle cx="82" cy="162" r="8" fill="#D06020"/>
  <circle cx="82" cy="162" r="5.5" fill="#FFB080"/>
  <line x1="82" y1="162" x2="86" y2="158" stroke="#A04518" stroke-width="2" stroke-linecap="round"/>
  <!-- Gauge 2 -->
  <circle cx="118" cy="162" r="8" fill="#D06020"/>
  <circle cx="118" cy="162" r="5.5" fill="#FFB080"/>
  <line x1="118" y1="162" x2="114" y2="158" stroke="#A04518" stroke-width="2" stroke-linecap="round"/>
  <!-- Bar indicator -->
  <rect x="76" y="176" width="48" height="8" rx="4" fill="#D06020"/>
  <rect x="78" y="178" width="28" height="4" rx="2" fill="#60D040"/>

  <!-- Tool belt -->
  <rect x="34" y="220" width="132" height="14" rx="5" fill="#802E10" stroke="#5A1E08" stroke-width="1"/>
  <!-- Belt buckle -->
  <rect x="90" y="218" width="20" height="18" rx="4" fill="#A04518" stroke="#5A1E08" stroke-width="1"/>
  <rect x="94" y="222" width="12" height="10" rx="2" fill="#FFB080"/>
  <!-- Tool holders -->
  <rect x="46" y="222" width="10" height="14" rx="3" fill="#5A1E08"/>
  <rect x="48" y="216" width="6" height="10" rx="2" fill="#808080"/>
  <rect x="144" y="222" width="10" height="14" rx="3" fill="#5A1E08"/>
  <rect x="146" y="214" width="6" height="12" rx="2" fill="#C0C040"/>

  <!-- Left arm — thick and sturdy -->
  <rect x="12" y="148" width="28" height="18" rx="9" fill="#D06020" stroke="#A04518" stroke-width="1.5"/>
  <rect x="6" y="156" width="20" height="38" rx="10" fill="#D06020" stroke="#A04518" stroke-width="1.5"/>
  <!-- Left hand — big work glove -->
  <circle cx="16" cy="200" r="14" fill="#F08040" stroke="#A04518" stroke-width="1.5"/>
  <circle cx="13" cy="196" r="3.5" fill="#FFB080" opacity="0.4"/>
  <!-- Glove cuff -->
  <rect x="4" y="188" width="24" height="6" rx="3" fill="#A04518"/>

  <!-- Right arm -->
  <rect x="160" y="148" width="28" height="18" rx="9" fill="#D06020" stroke="#A04518" stroke-width="1.5"/>
  <rect x="174" y="156" width="20" height="38" rx="10" fill="#D06020" stroke="#A04518" stroke-width="1.5"/>
  <!-- Right hand -->
  <circle cx="184" cy="200" r="14" fill="#F08040" stroke="#A04518" stroke-width="1.5"/>
  <circle cx="181" cy="196" r="3.5" fill="#FFB080" opacity="0.4"/>
  <!-- Glove cuff -->
  <rect x="172" y="188" width="24" height="6" rx="3" fill="#A04518"/>

  <!-- Left leg — wide stance -->
  <rect x="56" y="232" width="24" height="36" rx="12" fill="#D06020" stroke="#A04518" stroke-width="1.5"/>
  <!-- Left work boot -->
  <path d="M 44 264 Q 44 256 56 256 L 80 256 Q 84 256 84 264 L 84 274 Q 84 282 76 282 L 48 282 Q 40 282 40 274 Z" fill="#802E10" stroke="#5A1E08" stroke-width="1.5"/>
  <!-- Boot sole -->
  <rect x="40" y="278" width="44" height="6" rx="3" fill="#5A1E08"/>
  <!-- Boot highlight -->
  <rect x="48" y="262" width="28" height="6" rx="3" fill="#A04518" opacity="0.4"/>
  <!-- Boot lace detail -->
  <line x1="60" y1="260" x2="72" y2="260" stroke="#FFB080" stroke-width="1" opacity="0.5"/>
  <line x1="58" y1="266" x2="74" y2="266" stroke="#FFB080" stroke-width="1" opacity="0.5"/>

  <!-- Right leg -->
  <rect x="120" y="232" width="24" height="36" rx="12" fill="#D06020" stroke="#A04518" stroke-width="1.5"/>
  <!-- Right work boot -->
  <path d="M 116 264 Q 116 256 120 256 L 144 256 Q 156 256 156 264 L 156 274 Q 156 282 148 282 L 120 282 Q 112 282 112 274 Z" fill="#802E10" stroke="#5A1E08" stroke-width="1.5"/>
  <!-- Boot sole -->
  <rect x="112" y="278" width="44" height="6" rx="3" fill="#5A1E08"/>
  <!-- Boot highlight -->
  <rect x="120" y="262" width="28" height="6" rx="3" fill="#A04518" opacity="0.4"/>
  <!-- Boot lace detail -->
  <line x1="126" y1="260" x2="138" y2="260" stroke="#FFB080" stroke-width="1" opacity="0.5"/>
  <line x1="124" y1="266" x2="140" y2="266" stroke="#FFB080" stroke-width="1" opacity="0.5"/>
</svg>
