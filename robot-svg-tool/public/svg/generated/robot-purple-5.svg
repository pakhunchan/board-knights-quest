<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Robot 5: Purple Wizard — pointed hat antenna, robe body, mysterious eyes -->
  <defs>
    <linearGradient id="p5robe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7040C0"/>
      <stop offset="100%" stop-color="#5020A0"/>
    </linearGradient>
    <linearGradient id="p5head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9068E0"/>
      <stop offset="100%" stop-color="#7040C0"/>
    </linearGradient>
    <linearGradient id="p5hat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B8A0F0"/>
      <stop offset="100%" stop-color="#5020A0"/>
    </linearGradient>
  </defs>

  <!-- Wizard hat / pointed antenna -->
  <polygon points="100,2 78,56 122,56" fill="url(#p5hat)" stroke="#5020A0" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Hat band -->
  <rect x="76" y="50" width="48" height="10" rx="5" fill="#5020A0"/>
  <rect x="80" y="52" width="40" height="6" rx="3" fill="#B8A0F0" opacity="0.5"/>
  <!-- Star on hat -->
  <polygon points="100,16 102,22 108,23 104,27 105,33 100,30 95,33 96,27 92,23 98,22" fill="#B8A0F0" opacity="0.8"/>

  <!-- Head — wider at top, tapers slightly at chin -->
  <path d="M 46 58 Q 42 80 48 108 Q 56 126 100 128 Q 144 126 152 108 Q 158 80 154 58 Q 150 48 100 48 Q 50 48 46 58 Z" fill="url(#p5head)" stroke="#5020A0" stroke-width="2"/>
  <!-- Head highlight -->
  <ellipse cx="82" cy="66" rx="30" ry="10" fill="#B8A0F0" opacity="0.25"/>

  <!-- Left eye socket — big mysterious oval -->
  <ellipse cx="72" cy="84" rx="22" ry="24" fill="#5020A0"/>
  <!-- Left eye white -->
  <ellipse cx="72" cy="84" rx="18" ry="20" fill="#FFFFFF"/>
  <!-- Left pupil — large, mysterious -->
  <ellipse cx="75" cy="86" rx="10" ry="12" fill="#2A0060"/>
  <!-- Left iris glow -->
  <ellipse cx="75" cy="86" rx="10" ry="12" fill="#9068E0" opacity="0.3"/>
  <!-- Left eye shine -->
  <circle cx="80" cy="78" r="4.5" fill="#FFFFFF"/>
  <circle cx="74" cy="90" r="2" fill="#FFFFFF" opacity="0.5"/>

  <!-- Right eye socket -->
  <ellipse cx="128" cy="84" rx="22" ry="24" fill="#5020A0"/>
  <!-- Right eye white -->
  <ellipse cx="128" cy="84" rx="18" ry="20" fill="#FFFFFF"/>
  <!-- Right pupil -->
  <ellipse cx="131" cy="86" rx="10" ry="12" fill="#2A0060"/>
  <!-- Right iris glow -->
  <ellipse cx="131" cy="86" rx="10" ry="12" fill="#9068E0" opacity="0.3"/>
  <!-- Right eye shine -->
  <circle cx="136" cy="78" r="4.5" fill="#FFFFFF"/>
  <circle cx="130" cy="90" r="2" fill="#FFFFFF" opacity="0.5"/>

  <!-- Mouth — small mysterious smile -->
  <path d="M 84 112 Q 92 120 100 118 Q 108 120 116 112" stroke="#5020A0" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Cheek blush -->
  <ellipse cx="50" cy="100" rx="8" ry="5" fill="#C88AFF" opacity="0.35"/>
  <ellipse cx="150" cy="100" rx="8" ry="5" fill="#C88AFF" opacity="0.35"/>

  <!-- Neck / collar — wizard collar points -->
  <polygon points="76,128 68,144 86,140 100,146 114,140 132,144 124,128" fill="#5020A0"/>
  <polygon points="80,130 72,142 88,138 100,143 112,138 128,142 120,130" fill="#7040C0" opacity="0.6"/>

  <!-- Body — robe shape, widens at bottom -->
  <path d="M 62 142 Q 50 180 42 240 Q 40 260 58 264 L 142 264 Q 160 260 158 240 Q 150 180 138 142 Z" fill="url(#p5robe)" stroke="#5020A0" stroke-width="2"/>
  <!-- Robe highlight -->
  <path d="M 72 150 Q 64 185 58 230" stroke="#B8A0F0" stroke-width="1.5" fill="none" opacity="0.2"/>
  <path d="M 128 150 Q 136 185 142 230" stroke="#B8A0F0" stroke-width="1.5" fill="none" opacity="0.2"/>

  <!-- Chest panel — magical orb area -->
  <ellipse cx="100" cy="186" rx="28" ry="30" fill="#3A1080" stroke="#7040C0" stroke-width="1.5"/>
  <!-- Inner orb glow -->
  <ellipse cx="100" cy="184" rx="18" ry="19" fill="#9068E0" opacity="0.5"/>
  <ellipse cx="100" cy="182" rx="12" ry="12" fill="#B8A0F0" opacity="0.4"/>
  <!-- Magical sparkles on chest -->
  <circle cx="90" cy="176" r="3" fill="#B8A0F0" opacity="0.8"/>
  <circle cx="112" cy="180" r="2.5" fill="#B8A0F0" opacity="0.7"/>
  <circle cx="96" cy="196" r="2" fill="#B8A0F0" opacity="0.6"/>
  <!-- Center gem -->
  <circle cx="100" cy="184" r="5" fill="#E0D0FF"/>
  <circle cx="98" cy="182" r="2" fill="#FFFFFF" opacity="0.7"/>

  <!-- Left arm — robe sleeve -->
  <path d="M 60 154 Q 34 170 24 192 Q 20 200 26 206" fill="#7040C0" stroke="#5020A0" stroke-width="1.5"/>
  <path d="M 62 150 Q 38 166 28 186 Q 22 196 30 202" fill="#5020A0" stroke="#5020A0" stroke-width="1"/>
  <!-- Left hand -->
  <circle cx="28" cy="204" r="11" fill="#9068E0" stroke="#5020A0" stroke-width="1.5"/>
  <circle cx="25" cy="201" r="3" fill="#B8A0F0" opacity="0.4"/>

  <!-- Right arm — robe sleeve -->
  <path d="M 140 154 Q 166 170 176 192 Q 180 200 174 206" fill="#7040C0" stroke="#5020A0" stroke-width="1.5"/>
  <path d="M 138 150 Q 162 166 172 186 Q 178 196 170 202" fill="#5020A0" stroke="#5020A0" stroke-width="1"/>
  <!-- Right hand -->
  <circle cx="172" cy="204" r="11" fill="#9068E0" stroke="#5020A0" stroke-width="1.5"/>
  <circle cx="169" cy="201" r="3" fill="#B8A0F0" opacity="0.4"/>

  <!-- Left foot peeking out -->
  <ellipse cx="74" cy="272" rx="16" ry="9" fill="#5020A0" stroke="#3A1080" stroke-width="1.5"/>
  <ellipse cx="70" cy="270" rx="5" ry="3" fill="#9068E0" opacity="0.3"/>

  <!-- Right foot peeking out -->
  <ellipse cx="126" cy="272" rx="16" ry="9" fill="#5020A0" stroke="#3A1080" stroke-width="1.5"/>
  <ellipse cx="122" cy="270" rx="5" ry="3" fill="#9068E0" opacity="0.3"/>

  <!-- Robe bottom hem -->
  <path d="M 56 262 Q 72 268 100 270 Q 128 268 144 262" stroke="#B8A0F0" stroke-width="1.5" fill="none" opacity="0.3"/>
</svg>
