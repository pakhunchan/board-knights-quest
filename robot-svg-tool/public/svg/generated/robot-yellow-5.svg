<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <defs>
    <linearGradient id="yellowBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C838"/>
      <stop offset="100%" stop-color="#C8A010"/>
    </linearGradient>
    <linearGradient id="yellowHead" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C838"/>
      <stop offset="100%" stop-color="#C8A010"/>
    </linearGradient>
    <linearGradient id="yellowPanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A08000"/>
      <stop offset="100%" stop-color="#887000"/>
    </linearGradient>
  </defs>

  <!-- ANTENNA — bouncy spring coil -->
  <path d="M100,38 Q108,34 104,28 Q96,24 104,18 Q112,12 104,6" fill="none" stroke="#C8A010" stroke-width="3" stroke-linecap="round"/>
  <!-- Antenna ball — bouncy oversized -->
  <circle cx="104" cy="5" r="9" fill="#F8E068"/>
  <circle cx="102" cy="2" r="3.5" fill="#fff" opacity="0.5"/>

  <!-- HEAD — very round to match round theme -->
  <rect x="56" y="38" width="88" height="62" rx="30" ry="30" fill="url(#yellowHead)"/>
  <!-- Head highlight -->
  <ellipse cx="90" cy="46" rx="24" ry="8" fill="#F8E068" opacity="0.35"/>

  <!-- LEFT EYE — enormous, happy -->
  <ellipse cx="78" cy="64" rx="17" ry="18" fill="#A08000"/>
  <ellipse cx="78" cy="64" rx="14.5" ry="15.5" fill="#fff"/>
  <circle cx="81" cy="62" r="7.5" fill="#3A2800"/>
  <circle cx="84" cy="58" r="3" fill="#fff"/>
  <!-- Extra sparkle -->
  <circle cx="76" cy="68" r="1.5" fill="#fff" opacity="0.6"/>

  <!-- RIGHT EYE — enormous, happy -->
  <ellipse cx="122" cy="64" rx="17" ry="18" fill="#A08000"/>
  <ellipse cx="122" cy="64" rx="14.5" ry="15.5" fill="#fff"/>
  <circle cx="125" cy="62" r="7.5" fill="#3A2800"/>
  <circle cx="128" cy="58" r="3" fill="#fff"/>
  <circle cx="120" cy="68" r="1.5" fill="#fff" opacity="0.6"/>

  <!-- MOUTH — biggest, happiest open smile -->
  <path d="M76,82 Q84,98 100,100 Q116,98 124,82" fill="#A08000"/>
  <path d="M78,83 Q86,97 100,98 Q114,97 122,83" fill="#fff"/>
  <!-- Tongue -->
  <ellipse cx="100" cy="96" rx="10" ry="6" fill="#E88040"/>

  <!-- Blush cheeks — big and rosy -->
  <circle cx="56" cy="78" r="8" fill="#E8A020" opacity="0.45"/>
  <circle cx="144" cy="78" r="8" fill="#E8A020" opacity="0.45"/>

  <!-- NECK / COLLAR — small for round body -->
  <rect x="90" y="100" width="20" height="8" rx="4" ry="4" fill="#A08000"/>
  <!-- Collar — cute bow-tie shape -->
  <polygon points="84,104 100,110 116,104 100,108" fill="#C8A010"/>
  <circle cx="100" cy="107" r="4" fill="#F8E068"/>

  <!-- BODY — extremely round, egg/oval shape -->
  <ellipse cx="100" cy="168" rx="56" ry="62" fill="url(#yellowBody)"/>
  <!-- Body highlight — big rounded shine -->
  <ellipse cx="84" cy="148" rx="20" ry="28" fill="#F8E068" opacity="0.2"/>

  <!-- CHEST PANEL — rounded to match body -->
  <ellipse cx="100" cy="165" rx="26" ry="30" fill="url(#yellowPanel)"/>
  <!-- Panel inner glow -->
  <ellipse cx="100" cy="163" rx="21" ry="25" fill="none" stroke="#E8C838" stroke-width="1" opacity="0.5"/>

  <!-- Buttons — three stacked, colorful -->
  <circle cx="100" cy="146" r="5" fill="#F8E068"/>
  <circle cx="100" cy="146" r="2.5" fill="#fff" opacity="0.45"/>
  <circle cx="100" cy="162" r="5" fill="#E8C838"/>
  <circle cx="100" cy="162" r="2.5" fill="#fff" opacity="0.45"/>
  <circle cx="100" cy="178" r="5" fill="#F8E068"/>
  <circle cx="100" cy="178" r="2.5" fill="#fff" opacity="0.45"/>

  <!-- LEFT ARM — tiny, stubby, slightly raised -->
  <path d="M48,154 Q32,146 24,140" fill="none" stroke="#C8A010" stroke-width="10" stroke-linecap="round"/>
  <!-- Left hand — round -->
  <circle cx="22" cy="138" r="9" fill="#E8C838"/>
  <circle cx="20" cy="135" r="3" fill="#F8E068" opacity="0.5"/>

  <!-- RIGHT ARM — tiny, stubby, waving -->
  <path d="M152,154 Q168,144 176,132" fill="none" stroke="#C8A010" stroke-width="10" stroke-linecap="round"/>
  <!-- Right hand -->
  <circle cx="178" cy="130" r="9" fill="#E8C838"/>
  <circle cx="180" cy="127" r="3" fill="#F8E068" opacity="0.5"/>

  <!-- LEFT LEG — tiny and short -->
  <path d="M82,226 Q78,244 76,256" fill="none" stroke="#C8A010" stroke-width="11" stroke-linecap="round"/>
  <!-- Left foot — rounded, chunky -->
  <ellipse cx="72" cy="264" rx="16" ry="10" fill="#A08000"/>
  <ellipse cx="69" cy="262" rx="6" ry="4" fill="#C8A010" opacity="0.4"/>

  <!-- RIGHT LEG — tiny and short -->
  <path d="M118,226 Q122,244 124,256" fill="none" stroke="#C8A010" stroke-width="11" stroke-linecap="round"/>
  <!-- Right foot -->
  <ellipse cx="128" cy="264" rx="16" ry="10" fill="#A08000"/>
  <ellipse cx="125" cy="262" rx="6" ry="4" fill="#C8A010" opacity="0.4"/>
</svg>
