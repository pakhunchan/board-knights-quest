<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <defs>
    <linearGradient id="r4body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#BB7DC8"/>
      <stop offset="100%" stop-color="#9B4DA8"/>
    </linearGradient>
    <linearGradient id="r4head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#BB7DC8"/>
      <stop offset="100%" stop-color="#9B4DA8"/>
    </linearGradient>
    <linearGradient id="r4panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B2D7B"/>
      <stop offset="100%" stop-color="#4A1058"/>
    </linearGradient>
  </defs>

  <!-- Antenna stem -->
  <rect x="94" y="8" width="12" height="22" rx="3" ry="3" fill="#BB7DC8"/>
  <!-- Antenna crossbar -->
  <rect x="82" y="4" width="36" height="8" rx="4" ry="4" fill="#D8A0E4"/>
  <!-- Antenna balls on crossbar ends -->
  <circle cx="84" cy="8" r="6" fill="#D8A0E4"/>
  <circle cx="84" cy="6" r="2" fill="#F0D4F8" opacity="0.5"/>
  <circle cx="116" cy="8" r="6" fill="#D8A0E4"/>
  <circle cx="116" cy="6" r="2" fill="#F0D4F8" opacity="0.5"/>

  <!-- Head - boxy with rounded corners -->
  <rect x="36" y="28" width="128" height="88" rx="18" ry="18" fill="url(#r4head)" stroke="#6B2D7B" stroke-width="2.5"/>
  <!-- Head highlight -->
  <rect x="48" y="34" width="70" height="16" rx="8" ry="8" fill="#D8A0E4" opacity="0.25"/>

  <!-- Head bolts -->
  <circle cx="46" cy="72" r="5" fill="#6B2D7B"/>
  <circle cx="46" cy="72" r="3" fill="#BB7DC8"/>
  <line x1="43" y1="72" x2="49" y2="72" stroke="#6B2D7B" stroke-width="1.5"/>
  <circle cx="154" cy="72" r="5" fill="#6B2D7B"/>
  <circle cx="154" cy="72" r="3" fill="#BB7DC8"/>
  <line x1="151" y1="72" x2="157" y2="72" stroke="#6B2D7B" stroke-width="1.5"/>

  <!-- Left eye socket -->
  <rect x="52" y="50" width="38" height="36" rx="8" ry="8" fill="#6B2D7B"/>
  <!-- Left eye white -->
  <rect x="55" y="53" width="32" height="30" rx="6" ry="6" fill="#FFFFFF"/>
  <!-- Left pupil -->
  <circle cx="75" cy="68" r="9" fill="#6B2D7B"/>
  <!-- Left eye shine -->
  <circle cx="79" cy="64" r="3.5" fill="#FFFFFF"/>
  <circle cx="76" cy="70" r="1.5" fill="#FFFFFF" opacity="0.5"/>

  <!-- Right eye socket -->
  <rect x="110" y="50" width="38" height="36" rx="8" ry="8" fill="#6B2D7B"/>
  <!-- Right eye white -->
  <rect x="113" y="53" width="32" height="30" rx="6" ry="6" fill="#FFFFFF"/>
  <!-- Right pupil -->
  <circle cx="133" cy="68" r="9" fill="#6B2D7B"/>
  <!-- Right eye shine -->
  <circle cx="137" cy="64" r="3.5" fill="#FFFFFF"/>
  <circle cx="134" cy="70" r="1.5" fill="#FFFFFF" opacity="0.5"/>

  <!-- Mouth - retro zigzag/speaker grille -->
  <rect x="68" y="96" width="64" height="14" rx="4" ry="4" fill="#6B2D7B"/>
  <line x1="76" y1="96" x2="76" y2="110" stroke="#9B4DA8" stroke-width="1.5"/>
  <line x1="88" y1="96" x2="88" y2="110" stroke="#9B4DA8" stroke-width="1.5"/>
  <line x1="100" y1="96" x2="100" y2="110" stroke="#9B4DA8" stroke-width="1.5"/>
  <line x1="112" y1="96" x2="112" y2="110" stroke="#9B4DA8" stroke-width="1.5"/>
  <line x1="124" y1="96" x2="124" y2="110" stroke="#9B4DA8" stroke-width="1.5"/>

  <!-- Neck / collar -->
  <rect x="76" y="116" width="48" height="16" rx="5" ry="5" fill="#6B2D7B"/>
  <!-- Neck bolts -->
  <circle cx="84" cy="124" r="3" fill="#BB7DC8"/>
  <circle cx="84" cy="124" r="1.5" fill="#D8A0E4"/>
  <circle cx="116" cy="124" r="3" fill="#BB7DC8"/>
  <circle cx="116" cy="124" r="1.5" fill="#D8A0E4"/>

  <!-- Body - boxy with rounded corners -->
  <rect x="40" y="130" width="120" height="100" rx="16" ry="16" fill="url(#r4body)" stroke="#6B2D7B" stroke-width="2.5"/>
  <!-- Body highlight -->
  <rect x="50" y="136" width="60" height="12" rx="6" ry="6" fill="#D8A0E4" opacity="0.2"/>

  <!-- Body corner rivets -->
  <circle cx="54" cy="144" r="4" fill="#6B2D7B"/>
  <circle cx="54" cy="144" r="2.5" fill="#BB7DC8"/>
  <line x1="52" y1="144" x2="56" y2="144" stroke="#6B2D7B" stroke-width="1"/>
  <line x1="54" y1="142" x2="54" y2="146" stroke="#6B2D7B" stroke-width="1"/>

  <circle cx="146" cy="144" r="4" fill="#6B2D7B"/>
  <circle cx="146" cy="144" r="2.5" fill="#BB7DC8"/>
  <line x1="144" y1="144" x2="148" y2="144" stroke="#6B2D7B" stroke-width="1"/>
  <line x1="146" y1="142" x2="146" y2="146" stroke="#6B2D7B" stroke-width="1"/>

  <circle cx="54" cy="218" r="4" fill="#6B2D7B"/>
  <circle cx="54" cy="218" r="2.5" fill="#BB7DC8"/>
  <line x1="52" y1="218" x2="56" y2="218" stroke="#6B2D7B" stroke-width="1"/>
  <line x1="54" y1="216" x2="54" y2="220" stroke="#6B2D7B" stroke-width="1"/>

  <circle cx="146" cy="218" r="4" fill="#6B2D7B"/>
  <circle cx="146" cy="218" r="2.5" fill="#BB7DC8"/>
  <line x1="144" y1="218" x2="148" y2="218" stroke="#6B2D7B" stroke-width="1"/>
  <line x1="146" y1="216" x2="146" y2="220" stroke="#6B2D7B" stroke-width="1"/>

  <!-- Chest panel -->
  <rect x="64" y="154" width="72" height="58" rx="10" ry="10" fill="url(#r4panel)" stroke="#9B4DA8" stroke-width="1.5"/>

  <!-- Chest buttons - retro dials/indicators -->
  <circle cx="82" cy="170" r="6" fill="#D8A0E4"/>
  <circle cx="82" cy="170" r="3.5" fill="#F0D4F8" opacity="0.6"/>
  <circle cx="118" cy="170" r="6" fill="#E85A8A"/>
  <circle cx="118" cy="170" r="3.5" fill="#FFB0C8" opacity="0.6"/>

  <!-- Chest meter/gauge -->
  <rect x="76" y="184" width="48" height="10" rx="5" ry="5" fill="#4A1058"/>
  <rect x="78" y="186" width="20" height="6" rx="3" ry="3" fill="#5AE88A"/>
  <rect x="99" y="186" width="8" height="6" rx="3" ry="3" fill="#B8E85A"/>

  <!-- Chest dial -->
  <circle cx="100" cy="204" r="5" fill="#D8A0E4"/>
  <circle cx="100" cy="204" r="3" fill="#9B4DA8"/>
  <line x1="100" y1="204" x2="100" y2="200" stroke="#F0D4F8" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Left arm -->
  <rect x="18" y="142" width="22" height="52" rx="8" ry="8" fill="#BB7DC8" stroke="#6B2D7B" stroke-width="2"/>
  <!-- Left elbow rivet -->
  <circle cx="29" cy="168" r="3" fill="#6B2D7B"/>
  <circle cx="29" cy="168" r="1.5" fill="#BB7DC8"/>
  <!-- Left hand -->
  <circle cx="29" cy="202" r="14" fill="#D8A0E4" stroke="#6B2D7B" stroke-width="2"/>
  <circle cx="26" cy="198" r="3" fill="#F0D4F8" opacity="0.4"/>

  <!-- Right arm -->
  <rect x="160" y="142" width="22" height="52" rx="8" ry="8" fill="#BB7DC8" stroke="#6B2D7B" stroke-width="2"/>
  <!-- Right elbow rivet -->
  <circle cx="171" cy="168" r="3" fill="#6B2D7B"/>
  <circle cx="171" cy="168" r="1.5" fill="#BB7DC8"/>
  <!-- Right hand -->
  <circle cx="171" cy="202" r="14" fill="#D8A0E4" stroke="#6B2D7B" stroke-width="2"/>
  <circle cx="168" cy="198" r="3" fill="#F0D4F8" opacity="0.4"/>

  <!-- Left leg -->
  <rect x="62" y="228" width="24" height="38" rx="8" ry="8" fill="#BB7DC8" stroke="#6B2D7B" stroke-width="2"/>
  <!-- Left knee rivet -->
  <circle cx="74" cy="247" r="3" fill="#6B2D7B"/>
  <circle cx="74" cy="247" r="1.5" fill="#BB7DC8"/>
  <!-- Left foot -->
  <rect x="48" y="262" width="40" height="18" rx="9" ry="9" fill="#9B4DA8" stroke="#6B2D7B" stroke-width="2"/>
  <rect x="54" y="265" width="12" height="6" rx="3" ry="3" fill="#D8A0E4" opacity="0.3"/>

  <!-- Right leg -->
  <rect x="114" y="228" width="24" height="38" rx="8" ry="8" fill="#BB7DC8" stroke="#6B2D7B" stroke-width="2"/>
  <!-- Right knee rivet -->
  <circle cx="126" cy="247" r="3" fill="#6B2D7B"/>
  <circle cx="126" cy="247" r="1.5" fill="#BB7DC8"/>
  <!-- Right foot -->
  <rect x="112" y="262" width="40" height="18" rx="9" ry="9" fill="#9B4DA8" stroke="#6B2D7B" stroke-width="2"/>
  <rect x="118" y="265" width="12" height="6" rx="3" ry="3" fill="#D8A0E4" opacity="0.3"/>
</svg>
