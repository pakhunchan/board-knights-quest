<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <defs>
    <linearGradient id="pinkBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F04898"/>
      <stop offset="100%" stop-color="#D02878"/>
    </linearGradient>
    <linearGradient id="pinkHead" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F04898"/>
      <stop offset="100%" stop-color="#D02878"/>
    </linearGradient>
    <linearGradient id="pinkPanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A01858"/>
      <stop offset="100%" stop-color="#8A1048"/>
    </linearGradient>
  </defs>

  <!-- ANTENNA — ribbon-like with flowing curve -->
  <path d="M100,42 Q92,30 88,18 Q86,10 92,8 Q98,6 100,14" fill="none" stroke="#F04898" stroke-width="3" stroke-linecap="round"/>
  <path d="M100,42 Q108,28 114,16 Q116,8 110,7 Q104,6 100,14" fill="none" stroke="#D02878" stroke-width="3" stroke-linecap="round"/>
  <circle cx="100" cy="10" r="7" fill="#FF80C0"/>
  <circle cx="100" cy="8" r="2.5" fill="#fff" opacity="0.6"/>

  <!-- HEAD — rounded rectangle -->
  <rect x="62" y="42" width="76" height="58" rx="22" ry="22" fill="url(#pinkHead)"/>
  <!-- Head highlight -->
  <rect x="72" y="46" width="40" height="12" rx="6" ry="6" fill="#FF80C0" opacity="0.35"/>

  <!-- LEFT EYE -->
  <ellipse cx="82" cy="68" rx="13" ry="14" fill="#A01858"/>
  <ellipse cx="82" cy="68" rx="10.5" ry="11.5" fill="#fff"/>
  <circle cx="84" cy="67" r="5.5" fill="#3A1028"/>
  <circle cx="86" cy="64" r="2.2" fill="#fff"/>

  <!-- RIGHT EYE — slight wink (smaller) -->
  <ellipse cx="118" cy="68" rx="13" ry="14" fill="#A01858"/>
  <ellipse cx="118" cy="68" rx="10.5" ry="11.5" fill="#fff"/>
  <circle cx="120" cy="67" r="5.5" fill="#3A1028"/>
  <circle cx="122" cy="64" r="2.2" fill="#fff"/>

  <!-- MOUTH — cheerful curved smile -->
  <path d="M86,84 Q93,94 100,94 Q107,94 114,84" fill="none" stroke="#A01858" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Tiny tongue -->
  <ellipse cx="100" cy="92" rx="5" ry="3" fill="#FF80C0"/>

  <!-- Blush cheeks -->
  <circle cx="68" cy="80" r="6" fill="#FF80C0" opacity="0.4"/>
  <circle cx="132" cy="80" r="6" fill="#FF80C0" opacity="0.4"/>

  <!-- NECK / COLLAR -->
  <rect x="88" y="100" width="24" height="10" rx="4" ry="4" fill="#A01858"/>
  <!-- Collar — wider decorative piece -->
  <rect x="74" y="106" width="52" height="8" rx="4" ry="4" fill="#D02878"/>
  <rect x="80" y="107" width="40" height="4" rx="2" ry="2" fill="#F04898" opacity="0.4"/>

  <!-- BODY — slightly tapered, graceful dancer proportions -->
  <path d="M66,114 Q60,150 64,192 Q66,200 80,202 L120,202 Q134,200 136,192 Q140,150 134,114 Z" fill="url(#pinkBody)" rx="16"/>
  <!-- Body highlight -->
  <path d="M76,118 Q74,140 76,160 L88,160 Q86,140 88,118 Z" fill="#FF80C0" opacity="0.2"/>

  <!-- CHEST PANEL -->
  <rect x="80" y="130" width="40" height="50" rx="10" ry="10" fill="url(#pinkPanel)"/>
  <!-- Panel inner border -->
  <rect x="84" y="134" width="32" height="42" rx="7" ry="7" fill="none" stroke="#F04898" stroke-width="1" opacity="0.5"/>

  <!-- Buttons on panel -->
  <circle cx="92" cy="145" r="4" fill="#FF80C0"/>
  <circle cx="92" cy="145" r="2" fill="#fff" opacity="0.4"/>
  <circle cx="108" cy="145" r="4" fill="#F04898"/>
  <circle cx="108" cy="145" r="2" fill="#fff" opacity="0.4"/>
  <!-- Heart detail -->
  <path d="M96,160 Q96,155 100,155 Q104,155 104,160 L100,167 Z" fill="#FF80C0" opacity="0.7"/>

  <!-- LEFT ARM — raised high (dancer pose) -->
  <path d="M66,124 Q42,110 32,88" fill="none" stroke="#D02878" stroke-width="10" stroke-linecap="round"/>
  <!-- Left hand -->
  <circle cx="30" cy="86" r="10" fill="#F04898"/>
  <circle cx="28" cy="83" r="3" fill="#FF80C0" opacity="0.5"/>

  <!-- RIGHT ARM — extended mid-level, graceful -->
  <path d="M134,130 Q154,138 168,154" fill="none" stroke="#D02878" stroke-width="10" stroke-linecap="round"/>
  <!-- Right hand -->
  <circle cx="170" cy="156" r="10" fill="#F04898"/>
  <circle cx="172" cy="153" r="3" fill="#FF80C0" opacity="0.5"/>

  <!-- LEFT LEG — slightly forward (dancer step) -->
  <path d="M88,200 Q82,230 74,258" fill="none" stroke="#D02878" stroke-width="11" stroke-linecap="round"/>
  <!-- Left foot — rounded, forward -->
  <ellipse cx="68" cy="264" rx="16" ry="10" fill="#A01858"/>
  <ellipse cx="65" cy="262" rx="6" ry="4" fill="#D02878" opacity="0.4"/>

  <!-- RIGHT LEG — back, supporting -->
  <path d="M114,200 Q116,232 118,256" fill="none" stroke="#D02878" stroke-width="11" stroke-linecap="round"/>
  <!-- Right foot -->
  <ellipse cx="120" cy="264" rx="16" ry="10" fill="#A01858"/>
  <ellipse cx="117" cy="262" rx="6" ry="4" fill="#D02878" opacity="0.4"/>
</svg>
