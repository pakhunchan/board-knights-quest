<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Robot 1: Hot Pink Classic — star antenna, heart button, curved smile -->

  <!-- Antenna stem -->
  <rect x="96" y="12" width="8" height="28" rx="4" ry="4" fill="#C4186F"/>
  <!-- Antenna top: star shape -->
  <polygon points="100,2 103.5,11 113,11 105.5,17 108,26 100,21 92,26 94.5,17 87,11 96.5,11" fill="#FF4DA6" stroke="#C4186F" stroke-width="1.5"/>

  <!-- Head -->
  <rect x="52" y="40" width="96" height="72" rx="22" ry="22" fill="#E91E8C"/>
  <rect x="56" y="44" width="88" height="64" rx="18" ry="18" fill="#FF4DA6" opacity="0.35"/>

  <!-- Left eye socket -->
  <ellipse cx="76" cy="72" rx="16" ry="15" fill="#C4186F"/>
  <!-- Left eye white -->
  <ellipse cx="76" cy="72" rx="12" ry="11" fill="#FFFFFF"/>
  <!-- Left pupil -->
  <ellipse cx="79" cy="73" rx="6" ry="6.5" fill="#C4186F"/>
  <!-- Left eye shine -->
  <circle cx="82" cy="69" r="3" fill="#FFFFFF"/>

  <!-- Right eye socket -->
  <ellipse cx="124" cy="72" rx="16" ry="15" fill="#C4186F"/>
  <!-- Right eye white -->
  <ellipse cx="124" cy="72" rx="12" ry="11" fill="#FFFFFF"/>
  <!-- Right pupil -->
  <ellipse cx="127" cy="73" rx="6" ry="6.5" fill="#C4186F"/>
  <!-- Right eye shine -->
  <circle cx="130" cy="69" r="3" fill="#FFFFFF"/>

  <!-- Mouth: curved smile -->
  <path d="M78,92 Q100,108 122,92" fill="none" stroke="#C4186F" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Cheek blush -->
  <ellipse cx="60" cy="88" rx="8" ry="5" fill="#FFB3D9" opacity="0.6"/>
  <ellipse cx="140" cy="88" rx="8" ry="5" fill="#FFB3D9" opacity="0.6"/>

  <!-- Neck / collar -->
  <rect x="82" y="112" width="36" height="14" rx="6" ry="6" fill="#C4186F"/>
  <rect x="76" y="120" width="48" height="10" rx="5" ry="5" fill="#E91E8C"/>

  <!-- Body -->
  <rect x="48" y="128" width="104" height="100" rx="20" ry="20" fill="#E91E8C"/>
  <!-- Body highlight -->
  <rect x="54" y="134" width="92" height="42" rx="16" ry="16" fill="#FF4DA6" opacity="0.3"/>

  <!-- Chest panel -->
  <rect x="68" y="148" width="64" height="56" rx="12" ry="12" fill="#C4186F"/>
  <rect x="72" y="152" width="56" height="48" rx="10" ry="10" fill="#FFB3D9" opacity="0.4"/>

  <!-- Heart-shaped chest button -->
  <path d="M100,172 C100,168 94,160 86,164 C78,168 80,178 100,192 C120,178 122,168 114,164 C106,160 100,168 100,172Z" fill="#FF4DA6" stroke="#C4186F" stroke-width="1.5"/>

  <!-- Small side buttons -->
  <circle cx="82" cy="198" r="4" fill="#FF4DA6" stroke="#C4186F" stroke-width="1"/>
  <circle cx="100" cy="198" r="4" fill="#FFB3D9" stroke="#C4186F" stroke-width="1"/>
  <circle cx="118" cy="198" r="4" fill="#FF4DA6" stroke="#C4186F" stroke-width="1"/>

  <!-- Left arm -->
  <rect x="24" y="140" width="24" height="60" rx="12" ry="12" fill="#E91E8C"/>
  <rect x="26" y="142" width="20" height="24" rx="10" ry="10" fill="#FF4DA6" opacity="0.3"/>
  <!-- Left hand -->
  <circle cx="36" cy="206" r="14" fill="#FF4DA6" stroke="#C4186F" stroke-width="2"/>
  <circle cx="36" cy="206" r="7" fill="#FFB3D9" opacity="0.5"/>

  <!-- Right arm -->
  <rect x="152" y="140" width="24" height="60" rx="12" ry="12" fill="#E91E8C"/>
  <rect x="154" y="142" width="20" height="24" rx="10" ry="10" fill="#FF4DA6" opacity="0.3"/>
  <!-- Right hand -->
  <circle cx="164" cy="206" r="14" fill="#FF4DA6" stroke="#C4186F" stroke-width="2"/>
  <circle cx="164" cy="206" r="7" fill="#FFB3D9" opacity="0.5"/>

  <!-- Left leg -->
  <rect x="62" y="226" width="26" height="42" rx="13" ry="13" fill="#E91E8C"/>
  <!-- Left foot -->
  <ellipse cx="70" cy="274" rx="20" ry="12" fill="#C4186F"/>
  <ellipse cx="68" cy="272" rx="14" ry="8" fill="#FF4DA6" opacity="0.3"/>

  <!-- Right leg -->
  <rect x="112" y="226" width="26" height="42" rx="13" ry="13" fill="#E91E8C"/>
  <!-- Right foot -->
  <ellipse cx="130" cy="274" rx="20" ry="12" fill="#C4186F"/>
  <ellipse cx="128" cy="272" rx="14" ry="8" fill="#FF4DA6" opacity="0.3"/>

  <!-- Body bolt accents -->
  <circle cx="56" cy="178" r="3.5" fill="#C4186F"/>
  <circle cx="144" cy="178" r="3.5" fill="#C4186F"/>
</svg>
