<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 300">

  <!-- ANTENNA -->
  <!-- Antenna ball -->
  <circle cx="60" cy="12" r="8" fill="#F8D060"/>
  <!-- Antenna stem -->
  <rect x="57" y="20" width="6" height="28" rx="3" ry="3" fill="#E8B830"/>
  <!-- Stem ridges/rings -->
  <rect x="54" y="25" width="12" height="3" rx="1.5" ry="1.5" fill="#B89020"/>
  <rect x="54" y="32" width="12" height="3" rx="1.5" ry="1.5" fill="#B89020"/>
  <rect x="54" y="39" width="12" height="3" rx="1.5" ry="1.5" fill="#B89020"/>

  <!-- HEAD -->
  <rect x="20" y="50" width="80" height="60" rx="12" ry="12" fill="#E8B830"/>
  <!-- Eye sockets — rounded rectangles (unique trait) -->
  <rect x="27" y="60" width="28" height="36" rx="8" ry="8" fill="#B89020"/>
  <rect x="65" y="60" width="28" height="36" rx="8" ry="8" fill="#B89020"/>
  <!-- Left eye white -->
  <circle cx="41" cy="78" r="12" fill="#FFFFFF"/>
  <!-- Left pupil -->
  <circle cx="43" cy="78" r="6.5" fill="#4A3800"/>
  <!-- Left eye shine -->
  <circle cx="46" cy="75" r="2.5" fill="#FFFFFF"/>
  <!-- Right eye white -->
  <circle cx="79" cy="78" r="12" fill="#FFFFFF"/>
  <!-- Right pupil -->
  <circle cx="81" cy="78" r="6.5" fill="#4A3800"/>
  <!-- Right eye shine -->
  <circle cx="84" cy="75" r="2.5" fill="#FFFFFF"/>

  <!-- NECK -->
  <rect x="40" y="110" width="40" height="10" rx="5" ry="5" fill="#B89020"/>

  <!-- BODY -->
  <rect x="20" y="120" width="80" height="80" rx="12" ry="12" fill="#E8B830"/>
  <!-- Belly panel (lighter accent) -->
  <rect x="32" y="134" width="56" height="48" rx="8" ry="8" fill="#F8D060"/>
  <!-- Belly vent/grille lines (unique trait — two horizontal lines) -->
  <rect x="42" y="153" width="36" height="3" rx="1.5" ry="1.5" fill="#B89020"/>
  <rect x="42" y="162" width="36" height="3" rx="1.5" ry="1.5" fill="#B89020"/>

  <!-- LEGS -->
  <!-- Body bottom overlap to clean up leg join -->
  <rect x="20" y="194" width="80" height="10" rx="0" ry="0" fill="#E8B830"/>
  <!-- Arch shadow between legs -->
  <ellipse cx="60" cy="204" rx="12" ry="6" fill="#B89020"/>
  <!-- Left leg -->
  <rect x="24" y="200" width="28" height="60" rx="14" ry="14" fill="#E8B830"/>
  <!-- Left leg subtle highlight -->
  <rect x="30" y="210" width="16" height="24" rx="8" ry="8" fill="#F8D060" opacity="0.35"/>
  <!-- Right leg -->
  <rect x="68" y="200" width="28" height="60" rx="14" ry="14" fill="#E8B830"/>
  <!-- Right leg subtle highlight -->
  <rect x="74" y="210" width="16" height="24" rx="8" ry="8" fill="#F8D060" opacity="0.35"/>

</svg>
