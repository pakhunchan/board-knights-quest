<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <defs>
    <linearGradient id="r3body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8A4FD0"/>
      <stop offset="100%" stop-color="#6A1FB0"/>
    </linearGradient>
    <linearGradient id="r3head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8A4FD0"/>
      <stop offset="100%" stop-color="#6A1FB0"/>
    </linearGradient>
    <linearGradient id="r3panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A0A6E"/>
      <stop offset="100%" stop-color="#2A0050"/>
    </linearGradient>
  </defs>

  <!-- Antenna stem -->
  <rect x="96" y="12" width="8" height="24" rx="4" ry="4" fill="#8A4FD0"/>
  <!-- Antenna ball -->
  <circle cx="100" cy="10" r="10" fill="#AA7FE8"/>
  <circle cx="97" cy="7" r="3" fill="#D4BFFF" opacity="0.6"/>

  <!-- Head - big round for chibi style -->
  <rect x="32" y="34" width="136" height="100" rx="50" ry="50" fill="url(#r3head)" stroke="#3A0A6E" stroke-width="2"/>
  <!-- Head highlight -->
  <ellipse cx="80" cy="55" rx="40" ry="15" fill="#AA7FE8" opacity="0.25"/>

  <!-- Left eye socket -->
  <ellipse cx="68" cy="80" rx="24" ry="26" fill="#3A0A6E"/>
  <!-- Left eye white -->
  <ellipse cx="68" cy="80" rx="20" ry="22" fill="#FFFFFF"/>
  <!-- Left pupil -->
  <circle cx="72" cy="82" r="10" fill="#3A0A6E"/>
  <!-- Left eye shine -->
  <circle cx="76" cy="76" r="4" fill="#FFFFFF"/>
  <circle cx="72" cy="84" r="2" fill="#FFFFFF" opacity="0.5"/>

  <!-- Right eye socket -->
  <ellipse cx="132" cy="80" rx="24" ry="26" fill="#3A0A6E"/>
  <!-- Right eye white -->
  <ellipse cx="132" cy="80" rx="20" ry="22" fill="#FFFFFF"/>
  <!-- Right pupil -->
  <circle cx="136" cy="82" r="10" fill="#3A0A6E"/>
  <!-- Right eye shine -->
  <circle cx="140" cy="76" r="4" fill="#FFFFFF"/>
  <circle cx="136" cy="84" r="2" fill="#FFFFFF" opacity="0.5"/>

  <!-- Mouth - happy smile -->
  <path d="M 75 108 Q 100 126 125 108" stroke="#3A0A6E" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Cheek blush -->
  <ellipse cx="48" cy="100" rx="10" ry="6" fill="#D88AE8" opacity="0.4"/>
  <ellipse cx="152" cy="100" rx="10" ry="6" fill="#D88AE8" opacity="0.4"/>

  <!-- Neck / collar -->
  <rect x="82" y="132" width="36" height="14" rx="6" ry="6" fill="#3A0A6E"/>

  <!-- Body - very round/circular for chibi -->
  <ellipse cx="100" cy="200" rx="62" ry="56" fill="url(#r3body)" stroke="#3A0A6E" stroke-width="2"/>
  <!-- Body highlight -->
  <ellipse cx="85" cy="178" rx="28" ry="14" fill="#AA7FE8" opacity="0.2"/>

  <!-- Chest panel -->
  <ellipse cx="100" cy="198" rx="32" ry="28" fill="url(#r3panel)" stroke="#6A1FB0" stroke-width="1.5"/>

  <!-- Chest buttons -->
  <circle cx="88" cy="190" r="5" fill="#AA7FE8"/>
  <circle cx="88" cy="190" r="2.5" fill="#D4BFFF" opacity="0.6"/>
  <circle cx="112" cy="190" r="5" fill="#E85A8A"/>
  <circle cx="112" cy="190" r="2.5" fill="#FFB0C8" opacity="0.6"/>
  <circle cx="100" cy="206" r="5" fill="#5AE88A"/>
  <circle cx="100" cy="206" r="2.5" fill="#B0FFD0" opacity="0.6"/>

  <!-- Left arm -->
  <rect x="22" y="170" width="18" height="40" rx="9" ry="9" fill="#8A4FD0" stroke="#3A0A6E" stroke-width="1.5"/>
  <!-- Left hand -->
  <circle cx="31" cy="216" r="12" fill="#AA7FE8" stroke="#3A0A6E" stroke-width="1.5"/>
  <circle cx="28" cy="213" r="3" fill="#D4BFFF" opacity="0.4"/>

  <!-- Right arm -->
  <rect x="160" y="170" width="18" height="40" rx="9" ry="9" fill="#8A4FD0" stroke="#3A0A6E" stroke-width="1.5"/>
  <!-- Right hand -->
  <circle cx="169" cy="216" r="12" fill="#AA7FE8" stroke="#3A0A6E" stroke-width="1.5"/>
  <circle cx="166" cy="213" r="3" fill="#D4BFFF" opacity="0.4"/>

  <!-- Left leg -->
  <rect x="72" y="250" width="18" height="24" rx="9" ry="9" fill="#8A4FD0" stroke="#3A0A6E" stroke-width="1.5"/>
  <!-- Left foot -->
  <ellipse cx="76" cy="280" rx="18" ry="10" fill="#6A1FB0" stroke="#3A0A6E" stroke-width="1.5"/>
  <ellipse cx="72" cy="278" rx="6" ry="3" fill="#AA7FE8" opacity="0.3"/>

  <!-- Right leg -->
  <rect x="110" y="250" width="18" height="24" rx="9" ry="9" fill="#8A4FD0" stroke="#3A0A6E" stroke-width="1.5"/>
  <!-- Right foot -->
  <ellipse cx="124" cy="280" rx="18" ry="10" fill="#6A1FB0" stroke="#3A0A6E" stroke-width="1.5"/>
  <ellipse cx="120" cy="278" rx="6" ry="3" fill="#AA7FE8" opacity="0.3"/>
</svg>
