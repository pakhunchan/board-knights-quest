<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- ROBOT 3: Amber Yellow — Heavy/Tank variant -->
  <!-- Extra wide body, thick short legs, small head, heavy arms, shoulder bolts -->

  <!-- Antenna stem -->
  <rect x="96" y="12" width="8" height="16" rx="3" ry="3" fill="#B88B00"/>
  <!-- Antenna ball -->
  <circle cx="100" cy="8" r="8" fill="#F5C838"/>
  <circle cx="97" cy="6" r="2.5" fill="#FFE070" opacity="0.6"/>

  <!-- Head (small, perched on top) -->
  <rect x="70" y="28" width="60" height="44" rx="14" ry="14" fill="#E0AA00"/>
  <!-- Head highlight -->
  <rect x="76" y="32" width="48" height="20" rx="10" ry="10" fill="#F5C838" opacity="0.35"/>

  <!-- Left eye socket -->
  <circle cx="88" cy="48" r="12" fill="#B88B00"/>
  <!-- Left eye white -->
  <circle cx="88" cy="48" r="9" fill="#EEEEFF"/>
  <!-- Left pupil -->
  <circle cx="90" cy="47" r="5" fill="#2A1A08"/>
  <!-- Left eye shine -->
  <circle cx="92" cy="45" r="2" fill="#FFFFFF"/>

  <!-- Right eye socket -->
  <circle cx="112" cy="48" r="12" fill="#B88B00"/>
  <!-- Right eye white -->
  <circle cx="112" cy="48" r="9" fill="#EEEEFF"/>
  <!-- Right pupil -->
  <circle cx="114" cy="47" r="5" fill="#2A1A08"/>
  <!-- Right eye shine -->
  <circle cx="116" cy="45" r="2" fill="#FFFFFF"/>

  <!-- Mouth (sturdy grin) -->
  <path d="M88,62 Q100,72 112,62" stroke="#B88B00" stroke-width="3.5" stroke-linecap="round" fill="none"/>

  <!-- Neck / collar band (narrow, small head to wide body) -->
  <rect x="78" y="72" width="44" height="12" rx="5" ry="5" fill="#B88B00"/>
  <rect x="82" y="75" width="36" height="6" rx="3" ry="3" fill="#F5C838" opacity="0.3"/>

  <!-- Body (extra wide tank body) -->
  <rect x="24" y="84" width="152" height="120" rx="26" ry="26" fill="#E0AA00"/>
  <!-- Body highlight -->
  <rect x="34" y="90" width="132" height="52" rx="20" ry="20" fill="#F5C838" opacity="0.25"/>

  <!-- Left shoulder bolt -->
  <circle cx="40" cy="96" r="10" fill="#B88B00"/>
  <circle cx="40" cy="96" r="6" fill="#E0AA00"/>
  <circle cx="40" cy="96" r="3" fill="#F5C838" opacity="0.5"/>
  <!-- Right shoulder bolt -->
  <circle cx="160" cy="96" r="10" fill="#B88B00"/>
  <circle cx="160" cy="96" r="6" fill="#E0AA00"/>
  <circle cx="160" cy="96" r="3" fill="#F5C838" opacity="0.5"/>

  <!-- Chest panel (wide to match body) -->
  <rect x="56" y="115" width="88" height="55" rx="12" ry="12" fill="#B88B00"/>
  <!-- Chest button left -->
  <circle cx="76" cy="132" r="7" fill="#F5C838"/>
  <circle cx="76" cy="132" r="4" fill="#FFE070"/>
  <!-- Chest button center -->
  <circle cx="100" cy="132" r="7" fill="#F5C838"/>
  <circle cx="100" cy="132" r="4" fill="#FFE070"/>
  <!-- Chest button right -->
  <circle cx="124" cy="132" r="7" fill="#F5C838"/>
  <circle cx="124" cy="132" r="4" fill="#FFE070"/>
  <!-- Chest meter bar background -->
  <rect x="70" y="148" width="60" height="10" rx="5" ry="5" fill="#8B6A00"/>
  <!-- Chest meter bar fill -->
  <rect x="72" y="150" width="40" height="6" rx="3" ry="3" fill="#F5C838"/>

  <!-- Left arm (heavy/thick) -->
  <rect x="2" y="92" width="28" height="72" rx="14" ry="14" fill="#E0AA00"/>
  <rect x="4" y="94" width="24" height="28" rx="12" ry="12" fill="#F5C838" opacity="0.25"/>
  <!-- Left hand -->
  <circle cx="16" cy="168" r="14" fill="#B88B00"/>
  <circle cx="14" cy="165" r="4" fill="#F5C838" opacity="0.3"/>

  <!-- Right arm (heavy/thick) -->
  <rect x="170" y="92" width="28" height="72" rx="14" ry="14" fill="#E0AA00"/>
  <rect x="172" y="94" width="24" height="28" rx="12" ry="12" fill="#F5C838" opacity="0.25"/>
  <!-- Right hand -->
  <circle cx="184" cy="168" r="14" fill="#B88B00"/>
  <circle cx="182" cy="165" r="4" fill="#F5C838" opacity="0.3"/>

  <!-- Left leg (thick and short) -->
  <rect x="48" y="200" width="40" height="38" rx="16" ry="16" fill="#B88B00"/>
  <rect x="50" y="202" width="36" height="16" rx="12" ry="12" fill="#F5C838" opacity="0.2"/>
  <!-- Left foot (wide, stable) -->
  <rect x="38" y="230" width="56" height="24" rx="12" ry="12" fill="#E0AA00"/>
  <rect x="40" y="232" width="52" height="10" rx="8" ry="8" fill="#F5C838" opacity="0.25"/>

  <!-- Right leg (thick and short) -->
  <rect x="112" y="200" width="40" height="38" rx="16" ry="16" fill="#B88B00"/>
  <rect x="114" y="202" width="36" height="16" rx="12" ry="12" fill="#F5C838" opacity="0.2"/>
  <!-- Right foot (wide, stable) -->
  <rect x="106" y="230" width="56" height="24" rx="12" ry="12" fill="#E0AA00"/>
  <rect x="108" y="232" width="52" height="10" rx="8" ry="8" fill="#F5C838" opacity="0.25"/>
</svg>
