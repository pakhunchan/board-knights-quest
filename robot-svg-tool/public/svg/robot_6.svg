<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" fill="none">
  <!-- Antenna stem -->
  <rect x="95" y="18" width="10" height="22" rx="3" fill="#1E8449"/>
  <!-- Antenna ball -->
  <circle cx="100" cy="14" r="10" fill="#2ECC71"/>
  <circle cx="97" cy="11" r="3" fill="#5DADE2" opacity="0.6"/>

  <!-- Head -->
  <rect x="58" y="40" width="84" height="64" rx="18" fill="#27AE60"/>
  <!-- Head highlight -->
  <rect x="62" y="44" width="76" height="28" rx="14" fill="#2ECC71" opacity="0.45"/>

  <!-- Left eye socket -->
  <circle cx="80" cy="72" r="16" fill="#1E8449"/>
  <!-- Left eye white -->
  <circle cx="80" cy="72" r="12" fill="#FFFFFF"/>
  <!-- Left pupil -->
  <circle cx="83" cy="70" r="6" fill="#1A1A2E"/>
  <!-- Left eye glint -->
  <circle cx="86" cy="67" r="2.5" fill="#FFFFFF"/>

  <!-- Right eye socket -->
  <circle cx="120" cy="72" r="16" fill="#1E8449"/>
  <!-- Right eye white -->
  <circle cx="120" cy="72" r="12" fill="#FFFFFF"/>
  <!-- Right pupil -->
  <circle cx="123" cy="70" r="6" fill="#1A1A2E"/>
  <!-- Right eye glint -->
  <circle cx="126" cy="67" r="2.5" fill="#FFFFFF"/>

  <!-- Mouth -->
  <rect x="82" y="90" width="36" height="6" rx="3" fill="#1E8449"/>

  <!-- Neck collar / band -->
  <rect x="62" y="104" width="76" height="14" rx="5" fill="#1E8449"/>
  <rect x="66" y="107" width="68" height="8" rx="3" fill="#27AE60"/>
  <!-- Collar detail lines -->
  <rect x="80" y="106" width="3" height="10" rx="1" fill="#1E8449" opacity="0.5"/>
  <rect x="98" y="106" width="3" height="10" rx="1" fill="#1E8449" opacity="0.5"/>
  <rect x="116" y="106" width="3" height="10" rx="1" fill="#1E8449" opacity="0.5"/>

  <!-- Body -->
  <path d="M52,130 Q48,130 46,140 L42,200 Q40,218 56,222 L144,222 Q160,218 158,200 L154,140 Q152,130 148,130 Z" fill="#27AE60"/>
  <!-- Body highlight -->
  <path d="M58,134 Q56,134 54,142 L56,158 Q58,162 68,162 L132,162 Q142,162 144,158 L146,142 Q144,134 142,134 Z" fill="#2ECC71" opacity="0.35"/>

  <!-- Chest panel -->
  <rect x="72" y="148" width="56" height="44" rx="8" fill="#1E8449" opacity="0.6"/>
  <!-- Chest buttons -->
  <circle cx="88" cy="162" r="5" fill="#2ECC71"/>
  <circle cx="112" cy="162" r="5" fill="#F39C12"/>
  <circle cx="88" cy="180" r="5" fill="#E74C3C"/>
  <circle cx="112" cy="180" r="5" fill="#2ECC71"/>

  <!-- Belt / waist band -->
  <rect x="54" y="210" width="92" height="12" rx="4" fill="#1E8449"/>
  <!-- Belt buckle -->
  <rect x="88" y="208" width="24" height="16" rx="4" fill="#2ECC71"/>
  <rect x="93" y="212" width="14" height="8" rx="2" fill="#1E8449"/>

  <!-- Left arm -->
  <rect x="30" y="134" width="18" height="56" rx="9" fill="#27AE60"/>
  <rect x="32" y="136" width="14" height="20" rx="7" fill="#2ECC71" opacity="0.35"/>
  <!-- Left hand -->
  <circle cx="39" cy="196" r="12" fill="#1E8449"/>
  <circle cx="39" cy="196" r="8" fill="#27AE60"/>

  <!-- Right arm -->
  <rect x="152" y="134" width="18" height="56" rx="9" fill="#27AE60"/>
  <rect x="154" y="136" width="14" height="20" rx="7" fill="#2ECC71" opacity="0.35"/>
  <!-- Right hand -->
  <circle cx="161" cy="196" r="12" fill="#1E8449"/>
  <circle cx="161" cy="196" r="8" fill="#27AE60"/>

  <!-- Left leg -->
  <rect x="64" y="222" width="26" height="40" rx="10" fill="#27AE60"/>
  <!-- Left foot -->
  <ellipse cx="74" cy="272" rx="20" ry="12" fill="#1E8449"/>
  <ellipse cx="74" cy="270" rx="18" ry="9" fill="#27AE60"/>

  <!-- Right leg -->
  <rect x="110" y="222" width="26" height="40" rx="10" fill="#27AE60"/>
  <!-- Right foot -->
  <ellipse cx="126" cy="272" rx="20" ry="12" fill="#1E8449"/>
  <ellipse cx="126" cy="270" rx="18" ry="9" fill="#27AE60"/>
</svg>
