<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Antenna stem -->
  <rect x="96" y="18" width="8" height="20" rx="3" ry="3" fill="#D47A10"/>
  <!-- Antenna ball -->
  <circle cx="100" cy="14" r="10" fill="#FFAB3D"/>
  <circle cx="97" cy="11" r="3" fill="#FFD080" opacity="0.6"/>

  <!-- Head -->
  <rect x="58" y="38" width="84" height="62" rx="18" ry="18" fill="#F5921B"/>
  <!-- Head highlight -->
  <rect x="64" y="42" width="72" height="24" rx="12" ry="12" fill="#FFAB3D" opacity="0.4"/>

  <!-- Left eye socket -->
  <circle cx="80" cy="65" r="16" fill="#FFFFFF"/>
  <circle cx="80" cy="65" r="14" fill="#E8E8E8"/>
  <!-- Left pupil -->
  <circle cx="82" cy="66" r="8" fill="#2C2C2C"/>
  <circle cx="79" cy="63" r="3" fill="#FFFFFF"/>

  <!-- Right eye socket -->
  <circle cx="120" cy="65" r="16" fill="#FFFFFF"/>
  <circle cx="120" cy="65" r="14" fill="#E8E8E8"/>
  <!-- Right pupil -->
  <circle cx="122" cy="66" r="8" fill="#2C2C2C"/>
  <circle cx="119" cy="63" r="3" fill="#FFFFFF"/>

  <!-- Mouth -->
  <rect x="85" y="84" width="30" height="6" rx="3" ry="3" fill="#D47A10"/>

  <!-- Neck collar -->
  <rect x="52" y="100" width="96" height="14" rx="6" ry="6" fill="#D47A10"/>
  <rect x="56" y="102" width="88" height="4" rx="2" ry="2" fill="#FFAB3D" opacity="0.4"/>

  <!-- Body -->
  <path d="M48,120 Q44,120 42,130 L38,195 Q36,210 52,215 L148,215 Q164,210 162,195 L158,130 Q156,120 152,120 Z" fill="#F5921B"/>
  <!-- Body highlight -->
  <path d="M60,125 Q58,125 56,132 L54,160 Q80,165 100,162 Q120,165 146,160 L144,132 Q142,125 140,125 Z" fill="#FFAB3D" opacity="0.3"/>

  <!-- Chest panel -->
  <rect x="72" y="140" width="56" height="45" rx="10" ry="10" fill="#D47A10"/>
  <rect x="78" y="146" width="44" height="33" rx="7" ry="7" fill="#E87A00"/>
  <!-- Chest buttons -->
  <circle cx="92" cy="156" r="5" fill="#FFAB3D"/>
  <circle cx="108" cy="156" r="5" fill="#FFAB3D"/>
  <rect x="86" y="168" width="28" height="5" rx="2" ry="2" fill="#FFAB3D"/>

  <!-- Left arm -->
  <rect x="24" y="125" width="20" height="55" rx="10" ry="10" fill="#F5921B"/>
  <rect x="26" y="127" width="16" height="20" rx="8" ry="8" fill="#FFAB3D" opacity="0.35"/>
  <!-- Left hand -->
  <circle cx="34" cy="185" r="12" fill="#D47A10"/>

  <!-- Right arm -->
  <rect x="156" y="125" width="20" height="55" rx="10" ry="10" fill="#F5921B"/>
  <rect x="158" y="127" width="16" height="20" rx="8" ry="8" fill="#FFAB3D" opacity="0.35"/>
  <!-- Right hand -->
  <circle cx="166" cy="185" r="12" fill="#D47A10"/>

  <!-- Left leg -->
  <rect x="62" y="215" width="28" height="45" rx="12" ry="12" fill="#F5921B"/>
  <!-- Left foot -->
  <rect x="56" y="252" width="38" height="22" rx="10" ry="10" fill="#D47A10"/>

  <!-- Right leg -->
  <rect x="110" y="215" width="28" height="45" rx="12" ry="12" fill="#F5921B"/>
  <!-- Right foot -->
  <rect x="106" y="252" width="38" height="22" rx="10" ry="10" fill="#D47A10"/>
</svg>
