<!DOCTYPE html>
<html lang="en">
<head>

<title>Fantasy Level Map</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #b8e4e0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }
  svg { display: block; max-width: 100vw; max-height: 100vh; }
  .level-node { cursor: pointer; }
  .level-node.completed:hover circle:first-child { filter: brightness(1.1); }
  .level-node.current:hover circle:first-child { filter: brightness(1.15); }
