<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concept 04: Parchment Storybook Button</title>
<link href="https://fonts.googleapis.com/css2?family=Fondamento:ital@0;1&family=IM+Fell+English:ital@0;1&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background:
      linear-gradient(180deg,
        #FDF6E3 0%,
        #F5E6C8 25%,
        #EDE0CB 45%,
        #D6CBB5 60%,
        #C8C0AE 70%,
        #B8C8D8 85%,
        #A8BDD0 100%
      );
    background-attachment: fixed;
    font-family: 'IM Fell English', serif;
    overflow: hidden;
    position: relative;
  }

  /* Old book page texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(139, 105, 20, 0.015) 3px,
        rgba(139, 105, 20, 0.015) 4px
      ),
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 5px,
        rgba(139, 105, 20, 0.01) 5px,
        rgba(139, 105, 20, 0.01) 6px
      );
    pointer-events: none;
    z-index: 0;
  }

  /* Vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(61, 43, 31, 0.15) 100%);
    pointer-events: none;
    z-index: 0;
  }

  .label {
    position: relative;
    z-index: 1;
    font-family: 'IM Fell English', serif;
    font-size: 16px;
    color: #8B6914;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 48px;
    opacity: 0.7;
  }

  .button-wrapper {
    position: relative;
    z-index: 1;
    animation: gentleFloat 4s ease-in-out infinite;
  }

  @keyframes gentleFloat {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-6px); }
  }

  .continue-btn {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 280px;
    min-height: 88px;
    padding: 18px 52px;
    border: none;
    cursor: pointer;
    font-family: 'Cinzel Decorative', 'Fondamento', cursive;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: #3D2B1F;
    text-shadow:
      0 1px 0 rgba(245, 230, 200, 0.6),
      0 0 8px rgba(139, 105, 20, 0.1);
    background:
      linear-gradient(
        168deg,
        #F5E6C8 0%,
        #EFD9AB 18%,
        #F2E0B8 35%,
        #E8D5A8 55%,
        #E0CCA0 72%,
        #D8C498 100%
      );
    border-radius: 6px 8px 6px 10px;
    box-shadow:
      0 4px 12px rgba(61, 43, 31, 0.2),
      0 2px 4px rgba(61, 43, 31, 0.15),
      inset 0 1px 2px rgba(255, 255, 255, 0.5),
      inset 0 -1px 3px rgba(139, 105, 20, 0.12);
    transition:
      transform 0.22s ease,
      box-shadow 0.22s ease,
      background 0.3s ease;
    outline: none;
    /* Torn/aged edge via clip-path */
    clip-path: polygon(
      0% 4%,
      2% 0%,
      6% 2%,
      12% 0%,
      18% 1%,
      25% 0%,
      32% 2%,
      38% 0%,
      45% 1%,
      52% 0%,
      58% 2%,
      64% 0%,
      70% 1%,
      76% 0%,
      82% 2%,
      88% 0%,
      94% 1%,
      98% 0%,
      100% 3%,
      99% 10%,
      100% 20%,
      99% 30%,
      100% 42%,
      99% 55%,
      100% 68%,
      99% 78%,
      100% 88%,
      99% 95%,
      100% 97%,
      97% 100%,
      92% 98%,
      86% 100%,
      80% 98%,
      74% 100%,
      68% 99%,
      62% 100%,
      55% 98%,
      48% 100%,
      42% 99%,
      36% 100%,
      28% 98%,
      22% 100%,
      16% 99%,
      10% 100%,
      5% 98%,
      1% 100%,
      0% 97%,
      1% 90%,
      0% 80%,
      1% 70%,
      0% 58%,
      1% 48%,
      0% 38%,
      1% 28%,
      0% 18%,
      1% 10%
    );
  }

  /* Parchment paper fiber texture */
  .continue-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 30%, rgba(139, 105, 20, 0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 60%, rgba(139, 105, 20, 0.05) 0%, transparent 40%),
      radial-gradient(ellipse at 50% 80%, rgba(107, 78, 27, 0.04) 0%, transparent 50%),
      radial-gradient(circle at 30% 70%, rgba(139, 105, 20, 0.03) 0%, transparent 30%),
      radial-gradient(circle at 70% 20%, rgba(107, 78, 27, 0.03) 0%, transparent 30%);
    border-radius: inherit;
    pointer-events: none;
  }

  /* Gold ink border line inset */
  .continue-btn::after {
    content: '';
    position: absolute;
    top: 8px;
    left: 12px;
    right: 12px;
    bottom: 8px;
    border: 1.5px solid rgba(139, 105, 20, 0.25);
    border-radius: 3px;
    pointer-events: none;
  }

  /* Hover */
  .continue-btn:hover {
    transform: translateY(-3px);
    background:
      linear-gradient(
        168deg,
        #FAF0D8 0%,
        #F5E2B8 18%,
        #F8EAC8 35%,
        #F0DDB5 55%,
        #E8D5AA 72%,
        #E0CDA2 100%
      );
    box-shadow:
      0 8px 24px rgba(61, 43, 31, 0.25),
      0 4px 8px rgba(61, 43, 31, 0.15),
      0 0 20px rgba(139, 105, 20, 0.12),
      inset 0 1px 3px rgba(255, 255, 255, 0.6),
      inset 0 -1px 3px rgba(139, 105, 20, 0.1);
  }

  /* Active / Pressed */
  .continue-btn:active {
    transform: translateY(1px);
    box-shadow:
      0 1px 4px rgba(61, 43, 31, 0.2),
      0 1px 2px rgba(61, 43, 31, 0.12),
      inset 0 2px 4px rgba(107, 78, 27, 0.12);
    background:
      linear-gradient(
        168deg,
        #E8D5A8 0%,
        #E0CCA0 18%,
        #E4D0A5 35%,
        #DBC598 55%,
        #D3BD90 72%,
        #CBB588 100%
      );
    transition: transform 0.08s ease, box-shadow 0.08s ease;
  }

  /* Focus */
  .continue-btn:focus-visible {
    box-shadow:
      0 4px 12px rgba(61, 43, 31, 0.2),
      0 2px 4px rgba(61, 43, 31, 0.15),
      0 0 0 3px rgba(139, 105, 20, 0.3),
      0 0 16px rgba(139, 105, 20, 0.2),
      inset 0 1px 2px rgba(255, 255, 255, 0.5);
  }

  /* Wax seal */
  .wax-seal {
    position: absolute;
    right: -16px;
    top: -16px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 35% 35%,
        #C0623A 0%,
        #A0522D 30%,
        #8B4226 60%,
        #6B3218 100%
      );
    box-shadow:
      0 2px 6px rgba(61, 43, 31, 0.35),
      inset 0 1px 2px rgba(255, 200, 150, 0.3),
      inset 0 -2px 4px rgba(61, 43, 31, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 2;
  }

  /* Star stamp on wax seal */
  .wax-seal::before {
    content: '';
    width: 20px;
    height: 20px;
    background: none;
    clip-path: polygon(
      50% 0%,
      61% 35%,
      98% 35%,
      68% 57%,
      79% 91%,
      50% 70%,
      21% 91%,
      32% 57%,
      2% 35%,
      39% 35%
    );
    background-color: rgba(61, 43, 31, 0.35);
  }

  /* Wax seal shimmer highlight */
  .wax-seal::after {
    content: '';
    position: absolute;
    top: 4px;
    left: 6px;
    width: 16px;
    height: 10px;
    border-radius: 50%;
    background: linear-gradient(
      135deg,
      rgba(255, 220, 180, 0.45) 0%,
      transparent 100%
    );
    animation: sealShimmer 3s ease-in-out infinite;
  }

  @keyframes sealShimmer {
    0%, 100% { opacity: 0.5; transform: translate(0, 0) scale(1); }
    50% { opacity: 1; transform: translate(1px, -1px) scale(1.05); }
  }

  /* Decorative flourish below button */
  .flourish {
    position: relative;
    z-index: 1;
    margin-top: 32px;
    font-family: 'Fondamento', cursive;
    font-size: 20px;
    color: rgba(139, 105, 20, 0.35);
    letter-spacing: 0.5em;
    user-select: none;
  }
</style>
</head>
<body>

  <div class="label">Concept 04: Parchment Storybook</div>

  <div class="button-wrapper">
    <button class="continue-btn" type="button">
      <span class="wax-seal"></span>
      CONTINUE
    </button>
  </div>

  <div class="flourish" aria-hidden="true">~ ~ ~</div>

  <script>
    // Add a subtle ink-press feedback on click
    (function() {
      var btn = document.querySelector('.continue-btn');
      btn.addEventListener('click', function() {
        btn.style.transition = 'none';
        btn.style.transform = 'translateY(2px) scale(0.98)';
        requestAnimationFrame(function() {
          requestAnimationFrame(function() {
            btn.style.transition = 'transform 0.3s ease, box-shadow 0.3s ease';
            btn.style.transform = '';
          });
        });
      });
    })();
  </script>

</body>
</html>
