    <linearGradient id="mtGrad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a7a6e"/>
      <stop offset="100%" stop-color="#5a5a4e"/>

    <!-- 3D Elliptical Stone - Completed (light stone) -->
    <radialGradient id="stoneCompleted" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#c8c4b8"/>
      <stop offset="50%" stop-color="#a8a498"/>
      <stop offset="100%" stop-color="#888478"/>
    </radialGradient>

    <radialGradient id="stoneCurrent" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fff0c0"/>
      <stop offset="50%" stop-color="#e8d498"/>
      <stop offset="100%" stop-color="#c9a96e"/>
    </radialGradient>

    <!-- 3D Elliptical Stone - Locked (dark) -->
    <radialGradient id="stoneLocked" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#787470"/>
      <stop offset="50%" stop-color="#5e5a56"/>
      <stop offset="100%" stop-color="#4a4844"/>
    </radialGradient>

    <!-- Gold glow filter for current level -->
    <filter id="goldGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feFlood flood-color="#ffd740" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle shadow for nodes -->
    <filter id="nodeShadow" x="-20%" y="-10%" width="140%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.25"/>
    </filter>

      <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#000" flood-opacity="0.15"/>

      <rect x="0" y="0" width="7" height="5" fill="#928678" rx="0.5"/>

    <animateTransform id="bounce" attributeName="transform" type="translate" values="0,0; 0,-6; 0,0" dur="1s" repeatCount="indefinite"/>
