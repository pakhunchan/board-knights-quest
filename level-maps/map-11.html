<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Level Map - World 11</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1920px; height: 1080px; overflow: hidden; background: #b5d8c0; }
  svg { display: block; }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <!-- Sky gradient - soft teal-mint -->
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b5d8c0"/>
      <stop offset="60%" stop-color="#bfdfc8"/>
      <stop offset="100%" stop-color="#c8e6cf"/>
    </linearGradient>

    <!-- Grass gradients - sage green, muted -->
    <linearGradient id="grassGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7aaa6a"/>
      <stop offset="100%" stop-color="#6b9a5a"/>
    </linearGradient>
    <linearGradient id="grassGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b9a5a"/>
      <stop offset="100%" stop-color="#5a8a4a"/>
    </linearGradient>

    <!-- Path fill -->
    <linearGradient id="pathGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a96e"/>
      <stop offset="100%" stop-color="#b89458"/>
    </linearGradient>

    <!-- Mountain gradients - muted gray-brown -->
    <linearGradient id="mtGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9a9a8e"/>
      <stop offset="100%" stop-color="#7a7a6e"/>
    </linearGradient>
    <linearGradient id="mtGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a8a7e"/>
      <stop offset="100%" stop-color="#6a6a5e"/>
    </linearGradient>
    <linearGradient id="mtGrad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a7a6e"/>
      <stop offset="100%" stop-color="#5a5a4e"/>
    </linearGradient>

    <!-- Stone node gradients -->
    <radialGradient id="stoneCompleted" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#a0a098"/>
      <stop offset="100%" stop-color="#707068"/>
    </radialGradient>
    <radialGradient id="stoneCurrent" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffd966"/>
      <stop offset="100%" stop-color="#e6b830"/>
    </radialGradient>
    <radialGradient id="stoneLocked" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#6e6e68"/>
      <stop offset="100%" stop-color="#4a4a46"/>
    </radialGradient>

    <!-- Glow for current level -->
    <filter id="goldGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#ffd966" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle shadow for nodes -->
    <filter id="nodeShadow" x="-20%" y="-10%" width="140%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.25"/>
    </filter>

    <!-- Bush shadow -->
    <filter id="bushShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- ===== SKY ===== -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#skyGrad)"/>

  <!-- ===== DISTANT MOUNTAINS (behind hills) ===== -->
  <!-- Far back row - smaller, lighter -->

  <polygon points="160,440 320,260 480,440" fill="#9a9a8e" opacity="0.55"/>
  <polygon points="350,440 500,280 650,440" fill="#8a8a7e" opacity="0.5"/>
  <polygon points="520,440 680,240 840,440" fill="#9a9a8e" opacity="0.55"/>
  <polygon points="700,440 840,290 980,440" fill="#8a8a7e" opacity="0.5"/>
  <polygon points="1050,440 1200,310 1350,440" fill="#9a9a8e" opacity="0.45"/>
  <polygon points="1350,440 1480,320 1610,440" fill="#8a8a7e" opacity="0.4"/>

  <!-- Main mountain row -->
  <polygon points="-60,480 140,240 340,480" fill="url(#mtGrad2)"/>
  <polygon points="80,480 280,200 480,480" fill="url(#mtGrad1)"/>
  <polygon points="240,480 420,220 600,480" fill="url(#mtGrad3)"/>
  <polygon points="400,480 580,250 760,480" fill="url(#mtGrad2)"/>
  <polygon points="560,480 720,270 880,480" fill="url(#mtGrad1)"/>
  <polygon points="750,480 920,230 1090,480" fill="url(#mtGrad3)"/>
  <!-- Right side - sparser -->
  <polygon points="980,480 1140,280 1300,480" fill="url(#mtGrad2)"/>

  <polygon points="1450,480 1620,320 1790,480" fill="url(#mtGrad2)"/>
  <polygon points="1680,480 1830,330 1980,480" fill="url(#mtGrad3)" opacity="0.8"/>

  <!-- Snow caps -->
  <polygon points="280,200 255,235 305,235" fill="#e8e8e0" opacity="0.55"/>
  <polygon points="420,220 398,250 442,250" fill="#e8e8e0" opacity="0.55"/>
  <polygon points="580,250 558,278 602,278" fill="#e8e8e0" opacity="0.5"/>
  <polygon points="920,230 898,262 942,262" fill="#e8e8e0" opacity="0.55"/>
  <polygon points="140,240 118,272 162,272" fill="#e8e8e0" opacity="0.5"/>
  <polygon points="1140,280 1120,308 1160,308" fill="#e8e8e0" opacity="0.45"/>

  <!-- ===== CASTLE SILHOUETTE on a distant peak ===== -->
  <g transform="translate(920, 180)" opacity="0.55">
    <!-- Main tower -->
    <rect x="-18" y="0" width="36" height="50" fill="#5a5a4e" rx="2"/>
    <!-- Turret left -->
    <rect x="-28" y="-12" width="14" height="26" fill="#5a5a4e" rx="2"/>
    <rect x="-30" y="-17" width="4" height="7" fill="#5a5a4e"/>
    <rect x="-21" y="-17" width="4" height="7" fill="#5a5a4e"/>
    <!-- Turret right -->
    <rect x="14" y="-12" width="14" height="26" fill="#5a5a4e" rx="2"/>
    <rect x="16" y="-17" width="4" height="7" fill="#5a5a4e"/>
    <rect x="25" y="-17" width="4" height="7" fill="#5a5a4e"/>
    <!-- Center spire -->
    <polygon points="0,-25 -7,0 7,0" fill="#5a5a4e"/>
    <!-- Flag -->
    <line x1="0" y1="-25" x2="0" y2="-40" stroke="#5a5a4e" stroke-width="2"/>
    <polygon points="0,-40 13,-36 0,-32" fill="#b05050"/>
    <!-- Window -->
    <ellipse cx="0" cy="26" rx="5" ry="8" fill="#3a3a32"/>
    <!-- Gate -->
    <path d="M -7,50 L -7,38 A 7,9 0 0 1 7,38 L 7,50 Z" fill="#3a3a32"/>
  </g>

  <!-- ===== BUSH/TREE ROW between mountains and grass (y=440-560) ===== -->
  <!-- These sit in front of mountains, creating a treeline -->
  <g filter="url(#bushShadow)">
    <!-- Left cluster -->
    <circle cx="60" cy="510" r="38" fill="#5a8a4a"/>
    <circle cx="100" cy="500" r="42" fill="#6b9a5a"/>
    <circle cx="145" cy="508" r="36" fill="#5a8a4a"/>
    <circle cx="185" cy="502" r="40" fill="#7aaa6a"/>

    <circle cx="320" cy="510" r="40" fill="#7aaa6a"/>
    <circle cx="365" cy="504" r="36" fill="#6b9a5a"/>
    <circle cx="410" cy="512" r="38" fill="#5a8a4a"/>
    <circle cx="460" cy="506" r="40" fill="#7aaa6a"/>
    <circle cx="510" cy="514" r="35" fill="#6b9a5a"/>
    <circle cx="560" cy="508" r="38" fill="#5a8a4a"/>
    <circle cx="610" cy="510" r="42" fill="#7aaa6a"/>
    <circle cx="660" cy="504" r="36" fill="#6b9a5a"/>
    <circle cx="710" cy="512" r="38" fill="#5a8a4a"/>
    <circle cx="760" cy="506" r="40" fill="#7aaa6a"/>
    <circle cx="810" cy="514" r="35" fill="#6b9a5a"/>
    <circle cx="860" cy="508" r="38" fill="#5a8a4a"/>
    <circle cx="910" cy="510" r="40" fill="#7aaa6a"/>
    <circle cx="960" cy="506" r="36" fill="#6b9a5a"/>
    <circle cx="1010" cy="512" r="38" fill="#5a8a4a"/>
    <circle cx="1060" cy="508" r="40" fill="#7aaa6a"/>
    <circle cx="1110" cy="514" r="35" fill="#6b9a5a"/>
    <circle cx="1160" cy="506" r="38" fill="#5a8a4a"/>
    <circle cx="1210" cy="510" r="40" fill="#7aaa6a"/>
    <circle cx="1260" cy="504" r="36" fill="#6b9a5a"/>
    <circle cx="1310" cy="512" r="38" fill="#5a8a4a"/>
    <circle cx="1360" cy="508" r="35" fill="#7aaa6a"/>
    <circle cx="1410" cy="514" r="38" fill="#6b9a5a"/>

    <circle cx="1710" cy="514" r="38" fill="#6b9a5a"/>

  <!-- ===== GREEN GRASS HILLS (y=550 to y=1080) ===== -->

  <ellipse cx="900" cy="560" rx="560" ry="135" fill="#7aaa6a"/>
  <ellipse cx="1500" cy="565" rx="520" ry="140" fill="#6b9a5a"/>

  <!-- Main ground fill -->
  <rect x="0" y="580" width="1920" height="500" fill="#5a8a4a"/>

  <!-- Rolling foreground hills -->
  <ellipse cx="200" cy="600" rx="460" ry="110" fill="#7aaa6a"/>
  <ellipse cx="750" cy="615" rx="520" ry="120" fill="#6b9a5a"/>
  <ellipse cx="1300" cy="605" rx="490" ry="115" fill="#7aaa6a"/>
  <ellipse cx="1750" cy="620" rx="420" ry="108" fill="#6b9a5a"/>

  <!-- Foreground hill bumps -->
  <ellipse cx="100" cy="860" rx="320" ry="75" fill="#7aaa6a"/>
  <ellipse cx="500" cy="890" rx="360" ry="85" fill="#6b9a5a"/>
  <ellipse cx="960" cy="870" rx="400" ry="80" fill="#7aaa6a"/>
  <ellipse cx="1450" cy="880" rx="360" ry="75" fill="#6b9a5a"/>
  <ellipse cx="1800" cy="900" rx="310" ry="80" fill="#7aaa6a"/>

  <!-- Bottom edge fill -->
  <rect x="0" y="940" width="1920" height="140" fill="#5a8a4a"/>
  <ellipse cx="480" cy="1010" rx="520" ry="55" fill="#4f7f42"/>
  <ellipse cx="1400" cy="1020" rx="520" ry="50" fill="#4f7f42"/>

  <!-- ===== WINDING PATH - Wide S-Curve across full width ===== -->
  <!-- Path coordinates: all y values between 580 and 980 -->
  <!-- S-curve: starts bottom-left, sweeps right-up, bends back down, sweeps right-up, ends bottom-right -->
  <!-- Node positions along the path:
       L1(150,960) L2(320,870) L3(510,680) L4(720,610) L5(940,700)
       L6(1130,850) L7(1310,700) L8(1480,610) L9(1650,700) L10(1770,850) -->

  <!-- Path shadow -->
  <path d="M 100,1000 C 120,960 180,900 280,840
           C 400,770 470,700 560,660
           C 660,620 740,600 820,600
           C 920,600 1000,640 1060,700
           C 1130,770 1160,840 1200,870
           C 1250,900 1280,870 1320,820
           C 1370,760 1420,680 1500,630
           C 1570,590 1640,590 1700,630
           C 1760,670 1790,740 1810,820
           C 1825,880 1830,920 1830,960"
        stroke="#8a7040" stroke-width="58" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>

  <!-- Path dark edge -->
  <path d="M 100,1000 C 120,960 180,900 280,840
           C 400,770 470,700 560,660
           C 660,620 740,600 820,600
           C 920,600 1000,640 1060,700
           C 1130,770 1160,840 1200,870
           C 1250,900 1280,870 1320,820
           C 1370,760 1420,680 1500,630
           C 1570,590 1640,590 1700,630
           C 1760,670 1790,740 1810,820
           C 1825,880 1830,920 1830,960"
        stroke="#a08050" stroke-width="52" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Path main fill -->
  <path d="M 100,1000 C 120,960 180,900 280,840
           C 400,770 470,700 560,660
           C 660,620 740,600 820,600
           C 920,600 1000,640 1060,700
           C 1130,770 1160,840 1200,870
           C 1250,900 1280,870 1320,820
           C 1370,760 1420,680 1500,630
           C 1570,590 1640,590 1700,630
           C 1760,670 1790,740 1810,820
           C 1825,880 1830,920 1830,960"
        stroke="#c9a96e" stroke-width="44" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Path highlight (center light strip) -->
  <path d="M 100,1000 C 120,960 180,900 280,840
           C 400,770 470,700 560,660
           C 660,620 740,600 820,600
           C 920,600 1000,640 1060,700
           C 1130,770 1160,840 1200,870
           C 1250,900 1280,870 1320,820
           C 1370,760 1420,680 1500,630
           C 1570,590 1640,590 1700,630
           C 1760,670 1790,740 1810,820
           C 1825,880 1830,920 1830,960"
        stroke="#d4b87e" stroke-width="28" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

  <!-- ===== BUSHES (scattered around path, not on it) ===== -->
  <g filter="url(#bushShadow)">
    <!-- Left area bushes -->
    <circle cx="60" cy="750" r="28" fill="#4f7f42"/>
    <circle cx="85" cy="742" r="24" fill="#5a8a4a"/>
    <circle cx="40" cy="745" r="22" fill="#4a7a3e"/>

    <circle cx="250" cy="700" r="25" fill="#4f7f42"/>

    <circle cx="180" cy="940" r="30" fill="#4f7f42"/>
    <circle cx="206" cy="932" r="26" fill="#5a8a4a"/>
    <circle cx="160" cy="936" r="24" fill="#4a7a3e"/>

    <!-- Mid-left bushes -->
    <circle cx="420" cy="750" r="26" fill="#4f7f42"/>
    <circle cx="443" cy="743" r="23" fill="#5a8a4a"/>

    <circle cx="680" cy="680" r="28" fill="#4f7f42"/>
    <circle cx="706" cy="672" r="25" fill="#5a8a4a"/>
    <circle cx="660" cy="676" r="22" fill="#4a7a3e"/>

    <!-- Center bushes -->
    <circle cx="950" cy="780" r="24" fill="#4f7f42"/>
    <circle cx="972" cy="773" r="21" fill="#5a8a4a"/>

    <circle cx="1080" cy="920" r="28" fill="#4f7f42"/>
    <circle cx="1106" cy="912" r="24" fill="#5a8a4a"/>

    <circle cx="1420" cy="710" r="25" fill="#4f7f42"/>

    <!-- Right area bushes -->
    <circle cx="1600" cy="750" r="26" fill="#4f7f42"/>

    <circle cx="1870" cy="800" r="24" fill="#4f7f42"/>

    <circle cx="1500" cy="930" r="28" fill="#4f7f42"/>
    <circle cx="1523" cy="922" r="24" fill="#5a8a4a"/>

    <circle cx="350" cy="980" r="26" fill="#4f7f42"/>

    <circle cx="1750" cy="950" r="25" fill="#4f7f42"/>
    <circle cx="1772" cy="943" r="22" fill="#5a8a4a"/>
  </g>

  <!-- ===== SMALL TREES (round lollipop style) ===== -->

  <rect x="75" y="680" width="8" height="40" rx="3" fill="#5a4a30"/>
  <circle cx="79" cy="665" r="30" fill="#4f7f42"/>
  <circle cx="90" cy="660" r="25" fill="#5a8a4a"/>

  <!-- Tree 2 - mid-left -->
  <rect x="400" y="660" width="8" height="38" rx="3" fill="#5a4a30"/>
  <circle cx="404" cy="646" r="28" fill="#4f7f42"/>
  <circle cx="414" cy="642" r="23" fill="#5a8a4a"/>

  <!-- Tree 3 - center -->
  <rect x="870" y="830" width="8" height="38" rx="3" fill="#5a4a30"/>
  <circle cx="874" cy="816" r="28" fill="#4f7f42"/>
  <circle cx="884" cy="812" r="23" fill="#5a8a4a"/>

  <!-- Tree 5 - far right -->
  <rect x="1860" y="720" width="8" height="38" rx="3" fill="#5a4a30"/>
  <circle cx="1864" cy="706" r="28" fill="#4f7f42"/>
  <circle cx="1874" cy="702" r="23" fill="#5a8a4a"/>

  <!-- ===== LEVEL NODES ===== -->
  <!-- Level positions along the S-curve path (all y > 560) -->

  <!-- LEVEL 1 - Completed -->
  <g transform="translate(150, 960)" filter="url(#nodeShadow)">
    <circle cx="0" cy="0" r="28" fill="url(#stoneCompleted)" stroke="#888" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#aaa" stroke-width="1" opacity="0.4"/>
    <text x="0" y="6" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#fff" style="text-shadow: 0 1px 2px rgba(0,0,0,0.4)">1</text>
    <!-- 3 stars -->
    <polygon points="0,0 2,6 8,7 3,11 5,17 0,14 -5,17 -3,11 -8,7 -2,6" transform="translate(-18, 28) scale(0.55)" fill="#ffd700"/>
    <polygon points="0,0 2,6 8,7 3,11 5,17 0,14 -5,17 -3,11 -8,7 -2,6" transform="translate(0, 28) scale(0.55)" fill="#ffd700"/>
    <polygon points="0,0 2,6 8,7 3,11 5,17 0,14 -5,17 -3,11 -8,7 -2,6" transform="translate(18, 28) scale(0.55)" fill="#ffd700"/>
  </g>

  <!-- LEVEL 2 - Completed -->
  <g transform="translate(320, 855)" filter="url(#nodeShadow)">
    <circle cx="0" cy="0" r="28" fill="url(#stoneCompleted)" stroke="#888" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#aaa" stroke-width="1" opacity="0.4"/>
    <text x="0" y="6" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#fff" style="text-shadow: 0 1px 2px rgba(0,0,0,0.4)">2</text>
    <polygon points="0,0 2,6 8,7 3,11 5,17 0,14 -5,17 -3,11 -8,7 -2,6" transform="translate(-18, 28) scale(0.55)" fill="#ffd700"/>
    <polygon points="0,0 2,6 8,7 3,11 5,17 0,14 -5,17 -3,11 -8,7 -2,6" transform="translate(0, 28) scale(0.55)" fill="#ffd700"/>
    <polygon points="0,0 2,6 8,7 3,11 5,17 0,14 -5,17 -3,11 -8,7 -2,6" transform="translate(18, 28) scale(0.55)" fill="#ffd700"/>

  <!-- LEVEL 3 - Completed -->
  <g transform="translate(540, 670)" filter="url(#nodeShadow)">
    <circle cx="0" cy="0" r="28" fill="url(#stoneCompleted)" stroke="#888" stroke-width="2.5"/>

    <text x="0" y="6" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#fff" style="text-shadow: 0 1px 2px rgba(0,0,0,0.4)">3</text>
    <polygon points="0,0 2,6 8,7 3,11 5,17 0,14 -5,17 -3,11 -8,7 -2,6" transform="translate(-18, 28) scale(0.55)" fill="#ffd700"/>
    <polygon points="0,0 2,6 8,7 3,11 5,17 0,14 -5,17 -3,11 -8,7 -2,6" transform="translate(0, 28) scale(0.55)" fill="#ffd700"/>
    <polygon points="0,0 2,6 8,7 3,11 5,17 0,14 -5,17 -3,11 -8,7 -2,6" transform="translate(18, 28) scale(0.55)" fill="#ffd700"/>

  <!-- LEVEL 4 - Current (golden glow, slightly larger) -->
  <g transform="translate(770, 600)" filter="url(#goldGlow)">
    <circle cx="0" cy="0" r="32" fill="url(#stoneCurrent)" stroke="#daa520" stroke-width="3"/>
    <circle cx="0" cy="0" r="25" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.35"/>
