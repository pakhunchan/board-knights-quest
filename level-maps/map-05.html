      <stop offset="100%" stop-color="#b5e3d8"/>

    <!-- Grass gradient -->
    <linearGradient id="grassGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a8f3c"/>
      <stop offset="100%" stop-color="#4a7d2e"/>

    <!-- Path fill -->
    <linearGradient id="pathGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a96e"/>
      <stop offset="100%" stop-color="#b89458"/>
    </linearGradient>

    <!-- Mountain gradients -->
    <linearGradient id="mtnGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a8a7a"/>
      <stop offset="100%" stop-color="#6b6b6b"/>

    <linearGradient id="mtnGrad2" x1="0" y1="0" x2="0" y2="1">

      <stop offset="0%" stop-color="#999888"/>
      <stop offset="100%" stop-color="#6b6b6b"/>
    </linearGradient>

    <!-- Snow cap gradient -->
    <linearGradient id="snowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dde8e0"/>
    </linearGradient>

    <!-- Current level glow -->
    <filter id="glowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feFlood flood-color="#ffd700" flood-opacity="0.7" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <radialGradient id="stoneCompleted" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#d4cbb8"/>
      <stop offset="50%" stop-color="#b8ad98"/>
      <stop offset="100%" stop-color="#9a8e78"/>

      <stop offset="0%" stop-color="#ffe680"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#c9a200"/>

      <stop offset="50%" stop-color="#5e5a50"/>
