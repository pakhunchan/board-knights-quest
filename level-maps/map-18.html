<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Level Map - Figure-8</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; width: 1920px; height: 1080px; }
  svg { display: block; }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <!-- Sky gradient: soft teal-mint -->
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b5d8c0"/>
      <stop offset="100%" stop-color="#c8e6cf"/>
    </linearGradient>

    <!-- Grass gradient -->
    <linearGradient id="grassGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7aaa6a"/>
      <stop offset="50%" stop-color="#6b9a5a"/>
      <stop offset="100%" stop-color="#5a8a4a"/>
    </linearGradient>

    <!-- Path fill -->
    <linearGradient id="pathGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a96e"/>
      <stop offset="100%" stop-color="#b89458"/>
    </linearGradient>

    <!-- Mountain gradients -->
    <linearGradient id="mtnGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9a9a8e"/>
      <stop offset="100%" stop-color="#8a8a7e"/>

    <linearGradient id="mtnGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a8a7e"/>
      <stop offset="100%" stop-color="#7a7a6e"/>

    <linearGradient id="mtnGrad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9a9a8e"/>
      <stop offset="100%" stop-color="#7a7a6e"/>

    <!-- Stone platform gradient (completed) -->
    <radialGradient id="stoneCompleted" cx="0.35" cy="0.3" r="0.65">
      <stop offset="0%" stop-color="#d4c8a8"/>
      <stop offset="50%" stop-color="#bfb08a"/>
      <stop offset="100%" stop-color="#a89870"/>
    </radialGradient>

    <!-- Stone platform gradient (current) -->
    <radialGradient id="stoneCurrent" cx="0.35" cy="0.3" r="0.65">
      <stop offset="0%" stop-color="#ffe8a0"/>
      <stop offset="50%" stop-color="#f0d070"/>
      <stop offset="100%" stop-color="#d4a830"/>
    </radialGradient>

    <!-- Stone platform gradient (locked) -->
    <radialGradient id="stoneLocked" cx="0.35" cy="0.3" r="0.65">
      <stop offset="0%" stop-color="#8a8070"/>
      <stop offset="50%" stop-color="#706858"/>
      <stop offset="100%" stop-color="#585048"/>
    </radialGradient>

    <!-- Current level glow -->

      <stop offset="0%" stop-color="#ffe066" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#ffcc33" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffaa00" stop-opacity="0"/>
    </radialGradient>

    <!-- Drop shadow filter -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.25"/>
    </filter>

    <!-- Soft glow filter -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>

    <!-- Stone bridge gradient -->
    <linearGradient id="bridgeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b0a080"/>
      <stop offset="100%" stop-color="#8a7a60"/>
    </linearGradient>

    Figure-8 layout:
    Left loop center: ~(580, 790)
    Right loop center: ~(1340, 790)
    Crossing at: ~(960, 790)

    Level positions (along the 8):
    Left loop (bottom-left start, going clockwise):

      2: (280, 840)   — left side
      3: (340, 670)   — top-left
      4: (580, 620)   — top of left loop
      5: (780, 670)   — top-right approaching crossing

    Right loop (continuing from crossing, going clockwise):
      6: (1140, 670)  — top-left of right loop
      7: (1380, 620)  — top of right loop
      8: (1580, 670)  — top-right
      9: (1640, 840)  — right side
      10: (1500, 940) — bottom of right loop
  -->

  <!-- We draw the full figure-8 path first, then overlay the bridge -->

  <!-- Path edge (darker, wider stroke for depth) -->

    M 420,940
    Q 260,940 220,840
    Q 180,720 340,670
    Q 480,620 580,620
    Q 720,620 780,670
    Q 880,730 960,790
    Q 1040,730 1140,670

    Q 1640,940 1500,940
    Q 1300,940 1160,870
    Q 1060,830 960,790
    Q 860,830 760,870
    Q 620,940 420,940
    Z
  " fill="none" stroke="#a08050" stroke-width="52" stroke-linejoin="round"/>

    M 420,940
    Q 260,940 220,840
    Q 180,720 340,670
    Q 480,620 580,620
    Q 720,620 780,670
    Q 880,730 960,790
    Q 1040,730 1140,670
    Q 1240,620 1380,620
    Q 1520,620 1580,670
    Q 1720,720 1680,840
    Q 1640,940 1500,940
    Q 1300,940 1160,870
    Q 1060,830 960,790
    Q 860,830 760,870
    Q 620,940 420,940
    Z
  " fill="none" stroke="url(#pathGrad)" stroke-width="40" stroke-linejoin="round"/>

    <path d="M 1500,935 Q 1300,935 1160,865"/>
