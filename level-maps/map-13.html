    t=0.00: x=100,  y=775
    t=0.05: x=186,  y=914
    t=0.10: x=272,  y=950  (trough)
    t=0.15: x=358,  y=862

    t=0.95: x=1734, y=708
    t=1.00: x=1820, y=600

    Level 3:  x=490,  y=630
