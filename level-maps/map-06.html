<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Level Map - Valley to Castle</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  svg { display: block; }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <!-- Sky gradient -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8ecae6"/>
      <stop offset="60%" stop-color="#a3d5c9"/>
      <stop offset="100%" stop-color="#b5e3d8"/>
    </linearGradient>

    <!-- Grass gradient -->
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a8f3c"/>
      <stop offset="100%" stop-color="#4a7d2e"/>
    </linearGradient>

    <!-- Path fill -->
    <linearGradient id="pathFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9a96e"/>
      <stop offset="50%" stop-color="#d4b87a"/>
      <stop offset="100%" stop-color="#c9a96e"/>
    </linearGradient>

    <!-- Completed node gradient -->
    <radialGradient id="nodeCompleted" cx="0.4" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="#d4cfc0"/>
      <stop offset="60%" stop-color="#b8b0a0"/>
      <stop offset="100%" stop-color="#9e9688"/>
    </radialGradient>

    <!-- Current node glow -->
    <radialGradient id="nodeCurrent" cx="0.4" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="#ffe680"/>
      <stop offset="50%" stop-color="#ffd740"/>
      <stop offset="100%" stop-color="#f0c020"/>
    </radialGradient>
    <filter id="glowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Locked node gradient -->
    <radialGradient id="nodeLocked" cx="0.4" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="#8a8578"/>
      <stop offset="60%" stop-color="#6e6960"/>
      <stop offset="100%" stop-color="#555048"/>
    </radialGradient>

    <!-- Mountain gradient left -->
    <linearGradient id="mtnLeft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b6b6b"/>
      <stop offset="40%" stop-color="#7a7a6e"/>
      <stop offset="100%" stop-color="#8a8a7a"/>
    </linearGradient>
    <!-- Mountain gradient right -->
    <linearGradient id="mtnRight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#606060"/>
      <stop offset="40%" stop-color="#727266"/>
      <stop offset="100%" stop-color="#858578"/>
    </linearGradient>
    <!-- Far mountain -->
    <linearGradient id="mtnFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7e8e9a"/>
      <stop offset="100%" stop-color="#8a9a8a"/>
    </linearGradient>

    <!-- Bush gradient -->
    <radialGradient id="bush" cx="0.4" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="#4d8b35"/>
      <stop offset="100%" stop-color="#3d6b2e"/>
    </radialGradient>
    <radialGradient id="bushDark" cx="0.4" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="#3d7b28"/>
      <stop offset="100%" stop-color="#2d5b1e"/>
    </radialGradient>

    <!-- Tree trunk -->
    <linearGradient id="trunk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6b4e2a"/>
      <stop offset="100%" stop-color="#8b6840"/>
    </linearGradient>

    <!-- Cottage wall -->
    <linearGradient id="cottageWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8d8b8"/>
      <stop offset="100%" stop-color="#d4c4a0"/>
    </linearGradient>
    <!-- Cottage roof -->
    <linearGradient id="cottageRoof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b85c38"/>
      <stop offset="100%" stop-color="#a04828"/>
    </linearGradient>

    <!-- Castle wall -->
    <linearGradient id="castleWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8c0b0"/>
      <stop offset="100%" stop-color="#a8a090"/>
    </linearGradient>
    <linearGradient id="castleTower" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b0a898"/>
      <stop offset="100%" stop-color="#989080"/>
    </linearGradient>

    <!-- Subtle cloud -->
    <radialGradient id="cloud" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Star gradient -->
    <radialGradient id="star" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#ffe94d"/>
      <stop offset="100%" stop-color="#f0c020"/>
    </radialGradient>

    <!-- Snow cap -->
    <linearGradient id="snow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f0f0"/>
      <stop offset="100%" stop-color="#dce8e0"/>
    </linearGradient>
  </defs>

  <!-- ===== SKY ===== -->
  <rect width="1920" height="1080" fill="url(#sky)"/>

  <!-- ===== CLOUDS ===== -->
  <g opacity="0.5">
    <ellipse cx="300" cy="120" rx="120" ry="40" fill="white" opacity="0.4"/>
    <ellipse cx="350" cy="110" rx="80" ry="35" fill="white" opacity="0.5"/>
    <ellipse cx="260" cy="115" rx="70" ry="30" fill="white" opacity="0.35"/>

    <ellipse cx="1500" cy="80" rx="110" ry="38" fill="white" opacity="0.35"/>
    <ellipse cx="1550" cy="70" rx="90" ry="32" fill="white" opacity="0.45"/>
    <ellipse cx="1460" cy="78" rx="60" ry="28" fill="white" opacity="0.3"/>

    <ellipse cx="900" cy="60" rx="100" ry="30" fill="white" opacity="0.3"/>
    <ellipse cx="950" cy="55" rx="70" ry="25" fill="white" opacity="0.35"/>

    <ellipse cx="650" cy="160" rx="80" ry="28" fill="white" opacity="0.25"/>
    <ellipse cx="1250" cy="140" rx="90" ry="30" fill="white" opacity="0.28"/>
  </g>

  <!-- ===== FAR MOUNTAINS (hazy, behind everything) ===== -->
  <g>
    <!-- Far center-left peak -->
    <polygon points="600,420 820,220 1040,420" fill="url(#mtnFar)" opacity="0.5"/>
    <polygon points="820,220 860,220 820,240" fill="url(#snow)" opacity="0.4"/>
    <!-- Far center-right peak -->
    <polygon points="880,420 1100,240 1320,420" fill="url(#mtnFar)" opacity="0.45"/>
    <polygon points="1100,240 1135,240 1100,260" fill="url(#snow)" opacity="0.35"/>
  </g>

  <!-- ===== LEFT MOUNTAINS (valley wall) ===== -->
  <g>
    <polygon points="-100,1080 -50,300 200,180 400,350 500,420 550,1080" fill="url(#mtnLeft)"/>
    <polygon points="200,180 260,180 200,220" fill="url(#snow)" opacity="0.7"/>
    <!-- Secondary left peak -->
    <polygon points="-200,1080 -150,400 50,250 250,380 350,500 300,1080" fill="#757568" opacity="0.8"/>
    <polygon points="50,250 100,250 50,280" fill="url(#snow)" opacity="0.6"/>
    <!-- Smaller foothills left -->
    <polygon points="300,1080 350,520 500,450 650,550 700,1080" fill="#7a7a6e" opacity="0.6"/>
  </g>

  <!-- ===== RIGHT MOUNTAINS (valley wall) ===== -->
  <g>
    <polygon points="1920,1080 1970,320 1720,200 1520,370 1420,440 1370,1080" fill="url(#mtnRight)"/>
    <polygon points="1720,200 1660,200 1720,240" fill="url(#snow)" opacity="0.7"/>
    <!-- Secondary right peak -->
    <polygon points="2120,1080 2070,420 1870,270 1670,400 1570,520 1620,1080" fill="#6a6a5e" opacity="0.8"/>
    <polygon points="1870,270 1820,270 1870,300" fill="url(#snow)" opacity="0.6"/>
    <!-- Smaller foothills right -->
    <polygon points="1620,1080 1570,540 1420,470 1270,570 1220,1080" fill="#757568" opacity="0.6"/>
  </g>

  <!-- ===== GRASS HILLS (base layer, full bleed) ===== -->
  <!-- Upper grass area -->
  <path d="M0,480 Q200,440 400,470 Q600,500 800,460 Q1000,420 1200,460 Q1400,500 1600,450 Q1800,420 1920,460 L1920,1080 L0,1080 Z" fill="#5a8f3c"/>
  <!-- Rolling hill overlays -->
  <path d="M0,550 Q150,520 350,540 Q550,570 750,530 Q950,500 1150,540 Q1350,570 1550,520 Q1750,490 1920,530 L1920,1080 L0,1080 Z" fill="#4f8435"/>
  <path d="M0,650 Q250,620 500,650 Q750,680 1000,640 Q1250,610 1500,650 Q1750,680 1920,640 L1920,1080 L0,1080 Z" fill="#4a7d2e"/>
  <path d="M0,780 Q300,750 600,780 Q900,810 1200,770 Q1500,740 1920,780 L1920,1080 L0,1080 Z" fill="#437528"/>
  <path d="M0,900 Q400,870 800,900 Q1200,930 1600,890 Q1800,870 1920,900 L1920,1080 L0,1080 Z" fill="#3d6e24"/>

  <!-- ===== DIRT PATH (wide S-curves from bottom-center to top-center) ===== -->
  <g>
    <!-- Path shadow/edge (darker, wider) -->
    <path d="M960,1050
             Q960,1000 950,960
             Q920,880 750,840
             Q550,800 480,740
             Q420,680 500,620
             Q620,560 800,540
             Q1050,510 1200,470
             Q1400,430 1450,380
             Q1500,330 1400,280
             Q1280,230 1100,220
             Q960,215 960,180"
          fill="none" stroke="#9e7e45" stroke-width="58" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Main path fill -->
    <path d="M960,1050
             Q960,1000 950,960
             Q920,880 750,840
             Q550,800 480,740
             Q420,680 500,620
             Q620,560 800,540
             Q1050,510 1200,470
             Q1400,430 1450,380
             Q1500,330 1400,280
             Q1280,230 1100,220
             Q960,215 960,180"
          fill="none" stroke="#c9a96e" stroke-width="48" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Path center highlight -->
    <path d="M960,1050
             Q960,1000 950,960
             Q920,880 750,840
             Q550,800 480,740
             Q420,680 500,620
             Q620,560 800,540
             Q1050,510 1200,470
             Q1400,430 1450,380
             Q1500,330 1400,280
             Q1280,230 1100,220
             Q960,215 960,180"
          fill="none" stroke="#d8be85" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

    <!-- Path texture dots -->
    <g fill="#b89458" opacity="0.4">
      <circle cx="955" cy="990" r="3"/>
      <circle cx="940" cy="940" r="2.5"/>
      <circle cx="880" cy="870" r="3"/>
      <circle cx="780" cy="830" r="2"/>
      <circle cx="650" cy="800" r="3"/>
      <circle cx="530" cy="770" r="2.5"/>
      <circle cx="475" cy="720" r="3"/>
      <circle cx="490" cy="660" r="2"/>
      <circle cx="540" cy="610" r="3"/>
      <circle cx="650" cy="570" r="2.5"/>
      <circle cx="780" cy="545" r="3"/>
      <circle cx="920" cy="520" r="2"/>
      <circle cx="1060" cy="500" r="3"/>
      <circle cx="1180" cy="475" r="2.5"/>
      <circle cx="1300" cy="450" r="3"/>
      <circle cx="1420" cy="410" r="2"/>
      <circle cx="1460" cy="360" r="3"/>
      <circle cx="1430" cy="310" r="2.5"/>
      <circle cx="1350" cy="270" r="3"/>
      <circle cx="1230" cy="240" r="2"/>
      <circle cx="1100" cy="225" r="3"/>
      <circle cx="1020" cy="215" r="2.5"/>
    </g>
  </g>

  <!-- ===== VILLAGE (bottom center) ===== -->
  <g>
    <!-- Cottage 1 (left of path) -->
    <g transform="translate(840, 960)">
      <rect x="-30" y="-25" width="60" height="35" rx="3" fill="url(#cottageWall)"/>
      <rect x="-28" y="-23" width="12" height="14" rx="1" fill="#8ba5b5" opacity="0.6"/>
      <polygon points="-38,-25 0,-50 38,-25" fill="url(#cottageRoof)"/>
      <rect x="-4" y="-10" width="10" height="20" rx="1" fill="#7a5a30"/>
      <!-- Chimney -->
      <rect x="15" y="-48" width="8" height="20" rx="1" fill="#8a7a6a"/>
    </g>

    <!-- Cottage 2 (right of path) -->
    <g transform="translate(1080, 975)">
      <rect x="-25" y="-22" width="50" height="30" rx="3" fill="url(#cottageWall)"/>
      <rect x="-22" y="-18" width="10" height="12" rx="1" fill="#8ba5b5" opacity="0.6"/>
      <polygon points="-32,-22 0,-42 32,-22" fill="url(#cottageRoof)"/>
      <rect x="-3" y="-8" width="8" height="16" rx="1" fill="#7a5a30"/>
    </g>

    <!-- Cottage 3 (smaller, behind) -->
    <g transform="translate(1020, 1020)">
      <rect x="-20" y="-18" width="40" height="25" rx="2" fill="#dcc8a5"/>
      <polygon points="-26,-18 0,-35 26,-18" fill="#a54030"/>
      <rect x="-3" y="-6" width="7" height="13" rx="1" fill="#7a5a30"/>
    </g>

    <!-- Small fence segments -->
    <g stroke="#8b6840" stroke-width="2" fill="none" opacity="0.6">
      <line x1="790" y1="968" x2="790" y2="955"/>
      <line x1="800" y1="968" x2="800" y2="957"/>
      <line x1="788" y1="960" x2="802" y2="960"/>
      <line x1="1115" y1="980" x2="1130" y2="980"/>
      <line x1="1118" y1="985" x2="1118" y2="972"/>
      <line x1="1127" y1="985" x2="1127" y2="974"/>
    </g>
  </g>

  <!-- ===== CASTLE (top center) ===== -->
  <g transform="translate(960, 140)">
    <!-- Main castle body -->
    <rect x="-60" y="0" width="120" height="70" rx="4" fill="url(#castleWall)"/>
    <!-- Left tower -->
    <rect x="-80" y="-30" width="35" height="100" rx="3" fill="url(#castleTower)"/>
    <polygon points="-80,-30 -62,-55 -45,-30" fill="#7a4a3a"/>
    <!-- Right tower -->
    <rect x="45" y="-30" width="35" height="100" rx="3" fill="url(#castleTower)"/>
    <polygon points="45,-30 62,-55 80,-30" fill="#7a4a3a"/>
    <!-- Center tower (taller) -->
    <rect x="-22" y="-40" width="44" height="110" rx="3" fill="url(#castleWall)"/>
    <polygon points="-22,-40 0,-65 22,-40" fill="#8a5a4a"/>
    <!-- Flag on center tower -->
    <line x1="0" y1="-65" x2="0" y2="-85" stroke="#6b4e2a" stroke-width="2"/>
    <polygon points="0,-85 20,-78 0,-72" fill="#d44040"/>
    <!-- Gate -->
    <path d="M-14,70 L-14,40 Q0,28 14,40 L14,70 Z" fill="#5a4030"/>
    <!-- Windows -->
    <g fill="#6a8da0" opacity="0.7">
      <rect x="-70" y="-10" width="10" height="14" rx="2"/>
      <rect x="-55" y="-10" width="10" height="14" rx="2"/>
      <rect x="55" y="-10" width="10" height="14" rx="2"/>
      <rect x="70" y="-10" width="10" height="14" rx="2"/>
      <rect x="-12" y="-25" width="8" height="12" rx="4"/>
      <rect x="4" y="-25" width="8" height="12" rx="4"/>
    </g>
    <!-- Battlements on main wall -->
    <g fill="url(#castleWall)">
      <rect x="-58" y="-6" width="10" height="8" rx="1"/>
      <rect x="-44" y="-6" width="10" height="8" rx="1"/>
      <rect x="-30" y="-6" width="10" height="8" rx="1"/>
      <rect x="20" y="-6" width="10" height="8" rx="1"/>
      <rect x="34" y="-6" width="10" height="8" rx="1"/>
      <rect x="48" y="-6" width="10" height="8" rx="1"/>
    </g>
  </g>

  <!-- ===== TREES AND BUSHES ===== -->
  <!-- Bottom area (dense forest near village) -->
  <g>
    <!-- Large trees bottom-left -->
    <g transform="translate(200, 880)">
      <rect x="-6" y="-20" width="12" height="30" rx="3" fill="url(#trunk)"/>
      <ellipse cx="0" cy="-35" rx="30" ry="28" fill="url(#bush)"/>
      <ellipse cx="-8" cy="-45" rx="20" ry="20" fill="#4d8b35"/>
    </g>
    <g transform="translate(130, 920)">
      <rect x="-5" y="-15" width="10" height="25" rx="3" fill="url(#trunk)"/>
      <ellipse cx="0" cy="-28" rx="25" ry="22" fill="url(#bushDark)"/>
      <ellipse cx="6" cy="-38" rx="16" ry="16" fill="#3d7020"/>
    </g>
    <g transform="translate(300, 850)">
      <rect x="-5" y="-18" width="10" height="28" rx="3" fill="url(#trunk)"/>
      <ellipse cx="0" cy="-32" rx="28" ry="25" fill="url(#bush)"/>
      <ellipse cx="5" cy="-42" rx="18" ry="18" fill="#4a8530"/>
    </g>

    <!-- Large trees bottom-right -->
    <g transform="translate(1700, 870)">
      <rect x="-6" y="-20" width="12" height="30" rx="3" fill="url(#trunk)"/>
      <ellipse cx="0" cy="-35" rx="30" ry="28" fill="url(#bush)"/>
      <ellipse cx="8" cy="-45" rx="20" ry="20" fill="#4d8b35"/>
    </g>
    <g transform="translate(1780, 920)">
      <rect x="-5" y="-15" width="10" height="25" rx="3" fill="url(#trunk)"/>
      <ellipse cx="0" cy="-28" rx="25" ry="22" fill="url(#bushDark)"/>
    </g>
    <g transform="translate(1600, 860)">
      <rect x="-5" y="-18" width="10" height="28" rx="3" fill="url(#trunk)"/>
      <ellipse cx="0" cy="-32" rx="26" ry="24" fill="url(#bush)"/>
      <ellipse cx="-5" cy="-42" rx="17" ry="17" fill="#4a8530"/>
    </g>

    <!-- Medium trees mid-area -->
    <g transform="translate(350, 750)">
      <rect x="-4" y="-15" width="8" height="22" rx="3" fill="url(#trunk)"/>
      <ellipse cx="0" cy="-26" rx="22" ry="20" fill="url(#bush)"/>
    </g>
    <g transform="translate(680, 690)">
      <rect x="-4" y="-14" width="8" height="20" rx="3" fill="url(#trunk)"/>
      <ellipse cx="0" cy="-24" rx="20" ry="18" fill="url(#bushDark)"/>
    </g>
    <g transform="translate(1550, 680)">
      <rect x="-4" y="-14" width="8" height="20" rx="3" fill="url(#trunk)"/>
      <ellipse cx="0" cy="-24" rx="20" ry="18" fill="url(#bush)"/>
    </g>
    <g transform="translate(250, 700)">
      <rect x="-4" y="-14" width="8" height="22" rx="3" fill="url(#trunk)"/>
      <ellipse cx="0" cy="-26" rx="22" ry="20" fill="url(#bush)"/>
      <ellipse cx="5" cy="-34" rx="14" ry="14" fill="#4a8530"/>
    </g>

    <!-- Smaller trees upper-mid -->
    <g transform="translate(380, 600)">
      <rect x="-3" y="-12" width="6" height="18" rx="2" fill="url(#trunk)"/>
      <ellipse cx="0" cy="-20" rx="16" ry="15" fill="url(#bush)"/>
    </g>
    <g transform="translate(1500, 550)">
      <rect x="-3" y="-12" width="6" height="18" rx="2" fill="url(#trunk)"/>
      <ellipse cx="0" cy="-20" rx="16" ry="15" fill="url(#bushDark)"/>
    </g>

    <!-- Sparse small trees near top (rockier) -->
    <g transform="translate(600, 470)">
      <rect x="-3" y="-10" width="6" height="14" rx="2" fill="url(#trunk)"/>
      <ellipse cx="0" cy="-16" rx="12" ry="11" fill="url(#bush)" opacity="0.8"/>
    </g>
    <g transform="translate(1350, 420)">
      <rect x="-3" y="-10" width="6" height="14" rx="2" fill="url(#trunk)"/>
      <ellipse cx="0" cy="-16" rx="12" ry="11" fill="url(#bush)" opacity="0.8"/>
    </g>
  </g>

  <!-- Round bushes scattered -->
  <g>
    <!-- Bottom bushes (dense) -->
    <ellipse cx="100" cy="980" rx="25" ry="18" fill="url(#bushDark)"/>
    <ellipse cx="160" cy="1000" rx="20" ry="15" fill="url(#bush)"/>
    <ellipse cx="420" cy="950" rx="22" ry="16" fill="url(#bush)"/>
    <ellipse cx="500" cy="980" rx="18" ry="13" fill="url(#bushDark)"/>
    <ellipse cx="700" cy="930" rx="20" ry="15" fill="url(#bush)"/>
    <ellipse cx="1200" cy="960" rx="22" ry="16" fill="url(#bushDark)"/>
    <ellipse cx="1350" cy="940" rx="18" ry="14" fill="url(#bush)"/>
    <ellipse cx="1500" cy="970" rx="20" ry="15" fill="url(#bush)"/>
    <ellipse cx="1850" cy="960" rx="22" ry="16" fill="url(#bushDark)"/>
    <ellipse cx="1900" cy="1000" rx="18" ry="14" fill="url(#bush)"/>

    <!-- Mid bushes -->
    <ellipse cx="180" cy="800" rx="18" ry="14" fill="url(#bush)"/>
    <ellipse cx="620" cy="750" rx="16" ry="12" fill="url(#bushDark)"/>
    <ellipse cx="1650" cy="740" rx="16" ry="12" fill="url(#bush)"/>
    <ellipse cx="1750" cy="780" rx="18" ry="14" fill="url(#bushDark)"/>

    <!-- Upper bushes (sparse) -->
    <ellipse cx="300" cy="620" rx="14" ry="10" fill="url(#bush)" opacity="0.8"/>
    <ellipse cx="1580" cy="600" rx="14" ry="10" fill="url(#bushDark)" opacity="0.8"/>

    <!-- Near castle (very sparse, rocky) -->
    <ellipse cx="750" cy="380" rx="10" ry="8" fill="url(#bush)" opacity="0.6"/>
    <ellipse cx="1180" cy="360" rx="10" ry="8" fill="url(#bushDark)" opacity="0.6"/>
  </g>

  <!-- ===== ROCKS scattered near path and mountains ===== -->
  <g fill="#7a7a6e" opacity="0.6">
    <ellipse cx="430" cy="700" rx="12" ry="7" fill="#8a8a7a"/>
    <ellipse cx="1470" cy="400" rx="10" ry="6"/>
    <ellipse cx="1380" cy="350" rx="8" ry="5"/>
    <ellipse cx="820" cy="420" rx="9" ry="5"/>
    <ellipse cx="1100" cy="350" rx="8" ry="5"/>
    <ellipse cx="550" cy="580" rx="8" ry="5"/>
  </g>
