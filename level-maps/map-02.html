<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Fantasy Level Map - Variant 2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1920px; height: 1080px; overflow: hidden; background: #333; }
  svg { display: block; }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <!-- Sky gradient -->
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8ecae6"/>
      <stop offset="60%" stop-color="#a8d8cf"/>
      <stop offset="100%" stop-color="#b5e3d8"/>
    </linearGradient>

    <!-- Grass gradient -->
    <linearGradient id="grassGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a8f3c"/>
      <stop offset="100%" stop-color="#4a7d2e"/>
    </linearGradient>

    <!-- Path fill -->
    <linearGradient id="pathGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9a96e"/>
      <stop offset="50%" stop-color="#d4b87a"/>
      <stop offset="100%" stop-color="#c9a96e"/>
    </linearGradient>

    <!-- Golden glow for current level -->
    <radialGradient id="glowGold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#ffb800" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffa000" stop-opacity="0"/>
    </radialGradient>

    <!-- Stone platform gradient (completed) -->
    <radialGradient id="stoneComplete" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#d4cfc0"/>
      <stop offset="100%" stop-color="#a8a090"/>
    </radialGradient>

    <!-- Stone platform gradient (current) -->
    <radialGradient id="stoneCurrent" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f0e6c0"/>
      <stop offset="100%" stop-color="#c8b070"/>
    </radialGradient>

    <!-- Stone platform gradient (locked) -->
    <radialGradient id="stoneLocked" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#8a8580"/>
      <stop offset="100%" stop-color="#5e5a55"/>
    </radialGradient>

    <!-- Mountain gradient -->
    <linearGradient id="mtGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a7a6e"/>
      <stop offset="100%" stop-color="#6b6b6b"/>
    </linearGradient>
    <linearGradient id="mtGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a8a7a"/>
      <stop offset="100%" stop-color="#6b6b6b"/>
    </linearGradient>
    <linearGradient id="mtGrad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#707064"/>
      <stop offset="100%" stop-color="#555"/>
    </linearGradient>

    <!-- Stream gradient -->
    <linearGradient id="streamGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6db8d4" stop-opacity="0"/>
      <stop offset="20%" stop-color="#6db8d4"/>
      <stop offset="80%" stop-color="#5aa8c4"/>
      <stop offset="100%" stop-color="#5aa8c4" stop-opacity="0"/>
    </linearGradient>

    <!-- Bush gradient -->
    <radialGradient id="bushGrad" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#4a8535"/>
      <stop offset="100%" stop-color="#3d6b2e"/>
    </radialGradient>
    <radialGradient id="bushGrad2" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#3f7530"/>
      <stop offset="100%" stop-color="#2f5a22"/>
    </radialGradient>

    <!-- Tree trunk -->
    <linearGradient id="trunkGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6b4f32"/>
      <stop offset="100%" stop-color="#8a6b45"/>
    </linearGradient>

    <!-- Tree canopy -->
    <radialGradient id="canopyGrad" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#5a9640"/>
      <stop offset="100%" stop-color="#3d6b2e"/>
    </radialGradient>
    <radialGradient id="canopyGrad2" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#4a8535"/>
      <stop offset="100%" stop-color="#336028"/>
    </radialGradient>

    <!-- Cloud -->
    <radialGradient id="cloudGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e8f4f0" stop-opacity="0.5"/>
    </radialGradient>

    <!-- Filters -->
    <filter id="bevel" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur"/>
      <feSpecularLighting in="blur" surfaceScale="3" specularConstant="0.6" specularExponent="15" result="spec">
        <fePointLight x="-40" y="-60" z="80"/>
      </feSpecularLighting>
      <feComposite in="spec" in2="SourceAlpha" operator="in" result="specOut"/>
      <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="0.4" k4="0"/>
    </filter>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#2a4a1a" flood-opacity="0.3"/>
    </filter>

    <filter id="pathShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#3a2a10" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- ==================== SKY ==================== -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#skyGrad)"/>

  <!-- Clouds -->
  <g opacity="0.6">
    <ellipse cx="300" cy="100" rx="120" ry="40" fill="url(#cloudGrad)"/>
    <ellipse cx="350" cy="85" rx="80" ry="35" fill="url(#cloudGrad)"/>
    <ellipse cx="250" cy="90" rx="70" ry="30" fill="url(#cloudGrad)"/>
  </g>
  <g opacity="0.45">
    <ellipse cx="1100" cy="70" rx="100" ry="35" fill="url(#cloudGrad)"/>
    <ellipse cx="1140" cy="55" rx="70" ry="30" fill="url(#cloudGrad)"/>
  </g>
  <g opacity="0.5">
    <ellipse cx="1600" cy="120" rx="110" ry="38" fill="url(#cloudGrad)"/>
    <ellipse cx="1650" cy="105" rx="75" ry="32" fill="url(#cloudGrad)"/>
    <ellipse cx="1560" cy="110" rx="65" ry="28" fill="url(#cloudGrad)"/>
  </g>
  <g opacity="0.35">
    <ellipse cx="750" cy="140" rx="90" ry="30" fill="url(#cloudGrad)"/>
    <ellipse cx="790" cy="128" rx="60" ry="25" fill="url(#cloudGrad)"/>
  </g>

  <!-- ==================== MOUNTAINS (spread evenly) ==================== -->
  <!-- Far mountains (lighter, behind) -->
  <g opacity="0.5">
    <path d="M-50 420 Q80 200 200 420 Z" fill="#8a8a7a"/>
    <path d="M350 400 Q500 180 650 400 Z" fill="#7a7a6e"/>
    <path d="M600 410 Q780 170 950 410 Z" fill="#8a8a7a"/>
    <path d="M900 400 Q1080 190 1250 400 Z" fill="#7a7a6e"/>
    <path d="M1200 410 Q1400 160 1600 410 Z" fill="#8a8a7a"/>
    <path d="M1550 400 Q1720 200 1970 400 Z" fill="#7a7a6e"/>
  </g>

  <!-- Near mountains -->
  <path d="M-30 450 Q120 260 280 450 Z" fill="url(#mtGrad2)"/>
  <path d="M180 440 Q350 240 520 440 Z" fill="url(#mtGrad1)"/>
  <path d="M440 450 Q620 230 800 450 Z" fill="url(#mtGrad3)"/>
  <path d="M720 440 Q920 250 1100 440 Z" fill="url(#mtGrad2)"/>
  <path d="M1020 450 Q1200 220 1380 450 Z" fill="url(#mtGrad1)"/>
  <path d="M1300 440 Q1500 260 1680 440 Z" fill="url(#mtGrad3)"/>
  <path d="M1600 450 Q1780 270 1970 450 Z" fill="url(#mtGrad2)"/>

  <!-- Snow caps -->
  <g opacity="0.6" fill="#e8e8e0">
    <path d="M100 310 Q120 260 145 300 Q130 290 115 305 Z"/>
    <path d="M335 295 Q350 240 370 290 Q355 280 342 292 Z"/>
    <path d="M600 290 Q620 230 645 282 Q630 272 612 287 Z"/>
    <path d="M905 305 Q920 250 940 298 Q927 288 912 302 Z"/>
    <path d="M1185 280 Q1200 220 1220 272 Q1207 265 1192 278 Z"/>
    <path d="M1485 310 Q1500 260 1520 305 Q1505 295 1490 308 Z"/>
    <path d="M1768 320 Q1780 270 1795 315 Q1785 305 1772 316 Z"/>
  </g>

  <!-- ==================== GRASS HILLS ==================== -->
  <!-- Main grass fill -->
  <path d="M0 450 Q200 400 400 430 Q600 460 800 420 Q1000 390 1200 440 Q1400 470 1600 430 Q1800 400 1920 440 L1920 1080 L0 1080 Z" fill="url(#grassGrad)"/>

  <!-- Rolling hill layers for depth -->
  <path d="M0 480 Q150 450 350 470 Q550 500 750 460 Q950 430 1150 475 Q1350 510 1550 465 Q1750 435 1920 470 L1920 1080 L0 1080 Z" fill="#518835" opacity="0.4"/>
  <path d="M0 520 Q250 490 500 510 Q700 540 900 500 Q1100 470 1300 510 Q1500 545 1700 505 Q1850 485 1920 510 L1920 1080 L0 1080 Z" fill="#4a7d2e" opacity="0.3"/>

  <!-- Grass texture hints -->
  <g opacity="0.15" fill="#3d6b2e">
    <ellipse cx="100" cy="700" rx="180" ry="25"/>
    <ellipse cx="500" cy="800" rx="200" ry="20"/>
    <ellipse cx="900" cy="650" rx="160" ry="22"/>
    <ellipse cx="1400" cy="750" rx="190" ry="18"/>
    <ellipse cx="1750" cy="850" rx="170" ry="20"/>
  </g>

  <!-- ==================== STREAM (around level 6 area) ==================== -->
  <path d="M750 520 Q820 530 880 510 Q950 490 1020 505 Q1100 525 1180 510"
        stroke="url(#streamGrad)" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M760 520 Q830 528 890 510 Q955 492 1025 505 Q1095 522 1170 510"
        stroke="#8dd4e8" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.3"/>
  <!-- Stream banks -->
  <path d="M750 513 Q820 523 880 503 Q950 483 1020 498 Q1100 518 1180 503"
        stroke="#4a7d2e" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M750 528 Q820 538 880 518 Q950 498 1020 513 Q1100 533 1180 518"
        stroke="#4a7d2e" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.4"/>

  <!-- ==================== DIRT PATH (winding switchbacks, bottom-center upward) ==================== -->
  <!-- Path border (darker edge) -->
  <path d="M960 1050
           Q960 1000 960 970
           Q960 920 850 890
           Q650 840 420 870
           Q280 890 280 860
           Q280 810 450 780
           Q700 740 950 750
           Q1200 760 1450 730
           Q1620 710 1620 680
           Q1620 640 1400 620
           Q1100 595 900 610
           Q700 625 900 580
           Q960 555 960 530
           Q960 510 900 500
           Q820 490 780 470
           Q740 450 800 430
           Q880 400 1000 390
           Q1200 375 1350 350
           Q1500 325 1500 290
           Q1500 250 1300 235
           Q1100 220 960 210
           Q800 200 800 180
           Q800 155 960 130
           Q1050 115 960 100"
        stroke="#8a6b3a" stroke-width="52" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#pathShadow)"/>

  <!-- Path main fill -->
  <path d="M960 1050
           Q960 1000 960 970
           Q960 920 850 890
           Q650 840 420 870
           Q280 890 280 860
           Q280 810 450 780
           Q700 740 950 750
           Q1200 760 1450 730
           Q1620 710 1620 680
           Q1620 640 1400 620
           Q1100 595 900 610
           Q700 625 900 580
           Q960 555 960 530
           Q960 510 900 500
           Q820 490 780 470
           Q740 450 800 430
           Q880 400 1000 390
           Q1200 375 1350 350
           Q1500 325 1500 290
           Q1500 250 1300 235
           Q1100 220 960 210
           Q800 200 800 180
           Q800 155 960 130
           Q1050 115 960 100"
        stroke="#c9a96e" stroke-width="42" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Path center highlight -->
  <path d="M960 1050
           Q960 1000 960 970
           Q960 920 850 890
           Q650 840 420 870
           Q280 890 280 860
           Q280 810 450 780
           Q700 740 950 750
           Q1200 760 1450 730
           Q1620 710 1620 680
           Q1620 640 1400 620
           Q1100 595 900 610
           Q700 625 900 580
           Q960 555 960 530
           Q960 510 900 500
           Q820 490 780 470
           Q740 450 800 430
           Q880 400 1000 390
           Q1200 375 1350 350
           Q1500 325 1500 290
           Q1500 250 1300 235
           Q1100 220 960 210
           Q800 200 800 180
           Q800 155 960 130
           Q1050 115 960 100"
        stroke="#d4b87a" stroke-width="20" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

  <!-- ==================== WOODEN BRIDGE (over stream near level 6) ==================== -->
  <g transform="translate(950, 490)">
    <!-- Bridge shadow -->
    <rect x="-38" y="-12" width="76" height="34" rx="3" fill="#2a4a1a" opacity="0.2" transform="translate(2,3)"/>
    <!-- Bridge planks -->
    <rect x="-35" y="-10" width="70" height="30" rx="2" fill="#8B6B3E"/>
    <!-- Individual planks -->
    <line x1="-35" y1="-2" x2="35" y2="-2" stroke="#6b4f32" stroke-width="1"/>
    <line x1="-35" y1="6" x2="35" y2="6" stroke="#6b4f32" stroke-width="1"/>
    <line x1="-35" y1="14" x2="35" y2="14" stroke="#6b4f32" stroke-width="1"/>
    <!-- Plank highlight -->
    <rect x="-33" y="-9" width="66" height="28" rx="1" fill="#a08050" opacity="0.3"/>
    <!-- Rails -->
    <rect x="-38" y="-14" width="6" height="38" rx="2" fill="#6b4f32"/>
    <rect x="32" y="-14" width="6" height="38" rx="2" fill="#6b4f32"/>
    <!-- Rail tops -->
    <rect x="-40" y="-16" width="10" height="5" rx="2" fill="#7a5c3a"/>
    <rect x="30" y="-16" width="10" height="5" rx="2" fill="#7a5c3a"/>
    <!-- Rope/rail lines -->
    <line x1="-35" y1="-12" x2="-35" y2="20" stroke="#5a4428" stroke-width="1.5"/>
    <line x1="35" y1="-12" x2="35" y2="20" stroke="#5a4428" stroke-width="1.5"/>
  </g>

  <!-- ==================== BUSHES (left side, scattered) ==================== -->
  <g filter="url(#softShadow)">
    <!-- Left side bushes -->
    <ellipse cx="120" cy="680" rx="45" ry="35" fill="url(#bushGrad)"/>
    <ellipse cx="140" cy="670" rx="30" ry="25" fill="url(#bushGrad2)"/>

    <ellipse cx="200" cy="820" rx="38" ry="30" fill="url(#bushGrad)"/>

    <ellipse cx="80" cy="920" rx="50" ry="38" fill="url(#bushGrad2)"/>
    <ellipse cx="105" cy="908" rx="32" ry="26" fill="url(#bushGrad)"/>

    <ellipse cx="350" cy="950" rx="35" ry="28" fill="url(#bushGrad)"/>

    <ellipse cx="550" cy="560" rx="40" ry="32" fill="url(#bushGrad2)"/>
    <ellipse cx="570" cy="548" rx="28" ry="24" fill="url(#bushGrad)"/>

    <ellipse cx="180" cy="550" rx="35" ry="28" fill="url(#bushGrad)"/>

    <!-- Center scattered -->
    <ellipse cx="700" cy="670" rx="32" ry="26" fill="url(#bushGrad2)"/>
    <ellipse cx="1150" cy="680" rx="36" ry="28" fill="url(#bushGrad)"/>
  </g>

  <!-- ==================== TREES (more prominent on right side) ==================== -->
  <g filter="url(#softShadow)">
    <!-- Right side trees (prominent) -->
    <!-- Tree 1 -->
    <rect x="1680" y="500" width="16" height="55" rx="4" fill="url(#trunkGrad)"/>
    <ellipse cx="1688" cy="490" rx="45" ry="40" fill="url(#canopyGrad)"/>
    <ellipse cx="1700" cy="478" rx="30" ry="28" fill="url(#canopyGrad2)"/>
    <ellipse cx="1675" cy="480" rx="25" ry="24" fill="#4a8535" opacity="0.7"/>

    <!-- Tree 2 -->
    <rect x="1780" y="560" width="14" height="50" rx="4" fill="url(#trunkGrad)"/>
    <ellipse cx="1787" cy="550" rx="40" ry="36" fill="url(#canopyGrad2)"/>
    <ellipse cx="1798" cy="540" rx="28" ry="25" fill="url(#canopyGrad)"/>

    <!-- Tree 3 -->
    <rect x="1830" y="650" width="18" height="60" rx="5" fill="url(#trunkGrad)"/>
    <ellipse cx="1839" cy="638" rx="50" ry="44" fill="url(#canopyGrad)"/>
    <ellipse cx="1852" cy="624" rx="33" ry="30" fill="url(#canopyGrad2)"/>
    <ellipse cx="1825" cy="630" rx="28" ry="26" fill="#4a8535" opacity="0.6"/>

    <!-- Tree 4 (far right) -->
    <rect x="1870" y="480" width="14" height="48" rx="4" fill="url(#trunkGrad)"/>
    <ellipse cx="1877" cy="470" rx="38" ry="34" fill="url(#canopyGrad2)"/>
    <ellipse cx="1885" cy="460" rx="25" ry="23" fill="url(#canopyGrad)"/>

    <!-- Tree 5 right mid -->
    <rect x="1720" y="720" width="15" height="52" rx="4" fill="url(#trunkGrad)"/>
    <ellipse cx="1727" cy="710" rx="42" ry="37" fill="url(#canopyGrad)"/>
    <ellipse cx="1738" cy="698" rx="28" ry="26" fill="url(#canopyGrad2)"/>

    <!-- Tree 6 right lower -->
    <rect x="1800" y="830" width="16" height="55" rx="4" fill="url(#trunkGrad)"/>
    <ellipse cx="1808" cy="818" rx="44" ry="40" fill="url(#canopyGrad2)"/>
    <ellipse cx="1820" cy="806" rx="30" ry="28" fill="url(#canopyGrad)"/>

    <!-- A couple trees on left (less prominent) -->
    <rect x="100" y="470" width="12" height="42" rx="3" fill="url(#trunkGrad)"/>
    <ellipse cx="106" cy="462" rx="32" ry="28" fill="url(#canopyGrad)"/>
    <ellipse cx="114" cy="452" rx="22" ry="20" fill="url(#canopyGrad2)"/>

    <!-- Center tree -->
    <rect x="650" cy="448" y="450" width="13" height="45" rx="4" fill="url(#trunkGrad)"/>
    <ellipse cx="657" cy="440" rx="35" ry="32" fill="url(#canopyGrad2)"/>
    <ellipse cx="665" cy="430" rx="24" ry="22" fill="url(#canopyGrad)"/>
  </g>

  <!-- ==================== LEVEL NODES ==================== -->
  <!--
    Level positions along the path (bottom-center zigzagging up):
    1: 960, 970  (bottom center)
    2: 600, 870  (left switchback)
    3: 330, 840  (far left)
    4: 600, 760  (right switchback going right)
    5: 1100, 745 (continuing right)
    6: 1500, 710 (far right)
    7: 1200, 610 (switchback left)
    8: 950, 540  (center)
    9: 1200, 370 (right switchback)
    10: 960, 180 (top center)
  -->

  <!-- LEVEL 1 - Completed -->
  <g transform="translate(960, 970)">
    <circle cx="0" cy="0" r="30" fill="#6b635a" opacity="0.3" transform="translate(2,3)"/>
    <circle cx="0" cy="0" r="30" fill="url(#stoneComplete)" stroke="#a09880" stroke-width="3" filter="url(#bevel)"/>
    <circle cx="0" cy="0" r="24" fill="none" stroke="#c0b8a0" stroke-width="1" opacity="0.4"/>
    <text x="0" y="7" text-anchor="middle" font-family="'Trebuchet MS', Arial, sans-serif" font-size="22" font-weight="bold" fill="#5a5040">1</text>
    <!-- Stars -->
    <polygon points="-18,22 -16,17 -21,14 -15,14 -13,9 -11,14 -5,14 -10,17 -8,22 -13,19" fill="#ffd700" stroke="#c8a800" stroke-width="0.5"/>
    <polygon points="-3,22 -1,17 -6,14 0,14 2,9 4,14 10,14 5,17 7,22 2,19" fill="#ffd700" stroke="#c8a800" stroke-width="0.5"/>
    <polygon points="12,22 14,17 9,14 15,14 17,9 19,14 25,14 20,17 22,22 17,19" fill="#ffd700" stroke="#c8a800" stroke-width="0.5"/>
  </g>

  <!-- LEVEL 2 - Completed -->
  <g transform="translate(600, 870)">
    <circle cx="0" cy="0" r="30" fill="#6b635a" opacity="0.3" transform="translate(2,3)"/>
    <circle cx="0" cy="0" r="30" fill="url(#stoneComplete)" stroke="#a09880" stroke-width="3" filter="url(#bevel)"/>
    <circle cx="0" cy="0" r="24" fill="none" stroke="#c0b8a0" stroke-width="1" opacity="0.4"/>
    <text x="0" y="7" text-anchor="middle" font-family="'Trebuchet MS', Arial, sans-serif" font-size="22" font-weight="bold" fill="#5a5040">2</text>
    <polygon points="-18,22 -16,17 -21,14 -15,14 -13,9 -11,14 -5,14 -10,17 -8,22 -13,19" fill="#ffd700" stroke="#c8a800" stroke-width="0.5"/>
    <polygon points="-3,22 -1,17 -6,14 0,14 2,9 4,14 10,14 5,17 7,22 2,19" fill="#ffd700" stroke="#c8a800" stroke-width="0.5"/>
    <polygon points="12,22 14,17 9,14 15,14 17,9 19,14 25,14 20,17 22,22 17,19" fill="#ffd700" stroke="#c8a800" stroke-width="0.5"/>
  </g>

  <!-- LEVEL 3 - Completed -->
  <g transform="translate(330, 840)">
    <circle cx="0" cy="0" r="30" fill="#6b635a" opacity="0.3" transform="translate(2,3)"/>
    <circle cx="0" cy="0" r="30" fill="url(#stoneComplete)" stroke="#a09880" stroke-width="3" filter="url(#bevel)"/>
    <circle cx="0" cy="0" r="24" fill="none" stroke="#c0b8a0" stroke-width="1" opacity="0.4"/>
    <text x="0" y="7" text-anchor="middle" font-family="'Trebuchet MS', Arial, sans-serif" font-size="22" font-weight="bold" fill="#5a5040">3</text>
    <polygon points="-18,22 -16,17 -21,14 -15,14 -13,9 -11,14 -5,14 -10,17 -8,22 -13,19" fill="#ffd700" stroke="#c8a800" stroke-width="0.5"/>
    <polygon points="-3,22 -1,17 -6,14 0,14 2,9 4,14 10,14 5,17 7,22 2,19" fill="#ffd700" stroke="#c8a800" stroke-width="0.5"/>
    <polygon points="12,22 14,17 9,14 15,14 17,9 19,14 25,14 20,17 22,22 17,19" fill="#ffd700" stroke="#c8a800" stroke-width="0.5"/>
  </g>

  <!-- LEVEL 4 - Current (golden glow, larger) -->
  <g transform="translate(600, 760)">
    <!-- Animated glow pulse -->
    <circle cx="0" cy="0" r="55" fill="url(#glowGold)" opacity="0.7">
      <animate attributeName="r" values="50;60;50" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.4;0.7" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="35" fill="#6b635a" opacity="0.3" transform="translate(2,3)"/>
