<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Level Map - Ascending Staircase</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; }
  svg { display: block; }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <!-- Sky gradient -->
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8ecae6"/>
      <stop offset="60%" stop-color="#a8d8cb"/>
      <stop offset="100%" stop-color="#b5e3d8"/>
    </linearGradient>

    <!-- Grass gradient -->
    <linearGradient id="grassGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a8f3c"/>
      <stop offset="100%" stop-color="#4a7d2e"/>
    </linearGradient>

    <!-- Path fill -->
    <linearGradient id="pathGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a96e"/>
      <stop offset="100%" stop-color="#b89458"/>
    </linearGradient>

    <!-- Sun glow -->
    <radialGradient id="sunGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fff8dc"/>
      <stop offset="40%" stop-color="#ffe066"/>
      <stop offset="70%" stop-color="#ffcc33" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffcc33" stop-opacity="0"/>
    </radialGradient>

    <!-- Current level glow -->
    <radialGradient id="currentGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffe066" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#ffcc33" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffaa00" stop-opacity="0"/>
    </radialGradient>

    <!-- Stone platform gradient (completed) -->
    <radialGradient id="stoneCompleted" cx="0.35" cy="0.3" r="0.65">
      <stop offset="0%" stop-color="#d4c8a8"/>
      <stop offset="50%" stop-color="#bfb08a"/>
      <stop offset="100%" stop-color="#a89870"/>
    </radialGradient>

    <!-- Stone platform gradient (current) -->
    <radialGradient id="stoneCurrent" cx="0.35" cy="0.3" r="0.65">
      <stop offset="0%" stop-color="#ffe8a0"/>
      <stop offset="50%" stop-color="#f0d070"/>
      <stop offset="100%" stop-color="#d4a830"/>
    </radialGradient>

    <!-- Stone platform gradient (locked) -->
    <radialGradient id="stoneLocked" cx="0.35" cy="0.3" r="0.65">
      <stop offset="0%" stop-color="#8a8070"/>
      <stop offset="50%" stop-color="#706858"/>
      <stop offset="100%" stop-color="#585048"/>
    </radialGradient>

    <!-- Waterfall gradient -->
    <linearGradient id="waterfallGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8ecae6" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#a8dce6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c8ecf0" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Mountain gradients -->
    <linearGradient id="mtnGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a7a6a"/>
      <stop offset="100%" stop-color="#6b6b6b"/>
    </linearGradient>
    <linearGradient id="mtnGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a8a7a"/>
      <stop offset="100%" stop-color="#6b6b5b"/>
    </linearGradient>
    <linearGradient id="mtnGrad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#757565"/>
      <stop offset="100%" stop-color="#555"/>

    <!-- Plateau grass gradients -->

      <stop offset="0%" stop-color="#5a8f3c"/>
      <stop offset="100%" stop-color="#4a7d2e"/>

      <stop offset="100%" stop-color="#467728"/>

    <linearGradient id="plateau3Grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4e8434"/>
      <stop offset="100%" stop-color="#407024"/>

      <stop offset="100%" stop-color="#4a3f2a"/>

    <linearGradient id="cliffGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5f5236"/>
      <stop offset="100%" stop-color="#443a25"/>

    </filter>

    <!-- Soft glow filter -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>

    <!-- Bush shape -->
    <clipPath id="bushClip">
      <circle cx="0" cy="0" r="20"/>
    </clipPath>
