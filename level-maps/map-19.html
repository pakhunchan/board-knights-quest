  <!-- ============ LEVEL NODES ============ -->
  <!--
    10 levels evenly spaced along the quadratic bezier:
    Q bezier: P(t) = (1-t)^2 * P0 + 2(1-t)t * Pctrl + t^2 * P2
    P0=(200,980), Pctrl=(960,225), P2=(1720,980)

    t=0.000: (200.0, 980.0)  - Level 1
    t=0.111: (369.0, 893.1)  - Level 2
    t=0.222: (527.6, 822.9)  - Level 3
    t=0.333: (675.6, 769.3)  - Level 4
    t=0.444: (813.2, 732.4)  - Level 5
    t=0.556: (940.4, 712.1)  - Level 6
    t=0.667: (1057.1, 708.5) - Level 7 (near top of arc visually)
    t=0.778: (1163.3, 721.5) - Level 8
    t=0.889: (1259.1, 751.2) - Level 9
    t=1.000: (1720.0, 980.0) - Level 10

    Let me recalculate more evenly:
    t=0:     x=200,  y=980
    t=0.1:   x=352,  y=901
    t=0.2:   x=496,  y=838
    t=0.3:   x=632,  y=791
    t=0.4:   x=760,  y=760
    t=0.5:   x=880,  y=745
    t=0.6:   x=1064, y=718  (adjusted)
    t=0.7:   x=1224, y=735
    t=0.8:   x=1376, y=790
    t=0.9:   x=1556, y=893
    t=1:     x=1720, y=980

    Recalculating properly:
    B(t) = (1-t)^2*(200,980) + 2(1-t)*t*(960,225) + t^2*(1720,980)

    t=0.0:   (200,  980)
    t=0.111: (369,  893)
    t=0.222: (538,  823)
    t=0.333: (707,  769)
    t=0.444: (876,  732)
    t=0.556: (1045, 712)
    t=0.667: (1213, 709)
