<style>

  html, body { width: 1920px; height: 1080px; overflow: hidden; background: #b5d8c0; }

  @keyframes glowPulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }

</style>

      <stop offset="0%" stop-color="#b5d8c0"/>
      <stop offset="60%" stop-color="#bfdfc8"/>
      <stop offset="100%" stop-color="#c8e6cf"/>

      <stop offset="100%" stop-color="#6b9a5a"/>

      <stop offset="0%" stop-color="#c9a96e"/>

      <stop offset="100%" stop-color="#909088"/>

    <radialGradient id="stoneCurrent" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffd966"/>
      <stop offset="100%" stop-color="#e6b830"/>
    </radialGradient>

      <stop offset="0%" stop-color="#6e6e68"/>
      <stop offset="100%" stop-color="#4a4a46"/>
    </radialGradient>

    <!-- Bevel filter for stone buttons -->
    <filter id="stoneBevel" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feSpecularLighting in="blur" surfaceScale="4" specularConstant="0.6" specularExponent="15" result="spec">
        <fePointLight x="-50" y="-80" z="120"/>
      </feSpecularLighting>
      <feComposite in="spec" in2="SourceAlpha" operator="in" result="specIn"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode in="specIn"/>
      </feMerge>
    </filter>

    <!-- Glow for current level -->
    <filter id="goldGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feFlood flood-color="#ffd966" flood-opacity="0.7" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle shadow for nodes -->
    <filter id="nodeShadow" x="-20%" y="-10%" width="140%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.25"/>
    </filter>

      <stop offset="50%" stop-color="#daa520"/>
      <stop offset="100%" stop-color="#b8860b"/>
