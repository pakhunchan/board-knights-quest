  html, body { width: 1920px; height: 1080px; overflow: hidden; background: #b5d8c0; }
  svg { display: block; }
  @keyframes glowPulse {
    0%, 100% { r: 50; opacity: 0.35; }
    50% { r: 60; opacity: 0.55; }

</style>

      <stop offset="60%" stop-color="#bfdfc8"/>

      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#ffd966" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="nodeShadow" x="-20%" y="-10%" width="140%" height="150%">
