<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Level Map - Horseshoe Path</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; width: 1920px; height: 1080px; }
  svg { display: block; }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <!-- Sky gradient: soft teal-mint -->
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b5d8c0"/>
      <stop offset="60%" stop-color="#bfdfc8"/>
      <stop offset="100%" stop-color="#c8e6cf"/>
    </linearGradient>

    <!-- Grass gradient -->
    <linearGradient id="grassGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7aaa6a"/>
      <stop offset="100%" stop-color="#5a8a4a"/>
    </linearGradient>

    <!-- Path fill -->
    <linearGradient id="pathGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a96e"/>
      <stop offset="100%" stop-color="#b89458"/>
    </linearGradient>

    <!-- Mountain gradients -->
    <linearGradient id="mtnGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9a9a8e"/>
      <stop offset="100%" stop-color="#8a8a7e"/>
    </linearGradient>
    <linearGradient id="mtnGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a8a7e"/>
      <stop offset="100%" stop-color="#7a7a6e"/>
    </linearGradient>
    <linearGradient id="mtnGrad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a7a6e"/>
      <stop offset="100%" stop-color="#6a6a5e"/>
    </linearGradient>

    <!-- Sun glow -->
    <radialGradient id="sunGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fff8dc"/>
      <stop offset="40%" stop-color="#ffe066"/>
      <stop offset="70%" stop-color="#ffcc33" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffcc33" stop-opacity="0"/>
    </radialGradient>

    <!-- Current level glow -->
    <radialGradient id="currentGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffe066" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#ffcc33" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffaa00" stop-opacity="0"/>
    </radialGradient>

    <!-- Stone platform: completed -->
    <radialGradient id="stoneCompleted" cx="0.35" cy="0.3" r="0.65">
      <stop offset="0%" stop-color="#d4c8a8"/>
      <stop offset="50%" stop-color="#bfb08a"/>
      <stop offset="100%" stop-color="#a89870"/>
    </radialGradient>

    <!-- Stone platform: current -->
    <radialGradient id="stoneCurrent" cx="0.35" cy="0.3" r="0.65">
      <stop offset="0%" stop-color="#ffe8a0"/>
      <stop offset="50%" stop-color="#f0d070"/>
      <stop offset="100%" stop-color="#d4a830"/>
    </radialGradient>

    <!-- Stone platform: locked -->
    <radialGradient id="stoneLocked" cx="0.35" cy="0.3" r="0.65">
      <stop offset="0%" stop-color="#8a8070"/>
      <stop offset="50%" stop-color="#706858"/>
      <stop offset="100%" stop-color="#585048"/>
    </radialGradient>

    <!-- Torch flame gradient -->
    <radialGradient id="flameGrad" cx="0.5" cy="0.7" r="0.5">
      <stop offset="0%" stop-color="#ffe066"/>
      <stop offset="40%" stop-color="#ff9933"/>
      <stop offset="100%" stop-color="#cc4400" stop-opacity="0"/>
    </radialGradient>

    <!-- Torch glow -->
    <radialGradient id="torchGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffe066" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff9933" stop-opacity="0"/>
    </radialGradient>

    <!-- Drop shadow filter -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.25"/>
    </filter>

    <!-- Soft glow filter -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
  </defs>

  <!-- ==================== SKY ==================== -->

    <polygon points="380,320 358,358 402,358" fill="#e8e8e0" opacity="0.5"/>

  <g>
    <!-- Path shadow (darker edge) -->

             Q1760,930 1780,880 Q1800,820 1790,760 Q1780,700 1750,660
             Q1720,625 1650,610 Q1550,595 1400,598 Q1200,600 1000,605
             Q800,608 600,610 Q400,615 280,618 Q200,622 160,625"
           fill="none" stroke="#a08050" stroke-width="62" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Main path fill -->

             Q1760,930 1780,880 Q1800,820 1790,760 Q1780,700 1750,660
             Q1720,625 1650,610 Q1550,595 1400,598 Q1200,600 1000,605
             Q800,608 600,610 Q400,615 280,618 Q200,622 160,625"

  <!-- ==================== SCATTERED BUSHES ==================== -->

  <!-- ==================== TORCHES ==================== -->

    <!-- Torch 1: between level 1 and 2 -->
    <rect x="298" y="950" width="5" height="22" rx="1" fill="#5a4020"/>

    <ellipse cx="1770" cy="845" rx="8" ry="12" fill="url(#flameGrad)" opacity="0.8"/>
    <circle cx="1770" cy="845" r="22" fill="url(#torchGlow)"/>

    <!-- Torch 6: right curve upper -->
    <rect x="1778" y="720" width="5" height="22" rx="1" fill="#5a4020"/>
    <ellipse cx="1780" cy="715" rx="8" ry="12" fill="url(#flameGrad)" opacity="0.8"/>
