<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concept 07: Carved Stone Button</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Fredoka:wght@600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background:
      linear-gradient(180deg,
        #7EC8E3 0%,
        #A8DBF0 25%,
        #C9E8D4 45%,
        #8EBF6A 55%,
        #6B9E4E 60%,
        #5A8A3E 65%,
        #A89060 72%,
        #C4A86B 80%,
        #9E7E50 100%
      );
    font-family: 'Fredoka', sans-serif;
    position: relative;
  }

  /* grass blades layer */
  body::before {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 45%;
    background:
      repeating-linear-gradient(85deg, transparent, transparent 18px, rgba(90,138,62,0.15) 18px, rgba(90,138,62,0.15) 20px),
      repeating-linear-gradient(95deg, transparent, transparent 30px, rgba(107,142,78,0.1) 30px, rgba(107,142,78,0.1) 32px);
    pointer-events: none;
    z-index: 0;
  }

  /* stone rubble accents at bottom */
  body::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 18%;
    background:
      radial-gradient(ellipse 60px 30px at 15% 80%, #B89B65 0%, transparent 70%),
      radial-gradient(ellipse 45px 22px at 75% 70%, #A88F58 0%, transparent 70%),
      radial-gradient(ellipse 80px 35px at 50% 90%, #C4A86B 0%, transparent 70%),
      radial-gradient(ellipse 35px 18px at 88% 85%, #B89B65 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .concept-label {
    font-family: 'Fredoka', sans-serif;
    font-size: 16px;
    color: rgba(255,255,255,0.85);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 32px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.3);
    z-index: 1;
  }

  .stone-btn {
    position: relative;
    z-index: 1;
    width: 270px;
    height: 85px;
    border: none;
    outline: none;
    cursor: pointer;
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 26px;
    letter-spacing: 5px;
    color: #4A3A20;
    text-transform: uppercase;

    /* stone surface */
    background:
      /* subtle noise-like texture via layered gradients */
      radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 80%, rgba(0,0,0,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(255,255,255,0.05) 0%, transparent 80%),
      linear-gradient(170deg, #D8C48A 0%, #D4B87A 25%, #C4A86B 50%, #B89B60 75%, #A89060 100%);

    border-radius: 14px;

    /* carved/inset text */
    text-shadow:
      0 -1px 0 rgba(0,0,0,0.4),
      0 1px 1px rgba(255,240,200,0.5),
      0 -2px 2px rgba(0,0,0,0.15);

    /* stone depth + magical glow */
    box-shadow:
      /* inner top highlight */
      inset 0 2px 3px rgba(255,240,200,0.5),
      /* inner bottom shadow */
      inset 0 -3px 5px rgba(0,0,0,0.15),
      /* inner side texture */
      inset 2px 0 4px rgba(0,0,0,0.05),
      inset -2px 0 4px rgba(0,0,0,0.05),
      /* outer drop shadow */
      0 6px 12px rgba(60,40,10,0.4),
      0 2px 4px rgba(60,40,10,0.3),
      /* magical glow */
      0 0 18px rgba(255,214,102,0.25),
      0 0 40px rgba(255,214,102,0.1);

    /* border effect — chiseled edge */
    border-top: 2px solid rgba(255,240,200,0.45);
    border-left: 1px solid rgba(255,240,200,0.2);
    border-right: 1px solid rgba(100,80,40,0.2);
    border-bottom: 3px solid rgba(100,80,40,0.35);

    transition:
      transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94),
      box-shadow 0.2s ease,
      text-shadow 0.2s ease;

    animation: stoneFloat 3.5s ease-in-out infinite, stoneGlow 2.8s ease-in-out infinite;
  }

  /* rune decorations on left */
  .stone-btn::before {
    content: '\u16A0  \u16B2';
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-family: sans-serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 1px;
    color: rgba(74,58,32,0.25);
    text-shadow:
      0 -1px 0 rgba(0,0,0,0.15),
      0 1px 0 rgba(255,240,200,0.3);
    pointer-events: none;
    transition: color 0.3s ease, text-shadow 0.3s ease;
  }

  /* rune decorations on right */
  .stone-btn::after {
    content: '\u16B7  \u16A6';
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-family: sans-serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 1px;
    color: rgba(74,58,32,0.25);
    text-shadow:
      0 -1px 0 rgba(0,0,0,0.15),
      0 1px 0 rgba(255,240,200,0.3);
    pointer-events: none;
    transition: color 0.3s ease, text-shadow 0.3s ease;
  }

  /* HOVER */
  .stone-btn:hover {
    transform: translateY(-3px);
    box-shadow:
      inset 0 2px 3px rgba(255,240,200,0.5),
      inset 0 -3px 5px rgba(0,0,0,0.15),
      inset 2px 0 4px rgba(0,0,0,0.05),
      inset -2px 0 4px rgba(0,0,0,0.05),
      0 10px 20px rgba(60,40,10,0.35),
      0 4px 8px rgba(60,40,10,0.25),
      0 0 28px rgba(255,214,102,0.5),
      0 0 55px rgba(255,214,102,0.25),
      0 0 80px rgba(255,214,102,0.1);
    animation: stoneGlowHover 1.5s ease-in-out infinite;
  }

  .stone-btn:hover::before,
  .stone-btn:hover::after {
    color: rgba(74,58,32,0.45);
    text-shadow:
      0 -1px 0 rgba(0,0,0,0.2),
      0 1px 0 rgba(255,240,200,0.4),
      0 0 6px rgba(255,214,102,0.3);
  }

  /* ACTIVE / PRESSED */
  .stone-btn:active {
    transform: translateY(2px);
    transition-duration: 0.08s;
    box-shadow:
      inset 0 2px 5px rgba(0,0,0,0.2),
      inset 0 -1px 2px rgba(255,240,200,0.3),
      inset 2px 0 4px rgba(0,0,0,0.08),
      inset -2px 0 4px rgba(0,0,0,0.08),
      0 2px 4px rgba(60,40,10,0.3),
      0 1px 2px rgba(60,40,10,0.2),
      0 0 14px rgba(255,214,102,0.2);
    border-top: 1px solid rgba(100,80,40,0.2);
    border-bottom: 1px solid rgba(255,240,200,0.2);
    animation: none;
  }

  /* FOCUS */
  .stone-btn:focus-visible {
    box-shadow:
      inset 0 2px 3px rgba(255,240,200,0.5),
      inset 0 -3px 5px rgba(0,0,0,0.15),
      inset 2px 0 4px rgba(0,0,0,0.05),
      inset -2px 0 4px rgba(0,0,0,0.05),
      0 6px 12px rgba(60,40,10,0.4),
      0 2px 4px rgba(60,40,10,0.3),
      0 0 20px rgba(255,214,102,0.5),
      0 0 45px rgba(255,214,102,0.3),
      0 0 4px 3px rgba(107,142,78,0.5);
  }

  .stone-btn:focus-visible::before,
  .stone-btn:focus-visible::after {
    color: rgba(107,142,78,0.6);
    text-shadow:
      0 0 8px rgba(107,142,78,0.4),
      0 -1px 0 rgba(0,0,0,0.15),
      0 1px 0 rgba(255,240,200,0.3);
  }

  /* floating animation */
  @keyframes stoneFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }

  /* idle pulsing glow */
  @keyframes stoneGlow {
    0%, 100% {
      box-shadow:
        inset 0 2px 3px rgba(255,240,200,0.5),
        inset 0 -3px 5px rgba(0,0,0,0.15),
        inset 2px 0 4px rgba(0,0,0,0.05),
        inset -2px 0 4px rgba(0,0,0,0.05),
        0 6px 12px rgba(60,40,10,0.4),
        0 2px 4px rgba(60,40,10,0.3),
        0 0 18px rgba(255,214,102,0.25),
        0 0 40px rgba(255,214,102,0.1);
    }
    50% {
      box-shadow:
        inset 0 2px 3px rgba(255,240,200,0.5),
        inset 0 -3px 5px rgba(0,0,0,0.15),
        inset 2px 0 4px rgba(0,0,0,0.05),
        inset -2px 0 4px rgba(0,0,0,0.05),
        0 6px 12px rgba(60,40,10,0.4),
        0 2px 4px rgba(60,40,10,0.3),
        0 0 24px rgba(255,214,102,0.4),
        0 0 55px rgba(255,214,102,0.18);
    }
  }

  /* hover pulsing glow — more intense */
  @keyframes stoneGlowHover {
    0%, 100% {
      box-shadow:
        inset 0 2px 3px rgba(255,240,200,0.5),
        inset 0 -3px 5px rgba(0,0,0,0.15),
        inset 2px 0 4px rgba(0,0,0,0.05),
        inset -2px 0 4px rgba(0,0,0,0.05),
        0 10px 20px rgba(60,40,10,0.35),
        0 4px 8px rgba(60,40,10,0.25),
        0 0 28px rgba(255,214,102,0.5),
        0 0 55px rgba(255,214,102,0.25),
        0 0 80px rgba(255,214,102,0.1);
    }
    50% {
      box-shadow:
        inset 0 2px 3px rgba(255,240,200,0.5),
        inset 0 -3px 5px rgba(0,0,0,0.15),
        inset 2px 0 4px rgba(0,0,0,0.05),
        inset -2px 0 4px rgba(0,0,0,0.05),
        0 10px 20px rgba(60,40,10,0.35),
        0 4px 8px rgba(60,40,10,0.25),
        0 0 35px rgba(255,214,102,0.65),
        0 0 70px rgba(255,214,102,0.35),
        0 0 100px rgba(255,214,102,0.15);
    }
  }
</style>
</head>
<body>
  <span class="concept-label">Concept 07: Carved Stone</span>
  <button class="stone-btn" onclick="void(0)">CONTINUE</button>
</body>
</html>
