<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Results + Continue Button — Knight's Quest: Math Adventure</title>
<link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&family=Quicksand:wght@400;500;600;700&family=Patrick+Hand&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #a8d8c8;
  font-family: 'Quicksand', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* === MEADOW BACKGROUND === */
.meadow-scene {
  position: fixed;
  inset: 0;
  opacity: 0;
  transition: opacity 1.5s ease;
}
.meadow-scene.visible { opacity: 1; }

.sky {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, #a8d8c8 0%, #c5e8d8 25%, #d6f0e0 45%, #e8f4e0 60%, #f0f8e8 100%);
}

.sun {
  position: absolute;
  top: 6%;
  left: 50%;
  transform: translateX(-50%);
  width: 90px;
  height: 90px;
  background: radial-gradient(circle, rgba(255, 240, 180, 0.9) 0%, rgba(255, 230, 150, 0.5) 30%, rgba(255, 220, 120, 0.15) 60%, transparent 80%);
  border-radius: 50%;
}
.sun::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(255, 240, 180, 0.1) 0%, transparent 60%);
  border-radius: 50%;
}

.light-rays {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 700px;
  height: 100%;
  opacity: 0.10;
  background:
    linear-gradient(175deg, rgba(255, 240, 180, 0.3) 0%, transparent 50%) no-repeat 8% 0 / 90px 100%,
    linear-gradient(172deg, rgba(255, 240, 180, 0.2) 0%, transparent 45%) no-repeat 28% 0 / 70px 100%,
    linear-gradient(178deg, rgba(255, 240, 180, 0.25) 0%, transparent 55%) no-repeat 52% 0 / 80px 100%,
    linear-gradient(174deg, rgba(255, 240, 180, 0.15) 0%, transparent 40%) no-repeat 75% 0 / 60px 100%,
    linear-gradient(176deg, rgba(255, 240, 180, 0.15) 0%, transparent 35%) no-repeat 90% 0 / 50px 100%;
}

.cloud {
  position: absolute;
  background: rgba(255, 255, 255, 0.7);
  border-radius: 50%;
  filter: blur(1px);
}
.cloud::before, .cloud::after {
  content: '';
  position: absolute;
  background: rgba(255, 255, 255, 0.7);
  border-radius: 50%;
}
.cloud:nth-child(1) { width: 100px; height: 40px; top: 10%; left: 15%; }
.cloud:nth-child(1)::before { width: 50px; height: 35px; top: -15px; left: 15px; }
.cloud:nth-child(1)::after { width: 60px; height: 30px; top: -10px; left: 40px; }
.cloud:nth-child(2) { width: 120px; height: 35px; top: 14%; right: 18%; opacity: 0.5; }
.cloud:nth-child(2)::before { width: 55px; height: 30px; top: -12px; left: 20px; }
.cloud:nth-child(2)::after { width: 65px; height: 28px; top: -8px; left: 50px; }
.cloud:nth-child(3) { width: 80px; height: 30px; top: 8%; left: 60%; opacity: 0.4; }
.cloud:nth-child(3)::before { width: 40px; height: 25px; top: -10px; left: 12px; }
.cloud:nth-child(3)::after { width: 45px; height: 22px; top: -6px; left: 32px; }

.mountains {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 60%;
}
.mountain {
  position: absolute;
  bottom: 0;
  border-left: solid transparent;
  border-right: solid transparent;
  border-bottom: solid;
}
.mountain-1 { left: -15%; border-left-width: 320px; border-right-width: 350px; border-bottom-width: 500px; border-bottom-color: #b0a898; opacity: 0.45; }
.mountain-2 { left: 10%; border-left-width: 350px; border-right-width: 370px; border-bottom-width: 550px; border-bottom-color: #a89888; opacity: 0.4; }
.mountain-3 { left: 50%; transform: translateX(-50%); border-left-width: 300px; border-right-width: 310px; border-bottom-width: 440px; border-bottom-color: #b4a494; opacity: 0.35; }
.mountain-4 { right: 10%; border-left-width: 370px; border-right-width: 340px; border-bottom-width: 520px; border-bottom-color: #aca090; opacity: 0.4; }
.mountain-5 { right: -15%; border-left-width: 340px; border-right-width: 320px; border-bottom-width: 470px; border-bottom-color: #b8a898; opacity: 0.38; }
.mountain::after {
  content: '';
  position: absolute;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  border-left: 22px solid transparent;
  border-right: 22px solid transparent;
  border-bottom: 28px solid rgba(255,255,255,0.45);
}

.tree { position: absolute; z-index: 4; }
.tree-trunk { width: 14px; height: 30px; background: linear-gradient(to right, #8a7260, #a08870, #8a7260); margin: 0 auto; border-radius: 3px; }
.tree-crown { width: 60px; height: 55px; background: radial-gradient(ellipse at 50% 60%, #7aaa58, #5a8a40); border-radius: 50%; position: relative; margin-bottom: -5px; box-shadow: inset -8px -5px 15px rgba(0,0,0,0.1), inset 5px 5px 10px rgba(255,255,200,0.15); }
.tree-a { right: 8%; bottom: 28%; transform: scale(0.9); }
.tree-a .tree-crown { width: 65px; height: 58px; background: radial-gradient(ellipse at 50% 60%, #78a850, #5a8838); }
.tree-b { right: 22%; bottom: 25%; transform: scale(0.55); }
.tree-c { left: 15%; bottom: 27%; transform: scale(0.55); }
.tree-d { left: 30%; bottom: 24%; transform: scale(0.5); }

.hills { position: absolute; bottom: -20%; left: 0; width: 100%; height: 55%; }
.hill { position: absolute; bottom: 0; border-radius: 50% 50% 0 0; }
.hill-1 { left: -20%; width: 80%; height: 100%; background: linear-gradient(to bottom, #6aad5a, #5a9a4a); z-index: 2; }
.hill-2 { right: -20%; width: 80%; height: 95%; background: linear-gradient(to bottom, #5ea04e, #4e8a3e); z-index: 2; }
.hill-3 { left: 15%; width: 75%; height: 80%; background: linear-gradient(to bottom, #72b862, #62a852); z-index: 3; }
.hills::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(255, 240, 200, 0.1) 0%, transparent 50%); z-index: 4; pointer-events: none; }

.meadow-glow { position: absolute; bottom: 16%; left: 50%; transform: translateX(-50%); width: 500px; height: 60px; z-index: 5; }
.meadow-glow-circle { position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); width: 400px; height: 40px; background: radial-gradient(ellipse, rgba(255, 220, 140, 0.15) 0%, transparent 70%); border-radius: 50%; opacity: 0; transition: opacity 1s ease; }
.meadow-glow-circle.visible { opacity: 1; }
.meadow-glow-circle.bright { background: radial-gradient(ellipse, rgba(255, 220, 140, 0.35) 0%, rgba(255, 200, 100, 0.12) 50%, transparent 70%); width: 500px; height: 50px; }

.ground-flower { position: absolute; bottom: 22%; z-index: 5; }
.ground-flower::before { content: ''; display: block; width: 12px; height: 12px; border-radius: 50%; }
.ground-flower::after { content: ''; display: block; width: 2px; height: 14px; background: #5a9838; margin: -2px auto 0; }
.ground-flower:nth-child(1) { left: 25%; }
.ground-flower:nth-child(1)::before { background: #f5a088; }
.ground-flower:nth-child(2) { left: 32%; transform: scale(0.7); bottom: 21%; }
.ground-flower:nth-child(2)::before { background: #f5d080; }
.ground-flower:nth-child(3) { right: 26%; }
.ground-flower:nth-child(3)::before { background: #f0c090; }
.ground-flower:nth-child(4) { right: 33%; transform: scale(0.8); bottom: 21%; }
.ground-flower:nth-child(4)::before { background: #f8e8b0; }

.dewdrop {
  position: absolute;
  width: 4px;
  height: 4px;
  background: radial-gradient(circle, #fff8e0, #ffd880);
  border-radius: 50%;
  box-shadow: 0 0 8px 3px rgba(255, 220, 130, 0.4), 0 0 20px 6px rgba(255, 200, 100, 0.15);
  opacity: 0;
  animation: dewFloat 8s ease-in-out infinite, dewGlow 3s ease-in-out infinite;
}
@keyframes dewFloat {
  0%, 100% { transform: translate(0, 0); }
  25% { transform: translate(20px, -30px); }
  50% { transform: translate(-15px, -50px); }
  75% { transform: translate(25px, -15px); }
}
@keyframes dewGlow {
  0%, 100% { opacity: 0.15; }
  50% { opacity: 0.65; }
}

/* === FLOWERS ALONG XP PATH === */
.flower-track { position: absolute; display: flex; align-items: center; gap: 4px; pointer-events: none; }
.bloom-flower { width: 20px; height: 20px; position: relative; transform: scale(0); transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
.bloom-flower.bloomed { transform: scale(1); }
.bloom-flower.closed { transform: scale(0); transition: transform 0.3s ease-in; }
.bloom-flower .petal { position: absolute; width: 8px; height: 8px; border-radius: 50%; top: 50%; left: 50%; }
.bloom-flower .petal:nth-child(1) { transform: translate(-50%, -100%); }
.bloom-flower .petal:nth-child(2) { transform: translate(20%, -70%); }
.bloom-flower .petal:nth-child(3) { transform: translate(20%, -10%); }
.bloom-flower .petal:nth-child(4) { transform: translate(-50%, 15%); }
.bloom-flower .petal:nth-child(5) { transform: translate(-120%, -10%); }
.bloom-flower .petal:nth-child(6) { transform: translate(-120%, -70%); }
.bloom-flower .center { position: absolute; width: 6px; height: 6px; background: #d4a030; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); }
.bloom-flower.peach .petal { background: #f5b8a0; }
.bloom-flower.peach .center { background: #d48a60; }
.bloom-flower.coral .petal { background: #f0a088; }
.bloom-flower.coral .center { background: #c87060; }
.bloom-flower.gold .petal { background: #f5d880; }
.bloom-flower.gold .center { background: #c8a030; }
.bloom-flower.cream .petal { background: #f8ecd0; }
.bloom-flower.cream .center { background: #d4b870; }
.bloom-flower.amber .petal { background: #f0c070; }
.bloom-flower.amber .center { background: #c89838; }
.bloom-flower.blush .petal { background: #f0c0b0; }
.bloom-flower.blush .center { background: #d09078; }

/* === BUTTERFLIES === */
.butterfly { position: absolute; opacity: 0; transition: opacity 0.5s ease; pointer-events: none; }
.butterfly.visible { opacity: 1; }
.butterfly-body { width: 3px; height: 16px; background: #6a5040; border-radius: 2px; position: relative; margin: 0 auto; }
.wing-left, .wing-right { position: absolute; top: 2px; width: 14px; height: 18px; border-radius: 50% 50% 50% 0; transform-origin: right center; animation: wingFlap 0.4s ease-in-out infinite alternate; }
.wing-left { right: 100%; border-radius: 50% 50% 0 50%; transform-origin: right center; }
.wing-right { left: 100%; border-radius: 50% 50% 50% 0; transform-origin: left center; }
@keyframes wingFlap { 0% { transform: rotateY(0deg) scaleX(1); } 100% { transform: rotateY(60deg) scaleX(0.4); } }
.butterfly:nth-child(1) .wing-left, .butterfly:nth-child(1) .wing-right { background: linear-gradient(135deg, #f5c888, #e0a050); }
.butterfly:nth-child(2) .wing-left, .butterfly:nth-child(2) .wing-right { background: linear-gradient(135deg, #f0a878, #d88850); }
.butterfly:nth-child(3) .wing-left, .butterfly:nth-child(3) .wing-right { background: linear-gradient(135deg, #f8dca0, #e0b860); }
.butterfly:nth-child(4) .wing-left, .butterfly:nth-child(4) .wing-right { background: linear-gradient(135deg, #c8e0a0, #98c070); }
.butterfly { animation: butterflyPath 6s ease-in-out infinite; }
.butterfly:nth-child(2) { animation: butterflyPath2 7s ease-in-out infinite; }
.butterfly:nth-child(3) { animation: butterflyPath3 5.5s ease-in-out infinite; }
.butterfly:nth-child(4) { animation: butterflyPath4 6.5s ease-in-out infinite; }
@keyframes butterflyPath { 0%, 100% { transform: translate(0, 0) rotate(-5deg); } 25% { transform: translate(60px, -80px) rotate(5deg); } 50% { transform: translate(-30px, -120px) rotate(-8deg); } 75% { transform: translate(40px, -50px) rotate(3deg); } }
@keyframes butterflyPath2 { 0%, 100% { transform: translate(0, 0) rotate(3deg); } 25% { transform: translate(-70px, -60px) rotate(-5deg); } 50% { transform: translate(40px, -100px) rotate(8deg); } 75% { transform: translate(-50px, -40px) rotate(-3deg); } }
@keyframes butterflyPath3 { 0%, 100% { transform: translate(0, 0) rotate(-3deg); } 33% { transform: translate(50px, -90px) rotate(6deg); } 66% { transform: translate(-40px, -70px) rotate(-6deg); } }
@keyframes butterflyPath4 { 0%, 100% { transform: translate(0, 0) rotate(5deg); } 33% { transform: translate(-60px, -70px) rotate(-4deg); } 66% { transform: translate(30px, -110px) rotate(4deg); } }

/* === MAIN CONTENT === */
.content {
  position: relative;
  z-index: 10;
  text-align: center;
  width: 100%;
  max-width: 560px;
  padding: 0 20px;
}

.quest-header { opacity: 0; transform: translateY(20px) scale(0.9); transition: opacity 0.8s ease, transform 0.8s ease; margin-bottom: 28px; }
.quest-header.visible { opacity: 1; transform: translateY(0) scale(1); }
.quest-title { font-family: 'Amatic SC', cursive; font-weight: 700; font-size: 72px; color: #8a6830; text-shadow: 0 0 30px rgba(255, 200, 100, 0.4), 0 0 60px rgba(255, 180, 80, 0.15), 0 2px 4px rgba(100, 60, 20, 0.2); line-height: 1; letter-spacing: 3px; position: relative; }
.quest-title .vine-deco { display: inline-block; color: #c8a050; font-size: 40px; vertical-align: middle; opacity: 0.6; }

.level-section { opacity: 0; transform: translateY(15px); transition: opacity 0.6s ease, transform 0.6s ease; margin-bottom: 20px; }
.level-section.visible { opacity: 1; transform: translateY(0); }
.level-display { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 6px; }
.level-badge { font-family: 'Patrick Hand', cursive; font-size: 32px; color: #7a6040; text-shadow: 0 1px 3px rgba(100, 60, 20, 0.15); transition: all 0.5s ease; }
.level-badge.highlight { color: #c88a20; text-shadow: 0 0 15px rgba(255, 180, 60, 0.5), 0 1px 3px rgba(100, 60, 20, 0.2); transform: scale(1.15); }
.level-arrow { font-size: 24px; color: #c8a050; opacity: 0; transform: scaleX(0); transition: opacity 0.4s ease, transform 0.4s ease; }
.level-arrow.visible { opacity: 1; transform: scaleX(1); }
.level-new { opacity: 0; transform: translateX(-10px); transition: opacity 0.4s ease, transform 0.4s ease; }
.level-new.visible { opacity: 1; transform: translateX(0); }
.rank-title { font-family: 'Patrick Hand', cursive; font-size: 22px; color: #8a7050; text-shadow: 0 1px 2px rgba(100, 60, 20, 0.1); transition: all 0.5s ease; min-height: 30px; }
.rank-title.highlight { color: #c88a20; text-shadow: 0 0 12px rgba(255, 180, 60, 0.4), 0 1px 2px rgba(100, 60, 20, 0.2); font-size: 26px; }

.title-promoted { opacity: 0; transform: translateY(10px) scale(0.8); transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); margin-top: 4px; margin-bottom: 4px; min-height: 40px; }
.title-promoted.visible { opacity: 1; transform: translateY(0) scale(1); }
.title-promoted-label { font-family: 'Amatic SC', cursive; font-weight: 700; font-size: 38px; color: #c88a20; text-shadow: 0 0 20px rgba(255, 180, 60, 0.5), 0 0 40px rgba(255, 160, 40, 0.2); letter-spacing: 2px; animation: none; }
.title-promoted-label.shimmer { animation: titleShimmer 1.5s ease-in-out infinite; }
@keyframes titleShimmer { 0%, 100% { text-shadow: 0 0 20px rgba(255, 180, 60, 0.5), 0 0 40px rgba(255, 160, 40, 0.2); } 50% { text-shadow: 0 0 30px rgba(255, 200, 80, 0.7), 0 0 60px rgba(255, 180, 60, 0.35); } }
.title-transition { display: flex; align-items: center; justify-content: center; gap: 14px; margin-top: 6px; opacity: 0; transform: translateY(8px); transition: opacity 0.5s ease, transform 0.5s ease; }
.title-transition.visible { opacity: 1; transform: translateY(0); }
.title-old { font-family: 'Patrick Hand', cursive; font-size: 24px; color: #a08868; text-decoration: line-through; text-decoration-color: rgba(160, 136, 104, 0.5); }
.title-arrow { font-size: 20px; color: #c8a050; }
.title-new { font-family: 'Patrick Hand', cursive; font-size: 28px; color: #c88a20; text-shadow: 0 0 10px rgba(255, 180, 60, 0.4); font-weight: 700; }

/* XP Bar */
.xp-section { opacity: 0; transform: translateY(15px); transition: opacity 0.6s ease, transform 0.6s ease; margin-bottom: 16px; }
.xp-section.visible { opacity: 1; transform: translateY(0); }
.xp-bar-container { position: relative; width: 100%; height: 28px; background: rgba(255, 255, 255, 0.45); border-radius: 14px; border: 2px solid rgba(200, 170, 100, 0.35); overflow: hidden; box-shadow: inset 0 2px 6px rgba(150, 120, 60, 0.12), 0 1px 3px rgba(255, 255, 255, 0.3); }
.xp-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #e0a838, #e8c048, #f0d060); border-radius: 12px; transition: none; position: relative; box-shadow: 0 0 10px rgba(230, 180, 60, 0.3); }
.xp-bar-fill::after { content: ''; position: absolute; top: 3px; left: 8px; right: 8px; height: 6px; background: linear-gradient(to bottom, rgba(255,255,255,0.35), transparent); border-radius: 3px; }
.xp-bar-fill.maxed { background: linear-gradient(90deg, #e8c048, #f0d060, #f8e078); box-shadow: 0 0 20px rgba(240, 200, 80, 0.5); }
.xp-text { font-family: 'Quicksand', sans-serif; font-weight: 600; font-size: 13px; color: #7a6040; margin-top: 6px; text-shadow: 0 1px 2px rgba(255, 255, 255, 0.3); }
.flower-row { display: flex; justify-content: space-around; align-items: flex-end; width: 100%; height: 28px; margin-bottom: 4px; }

/* +500 XP popup */
.xp-bonus { opacity: 0; transform: translateY(10px) scale(0.8); transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); margin-top: 14px; }
.xp-bonus.visible { opacity: 1; transform: translateY(0) scale(1); }
.xp-bonus-text { font-family: 'Patrick Hand', cursive; font-size: 36px; color: #c88a20; text-shadow: 0 0 20px rgba(255, 180, 60, 0.5), 0 0 40px rgba(255, 160, 40, 0.2), 0 2px 4px rgba(100, 60, 20, 0.15); display: inline-block; animation: none; }
.xp-bonus-text.glow { animation: bonusGlow 2s ease-in-out infinite; }
@keyframes bonusGlow { 0%, 100% { text-shadow: 0 0 20px rgba(255, 180, 60, 0.5), 0 0 40px rgba(255, 160, 40, 0.2), 0 2px 4px rgba(100, 60, 20, 0.15); } 50% { text-shadow: 0 0 30px rgba(255, 200, 80, 0.7), 0 0 60px rgba(255, 180, 60, 0.35), 0 2px 4px rgba(100, 60, 20, 0.15); } }

/* Level up flash */
.level-up-flash { position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, rgba(255, 230, 150, 0.35), transparent 70%); opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 5; }
.level-up-flash.active { opacity: 1; }

.particle { position: absolute; width: 2px; height: 2px; background: rgba(255, 220, 140, 0.4); border-radius: 50%; animation: particleDrift 10s linear infinite; }
@keyframes particleDrift { 0% { transform: translateY(0) translateX(0); opacity: 0; } 10% { opacity: 0.5; } 90% { opacity: 0.5; } 100% { transform: translateY(-200px) translateX(30px); opacity: 0; } }

.sparkle { position: absolute; width: 3px; height: 3px; background: #ffd060; border-radius: 50%; opacity: 0; pointer-events: none; }
.sparkle.burst { animation: sparkleBurst 1s ease-out forwards; }
@keyframes sparkleBurst { 0% { opacity: 1; transform: translate(0, 0) scale(1); } 100% { opacity: 0; transform: translate(var(--sx), var(--sy)) scale(0); } }

.petal-particle { position: absolute; width: 10px; height: 8px; background: linear-gradient(135deg, #f5c888, #f0a868); border-radius: 50% 0 50% 0; opacity: 0; pointer-events: none; }
.petal-particle.falling { animation: petalFall 3s ease-in forwards; }
@keyframes petalFall { 0% { opacity: 0.7; transform: translateY(0) rotate(0deg); } 100% { opacity: 0; transform: translateY(200px) rotate(360deg) translateX(var(--lx)); } }

/* ======================================================
   NATURE-FRAMED CONTINUE BUTTON
   ====================================================== */
.continue-section {
  opacity: 0;
  transform: translateY(20px) scale(0.85);
  transition: opacity 0.7s ease, transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
  margin-top: 28px;
}
.continue-section.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
}

.button-wrap {
  position: relative;
  display: inline-block;
}

/* decorative leaves at corners */
.leaf {
  position: absolute;
  width: 28px;
  height: 16px;
  border-radius: 50% 0 50% 0;
  background: linear-gradient(135deg, #8FBC6B 0%, #6B8E4E 100%);
  z-index: 2;
  pointer-events: none;
  opacity: 0.92;
  box-shadow: inset -2px -1px 3px rgba(0,0,0,0.12);
  transition: opacity 0.3s, transform 0.3s;
}
.leaf::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 20%;
  width: 55%;
  height: 1px;
  background: rgba(74, 124, 63, 0.5);
  transform: rotate(-8deg);
}
.leaf-tl { top: -6px; left: -8px; transform: rotate(-20deg); }
.leaf-tr { top: -6px; right: -8px; transform: rotate(70deg) scaleX(-1); }
.leaf-bl { bottom: -6px; left: -8px; transform: rotate(-70deg); }
.leaf-br { bottom: -6px; right: -8px; transform: rotate(20deg) scaleX(-1); }

.leaf-sm {
  position: absolute;
  width: 18px;
  height: 10px;
  border-radius: 50% 0 50% 0;
  background: linear-gradient(135deg, #A3D48C 0%, #7DAF5A 100%);
  z-index: 2;
  pointer-events: none;
  opacity: 0.8;
  transition: opacity 0.3s;
}
.leaf-sm-1 { top: -10px; left: 22px; transform: rotate(-40deg); }
.leaf-sm-2 { top: -10px; right: 22px; transform: rotate(40deg) scaleX(-1); }
.leaf-sm-3 { bottom: -10px; left: 30px; transform: rotate(50deg); }
.leaf-sm-4 { bottom: -10px; right: 30px; transform: rotate(-50deg) scaleX(-1); }

.vine {
  position: absolute;
  pointer-events: none;
  z-index: 1;
}
.vine-left {
  left: -5px;
  top: 20%;
  width: 6px;
  height: 60%;
  background: linear-gradient(to bottom, transparent, #5A7A42 20%, #6B8E4E 50%, #5A7A42 80%, transparent);
  border-radius: 3px;
}
.vine-right {
  right: -5px;
  top: 20%;
  width: 6px;
  height: 60%;
  background: linear-gradient(to bottom, transparent, #5A7A42 20%, #6B8E4E 50%, #5A7A42 80%, transparent);
  border-radius: 3px;
}
.vine-left::after, .vine-right::after {
  content: '';
  position: absolute;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #C67B3F, #8B5E3C);
  top: 30%;
}
.vine-left::after { left: -2px; }
.vine-right::after { right: -2px; }

.continue-btn {
  position: relative;
  z-index: 3;
  display: inline-block;
  min-width: 280px;
  min-height: 76px;
  padding: 18px 52px;
  border: none;
  border-radius: 18px;
  cursor: pointer;
  font-family: 'Fredoka One', cursive;
  font-size: 32px;
  letter-spacing: 2.5px;
  color: #FFF5D4;
  text-shadow:
    0 2px 0 #4A6B35,
    0 0 12px rgba(255, 230, 140, 0.3);
  background:
    linear-gradient(180deg, #8FBC6B 0%, #6B8E4E 45%, #5A7A42 100%);
  box-shadow:
    0 0 0 3px #4A6B35,
    0 0 0 8px #8B6B3E,
    0 0 14px 2px rgba(107, 142, 78, 0.4),
    0 6px 0 0 #3D5F2E,
    0 8px 16px rgba(40, 60, 25, 0.45);
  animation: continueBob 3s ease-in-out infinite;
  transition:
    transform 0.18s ease,
    box-shadow 0.18s ease,
    background 0.18s ease,
    filter 0.18s ease;
  -webkit-tap-highlight-color: transparent;
  outline: none;
}

.continue-btn::before {
  content: '';
  position: absolute;
  inset: 3px;
  border-radius: 15px;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(168, 212, 140, 0.35) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 80%, rgba(90, 122, 66, 0.25) 0%, transparent 50%);
  pointer-events: none;
  z-index: 1;
}

.continue-btn::after {
  content: '';
  position: absolute;
  top: 4px;
  left: 12px;
  right: 12px;
  height: 28%;
  border-radius: 12px 12px 50% 50%;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.22) 0%, rgba(255, 255, 255, 0.04) 100%);
  pointer-events: none;
  z-index: 2;
}

@keyframes continueBob {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}

.continue-btn:hover {
  background: linear-gradient(180deg, #A3D48C 0%, #7DAF5A 45%, #6B8E4E 100%);
  box-shadow:
    0 0 0 3px #5A8242,
    0 0 0 8px #A07B4A,
    0 0 24px 6px rgba(168, 212, 140, 0.5),
    0 0 40px 10px rgba(255, 230, 140, 0.15),
    0 6px 0 0 #3D5F2E,
    0 8px 20px rgba(40, 60, 25, 0.4);
  animation: continueBobHover 3s ease-in-out infinite;
}
@keyframes continueBobHover {
  0%, 100% { transform: translateY(0) scale(1.06); }
  50% { transform: translateY(-5px) scale(1.06); }
}

.continue-btn:active {
  transform: translateY(4px) scale(1.02) !important;
  box-shadow:
    0 0 0 3px #4A6B35,
    0 0 0 8px #8B6B3E,
    0 0 10px 2px rgba(107, 142, 78, 0.3),
    0 2px 0 0 #3D5F2E,
    0 3px 8px rgba(40, 60, 25, 0.4);
  background: linear-gradient(180deg, #7DAF5A 0%, #5A7A42 45%, #4A6B35 100%);
  animation: none;
  transition: transform 0.06s ease, box-shadow 0.06s ease, background 0.06s ease;
}

.continue-btn:focus-visible {
  box-shadow:
    0 0 0 3px #4A6B35,
    0 0 0 8px #8B6B3E,
    0 0 0 12px rgba(168, 212, 140, 0.6),
    0 0 20px 8px rgba(143, 188, 107, 0.35),
    0 6px 0 0 #3D5F2E,
    0 8px 16px rgba(40, 60, 25, 0.45);
}

.button-wrap:hover .leaf { opacity: 1; }
.button-wrap:hover .leaf-tl { transform: rotate(-25deg) scale(1.15); }
.button-wrap:hover .leaf-tr { transform: rotate(75deg) scaleX(-1) scale(1.15); }
.button-wrap:hover .leaf-bl { transform: rotate(-75deg) scale(1.15); }
.button-wrap:hover .leaf-br { transform: rotate(25deg) scaleX(-1) scale(1.15); }
.button-wrap:hover .leaf-sm { opacity: 1; }

.grass-cluster {
  position: absolute;
  bottom: -14px;
  pointer-events: none;
  z-index: 0;
  display: flex;
  gap: 2px;
  align-items: flex-end;
}
.grass-cluster-left { left: 12px; }
.grass-cluster-right { right: 12px; }
.grass-cluster-center { left: 50%; transform: translateX(-50%); }

.grass-blade {
  width: 4px;
  border-radius: 2px 2px 0 0;
  background: linear-gradient(to top, #5A7A42, #8FBC6B);
}
</style>
</head>
<body>

<div class="meadow-scene" id="meadowScene">
  <div class="sky"></div>
  <div class="sun"></div>
  <div class="light-rays"></div>

  <div class="cloud"></div>
  <div class="cloud"></div>
  <div class="cloud"></div>

  <div class="mountains">
    <div class="mountain mountain-1"></div>
    <div class="mountain mountain-2"></div>
    <div class="mountain mountain-3"></div>
    <div class="mountain mountain-4"></div>
    <div class="mountain mountain-5"></div>
  </div>

  <div class="tree tree-a"><div class="tree-crown"></div><div class="tree-trunk"></div></div>
  <div class="tree tree-b"><div class="tree-crown"></div><div class="tree-trunk"></div></div>
  <div class="tree tree-c"><div class="tree-crown"></div><div class="tree-trunk"></div></div>
  <div class="tree tree-d"><div class="tree-crown"></div><div class="tree-trunk"></div></div>

  <div class="hills">
    <div class="hill hill-2"></div>
    <div class="hill hill-3"></div>
    <div class="hill hill-1"></div>
  </div>

  <div class="ground-flower"></div>
  <div class="ground-flower"></div>
  <div class="ground-flower"></div>
  <div class="ground-flower"></div>

  <div class="meadow-glow">
    <div class="meadow-glow-circle" id="meadowGlow"></div>
  </div>

  <div id="dewdropContainer"></div>

  <div id="butterflyContainer">
    <div class="butterfly" style="top: 25%; left: 20%;"><div class="butterfly-body"><div class="wing-left"></div><div class="wing-right"></div></div></div>
    <div class="butterfly" style="top: 30%; right: 22%;"><div class="butterfly-body"><div class="wing-left"></div><div class="wing-right"></div></div></div>
    <div class="butterfly" style="top: 18%; left: 40%;"><div class="butterfly-body"><div class="wing-left"></div><div class="wing-right"></div></div></div>
    <div class="butterfly" style="top: 35%; right: 38%;"><div class="butterfly-body"><div class="wing-left"></div><div class="wing-right"></div></div></div>
  </div>

  <div id="particleContainer"></div>
  <div class="level-up-flash" id="levelUpFlash"></div>
</div>

<!-- Main content -->
<div class="content">
  <div class="quest-header" id="questHeader">
    <div class="quest-title">
      <span class="vine-deco">~</span>
      Quest Completed!
      <span class="vine-deco">~</span>
    </div>
  </div>

  <div class="level-section" id="levelSection">
    <div class="level-display">
      <span class="level-badge" id="levelOld">Level 1</span>
      <span class="level-arrow" id="levelArrow">&#10140;</span>
      <span class="level-badge level-new" id="levelNew">Level 2</span>
    </div>
    <div class="rank-title" id="rankTitle">Trainee</div>
    <div class="title-promoted" id="titlePromoted">
      <div class="title-promoted-label" id="titlePromotedLabel">Title Promoted!</div>
      <div class="title-transition" id="titleTransition">
        <span class="title-old">Trainee</span>
        <span class="title-arrow">&#10140;</span>
        <span class="title-new">Explorer</span>
      </div>
    </div>
  </div>

  <div class="xp-section" id="xpSection">
    <div class="flower-row" id="flowerRow"></div>
    <div class="xp-bar-container">
      <div class="xp-bar-fill" id="xpBarFill"></div>
    </div>
    <div class="xp-text" id="xpText">0 / 500 XP</div>
  </div>

  <div class="xp-bonus" id="xpBonus">
    <span class="xp-bonus-text" id="xpBonusText">+500 XP</span>
  </div>

  <!-- NATURE-FRAMED CONTINUE BUTTON -->
  <div class="continue-section" id="continueSection">
    <div class="button-wrap">
      <div class="leaf leaf-tl"></div>
      <div class="leaf leaf-tr"></div>
      <div class="leaf leaf-bl"></div>
      <div class="leaf leaf-br"></div>
      <div class="leaf-sm leaf-sm-1"></div>
      <div class="leaf-sm leaf-sm-2"></div>
      <div class="leaf-sm leaf-sm-3"></div>
      <div class="leaf-sm leaf-sm-4"></div>
      <div class="vine vine-left"></div>
      <div class="vine vine-right"></div>
      <div class="grass-cluster grass-cluster-left">
        <div class="grass-blade" style="height:12px; transform:rotate(-12deg);"></div>
        <div class="grass-blade" style="height:16px; transform:rotate(-4deg);"></div>
        <div class="grass-blade" style="height:14px; transform:rotate(6deg);"></div>
        <div class="grass-blade" style="height:10px; transform:rotate(14deg);"></div>
      </div>
      <div class="grass-cluster grass-cluster-center">
        <div class="grass-blade" style="height:10px; transform:rotate(-10deg);"></div>
        <div class="grass-blade" style="height:15px; transform:rotate(-2deg);"></div>
        <div class="grass-blade" style="height:13px; transform:rotate(8deg);"></div>
      </div>
      <div class="grass-cluster grass-cluster-right">
        <div class="grass-blade" style="height:10px; transform:rotate(-14deg);"></div>
        <div class="grass-blade" style="height:14px; transform:rotate(-6deg);"></div>
        <div class="grass-blade" style="height:16px; transform:rotate(4deg);"></div>
        <div class="grass-blade" style="height:12px; transform:rotate(12deg);"></div>
      </div>
      <button class="continue-btn" type="button">CONTINUE</button>
    </div>
  </div>
</div>

<div id="sparkleContainer" style="position:fixed;inset:0;pointer-events:none;z-index:20;"></div>

<script>
(function() {
  // === CREATE DEW DROPS ===
  const dewdropContainer = document.getElementById('dewdropContainer');
  for (let i = 0; i < 18; i++) {
    const d = document.createElement('div');
    d.className = 'dewdrop';
    d.style.left = (10 + Math.random() * 80) + '%';
    d.style.top = (10 + Math.random() * 70) + '%';
    d.style.animationDelay = (Math.random() * 8) + 's, ' + (Math.random() * 3) + 's';
    d.style.animationDuration = (6 + Math.random() * 6) + 's, ' + (2 + Math.random() * 2) + 's';
    dewdropContainer.appendChild(d);
  }

  // === CREATE AMBIENT PARTICLES ===
  const particleContainer = document.getElementById('particleContainer');
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = (10 + Math.random() * 80) + '%';
    p.style.top = (30 + Math.random() * 60) + '%';
    p.style.animationDelay = (Math.random() * 10) + 's';
    p.style.animationDuration = (8 + Math.random() * 8) + 's';
    particleContainer.appendChild(p);
  }

  // === CREATE FLOWERS IN ROW ===
  const flowerRow = document.getElementById('flowerRow');
  const flowerColors = ['peach', 'coral', 'gold', 'cream', 'amber', 'blush', 'peach', 'gold', 'coral', 'cream', 'amber', 'blush'];
  const flowers = [];
  for (let i = 0; i < 12; i++) {
    const f = document.createElement('div');
    f.className = 'bloom-flower ' + flowerColors[i];
    f.innerHTML = '<div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="center"></div>';
    flowerRow.appendChild(f);
    flowers.push(f);
  }

  // === REFS ===
  const meadowScene = document.getElementById('meadowScene');
  const questHeader = document.getElementById('questHeader');
  const levelSection = document.getElementById('levelSection');
  const xpSection = document.getElementById('xpSection');
  const xpBarFill = document.getElementById('xpBarFill');
  const xpText = document.getElementById('xpText');
  const xpBonus = document.getElementById('xpBonus');
  const xpBonusText = document.getElementById('xpBonusText');
  const levelOld = document.getElementById('levelOld');
  const levelArrow = document.getElementById('levelArrow');
  const levelNew = document.getElementById('levelNew');
  const rankTitle = document.getElementById('rankTitle');
  const meadowGlow = document.getElementById('meadowGlow');
  const levelUpFlash = document.getElementById('levelUpFlash');
  const sparkleContainer = document.getElementById('sparkleContainer');
  const butterflies = document.querySelectorAll('.butterfly');
  const titlePromoted = document.getElementById('titlePromoted');
  const titlePromotedLabel = document.getElementById('titlePromotedLabel');
  const titleTransition = document.getElementById('titleTransition');
  const continueSection = document.getElementById('continueSection');

  function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

  function animateXP(from, to, max, duration) {
    return new Promise(resolve => {
      const start = performance.now();
      function tick(now) {
        const t = Math.min((now - start) / duration, 1);
        const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
        const current = Math.round(from + (to - from) * eased);
        const pct = (current / max) * 100;
        xpBarFill.style.width = pct + '%';
        xpText.textContent = current + ' / ' + max + ' XP';
        const flowerIndex = Math.floor((current / max) * flowers.length);
        for (let i = 0; i < flowers.length; i++) {
          if (i <= flowerIndex && current > 0) {
            if (!flowers[i].classList.contains('bloomed')) {
              flowers[i].classList.remove('closed');
              flowers[i].classList.add('bloomed');
            }
          }
        }
        if (t < 1) { requestAnimationFrame(tick); } else { resolve(); }
      }
      requestAnimationFrame(tick);
    });
  }

  function closeFlowers() {
    flowers.forEach(f => { f.classList.remove('bloomed'); f.classList.add('closed'); });
  }

  function spawnSparkles(cx, cy, count) {
    for (let i = 0; i < count; i++) {
      const s = document.createElement('div');
      s.className = 'sparkle';
      const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
      const dist = 40 + Math.random() * 80;
      s.style.left = cx + 'px';
      s.style.top = cy + 'px';
      s.style.setProperty('--sx', Math.cos(angle) * dist + 'px');
      s.style.setProperty('--sy', Math.sin(angle) * dist + 'px');
      s.style.background = ['#ffd060', '#f5c888', '#f0a868', '#f8e8b0', '#ffe88a'][Math.floor(Math.random() * 5)];
      sparkleContainer.appendChild(s);
      requestAnimationFrame(() => s.classList.add('burst'));
      setTimeout(() => s.remove(), 1100);
    }
  }

  function spawnPetals() {
    for (let i = 0; i < 12; i++) {
      const l = document.createElement('div');
      l.className = 'petal-particle';
      l.style.left = (20 + Math.random() * 60) + '%';
      l.style.top = (10 + Math.random() * 30) + '%';
      l.style.setProperty('--lx', (Math.random() - 0.5) * 100 + 'px');
      l.style.animationDelay = (Math.random() * 0.8) + 's';
      const colors = ['#f5c888', '#f0a868', '#f8dca0', '#f5b8a0', '#f0c090'];
      const c = colors[Math.floor(Math.random() * colors.length)];
      l.style.background = 'linear-gradient(135deg, ' + c + ', ' + c + 'cc)';
      sparkleContainer.appendChild(l);
      requestAnimationFrame(() => l.classList.add('falling'));
      setTimeout(() => l.remove(), 4000);
    }
  }

  // === ANIMATION SEQUENCE ===
  async function runSequence() {
    await wait(1000);
    meadowScene.classList.add('visible');
    meadowGlow.classList.add('visible');
    await wait(1200);

    questHeader.classList.add('visible');
    await wait(800);

    levelSection.classList.add('visible');
    await wait(400);
    xpSection.classList.add('visible');
    await wait(600);

    await animateXP(0, 500, 500, 2200);
    xpBarFill.classList.add('maxed');
    await wait(400);

    // LEVEL UP!
    levelUpFlash.classList.add('active');
    meadowGlow.classList.add('bright');
    const rect = levelSection.getBoundingClientRect();
    spawnSparkles(rect.left + rect.width / 2, rect.top + rect.height / 2, 24);
    spawnPetals();
    butterflies.forEach((b, i) => { setTimeout(() => b.classList.add('visible'), i * 150); });
    await wait(300);
    levelUpFlash.classList.remove('active');

    levelOld.classList.add('highlight');
    await wait(300);
    levelArrow.classList.add('visible');
    await wait(300);
    levelNew.classList.add('visible');
    await wait(200);
    levelNew.classList.add('highlight');
    levelOld.classList.remove('highlight');
    await wait(600);

    // TITLE PROMOTED!
    titlePromoted.classList.add('visible');
    titlePromotedLabel.classList.add('shimmer');
    const titleRect = titlePromoted.getBoundingClientRect();
    spawnSparkles(titleRect.left + titleRect.width / 2, titleRect.top + titleRect.height / 2, 16);
    await wait(700);
    titleTransition.classList.add('visible');
    rankTitle.style.opacity = '0';
    rankTitle.style.transition = 'opacity 0.3s ease';
    spawnSparkles(titleRect.left + titleRect.width / 2, titleRect.top + titleRect.height / 2 + 20, 12);
    await wait(1000);

    // XP bar resets
    xpBarFill.classList.remove('maxed');
    closeFlowers();
    xpBarFill.style.width = '0%';
    xpText.textContent = '0 / 600 XP';
    await wait(600);

    await animateXP(0, 300, 600, 1600);
    xpText.textContent = '300 / 600 XP';
    await wait(400);

    // +500 XP
    xpBonus.classList.add('visible');
    await wait(200);
    xpBonusText.classList.add('glow');
    const bonusRect = xpBonusText.getBoundingClientRect();
    spawnSparkles(bonusRect.left + bonusRect.width / 2, bonusRect.top + bonusRect.height / 2, 12);

    // CONTINUE BUTTON appears!
    await wait(800);
    continueSection.classList.add('visible');

    // Sparkles around the button
    await wait(300);
    const btnRect = continueSection.getBoundingClientRect();
    spawnSparkles(btnRect.left + btnRect.width / 2, btnRect.top + btnRect.height / 2, 10);
  }

  runSequence();
})();
</script>
</body>
</html>
