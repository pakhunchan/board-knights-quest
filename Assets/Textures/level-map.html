    <!-- Sky gradient - soft teal-mint -->

      <stop offset="0%" stop-color="#b5d8c0"/>
      <stop offset="60%" stop-color="#bfdfc8"/>
      <stop offset="100%" stop-color="#c8e6cf"/>

      <stop offset="0%" stop-color="#c9a96e"/>
      <stop offset="100%" stop-color="#b89458"/>

      <stop offset="0%" stop-color="#d4cfc0"/>
      <stop offset="60%" stop-color="#b8b3a4"/>
      <stop offset="100%" stop-color="#9a9588"/>

      <stop offset="40%" stop-color="#e8d498"/>

      <stop offset="60%" stop-color="#706c68"/>
      <stop offset="100%" stop-color="#5a5854"/>

      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#ffd966" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle shadow for nodes -->
    <filter id="nodeShadow" x="-20%" y="-10%" width="140%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.25"/>
    </filter>

    <!-- Bush shadow -->

      <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#000" flood-opacity="0.15"/>
    </filter>

    <!-- Subtle inner bevel for stones -->
    <filter id="bevel" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feSpecularLighting in="blur" surfaceScale="3" specularConstant="0.6" specularExponent="15" lighting-color="#fff" result="spec">
        <fePointLight x="-30" y="-30" z="60"/>
      </feSpecularLighting>
      <feComposite in="spec" in2="SourceAlpha" operator="in" result="specIn"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode in="specIn"/>
      </feMerge>
    </filter>

<script>
// FIX 1: Move all level nodes to exact positions on the path centerline
(function() {
  var path = document.getElementById('mainPath');
  var nodes = document.querySelectorAll('.level-node');
  var totalLength = path.getTotalLength();

  // We want to skip a small margin at start/end so nodes aren't off-screen
  // Place 10 nodes evenly from ~5% to ~95% of the path length
  var startFrac = 0.05;
  var endFrac = 0.95;

  for (var i = 0; i < nodes.length; i++) {
    var frac = startFrac + (endFrac - startFrac) * (i / (nodes.length - 1));
    var pt = path.getPointAtLength(frac * totalLength);
    nodes[i].setAttribute('transform', 'translate(' + pt.x.toFixed(1) + ', ' + pt.y.toFixed(1) + ')');
  }

  // Override level 9 (index 8): find closest point on path to the castle door at x=1680
  var bestDist = Infinity, bestPt = null;
  for (var l = 0; l <= totalLength; l += 1) {
    var p = path.getPointAtLength(l);
    var dx = p.x - 1680;
    var dist = Math.abs(dx);
    if (dist < bestDist) { bestDist = dist; bestPt = p; }
  }
  if (bestPt) {
    nodes[8].setAttribute('transform', 'translate(' + bestPt.x.toFixed(1) + ', ' + bestPt.y.toFixed(1) + ')');
  }
})();
</script>
