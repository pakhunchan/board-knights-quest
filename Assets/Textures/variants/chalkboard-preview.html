<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; }
  body { background: #222; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; color: #aaa; }
  .stage { position: relative; width: 1920px; height: 1080px; transform-origin: top center; }
  .stage img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; transition: none; }
  .controls { margin-top: 20px; display: flex; gap: 12px; align-items: center; }
  button { padding: 8px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 6px; background: #4a7; color: #fff; }
  button:hover { background: #5b8; }
  .label { font-size: 14px; }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <img src="chalkboard-layers/layer-0-background.png?v=2" data-layer="0">
    <img src="chalkboard-layers/layer-1-frame.png?v=2" data-layer="1">
    <img src="chalkboard-layers/layer-2-board.png?v=2" data-layer="2">
    <img src="chalkboard-layers/layer-3-tray.png?v=2" data-layer="3">
    <img src="chalkboard-layers/layer-4-border.png?v=2" data-layer="4">
  </div>
  <div class="controls">
    <button onclick="play()">Play Animation</button>
    <button onclick="reset()">Reset</button>
    <span class="label" id="status">Ready</span>
  </div>
<script>
  const layers = document.querySelectorAll('.stage img');
  const status = document.getElementById('status');
  const FADE_MS = 800;
  const DELAY_MS = 500;

  // Scale stage to fit viewport
  function fitStage() {
    const stage = document.getElementById('stage');
    const scale = Math.min(window.innerWidth / 1920, (window.innerHeight - 60) / 1080);
    stage.style.transform = `scale(${scale})`;
    stage.style.marginTop = `-${(1080 - 1080 * scale) / 2}px`;
  }
  fitStage();
  window.addEventListener('resize', fitStage);

  function reset() {
    layers.forEach(img => {
      img.style.transition = 'none';
      img.style.opacity = 0;
    });
    status.textContent = 'Ready';
  }

  function play() {
    reset();
    // Small delay to ensure reset takes effect
    requestAnimationFrame(() => requestAnimationFrame(() => {
      layers.forEach((img, i) => {
        const start = i * (FADE_MS + DELAY_MS);
        setTimeout(() => {
          img.style.transition = `opacity ${FADE_MS}ms ease-in-out`;
          img.style.opacity = 1;
          status.textContent = `Layer ${i}: ${img.src.split('/').pop()}`;
        }, start);
      });
      const total = layers.length * (FADE_MS + DELAY_MS);
      setTimeout(() => { status.textContent = 'Complete'; }, total);
    }));
  }
</script>
</body>
</html>
