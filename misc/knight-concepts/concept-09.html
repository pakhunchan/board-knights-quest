<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concept 09 - Chibi Knight</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1a1a1a;
  }
  .preview {
    background: #2a2a2a;
    border-radius: 20px;
    padding: 40px 60px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .knight {
    animation: bounce 1.5s ease-in-out infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .head-group {
    animation: headTilt 4s ease-in-out infinite;
    transform-origin: 150px 200px;
  }
  @keyframes headTilt {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(2.5deg); }
    75% { transform: rotate(-2.5deg); }
  }
  .eye-left, .eye-right {
    animation: blink 3s ease-in-out infinite;
  }
  .eye-left {
    transform-origin: 127px 185px;
  }
  .eye-right {
    transform-origin: 173px 185px;
  }
  @keyframes blink {
    0%, 90%, 100% { transform: scaleY(1); }
    95% { transform: scaleY(0.1); }
  }
  .sword-group {
    animation: swordSparkle 2s ease-in-out infinite;
    transform-origin: 215px 220px;
  }
  @keyframes swordSparkle {
    0%, 100% { transform: rotate(0deg) scale(1); }
    50% { transform: rotate(5deg) scale(1.05); }
  }
  .sparkle1 {
    animation: sparkleFlash 2s ease-in-out infinite;
  }
  .sparkle2 {
    animation: sparkleFlash 2s ease-in-out infinite 0.5s;
  }
  .sparkle3 {
    animation: sparkleFlash 2s ease-in-out infinite 1s;
  }
  @keyframes sparkleFlash {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>
<div class="preview">
<svg class="knight" viewBox="0 0 300 400" width="300" height="400" xmlns="http://www.w3.org/2000/svg">

  <!-- === BOOTS === -->
  <ellipse cx="128" cy="388" rx="18" ry="12" fill="#6B5F56"/>
  <ellipse cx="172" cy="388" rx="18" ry="12" fill="#6B5F56"/>

  <!-- === LEGS === -->
  <rect x="120" y="360" width="20" height="30" rx="10" fill="#8B8178"/>
  <rect x="160" y="360" width="20" height="30" rx="10" fill="#8B8178"/>

  <!-- === TORSO (tiny round body) === -->
  <ellipse cx="150" cy="335" rx="40" ry="35" fill="#A09890"/>
  <!-- Green front panel -->
  <ellipse cx="150" cy="338" rx="26" ry="24" fill="#7B9E6B"/>
  <!-- Belt -->
  <rect x="112" y="348" width="76" height="8" rx="4" fill="#6B5F56"/>
  <ellipse cx="150" cy="352" rx="6" ry="5" fill="#C4A44A"/>

  <!-- === LEFT ARM === -->
  <ellipse cx="105" cy="330" rx="14" ry="18" fill="#A09890"/>
  <!-- Left hand -->
  <circle cx="100" cy="345" r="9" fill="#D4A574"/>

  <!-- === RIGHT ARM (holding sword up) === -->
  <ellipse cx="195" cy="315" rx="14" ry="18" fill="#A09890" transform="rotate(-20, 195, 315)"/>
  <!-- Right hand -->
  <circle cx="205" cy="300" r="9" fill="#D4A574"/>

  <!-- === SWORD GROUP === -->
  <g class="sword-group">
    <!-- Sword handle -->
    <rect x="200" y="275" width="8" height="28" rx="3" fill="#6B5F56"/>
    <!-- Sword crossguard -->
    <rect x="194" y="272" width="20" height="6" rx="3" fill="#8B8178"/>
    <!-- Sword blade -->
    <polygon points="204,272 196,222 204,210 212,222" fill="#C4A44A"/>
    <!-- Blade highlight -->
    <polygon points="204,268 200,232 204,218 206,232" fill="#D4C86A" opacity="0.5"/>
    <!-- Blade tip highlight -->
    <circle cx="204" cy="215" r="3" fill="#EDE4A0" opacity="0.6"/>

    <!-- Sparkles -->
    <polygon class="sparkle1" points="188,220 190,215 192,220 190,225" fill="#EDE4A0"/>
    <polygon class="sparkle2" points="218,235 220,230 222,235 220,240" fill="#EDE4A0"/>
    <polygon class="sparkle3" points="195,245 197,241 199,245 197,249" fill="#EDE4A0"/>
  </g>

  <!-- === HEAD GROUP (huge! 60% of character) === -->
  <g class="head-group">

    <!-- Helmet base (big round) -->
    <ellipse cx="150" cy="175" rx="72" ry="78" fill="#A09890"/>

    <!-- Helmet front brim -->
    <ellipse cx="150" cy="210" rx="68" ry="22" fill="#8B8178"/>

    <!-- Face area -->
    <ellipse cx="150" cy="195" rx="52" ry="42" fill="#D4A574"/>

    <!-- Helmet top ridge -->
    <ellipse cx="150" cy="115" rx="15" ry="10" fill="#8B8178"/>

    <!-- Plume -->
    <ellipse cx="150" cy="95" rx="12" ry="22" fill="#7B9E6B"/>
    <ellipse cx="150" cy="82" rx="8" ry="14" fill="#5A7A4A"/>

    <!-- Rosy cheeks -->
    <circle cx="118" cy="200" r="12" fill="#D4918B" opacity="0.6"/>
    <circle cx="182" cy="200" r="12" fill="#D4918B" opacity="0.6"/>

    <!-- === EYES (huge sparkly!) === -->
    <!-- Left eye -->
    <g class="eye-left">
      <ellipse cx="127" cy="185" rx="16" ry="18" fill="#3A3020"/>
      <!-- Iris -->
      <ellipse cx="127" cy="186" rx="13" ry="15" fill="#5A7A4A"/>
      <!-- Pupil -->
      <ellipse cx="127" cy="188" rx="8" ry="10" fill="#2A2520"/>
      <!-- Big sparkle -->
      <circle cx="121" cy="180" r="5" fill="white"/>
      <!-- Small sparkle -->
      <circle cx="132" cy="190" r="3" fill="white" opacity="0.7"/>
      <!-- Tiny sparkle -->
      <circle cx="124" cy="192" r="1.5" fill="white" opacity="0.5"/>
    </g>

    <!-- Right eye -->
    <g class="eye-right">
      <ellipse cx="173" cy="185" rx="16" ry="18" fill="#3A3020"/>
      <!-- Iris -->
      <ellipse cx="173" cy="186" rx="13" ry="15" fill="#5A7A4A"/>
      <!-- Pupil -->
      <ellipse cx="173" cy="188" rx="8" ry="10" fill="#2A2520"/>
      <!-- Big sparkle -->
      <circle cx="167" cy="180" r="5" fill="white"/>
      <!-- Small sparkle -->
      <circle cx="178" cy="190" r="3" fill="white" opacity="0.7"/>
      <!-- Tiny sparkle -->
      <circle cx="170" cy="192" r="1.5" fill="white" opacity="0.5"/>
    </g>

    <!-- Tiny nose -->
    <ellipse cx="150" cy="200" rx="3" ry="2.5" fill="#C4946A"/>

    <!-- Big happy open mouth smile -->
    <ellipse cx="150" cy="212" rx="14" ry="10" fill="#8B4535"/>
    <!-- Tongue -->
    <ellipse cx="150" cy="217" rx="8" ry="6" fill="#C46B5B"/>
    <!-- Mouth top (teeth hint) -->
    <ellipse cx="150" cy="208" rx="10" ry="3" fill="#F0E8E0" opacity="0.7"/>

    <!-- Eyebrows (happy angled) -->
    <ellipse cx="127" cy="166" rx="12" ry="3.5" fill="#6B5F56" transform="rotate(-5, 127, 166)"/>
    <ellipse cx="173" cy="166" rx="12" ry="3.5" fill="#6B5F56" transform="rotate(5, 173, 166)"/>

    <!-- Helmet ear guards -->
    <ellipse cx="85" cy="185" rx="12" ry="18" fill="#A09890"/>
    <ellipse cx="215" cy="185" rx="12" ry="18" fill="#A09890"/>

  </g>

</svg>
</div>
</body>
</html>
