<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wise Elder Knight — Character Concept 06</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #2a2a2a;
    font-family: sans-serif;
  }
  .preview {
    padding: 40px;
    text-align: center;
  }
  .preview h2 {
    color: #aaa;
    font-weight: 300;
    margin-bottom: 20px;
    letter-spacing: 1px;
  }

  /* --- Animations --- */
  @keyframes breathe {
    0%, 100% { transform: scaleY(1); }
    50% { transform: scaleY(1.015); }
  }
  @keyframes blink {
    0%, 88%, 92%, 100% { transform: scaleY(1); }
    90% { transform: scaleY(0.08); }
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-2px); }
  }
  @keyframes beardSway {
    0%, 100% { transform: skewX(0deg); }
    50% { transform: skewX(1.2deg); }
  }
</style>
</head>
<body>
<div class="preview">
  <h2>Concept 06 — The Wise Elder Knight</h2>

  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">

    <!-- Whole character bobs gently -->
    <g style="transform-origin: 150px 380px; animation: bob 3s ease-in-out infinite;">

      <!-- === SHADOW === -->
      <ellipse cx="150" cy="385" rx="55" ry="7" fill="#000" opacity="0.1"/>

      <!-- === STAFF (behind body) === -->
      <!-- Staff shaft -->
      <rect x="196" y="52" width="9" height="320" rx="4.5" fill="#8B6914"/>
      <!-- Staff wood grain -->
      <rect x="198" y="60" width="3" height="300" rx="1.5" fill="#9E7B1E" opacity="0.35"/>
      <!-- Staff top knob -->
      <ellipse cx="200.5" cy="52" rx="8" ry="8" fill="#8B6914"/>
      <ellipse cx="200.5" cy="50" rx="6" ry="6" fill="#9E7B1E" opacity="0.4"/>
      <!-- Staff bottom tip -->
      <ellipse cx="200.5" cy="372" rx="5" ry="3" fill="#6B5210"/>

      <!-- === BOOTS === -->
      <!-- Left boot -->
      <path d="M112,355 Q109,360 104,366 Q102,372 105,375 Q112,378 124,377 Q130,375 131,370 Q131,362 128,355 Z"
            fill="#5A4A3A"/>
      <!-- Right boot -->
      <path d="M156,355 Q154,360 150,366 Q148,372 151,375 Q158,378 170,377 Q176,375 177,370 Q176,362 173,355 Z"
            fill="#5A4A3A"/>
      <!-- Boot cuffs -->
      <ellipse cx="120" cy="355" rx="12" ry="5" fill="#4A3C2E"/>
      <ellipse cx="164" cy="355" rx="12" ry="5" fill="#4A3C2E"/>

      <!-- === LEGS === -->
      <!-- Left leg -->
      <path d="M114,295 Q112,315 113,335 Q114,350 120,357 Q128,353 129,335 Q130,315 128,295 Z"
            fill="#8B8178"/>
      <!-- Right leg -->
      <path d="M156,295 Q154,315 155,335 Q156,350 164,357 Q172,353 173,335 Q173,315 170,295 Z"
            fill="#8B8178"/>
      <!-- Knee guards -->
      <ellipse cx="121" cy="325" rx="8" ry="4" fill="#9E9890" opacity="0.35"/>
      <ellipse cx="163" cy="325" rx="8" ry="4" fill="#9E9890" opacity="0.35"/>

      <!-- === TORSO GROUP (breathing) === -->
      <g style="transform-origin: 143px 240px; animation: breathe 4s ease-in-out infinite;">

        <!-- Green robe/tabard (behind armor) -->
        <path d="M100,170 Q93,210 96,260 Q100,290 105,300 Q120,308 143,310 Q166,308 180,300
                 Q185,290 188,260 Q192,210 185,170 Z"
              fill="#7B9E6B"/>
        <!-- Robe side shading -->
        <path d="M100,175 Q95,215 98,265 Q100,285 103,298 Q99,270 100,230 Q102,195 102,175 Z"
              fill="#5A7A4A" opacity="0.5"/>
        <path d="M185,175 Q190,215 187,265 Q185,285 182,298 Q186,270 185,230 Q183,195 183,175 Z"
              fill="#5A7A4A" opacity="0.5"/>

        <!-- Aged plate armor vest over robe -->
        <path d="M110,172 Q107,200 110,240 Q113,270 118,285 Q130,290 143,290 Q156,290 168,285
                 Q173,270 176,240 Q179,200 175,172 Z"
              fill="#A09890" opacity="0.6"/>

        <!-- Robe center seam -->
        <rect x="141" y="180" width="3" height="110" rx="1.5" fill="#5A7A4A" opacity="0.4"/>

        <!-- Belt -->
        <rect x="104" y="275" width="78" height="12" rx="4" fill="#6B5F56"/>
        <!-- Belt buckle -->
        <rect x="135" y="276" width="14" height="10" rx="2" fill="#C4A44A"/>
        <rect x="138" y="278" width="8" height="6" rx="1" fill="#6B5F56"/>

        <!-- Book pouch on belt -->
        <rect x="110" y="274" width="18" height="16" rx="3" fill="#5A4A3A"/>
        <rect x="112" y="276" width="14" height="11" rx="2" fill="#6B5A48"/>
        <!-- Book pages hint -->
        <rect x="113" y="278" width="2" height="7" rx="1" fill="#E8E0D8" opacity="0.5"/>

        <!-- === LEFT ARM (on staff side) === -->
        <g>
          <!-- Upper arm -->
          <path d="M175,178 Q185,195 190,215 Q193,230 190,242 Q183,238 182,222 Q180,205 178,190 Z"
                fill="#7B9E6B"/>
          <!-- Forearm reaching to staff -->
          <path d="M190,238 Q195,245 198,255 Q200,262 198,268 Q193,265 192,258 Q190,248 190,240 Z"
                fill="#A09890"/>
          <!-- Hand on staff -->
          <ellipse cx="198" cy="268" rx="7" ry="6" fill="#D4A574"/>
          <!-- Fingers wrapped -->
          <path d="M193,264 Q191,268 193,272 Q195,270 193,266 Z" fill="#C49564" opacity="0.6"/>
          <!-- Shoulder -->
          <ellipse cx="178" cy="180" rx="10" ry="7" fill="#8B8178"/>
        </g>

        <!-- === RIGHT ARM (resting on staff) === -->
        <g>
          <!-- Upper arm -->
          <path d="M110,178 Q100,195 96,215 Q94,230 97,242 Q104,238 105,222 Q107,205 109,190 Z"
                fill="#7B9E6B"/>
          <!-- Forearm -->
          <path d="M97,238 Q92,248 90,258 Q89,265 92,268 Q97,265 98,258 Q99,248 98,240 Z"
                fill="#A09890"/>
          <!-- Hand (relaxed at side) -->
          <ellipse cx="91" cy="268" rx="6" ry="5.5" fill="#D4A574"/>
          <!-- Shoulder -->
          <ellipse cx="110" cy="180" rx="10" ry="7" fill="#8B8178"/>
        </g>

        <!-- Robe bottom fringe -->
        <path d="M105,298 Q115,305 143,308 Q170,305 180,298 Q175,310 143,315 Q110,310 105,298 Z"
              fill="#5A7A4A" opacity="0.5"/>

      </g><!-- end torso group -->

      <!-- === HEAD === -->
      <g>
        <!-- Neck -->
        <rect x="134" y="145" width="18" height="18" rx="6" fill="#D4A574"/>

        <!-- Hood / simple open-face helmet -->
        <path d="M113,108 Q110,125 113,145 Q116,155 126,162 Q140,168 160,162 Q170,155 173,145
                 Q176,125 173,108 Q166,88 143,82 Q120,88 113,108 Z"
              fill="#8B8178"/>
        <!-- Hood shading -->
        <path d="M113,108 Q112,125 115,145 Q116,150 120,156 Q114,145 114,130 Q114,115 115,108 Z"
              fill="#6B5F56" opacity="0.4"/>

        <!-- Face -->
        <ellipse cx="143" cy="124" rx="24" ry="27" fill="#D4A574"/>

        <!-- Wrinkle lines on forehead -->
        <path d="M130,106 Q138,104 155,106" fill="none" stroke="#C49564" stroke-width="0.8" opacity="0.35"/>
        <path d="M132,110 Q140,108 153,110" fill="none" stroke="#C49564" stroke-width="0.7" opacity="0.3"/>

        <!-- Crow's feet wrinkles -->
        <path d="M122,118 Q119,116 117,114" fill="none" stroke="#C49564" stroke-width="0.7" opacity="0.3"/>
        <path d="M122,120 Q119,120 117,118" fill="none" stroke="#C49564" stroke-width="0.7" opacity="0.3"/>
        <path d="M164,118 Q167,116 169,114" fill="none" stroke="#C49564" stroke-width="0.7" opacity="0.3"/>
        <path d="M164,120 Q167,120 169,118" fill="none" stroke="#C49564" stroke-width="0.7" opacity="0.3"/>

        <!-- Spectacles / glasses -->
        <!-- Left lens -->
        <circle cx="134" cy="119" r="10" fill="none" stroke="#C4A44A" stroke-width="1.8"/>
        <!-- Right lens -->
        <circle cx="154" cy="119" r="10" fill="none" stroke="#C4A44A" stroke-width="1.8"/>
        <!-- Bridge -->
        <path d="M144,119 Q146,117 148,119" fill="none" stroke="#C4A44A" stroke-width="1.5"/>
        <!-- Ear pieces -->
        <path d="M124,118 Q120,116 118,120" fill="none" stroke="#C4A44A" stroke-width="1.2"/>
        <path d="M164,118 Q168,116 170,120" fill="none" stroke="#C4A44A" stroke-width="1.2"/>
        <!-- Lens glare -->
        <ellipse cx="130" cy="116" rx="3" ry="2" fill="white" opacity="0.12"/>
        <ellipse cx="150" cy="116" rx="3" ry="2" fill="white" opacity="0.12"/>

        <!-- Eyes group (blinking - slower for elder) -->
        <g style="transform-origin: 143px 119px; animation: blink 5s ease-in-out infinite;">
          <!-- Left eye - squinting/kind -->
          <ellipse cx="134" cy="119" rx="5" ry="3.5" fill="white"/>
          <ellipse cx="135" cy="119" rx="3" ry="3" fill="#5B7A5A"/>
          <circle cx="136" cy="119" r="1.5" fill="#2D3A2D"/>
          <circle cx="137" cy="117.5" r="0.8" fill="white" opacity="0.7"/>
          <!-- Upper eyelid (makes eyes look squinty/wise) -->
          <path d="M129,116 Q134,113 139,116" fill="#D4A574" opacity="0.5"/>

          <!-- Right eye - squinting/kind -->
          <ellipse cx="154" cy="119" rx="5" ry="3.5" fill="white"/>
          <ellipse cx="155" cy="119" rx="3" ry="3" fill="#5B7A5A"/>
          <circle cx="156" cy="119" r="1.5" fill="#2D3A2D"/>
          <circle cx="157" cy="117.5" r="0.8" fill="white" opacity="0.7"/>
          <!-- Upper eyelid -->
          <path d="M149,116 Q154,113 159,116" fill="#D4A574" opacity="0.5"/>
        </g>

        <!-- Bushy elder eyebrows -->
        <path d="M125,112 Q130,108 140,111" fill="#D0C8C0" opacity="0.7"/>
        <path d="M148,111 Q158,108 163,112" fill="#D0C8C0" opacity="0.7"/>

        <!-- Nose (larger, elder) -->
        <ellipse cx="143" cy="129" rx="4" ry="3.5" fill="#C49564" opacity="0.45"/>
        <ellipse cx="141" cy="130" rx="2" ry="1.5" fill="#C49564" opacity="0.25"/>

        <!-- Gentle smile -->
        <path d="M133,138 Q143,144 153,138" fill="#C49564" opacity="0.5"/>
        <!-- Smile lines -->
        <path d="M128,136 Q130,140 133,138" fill="none" stroke="#C49564" stroke-width="0.7" opacity="0.3"/>
        <path d="M158,136 Q156,140 153,138" fill="none" stroke="#C49564" stroke-width="0.7" opacity="0.3"/>

        <!-- === BEARD (with sway animation) === -->
        <g style="transform-origin: 143px 145px; animation: beardSway 4.5s ease-in-out infinite;">
          <!-- Main beard mass -->
          <path d="M120,135 Q118,145 116,160 Q114,180 118,200 Q122,215 133,225
                   Q143,230 153,225 Q164,215 168,200 Q172,180 170,160 Q168,145 166,135
                   Q160,142 143,144 Q126,142 120,135 Z"
                fill="#E8E0D8"/>
          <!-- Beard shading/volume -->
          <path d="M122,140 Q120,155 119,175 Q118,195 122,210 Q126,218 133,222
                   Q128,210 126,190 Q124,170 124,150 Q124,142 122,140 Z"
                fill="#D8D0C8" opacity="0.5"/>
          <path d="M164,140 Q166,155 167,175 Q168,195 164,210 Q160,218 153,222
                   Q158,210 160,190 Q162,170 162,150 Q162,142 164,140 Z"
                fill="#D8D0C8" opacity="0.5"/>
          <!-- Beard wave lines (texture) -->
          <path d="M128,165 Q135,162 143,164 Q151,162 158,165" fill="none" stroke="#D0C8C0" stroke-width="1" opacity="0.3"/>
          <path d="M126,185 Q135,182 143,184 Q151,182 160,185" fill="none" stroke="#D0C8C0" stroke-width="1" opacity="0.3"/>
          <path d="M130,205 Q138,202 143,204 Q148,202 156,205" fill="none" stroke="#D0C8C0" stroke-width="1" opacity="0.25"/>
          <!-- Beard tip -->
          <path d="M138,222 Q143,232 148,222" fill="#E8E0D8"/>
        </g>

        <!-- Mustache (over beard, under nose) -->
        <path d="M130,134 Q136,130 143,132 Q150,130 156,134 Q152,138 143,140 Q134,138 130,134 Z"
              fill="#E8E0D8"/>
        <!-- Mustache shadow -->
        <path d="M134,135 Q139,133 143,134 Q147,133 152,135 Q148,137 143,138 Q138,137 134,135 Z"
              fill="#D8D0C8" opacity="0.4"/>

        <!-- Hood edge framing face -->
        <path d="M120,102 Q117,118 120,140 Q122,150 128,158"
              fill="none" stroke="#6B5F56" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
        <path d="M166,102 Q169,118 166,140 Q164,150 158,158"
              fill="none" stroke="#6B5F56" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>

      </g><!-- end head -->

    </g><!-- end bob group -->

  </svg>
</div>
</body>
</html>
