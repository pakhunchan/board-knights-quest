<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concept 04 - Viking Knight</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1a1a1a;
    font-family: sans-serif;
  }
  .preview {
    background: #2a2a2a;
    border-radius: 16px;
    padding: 40px 60px 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .preview h2 {
    color: #888;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin: 0;
  }

  /* Animations */
  @keyframes breathe {
    0%, 100% { transform: scaleY(1); }
    50% { transform: scaleY(1.02); }
  }
  @keyframes blink {
    0%, 90%, 100% { transform: scaleY(1); }
    95% { transform: scaleY(0.1); }
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }
  @keyframes braidSwayLeft {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(3deg); }
  }
  @keyframes braidSwayRight {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(-3deg); }
  }

  .knight-bob {
    animation: bob 2.5s ease-in-out infinite;
  }
  .torso-breathe {
    animation: breathe 3s ease-in-out infinite;
    transform-origin: 150px 240px;
  }
  .eye-blink {
    animation: blink 4s ease-in-out infinite;
  }
  .eye-blink-delay {
    animation: blink 4s ease-in-out infinite;
    animation-delay: 0.05s;
  }
  .braid-left {
    animation: braidSwayLeft 3s ease-in-out infinite;
    transform-origin: 100px 145px;
  }
  .braid-right {
    animation: braidSwayRight 3s ease-in-out infinite;
    transform-origin: 200px 145px;
  }
</style>
</head>
<body>
<div class="preview">
  <svg viewBox="0 0 300 400" width="300" height="400" xmlns="http://www.w3.org/2000/svg">
    <g class="knight-bob">

      <!-- === BOOTS === -->
      <!-- Left boot -->
      <rect x="100" y="360" width="40" height="30" rx="6" fill="#5A4A3A"/>
      <!-- Left boot fur trim -->
      <ellipse cx="120" cy="358" rx="24" ry="6" fill="#C4A44A"/>
      <!-- Right boot -->
      <rect x="160" y="360" width="40" height="30" rx="6" fill="#5A4A3A"/>
      <!-- Right boot fur trim -->
      <ellipse cx="180" cy="358" rx="24" ry="6" fill="#C4A44A"/>
      <!-- Boot toe caps -->
      <ellipse cx="112" cy="388" rx="14" ry="5" fill="#4A3A2A"/>
      <ellipse cx="188" cy="388" rx="14" ry="5" fill="#4A3A2A"/>

      <!-- === LEGS === -->
      <!-- Left leg -->
      <rect x="105" y="310" width="35" height="52" rx="8" fill="#8B8178"/>
      <!-- Right leg -->
      <rect x="160" y="310" width="35" height="52" rx="8" fill="#8B8178"/>
      <!-- Knee guards -->
      <ellipse cx="122" cy="330" rx="12" ry="8" fill="#7B7168"/>
      <ellipse cx="178" cy="330" rx="12" ry="8" fill="#7B7168"/>

      <!-- === TORSO GROUP (breathe) === -->
      <g class="torso-breathe">
        <!-- Belt -->
        <rect x="95" y="295" width="110" height="20" rx="4" fill="#5A4A3A"/>
        <!-- Belt buckle -->
        <rect x="140" y="297" width="20" height="16" rx="3" fill="#C4A44A"/>

        <!-- Green tunic base (visible at bottom) -->
        <rect x="100" y="210" width="100" height="95" rx="12" fill="#7B9E6B"/>

        <!-- Plate armor chest -->
        <path d="M105 210 Q150 195 195 210 L190 275 Q150 285 110 275 Z" fill="#A09890"/>
        <!-- Armor highlight -->
        <path d="M120 215 Q150 205 180 215 L177 250 Q150 258 123 250 Z" fill="#B0A8A0"/>

        <!-- Fur trim along armor edges -->
        <ellipse cx="108" cy="240" rx="10" ry="30" fill="#C4A44A" opacity="0.8"/>
        <ellipse cx="192" cy="240" rx="10" ry="30" fill="#C4A44A" opacity="0.8"/>
        <!-- Bottom fur trim -->
        <ellipse cx="150" cy="278" rx="45" ry="8" fill="#C4A44A" opacity="0.7"/>

        <!-- === ARMS (crossed over chest) === -->
        <!-- Left arm (goes from left shoulder across to right) -->
        <path d="M95 215 Q85 230 88 260 Q100 275 150 265 L155 250 Q110 255 100 240 Q95 225 100 215 Z" fill="#8B8178"/>
        <!-- Right arm (goes from right shoulder across to left) -->
        <path d="M205 215 Q215 230 212 260 Q200 275 150 265 L145 250 Q190 255 200 240 Q205 225 200 215 Z" fill="#8B8178"/>

        <!-- Gauntlet left (resting on right side) -->
        <ellipse cx="155" cy="260" rx="18" ry="10" fill="#6B5F56"/>
        <!-- Gauntlet right (resting on left side) -->
        <ellipse cx="145" cy="253" rx="18" ry="10" fill="#6B5F56"/>
        <!-- Gauntlet fingers -->
        <ellipse cx="168" cy="258" rx="6" ry="7" fill="#5A4A3A"/>
        <ellipse cx="130" cy="250" rx="6" ry="7" fill="#5A4A3A"/>

        <!-- Shoulder pauldrons -->
        <ellipse cx="98" cy="212" rx="18" ry="14" fill="#7B7168"/>
        <ellipse cx="202" cy="212" rx="18" ry="14" fill="#7B7168"/>

        <!-- === FUR COLLAR === -->
        <ellipse cx="150" cy="198" rx="52" ry="18" fill="#C4A44A"/>
        <ellipse cx="150" cy="195" rx="46" ry="14" fill="#D4B45A"/>
        <ellipse cx="135" cy="196" rx="12" ry="10" fill="#C4A44A"/>
        <ellipse cx="165" cy="196" rx="12" ry="10" fill="#C4A44A"/>
        <ellipse cx="150" cy="193" rx="15" ry="9" fill="#D4B45A"/>
      </g>

      <!-- === BRAIDS === -->
      <!-- Left braid -->
      <g class="braid-left">
        <rect x="88" y="145" width="14" height="60" rx="7" fill="#C4A44A"/>
        <rect x="86" y="150" width="14" height="12" rx="5" fill="#B89430"/>
        <rect x="86" y="168" width="14" height="12" rx="5" fill="#B89430"/>
        <rect x="86" y="186" width="14" height="12" rx="5" fill="#B89430"/>
        <!-- Braid tie -->
        <ellipse cx="95" cy="205" rx="8" ry="5" fill="#5A4A3A"/>
      </g>
      <!-- Right braid -->
      <g class="braid-right">
        <rect x="198" y="145" width="14" height="60" rx="7" fill="#C4A44A"/>
        <rect x="200" y="150" width="14" height="12" rx="5" fill="#B89430"/>
        <rect x="200" y="168" width="14" height="12" rx="5" fill="#B89430"/>
        <rect x="200" y="186" width="14" height="12" rx="5" fill="#B89430"/>
        <!-- Braid tie -->
        <ellipse cx="205" cy="205" rx="8" ry="5" fill="#5A4A3A"/>
      </g>

      <!-- === HEAD === -->
      <!-- Hair behind head -->
      <ellipse cx="150" cy="135" rx="42" ry="38" fill="#C4A44A"/>

      <!-- Head/face -->
      <ellipse cx="150" cy="140" rx="38" ry="36" fill="#D4A574"/>

      <!-- Rosy cheeks -->
      <ellipse cx="125" cy="150" rx="10" ry="7" fill="#D4857A" opacity="0.45"/>
      <ellipse cx="175" cy="150" rx="10" ry="7" fill="#D4857A" opacity="0.45"/>

      <!-- Eyes -->
      <g class="eye-blink" style="transform-origin: 135px 138px;">
        <ellipse cx="135" cy="138" rx="5.5" ry="6" fill="#6B7F8A"/>
        <ellipse cx="136" cy="136" rx="2" ry="2" fill="#fff" opacity="0.6"/>
      </g>
      <g class="eye-blink-delay" style="transform-origin: 165px 138px;">
        <ellipse cx="165" cy="138" rx="5.5" ry="6" fill="#6B7F8A"/>
        <ellipse cx="166" cy="136" rx="2" ry="2" fill="#fff" opacity="0.6"/>
      </g>

      <!-- Nose -->
      <ellipse cx="150" cy="148" rx="4" ry="3" fill="#C49564"/>

      <!-- Wide friendly grin -->
      <path d="M134 157 Q150 170 166 157" fill="#8B5E3C"/>
      <path d="M136 157 Q150 167 164 157" fill="#F0D0B0"/>

      <!-- Eyebrows (bushy) -->
      <ellipse cx="135" cy="128" rx="10" ry="3" fill="#B89430"/>
      <ellipse cx="165" cy="128" rx="10" ry="3" fill="#B89430"/>

      <!-- === HELMET === -->
      <!-- Helmet dome -->
      <path d="M108 130 Q110 85 150 78 Q190 85 192 130 Q175 122 150 120 Q125 122 108 130 Z" fill="#6B5F56"/>
      <!-- Helmet band -->
      <rect x="108" y="120" width="84" height="12" rx="3" fill="#5A4A3A"/>
      <!-- Helmet nose guard -->
      <rect x="146" y="120" width="8" height="22" rx="2" fill="#5A4A3A"/>

      <!-- Helmet detail ridge -->
      <path d="M148 80 Q150 75 152 80 L152 120 L148 120 Z" fill="#5A4A3A"/>

      <!-- Left horn -->
      <path d="M112 118 Q100 100 90 80 Q88 75 95 78 Q108 90 118 115 Z" fill="#C4A44A"/>
      <path d="M112 118 Q102 102 95 86 Q94 83 99 84 Q110 94 118 115 Z" fill="#D4B45A"/>
      <!-- Right horn -->
      <path d="M188 118 Q200 100 210 80 Q212 75 205 78 Q192 90 182 115 Z" fill="#C4A44A"/>
      <path d="M188 118 Q198 102 205 86 Q206 83 201 84 Q190 94 182 115 Z" fill="#D4B45A"/>

    </g>
  </svg>
  <h2>Concept 04 &mdash; Viking Knight</h2>
</div>
</body>
</html>
