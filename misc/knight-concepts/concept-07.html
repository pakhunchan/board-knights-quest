<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stout Ranger — Character Concept 07</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #2a2a2a;
    font-family: sans-serif;
  }
  .preview {
    padding: 40px;
    text-align: center;
  }
  .preview h2 {
    color: #aaa;
    font-weight: 300;
    margin-bottom: 20px;
    letter-spacing: 1px;
  }

  /* --- Animations --- */
  @keyframes breathe {
    0%, 100% { transform: scaleY(1); }
    50% { transform: scaleY(1.02); }
  }
  @keyframes blink {
    0%, 88%, 92%, 100% { transform: scaleY(1); }
    90% { transform: scaleY(0.08); }
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }
  @keyframes cloakFlutter {
    0%, 100% { transform: skewX(0deg) scaleX(1); }
    35% { transform: skewX(1.2deg) scaleX(1.01); }
    65% { transform: skewX(-0.8deg) scaleX(0.99); }
  }
  @keyframes cloakEdge {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(1.5deg); }
  }
</style>
</head>
<body>
<div class="preview">
  <h2>Concept 07 — The Stout Ranger</h2>

  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">

    <!-- ============ WHOLE CHARACTER BOB ============ -->
    <g style="transform-origin: 150px 200px; animation: bob 2.5s ease-in-out infinite;">

      <!-- ============ CLOAK BACK (behind everything) ============ -->
      <g style="transform-origin: 160px 160px; animation: cloakFlutter 3.5s ease-in-out infinite;">
        <!-- Main cloak body -->
        <path d="M110,130 Q105,180 100,240 Q96,280 102,310 Q108,320 120,315 Q130,300 132,260 L135,180 Z"
              fill="#4A6A3A"/>
        <path d="M190,130 Q195,180 200,240 Q204,280 198,310 Q192,320 180,315 Q170,300 168,260 L165,180 Z"
              fill="#4A6A3A"/>
        <!-- Cloak middle drape -->
        <path d="M120,135 Q145,145 150,200 Q148,260 140,310 Q150,315 160,310 Q155,260 152,200 Q155,145 180,135 Q160,150 150,150 Q140,150 120,135 Z"
              fill="#5A7A4A" opacity="0.7"/>
      </g>

      <!-- Cloak flutter edge -->
      <g style="transform-origin: 100px 310px; animation: cloakEdge 4s ease-in-out infinite;">
        <path d="M96,290 Q92,300 94,315 Q98,322 106,318 Q104,305 102,290 Z"
              fill="#4A6A3A"/>
      </g>
      <g style="transform-origin: 200px 310px; animation: cloakEdge 4s ease-in-out infinite 0.5s;">
        <path d="M204,290 Q208,300 206,315 Q202,322 194,318 Q196,305 198,290 Z"
              fill="#4A6A3A"/>
      </g>

      <!-- ============ BOOTS ============ -->
      <!-- Left boot -->
      <rect x="116" y="340" width="28" height="32" rx="6" fill="#5A4A3A"/>
      <path d="M112,362 Q112,374 120,376 L148,376 Q152,374 152,366 L148,362 Z"
            fill="#5A4A3A"/>
      <!-- Boot top cuff -->
      <rect x="116" y="336" width="28" height="8" rx="3" fill="#4A3A2A"/>
      <!-- Right boot -->
      <rect x="156" y="340" width="28" height="32" rx="6" fill="#5A4A3A"/>
      <path d="M152,362 Q152,374 160,376 L188,376 Q192,374 192,366 L188,362 Z"
            fill="#5A4A3A"/>
      <!-- Boot top cuff -->
      <rect x="156" y="336" width="28" height="8" rx="3" fill="#4A3A2A"/>

      <!-- ============ LEGS ============ -->
      <!-- Left leg -->
      <rect x="118" y="290" width="26" height="52" rx="6" fill="#8B6914"/>
      <!-- Right leg -->
      <rect x="158" y="290" width="26" height="52" rx="6" fill="#8B6914"/>
      <!-- Knee patches -->
      <ellipse cx="131" cy="312" rx="10" ry="8" fill="#7A5A2A"/>
      <ellipse cx="171" cy="312" rx="10" ry="8" fill="#7A5A2A"/>

      <!-- ============ TORSO (breathing) ============ -->
      <g style="transform-origin: 150px 240px; animation: breathe 3s ease-in-out infinite;">

        <!-- Leather chest armor -->
        <path d="M112,168 Q108,200 110,250 Q112,280 120,292 L180,292 Q188,280 190,250 Q192,200 188,168 Q170,158 150,158 Q130,158 112,168 Z"
              fill="#A09890"/>
        <!-- Armor center panel -->
        <path d="M135,170 Q132,210 134,260 Q136,285 140,290 L160,290 Q164,285 166,260 Q168,210 165,170 Q158,165 150,165 Q142,165 135,170 Z"
              fill="#8B8178"/>
        <!-- Armor chest highlight -->
        <path d="M138,175 Q136,200 137,230 L148,230 Q149,200 148,175 Q144,172 138,175 Z"
              fill="#B0A898" opacity="0.5"/>

        <!-- ============ BELT ============ -->
        <rect x="110" y="268" width="80" height="12" rx="3" fill="#5A4A3A"/>
        <!-- Belt buckle -->
        <rect x="143" y="267" width="14" height="14" rx="2" fill="#8B7A3A"/>
        <rect x="146" y="270" width="8" height="8" rx="1" fill="#A09030"/>
        <!-- Belt pouches -->
        <rect x="115" y="270" width="16" height="14" rx="3" fill="#7A5A2A"/>
        <rect x="170" y="270" width="16" height="14" rx="3" fill="#7A5A2A"/>
        <!-- Pouch flaps -->
        <rect x="115" y="270" width="16" height="5" rx="2" fill="#6A4A1A"/>
        <rect x="170" y="270" width="16" height="5" rx="2" fill="#6A4A1A"/>

        <!-- ============ CLOAK OVER SHOULDERS ============ -->
        <!-- Left shoulder cloak -->
        <path d="M100,155 Q95,170 98,200 Q100,220 108,230 L118,225 Q114,200 112,175 Q112,160 115,155 Z"
              fill="#5A7A4A"/>
        <!-- Right shoulder cloak -->
        <path d="M200,155 Q205,170 202,200 Q200,220 192,230 L182,225 Q186,200 188,175 Q188,160 185,155 Z"
              fill="#5A7A4A"/>
        <!-- Shoulder cloak clasp at neck -->
        <circle cx="130" cy="162" r="5" fill="#8B7A3A"/>
        <circle cx="170" cy="162" r="5" fill="#8B7A3A"/>

        <!-- ============ LEFT ARM (relaxed, at side) ============ -->
        <!-- Upper arm -->
        <path d="M104,175 Q96,195 94,220 Q93,235 98,240 L112,236 Q110,220 112,200 Q114,185 115,175 Z"
              fill="#5A7A4A"/>
        <!-- Forearm -->
        <path d="M94,236 Q88,255 86,275 Q85,285 90,290 L104,286 Q102,270 104,255 Q106,242 108,236 Z"
              fill="#A09890"/>
        <!-- Hand -->
        <path d="M86,282 Q82,292 84,300 Q86,306 92,307 Q98,306 100,300 Q100,292 98,285 Z"
              fill="#D4A574"/>

        <!-- ============ RIGHT ARM (thumbs up) ============ -->
        <!-- Upper arm -->
        <path d="M186,175 Q194,185 198,200 Q202,215 200,225 L188,222 Q188,210 186,198 Q184,186 185,175 Z"
              fill="#5A7A4A"/>
        <!-- Forearm going up -->
        <path d="M196,222 Q204,205 210,185 Q214,172 212,165 L200,167 Q200,175 196,190 Q192,205 188,218 Z"
              fill="#A09890"/>
        <!-- Fist -->
        <ellipse cx="210" cy="158" rx="12" ry="14" fill="#D4A574"/>
        <!-- Thumb pointing up -->
        <rect x="205" y="130" width="10" height="26" rx="5" fill="#D4A574"/>
        <!-- Thumb nail hint -->
        <rect x="207" y="131" width="6" height="5" rx="2" fill="#C4956A"/>
        <!-- Fingers wrapped (the fist) -->
        <path d="M200,150 Q198,155 199,164 Q200,170 206,172 Q202,168 201,160 Q200,154 202,150 Z"
              fill="#C4956A"/>
        <path d="M220,150 Q222,155 221,164 Q220,170 214,172 Q218,168 219,160 Q220,154 218,150 Z"
              fill="#C4956A"/>

      </g><!-- end breathing group -->

      <!-- ============ HEAD ============ -->
      <!-- Neck -->
      <rect x="140" y="140" width="20" height="22" rx="4" fill="#D4A574"/>

      <!-- Hood pulled back behind head -->
      <path d="M120,88 Q115,70 120,55 Q130,40 150,38 Q170,40 180,55 Q185,70 180,88 Q175,100 172,115 Q165,125 150,128 Q135,125 128,115 Q125,100 120,88 Z"
            fill="#5A7A4A"/>
      <!-- Hood interior shadow -->
      <path d="M125,82 Q122,68 126,58 Q134,48 150,46 Q166,48 174,58 Q178,68 175,82 Q172,92 170,105 Q165,112 150,114 Q135,112 130,105 Q128,92 125,82 Z"
            fill="#4A6A3A"/>
      <!-- Hood folds -->
      <path d="M122,75 Q120,85 123,95 Q125,90 124,80 Z" fill="#4A6A3A" opacity="0.5"/>
      <path d="M178,75 Q180,85 177,95 Q175,90 176,80 Z" fill="#4A6A3A" opacity="0.5"/>

      <!-- Head shape -->
      <ellipse cx="150" cy="100" rx="28" ry="32" fill="#D4A574"/>

      <!-- Hair peeking from under hood -->
      <path d="M124,90 Q122,80 128,74 Q135,70 142,72 Q138,76 132,80 Q128,85 126,90 Z"
            fill="#7A5A2A"/>
      <path d="M176,90 Q178,80 172,74 Q165,70 158,72 Q162,76 168,80 Q172,85 174,90 Z"
            fill="#7A5A2A"/>

      <!-- Stubble -->
      <ellipse cx="150" cy="118" rx="18" ry="10" fill="#C49A68" opacity="0.4"/>
      <ellipse cx="140" cy="112" rx="5" ry="8" fill="#C49A68" opacity="0.3"/>
      <ellipse cx="160" cy="112" rx="5" ry="8" fill="#C49A68" opacity="0.3"/>

      <!-- ============ FACE ============ -->
      <!-- Eyebrows (thick, adventurous) -->
      <path d="M133,86 Q138,82 146,84" fill="#6A4A2A"/>
      <path d="M154,84 Q162,82 167,86" fill="#6A4A2A"/>
      <!-- Eyebrow thickness -->
      <rect x="133" y="84" width="13" height="3" rx="1.5" fill="#6A4A2A"/>
      <rect x="154" y="84" width="13" height="3" rx="1.5" fill="#6A4A2A"/>

      <!-- Eyes (blinking) -->
      <g style="transform-origin: 141px 93px; animation: blink 4s ease-in-out infinite;">
        <ellipse cx="141" cy="93" rx="5" ry="5" fill="#FFFFFF"/>
        <ellipse cx="142" cy="93" rx="3" ry="3.5" fill="#5A7040"/>
        <ellipse cx="142.5" cy="92.5" rx="1.5" ry="1.5" fill="#2A3020"/>
        <circle cx="143.5" cy="91.5" r="0.8" fill="#FFFFFF"/>
      </g>
      <g style="transform-origin: 159px 93px; animation: blink 4s ease-in-out infinite;">
        <ellipse cx="159" cy="93" rx="5" ry="5" fill="#FFFFFF"/>
        <ellipse cx="158" cy="93" rx="3" ry="3.5" fill="#5A7040"/>
        <ellipse cx="157.5" cy="92.5" rx="1.5" ry="1.5" fill="#2A3020"/>
        <circle cx="156.5" cy="91.5" r="0.8" fill="#FFFFFF"/>
      </g>

      <!-- Crow's feet / smile lines near eyes -->
      <path d="M132,94 Q130,92 129,90" fill="none" stroke="#C49060" stroke-width="0.8" opacity="0.4"/>
      <path d="M168,94 Q170,92 171,90" fill="none" stroke="#C49060" stroke-width="0.8" opacity="0.4"/>

      <!-- Nose -->
      <path d="M148,96 Q146,104 144,108 Q148,110 152,110 Q156,108 154,104 Q152,96 150,96 Z"
            fill="#C4956A"/>

      <!-- Small scar on left cheek -->
      <path d="M130,100 L134,106" fill="none" stroke="#BA8E60" stroke-width="1.2" opacity="0.5"/>
      <path d="M131,103 L134,101" fill="none" stroke="#BA8E60" stroke-width="0.8" opacity="0.4"/>

      <!-- Friendly grin -->
      <path d="M138,114 Q144,121 150,122 Q156,121 162,114"
            fill="none" stroke="#8B5A3A" stroke-width="2" stroke-linecap="round"/>
      <!-- Teeth hint -->
      <path d="M142,116 Q150,122 158,116 Q154,118 150,118.5 Q146,118 142,116 Z"
            fill="#F0E8DC"/>

      <!-- Cheek warmth -->
      <ellipse cx="133" cy="108" rx="6" ry="4" fill="#D4876A" opacity="0.2"/>
      <ellipse cx="167" cy="108" rx="6" ry="4" fill="#D4876A" opacity="0.2"/>

    </g><!-- end bob group -->

  </svg>
</div>
</body>
</html>
