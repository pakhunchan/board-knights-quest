<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shield Bearer Knight — Character Concept 08</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #2a2a2a;
    font-family: sans-serif;
  }
  .preview {
    padding: 40px;
    text-align: center;
  }
  .preview h2 {
    color: #aaa;
    font-weight: 300;
    margin-bottom: 20px;
    letter-spacing: 1px;
  }

  /* --- Animations --- */
  @keyframes blink {
    0%, 88%, 93%, 100% { transform: scaleY(1); }
    90.5% { transform: scaleY(0.05); }
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }
  @keyframes shieldWobble {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(0.8deg); }
    75% { transform: rotate(-0.8deg); }
  }
  @keyframes peek {
    0%, 100% { transform: translateY(0); }
    40% { transform: translateY(-4px); }
    60% { transform: translateY(-4px); }
  }
</style>
</head>
<body>
<div class="preview">
  <h2>Concept 08 — The Shield Bearer</h2>

  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">

    <!-- Whole character bobbing -->
    <g style="transform-origin: 150px 200px; animation: bob 2.5s ease-in-out infinite;">

      <!-- === SHADOW === -->
      <ellipse cx="150" cy="385" rx="55" ry="7" fill="#000" opacity="0.1"/>

      <!-- === BOOTS === -->
      <!-- Left boot -->
      <path d="M112,365 Q108,370 106,375 Q105,380 110,383 Q118,385 126,383 Q130,380 129,375 Q128,370 126,365 Z"
            fill="#6B5F56"/>
      <!-- Right boot -->
      <path d="M164,365 Q162,370 161,375 Q160,380 165,383 Q172,385 180,383 Q184,380 183,375 Q182,370 180,365 Z"
            fill="#6B5F56"/>
      <!-- Boot soles -->
      <ellipse cx="117" cy="383" rx="11" ry="3" fill="#5A5048" opacity="0.5"/>
      <ellipse cx="173" cy="383" rx="11" ry="3" fill="#5A5048" opacity="0.5"/>

      <!-- === LEGS === -->
      <!-- Left leg -->
      <path d="M116,320 Q114,335 113,350 Q113,365 119,368 Q127,368 128,355 Q129,340 130,320 Z"
            fill="#8B8178"/>
      <!-- Right leg -->
      <path d="M162,320 Q161,335 161,350 Q162,365 170,368 Q178,368 179,355 Q179,340 178,320 Z"
            fill="#8B8178"/>
      <!-- Knee armor hints -->
      <ellipse cx="122" cy="340" rx="8" ry="4" fill="#9E9890" opacity="0.25"/>
      <ellipse cx="170" cy="340" rx="8" ry="4" fill="#9E9890" opacity="0.25"/>

      <!-- === SHIELD (large, wobbling) === -->
      <g style="transform-origin: 150px 260px; animation: shieldWobble 2s ease-in-out infinite;">

        <!-- Shield main body - big round shield -->
        <ellipse cx="150" cy="255" rx="80" ry="85" fill="#B8D4CE"/>

        <!-- Rim as a filled ring shape -->
        <ellipse cx="150" cy="255" rx="80" ry="85" fill="#C4A44A"/>
        <ellipse cx="150" cy="255" rx="74" ry="79" fill="#B8D4CE"/>

        <!-- Inner decorative ring -->
        <ellipse cx="150" cy="255" rx="58" ry="62" fill="#A8C8C0" opacity="0.4"/>

        <!-- Shield emblem - green cross -->
        <rect x="144" y="220" width="12" height="70" rx="3" fill="#7B9E6B"/>
        <rect x="120" y="246" width="60" height="12" rx="3" fill="#7B9E6B"/>
        <!-- Cross center highlight -->
        <rect x="146" y="248" width="8" height="8" rx="2" fill="#8BAE7B" opacity="0.5"/>

        <!-- Shield surface highlights -->
        <ellipse cx="130" cy="235" rx="18" ry="22" fill="#C8E0D8" opacity="0.3"/>

        <!-- Gold rim rivets -->
        <circle cx="150" cy="172" r="3" fill="#D4B45A" opacity="0.7"/>
        <circle cx="185" cy="178" r="3" fill="#D4B45A" opacity="0.7"/>
        <circle cx="213" cy="198" r="3" fill="#D4B45A" opacity="0.7"/>
        <circle cx="226" cy="228" r="3" fill="#D4B45A" opacity="0.7"/>
        <circle cx="228" cy="260" r="3" fill="#D4B45A" opacity="0.7"/>
        <circle cx="220" cy="290" r="3" fill="#D4B45A" opacity="0.7"/>
        <circle cx="203" cy="315" r="3" fill="#D4B45A" opacity="0.7"/>
        <circle cx="180" cy="332" r="3" fill="#D4B45A" opacity="0.7"/>
        <circle cx="150" cy="340" r="3" fill="#D4B45A" opacity="0.7"/>
        <circle cx="120" cy="332" r="3" fill="#D4B45A" opacity="0.7"/>
        <circle cx="97" cy="315" r="3" fill="#D4B45A" opacity="0.7"/>
        <circle cx="80" cy="290" r="3" fill="#D4B45A" opacity="0.7"/>
        <circle cx="72" cy="260" r="3" fill="#D4B45A" opacity="0.7"/>
        <circle cx="74" cy="228" r="3" fill="#D4B45A" opacity="0.7"/>
        <circle cx="87" cy="198" r="3" fill="#D4B45A" opacity="0.7"/>
        <circle cx="115" cy="178" r="3" fill="#D4B45A" opacity="0.7"/>

        <!-- === HANDS gripping shield edges === -->
        <!-- Left hand -->
        <ellipse cx="76" cy="245" rx="8" ry="10" fill="#D4A574"/>
        <!-- Left fingers wrapping over -->
        <ellipse cx="78" cy="237" rx="5" ry="4" fill="#D4A574"/>
        <ellipse cx="78" cy="253" rx="5" ry="4" fill="#D4A574"/>
        <!-- Left thumb -->
        <ellipse cx="72" cy="245" rx="3.5" ry="5" fill="#C89A68"/>

        <!-- Right hand -->
        <ellipse cx="224" cy="245" rx="8" ry="10" fill="#D4A574"/>
        <!-- Right fingers wrapping over -->
        <ellipse cx="222" cy="237" rx="5" ry="4" fill="#D4A574"/>
        <ellipse cx="222" cy="253" rx="5" ry="4" fill="#D4A574"/>
        <!-- Right thumb -->
        <ellipse cx="228" cy="245" rx="3.5" ry="5" fill="#C89A68"/>

      </g><!-- end shield group -->

      <!-- === ARMS (behind shield, connecting hands to body) === -->
      <!-- Left arm -->
      <path d="M118,180 Q100,200 88,225 Q80,240 78,245" fill="#8B8178" opacity="0.4"/>
      <!-- Right arm -->
      <path d="M182,180 Q200,200 212,225 Q220,240 222,245" fill="#8B8178" opacity="0.4"/>

      <!-- === HEAD (peeking over shield, with peek animation) === -->
      <g style="transform-origin: 150px 155px; animation: peek 3.5s ease-in-out infinite;">

        <!-- Helmet back -->
        <ellipse cx="150" cy="130" rx="32" ry="30" fill="#A09890"/>

        <!-- Face - round and cheerful -->
        <ellipse cx="150" cy="142" rx="28" ry="24" fill="#D4A574"/>

        <!-- Rosy cheeks -->
        <ellipse cx="130" cy="148" rx="8" ry="5" fill="#E8A090" opacity="0.45"/>
        <ellipse cx="170" cy="148" rx="8" ry="5" fill="#E8A090" opacity="0.45"/>

        <!-- === EYES (big and cheerful, with blink) === -->
        <g style="transform-origin: 150px 140px; animation: blink 3.5s ease-in-out infinite;">
          <!-- Left eye white - BIGGER than other concepts -->
          <ellipse cx="138" cy="138" rx="9" ry="9" fill="white"/>
          <!-- Left iris -->
          <ellipse cx="139.5" cy="139" rx="5.5" ry="6" fill="#5B8A5A"/>
          <!-- Left pupil -->
          <circle cx="140.5" cy="139" r="2.8" fill="#2D3A2D"/>
          <!-- Left eye sparkle -->
          <circle cx="142" cy="136.5" r="1.8" fill="white" opacity="0.9"/>
          <circle cx="138" cy="141" r="1" fill="white" opacity="0.5"/>

          <!-- Right eye white -->
          <ellipse cx="162" cy="138" rx="9" ry="9" fill="white"/>
          <!-- Right iris -->
          <ellipse cx="163.5" cy="139" rx="5.5" ry="6" fill="#5B8A5A"/>
          <!-- Right pupil -->
          <circle cx="164.5" cy="139" r="2.8" fill="#2D3A2D"/>
          <!-- Right eye sparkle -->
          <circle cx="166" cy="136.5" r="1.8" fill="white" opacity="0.9"/>
          <circle cx="162" cy="141" r="1" fill="white" opacity="0.5"/>
        </g>

        <!-- Eyebrows - raised excitedly -->
        <ellipse cx="137" cy="127" rx="8" ry="2.5" fill="#8B7860" opacity="0.35"/>
        <ellipse cx="163" cy="127" rx="8" ry="2.5" fill="#8B7860" opacity="0.35"/>

        <!-- Nose -->
        <ellipse cx="150" cy="147" rx="3" ry="2.5" fill="#C89A68" opacity="0.5"/>

        <!-- Excited smile - wide open grin -->
        <path d="M137,154 Q143,162 150,163 Q157,162 163,154"
              fill="#C07850" opacity="0.8"/>
        <!-- Smile interior -->
        <path d="M139,155 Q144,161 150,162 Q156,161 161,155"
              fill="#A06040" opacity="0.5"/>
        <!-- Smile cheek creases -->
        <path d="M134,152 Q136,155 138,154" fill="#C89A68" opacity="0.3"/>
        <path d="M166,152 Q164,155 162,154" fill="#C89A68" opacity="0.3"/>

        <!-- === HELMET === -->
        <!-- Main helmet dome -->
        <path d="M118,132 Q118,105 130,95 Q140,88 150,86 Q160,88 170,95 Q182,105 182,132
                 Q178,128 170,126 Q160,124 150,124 Q140,124 130,126 Q122,128 118,132 Z"
              fill="#A09890"/>
        <!-- Helmet band -->
        <path d="M118,130 Q125,126 135,124 Q145,123 150,123 Q155,123 165,124 Q175,126 182,130
                 Q180,133 170,130 Q160,128 150,128 Q140,128 130,130 Q120,133 118,130 Z"
              fill="#8B8178"/>
        <!-- Helmet top ridge -->
        <path d="M140,90 Q145,86 150,85 Q155,86 160,90 Q156,88 150,87 Q144,88 140,90 Z"
              fill="#8B8178" opacity="0.6"/>
        <!-- Helmet shine -->
        <ellipse cx="140" cy="105" rx="12" ry="10" fill="#B0A8A0" opacity="0.3"/>
        <!-- Helmet nose guard (small) -->
        <path d="M147,124 L150,132 L153,124 Z" fill="#9E9890" opacity="0.6"/>

        <!-- Helmet plume (small, cheerful) -->
        <ellipse cx="150" cy="84" rx="5" ry="4" fill="#7B9E6B"/>
        <ellipse cx="153" cy="81" rx="4" ry="3.5" fill="#5A7A4A"/>
        <ellipse cx="150" cy="79" rx="3" ry="3" fill="#7B9E6B" opacity="0.8"/>

      </g><!-- end head group -->

    </g><!-- end whole character bob -->

  </svg>
</div>
</body>
</html>
