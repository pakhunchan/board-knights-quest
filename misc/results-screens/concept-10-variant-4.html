<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quest Completed - Knight's Quest: Math Adventure (Sunny Hillside)</title>
<link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&family=Quicksand:wght@400;500;600;700&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #1a4a10;
  font-family: 'Quicksand', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* === SUNNY HILLSIDE BACKGROUND === */
.meadow-scene {
  position: fixed;
  inset: 0;
  opacity: 0;
  transition: opacity 1.5s ease;
}
.meadow-scene.visible { opacity: 1; }

/* Sky gradient - vivid blue to warm yellow at horizon */
.sky {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, #38a1f4 0%, #6ec6f8 25%, #a8e0fc 42%, #f0e88a 62%, #fce4a0 70%, #ffe8b0 80%);
}

/* Big cheerful sun */
.sun {
  position: absolute;
  top: 6%;
  right: 18%;
  width: 100px;
  height: 100px;
  background: radial-gradient(circle, #fff7cc 0%, #ffe44d 40%, #ffcc00 70%, rgba(255,200,0,0) 100%);
  border-radius: 50%;
  box-shadow: 0 0 60px 30px rgba(255,220,50,0.4), 0 0 120px 60px rgba(255,200,30,0.15);
}
.sun::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  width: 70px;
  height: 70px;
  background: radial-gradient(circle, #fff 0%, #fffbe0 30%, #ffe44d 100%);
  border-radius: 50%;
}

/* Animated sunbeam rays */
.sunbeams {
  position: absolute;
  top: 6%;
  right: 18%;
  width: 100px;
  height: 100px;
  animation: sunSpin 30s linear infinite;
}
@keyframes sunSpin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.sunbeam-ray {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 300px;
  height: 4px;
  transform-origin: 0 50%;
  background: linear-gradient(90deg, rgba(255,230,80,0.5) 0%, rgba(255,230,80,0.15) 40%, transparent 100%);
  border-radius: 2px;
}

/* Thick crossing sunbeams across the scene */
.scene-beams {
  position: absolute;
  inset: 0;
  overflow: hidden;
  opacity: 0.25;
}
.scene-beam {
  position: absolute;
  background: linear-gradient(180deg, transparent, rgba(255,240,120,0.4), transparent);
  width: 60px;
  height: 200%;
  top: -30%;
}
.scene-beam:nth-child(1) { left: 15%; transform: rotate(15deg); animation: beamDrift1 12s ease-in-out infinite; }
.scene-beam:nth-child(2) { left: 45%; transform: rotate(-10deg); width: 80px; animation: beamDrift2 15s ease-in-out infinite; }
.scene-beam:nth-child(3) { right: 15%; transform: rotate(8deg); width: 50px; animation: beamDrift3 10s ease-in-out infinite; }
@keyframes beamDrift1 {
  0%, 100% { transform: rotate(15deg) translateX(0); }
  50% { transform: rotate(18deg) translateX(20px); }
}
@keyframes beamDrift2 {
  0%, 100% { transform: rotate(-10deg) translateX(0); }
  50% { transform: rotate(-7deg) translateX(-15px); }
}
@keyframes beamDrift3 {
  0%, 100% { transform: rotate(8deg) translateX(0); }
  50% { transform: rotate(11deg) translateX(25px); }
}

/* White fluffy clouds */
.cloud {
  position: absolute;
  background: white;
  border-radius: 50%;
  opacity: 0.9;
  filter: blur(1px);
}
.cloud::before, .cloud::after {
  content: '';
  position: absolute;
  background: white;
  border-radius: 50%;
}
.cloud-1 {
  width: 100px; height: 40px;
  top: 10%; left: 5%;
  animation: cloudDrift 25s linear infinite;
}
.cloud-1::before { width: 60px; height: 50px; top: -20px; left: 20px; }
.cloud-1::after { width: 50px; height: 35px; top: -10px; left: 55px; }

.cloud-2 {
  width: 120px; height: 45px;
  top: 15%; left: 55%;
  animation: cloudDrift 30s linear infinite;
  animation-delay: -10s;
}
.cloud-2::before { width: 70px; height: 55px; top: -25px; left: 25px; }
.cloud-2::after { width: 55px; height: 40px; top: -15px; left: 65px; }

.cloud-3 {
  width: 80px; height: 30px;
  top: 8%; left: 35%;
  animation: cloudDrift 22s linear infinite;
  animation-delay: -5s;
  opacity: 0.7;
}
.cloud-3::before { width: 45px; height: 38px; top: -18px; left: 15px; }
.cloud-3::after { width: 40px; height: 28px; top: -10px; left: 45px; }

.cloud-4 {
  width: 90px; height: 35px;
  top: 18%; left: 80%;
  animation: cloudDrift 28s linear infinite;
  animation-delay: -15s;
  opacity: 0.75;
}
.cloud-4::before { width: 55px; height: 45px; top: -20px; left: 18px; }
.cloud-4::after { width: 45px; height: 32px; top: -12px; left: 50px; }

@keyframes cloudDrift {
  0% { transform: translateX(0); }
  100% { transform: translateX(-120vw); }
}

/* Mountains in background */
.mountains {
  position: absolute;
  bottom: 28%;
  left: 0;
  width: 100%;
  height: 30%;
}
.mountain {
  position: absolute;
  bottom: 0;
  width: 0;
  height: 0;
  border-style: solid;
}
.mountain-1 {
  left: 5%;
  border-width: 0 120px 160px 100px;
  border-color: transparent transparent #9a9080 transparent;
  opacity: 0.5;
}
.mountain-2 {
  left: 25%;
  border-width: 0 150px 200px 130px;
  border-color: transparent transparent #8a8070 transparent;
  opacity: 0.45;
}
.mountain-3 {
  right: 10%;
  border-width: 0 130px 170px 140px;
  border-color: transparent transparent #9a9080 transparent;
  opacity: 0.5;
}
.mountain-4 {
  right: 30%;
  border-width: 0 100px 140px 110px;
  border-color: transparent transparent #8a8070 transparent;
  opacity: 0.45;
}

/* Bright green rolling hills - layered */
.hills-back {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 42%;
}
.hill {
  position: absolute;
  border-radius: 50%;
}
/* Back hills */
.hill-b1 {
  width: 60%; height: 300px; bottom: 60px; left: -10%;
  background: radial-gradient(ellipse at 50% 40%, #5ebd3e, #4aa830);
}
.hill-b2 {
  width: 50%; height: 280px; bottom: 50px; right: -5%;
  background: radial-gradient(ellipse at 50% 40%, #52b030, #3f9a25);
}
.hill-b3 {
  width: 40%; height: 250px; bottom: 70px; left: 30%;
  background: radial-gradient(ellipse at 50% 40%, #68c848, #50b535);
}
/* Front hills */
.hill-f1 {
  width: 70%; height: 200px; bottom: -40px; left: -15%;
  background: radial-gradient(ellipse at 50% 30%, #72d450, #58c038);
  z-index: 1;
}
.hill-f2 {
  width: 60%; height: 180px; bottom: -30px; right: -10%;
  background: radial-gradient(ellipse at 50% 30%, #65cc45, #50b830);
  z-index: 1;
}
.hill-f3 {
  width: 45%; height: 160px; bottom: -20px; left: 25%;
  background: radial-gradient(ellipse at 50% 30%, #7ade58, #62cc42);
  z-index: 2;
}

/* Green floor base */
.meadow-floor {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 18%;
  background: linear-gradient(to bottom, #65cc45 0%, #58c038 40%, #4db530 100%);
  z-index: 3;
}

/* Round lollipop trees */
.tree {
  position: absolute;
  z-index: 2;
}
.tree-trunk {
  width: 12px;
  height: 50px;
  background: linear-gradient(to right, #8a6a40, #a07850, #8a6a40);
  margin: 0 auto;
  border-radius: 3px;
}
.tree-crown {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  margin: 0 auto;
  position: relative;
}
.tree-crown::after {
  content: '';
  position: absolute;
  top: 8px;
  left: 12px;
  width: 20px;
  height: 15px;
  background: rgba(255,255,255,0.15);
  border-radius: 50%;
}

.tree-1 { bottom: 24%; left: 8%; }
.tree-1 .tree-crown { background: radial-gradient(circle at 40% 40%, #80e855, #4db530); width: 65px; height: 65px; }
.tree-1 .tree-trunk { height: 55px; }

.tree-2 { bottom: 26%; left: 18%; }
.tree-2 .tree-crown { background: radial-gradient(circle at 40% 40%, #90f060, #55c035); width: 50px; height: 50px; }
.tree-2 .tree-trunk { height: 40px; width: 10px; }

.tree-3 { bottom: 25%; right: 10%; }
.tree-3 .tree-crown { background: radial-gradient(circle at 40% 40%, #75e050, #42a828); width: 70px; height: 70px; }
.tree-3 .tree-trunk { height: 60px; width: 14px; }

.tree-4 { bottom: 27%; right: 22%; }
.tree-4 .tree-crown { background: radial-gradient(circle at 40% 40%, #88ec58, #4cb530); width: 45px; height: 45px; }
.tree-4 .tree-trunk { height: 35px; width: 9px; }

.tree-5 { bottom: 28%; left: 38%; z-index: 1; }
.tree-5 .tree-crown { background: radial-gradient(circle at 40% 40%, #6ad845, #3ea020); width: 55px; height: 55px; }
.tree-5 .tree-trunk { height: 45px; width: 11px; }

.tree-6 { bottom: 29%; right: 36%; z-index: 1; }
.tree-6 .tree-crown { background: radial-gradient(circle at 40% 40%, #78e050, #48b028); width: 48px; height: 48px; }
.tree-6 .tree-trunk { height: 38px; width: 10px; }

/* === FLOWERS ALONG XP PATH === */
.flower-track {
  position: absolute;
  display: flex;
  align-items: center;
  gap: 4px;
  pointer-events: none;
}

.bloom-flower {
  width: 22px;
  height: 22px;
  position: relative;
  transform: scale(0);
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.bloom-flower.bloomed { transform: scale(1); }
.bloom-flower.closed { transform: scale(0); transition: transform 0.3s ease-in; }

.bloom-flower .petal {
  position: absolute;
  width: 9px;
  height: 9px;
  border-radius: 50%;
  top: 50%;
  left: 50%;
}
.bloom-flower .petal:nth-child(1) { transform: translate(-50%, -100%); }
.bloom-flower .petal:nth-child(2) { transform: translate(20%, -70%); }
.bloom-flower .petal:nth-child(3) { transform: translate(20%, -10%); }
.bloom-flower .petal:nth-child(4) { transform: translate(-50%, 15%); }
.bloom-flower .petal:nth-child(5) { transform: translate(-120%, -10%); }
.bloom-flower .petal:nth-child(6) { transform: translate(-120%, -70%); }
.bloom-flower .center {
  position: absolute;
  width: 7px;
  height: 7px;
  background: #cc8800;
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* Bright primary-ish flower colors */
.bloom-flower.sunny-yellow .petal { background: #ffe040; }
.bloom-flower.sunny-yellow .center { background: #cc8800; }
.bloom-flower.bright-orange .petal { background: #ffaa30; }
.bloom-flower.bright-orange .center { background: #cc6600; }
.bloom-flower.hot-pink .petal { background: #ff70a0; }
.bloom-flower.hot-pink .center { background: #ffcc00; }
.bloom-flower.pure-white .petal { background: #fff; }
.bloom-flower.pure-white .center { background: #ffdd44; }

/* === BUTTERFLIES === */
.butterfly {
  position: absolute;
  opacity: 0;
  transition: opacity 0.5s ease;
  pointer-events: none;
}
.butterfly.visible { opacity: 1; }

.butterfly-body {
  width: 3px;
  height: 16px;
  background: #4a3020;
  border-radius: 2px;
  position: relative;
  margin: 0 auto;
}
.wing-left, .wing-right {
  position: absolute;
  top: 2px;
  width: 14px;
  height: 18px;
  border-radius: 50% 50% 50% 0;
  transform-origin: right center;
  animation: wingFlap 0.4s ease-in-out infinite alternate;
}
.wing-left {
  right: 100%;
  border-radius: 50% 50% 0 50%;
  transform-origin: right center;
}
.wing-right {
  left: 100%;
  border-radius: 50% 50% 50% 0;
  transform-origin: left center;
}
@keyframes wingFlap {
  0% { transform: rotateY(0deg) scaleX(1); }
  100% { transform: rotateY(60deg) scaleX(0.4); }
}

/* Vivid spring butterfly colors */
.butterfly:nth-child(1) .wing-left, .butterfly:nth-child(1) .wing-right {
  background: linear-gradient(135deg, #ff6090, #ff3070);
}
.butterfly:nth-child(2) .wing-left, .butterfly:nth-child(2) .wing-right {
  background: linear-gradient(135deg, #50ccff, #20a0ee);
}
.butterfly:nth-child(3) .wing-left, .butterfly:nth-child(3) .wing-right {
  background: linear-gradient(135deg, #ffcc20, #ff9900);
}
.butterfly:nth-child(4) .wing-left, .butterfly:nth-child(4) .wing-right {
  background: linear-gradient(135deg, #60ee80, #30cc50);
}

.butterfly { animation: butterflyPath 6s ease-in-out infinite; }
.butterfly:nth-child(2) { animation: butterflyPath2 7s ease-in-out infinite; }
.butterfly:nth-child(3) { animation: butterflyPath3 5.5s ease-in-out infinite; }
.butterfly:nth-child(4) { animation: butterflyPath4 6.5s ease-in-out infinite; }

@keyframes butterflyPath {
  0%, 100% { transform: translate(0, 0) rotate(-5deg); }
  25% { transform: translate(60px, -80px) rotate(5deg); }
  50% { transform: translate(-30px, -120px) rotate(-8deg); }
  75% { transform: translate(40px, -50px) rotate(3deg); }
}
@keyframes butterflyPath2 {
  0%, 100% { transform: translate(0, 0) rotate(3deg); }
  25% { transform: translate(-70px, -60px) rotate(-5deg); }
  50% { transform: translate(40px, -100px) rotate(8deg); }
  75% { transform: translate(-50px, -40px) rotate(-3deg); }
}
@keyframes butterflyPath3 {
  0%, 100% { transform: translate(0, 0) rotate(-3deg); }
  33% { transform: translate(50px, -90px) rotate(6deg); }
  66% { transform: translate(-40px, -70px) rotate(-6deg); }
}
@keyframes butterflyPath4 {
  0%, 100% { transform: translate(0, 0) rotate(5deg); }
  33% { transform: translate(-60px, -70px) rotate(-4deg); }
  66% { transform: translate(30px, -110px) rotate(4deg); }
}

/* === MAIN CONTENT === */
.content {
  position: relative;
  z-index: 10;
  text-align: center;
  width: 100%;
  max-width: 560px;
  padding: 0 20px;
}

/* Quest Completed Header */
.quest-header {
  opacity: 0;
  transform: translateY(20px) scale(0.9);
  transition: opacity 0.8s ease, transform 0.8s ease;
  margin-bottom: 28px;
}
.quest-header.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
}

.quest-title {
  font-family: 'Amatic SC', cursive;
  font-weight: 700;
  font-size: 72px;
  color: #2a6a10;
  text-shadow:
    0 0 30px rgba(255, 230, 80, 0.5),
    0 0 60px rgba(255, 210, 50, 0.2),
    0 2px 0 #1a5500,
    0 3px 6px rgba(0, 0, 0, 0.2);
  line-height: 1;
  letter-spacing: 3px;
  position: relative;
}
.quest-title .sun-deco {
  display: inline-block;
  color: #ffcc00;
  font-size: 40px;
  vertical-align: middle;
  opacity: 0.8;
}

/* Level display */
.level-section {
  opacity: 0;
  transform: translateY(15px);
  transition: opacity 0.6s ease, transform 0.6s ease;
  margin-bottom: 20px;
}
.level-section.visible {
  opacity: 1;
  transform: translateY(0);
}

.level-display {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 6px;
}

.level-badge {
  font-family: 'Patrick Hand', cursive;
  font-size: 32px;
  color: #2a6a10;
  text-shadow: 0 1px 2px rgba(0,0,0,0.15), 0 0 8px rgba(255,230,80,0.3);
  transition: all 0.5s ease;
}
.level-badge.highlight {
  color: #cc8800;
  text-shadow: 0 0 15px rgba(255, 200, 40, 0.6), 0 1px 2px rgba(0,0,0,0.2);
  transform: scale(1.15);
}

.level-arrow {
  font-size: 24px;
  color: #88bb30;
  opacity: 0;
  transform: scaleX(0);
  transition: opacity 0.4s ease, transform 0.4s ease;
}
.level-arrow.visible {
  opacity: 1;
  transform: scaleX(1);
}

.level-new {
  opacity: 0;
  transform: translateX(-10px);
  transition: opacity 0.4s ease, transform 0.4s ease;
}
.level-new.visible {
  opacity: 1;
  transform: translateX(0);
}

.rank-title {
  font-family: 'Patrick Hand', cursive;
  font-size: 22px;
  color: #3a7a18;
  text-shadow: 0 1px 2px rgba(0,0,0,0.1);
  transition: all 0.5s ease;
  min-height: 30px;
}
.rank-title.highlight {
  color: #cc8800;
  text-shadow: 0 0 12px rgba(255, 200, 40, 0.5), 0 1px 2px rgba(0,0,0,0.15);
  font-size: 26px;
}

/* Title promotion block */
.title-promotion {
  opacity: 0;
  transform: translateY(10px) scale(0.8);
  transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  margin-bottom: 16px;
}
.title-promotion.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
}

.title-promoted-label {
  font-family: 'Amatic SC', cursive;
  font-weight: 700;
  font-size: 42px;
  color: #cc8800;
  text-shadow: 0 0 20px rgba(255,200,40,0.6), 0 2px 0 #aa6600;
  position: relative;
  display: inline-block;
}

/* Sunburst behind "Title Promoted!" */
.title-sunburst {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 200px;
  height: 200px;
  opacity: 0;
  transition: opacity 0.4s ease;
  pointer-events: none;
}
.title-sunburst.visible { opacity: 1; }
.title-sunburst .sb-ray {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 120px;
  height: 3px;
  transform-origin: 0 50%;
  background: linear-gradient(90deg, rgba(255,210,60,0.6) 0%, rgba(255,210,60,0.1) 60%, transparent 100%);
  border-radius: 2px;
  animation: sbPulse 2s ease-in-out infinite alternate;
}
@keyframes sbPulse {
  0% { opacity: 0.5; transform: rotate(var(--ray-angle)) scaleX(0.8); }
  100% { opacity: 1; transform: rotate(var(--ray-angle)) scaleX(1.1); }
}

.title-change {
  font-family: 'Patrick Hand', cursive;
  font-size: 28px;
  color: #3a7a18;
  text-shadow: 0 1px 2px rgba(0,0,0,0.1);
  margin-top: 4px;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.5s ease, transform 0.5s ease;
}
.title-change.visible {
  opacity: 1;
  transform: translateY(0);
}
.title-change .old-title {
  color: #888;
  text-decoration: line-through;
  text-decoration-color: rgba(0,0,0,0.2);
}
.title-change .change-arrow {
  color: #cc8800;
  margin: 0 8px;
}
.title-change .new-title {
  color: #cc8800;
  font-size: 32px;
  text-shadow: 0 0 10px rgba(255,200,40,0.4);
}

/* XP Bar */
.xp-section {
  opacity: 0;
  transform: translateY(15px);
  transition: opacity 0.6s ease, transform 0.6s ease;
  margin-bottom: 16px;
}
.xp-section.visible {
  opacity: 1;
  transform: translateY(0);
}

.xp-bar-container {
  position: relative;
  width: 100%;
  height: 30px;
  background: #faf0c8;
  border-radius: 15px;
  border: 3px solid #e0d090;
  overflow: hidden;
  box-shadow: inset 0 2px 6px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.1);
}

.xp-bar-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #88dd30, #aaee44, #ccff55);
  border-radius: 12px;
  transition: none;
  position: relative;
  box-shadow: 0 0 12px rgba(150, 230, 60, 0.4);
}
.xp-bar-fill::after {
  content: '';
  position: absolute;
  top: 3px;
  left: 8px;
  right: 8px;
  height: 7px;
  background: linear-gradient(to bottom, rgba(255,255,255,0.45), transparent);
  border-radius: 4px;
}

.xp-bar-fill.maxed {
  background: linear-gradient(90deg, #aaee44, #ccff55, #eeff88);
  box-shadow: 0 0 25px rgba(200, 255, 80, 0.6);
}

.xp-text {
  font-family: 'Quicksand', sans-serif;
  font-weight: 600;
  font-size: 14px;
  color: #3a7a18;
  margin-top: 6px;
  text-shadow: 0 1px 1px rgba(255,255,255,0.5);
}

/* Flower row above XP bar */
.flower-row {
  display: flex;
  justify-content: space-around;
  align-items: flex-end;
  width: 100%;
  height: 30px;
  margin-bottom: 4px;
}

/* +500 XP popup */
.xp-bonus {
  opacity: 0;
  transform: translateY(10px) scale(0.8);
  transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  margin-top: 14px;
}
.xp-bonus.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
}

.xp-bonus-text {
  font-family: 'Patrick Hand', cursive;
  font-size: 38px;
  color: #cc8800;
  text-shadow:
    0 0 20px rgba(255, 200, 40, 0.6),
    0 0 40px rgba(255, 180, 30, 0.25),
    0 2px 0 #aa6600,
    0 3px 6px rgba(0, 0, 0, 0.15);
  display: inline-block;
  animation: none;
}
.xp-bonus-text.glow {
  animation: bonusGlow 2s ease-in-out infinite;
}
@keyframes bonusGlow {
  0%, 100% { text-shadow: 0 0 20px rgba(255, 200, 40, 0.6), 0 0 40px rgba(255, 180, 30, 0.25), 0 2px 0 #aa6600; }
  50% { text-shadow: 0 0 30px rgba(255, 200, 40, 0.8), 0 0 60px rgba(255, 180, 30, 0.4), 0 2px 0 #aa6600; }
}

/* Level up flash - warm yellow/gold */
.level-up-flash {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at 50% 50%, rgba(255, 230, 80, 0.45), rgba(255,200,40,0.1) 50%, transparent 70%);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
  z-index: 5;
}
.level-up-flash.active {
  opacity: 1;
}

/* Ambient pollen/dandelion particles */
.pollen {
  position: absolute;
  width: 4px;
  height: 4px;
  background: radial-gradient(circle, rgba(255,240,180,0.9), rgba(255,230,140,0.3));
  border-radius: 50%;
  animation: pollenDrift 12s ease-in-out infinite;
  opacity: 0;
}
@keyframes pollenDrift {
  0% { transform: translateY(0) translateX(0); opacity: 0; }
  10% { opacity: 0.7; }
  50% { transform: translateY(-100px) translateX(40px); opacity: 0.5; }
  90% { opacity: 0.3; }
  100% { transform: translateY(-200px) translateX(-20px); opacity: 0; }
}

/* Grass tufts on the front hills */
.grass-tuft {
  position: absolute;
  bottom: 17%;
  z-index: 4;
}
.grass-blade {
  display: inline-block;
  width: 3px;
  height: 20px;
  background: linear-gradient(to top, #58c038, #80e855);
  border-radius: 2px 2px 0 0;
  transform-origin: bottom center;
  margin: 0 1px;
}
.grass-blade:nth-child(1) { transform: rotate(-15deg); height: 18px; }
.grass-blade:nth-child(2) { transform: rotate(-5deg); height: 24px; }
.grass-blade:nth-child(3) { transform: rotate(3deg); height: 20px; }
.grass-blade:nth-child(4) { transform: rotate(10deg); height: 16px; }

/* Gold sparkle burst for level-up */
.sparkle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: #ffd700;
  border-radius: 50%;
  opacity: 0;
  pointer-events: none;
  box-shadow: 0 0 4px 1px rgba(255,215,0,0.5);
}
.sparkle.burst {
  animation: sparkleBurst 1s ease-out forwards;
}
@keyframes sparkleBurst {
  0% { opacity: 1; transform: translate(0, 0) scale(1.2); }
  100% { opacity: 0; transform: translate(var(--sx), var(--sy)) scale(0); }
}

/* Leaf particles during level up */
.leaf {
  position: absolute;
  width: 10px;
  height: 14px;
  background: linear-gradient(135deg, #88dd30, #60bb20);
  border-radius: 0 50% 50% 50%;
  opacity: 0;
  pointer-events: none;
}
.leaf.falling {
  animation: leafFall 3s ease-in forwards;
}
@keyframes leafFall {
  0% { opacity: 0.9; transform: translateY(0) rotate(0deg); }
  100% { opacity: 0; transform: translateY(200px) rotate(360deg) translateX(var(--lx)); }
}

/* Small decorative daisies on the hills */
.hill-daisy {
  position: absolute;
  width: 10px;
  height: 10px;
  z-index: 3;
}
.hill-daisy::before {
  content: '';
  position: absolute;
  inset: 0;
  background: white;
  border-radius: 50%;
  box-shadow:
    6px 0 0 white, -6px 0 0 white,
    0 6px 0 white, 0 -6px 0 white;
}
.hill-daisy::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  width: 6px;
  height: 6px;
  background: #ffdd00;
  border-radius: 50%;
  z-index: 1;
}
</style>
</head>
<body>

<div class="meadow-scene" id="meadowScene">
  <div class="sky"></div>

  <!-- Sun with animated rays -->
  <div class="sun"></div>
  <div class="sunbeams" id="sunbeams"></div>

  <!-- Crossing light beams -->
  <div class="scene-beams">
    <div class="scene-beam"></div>
    <div class="scene-beam"></div>
    <div class="scene-beam"></div>
  </div>

  <!-- Fluffy clouds -->
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>
  <div class="cloud cloud-4"></div>

  <!-- Mountains -->
  <div class="mountains">
    <div class="mountain mountain-1"></div>
    <div class="mountain mountain-2"></div>
    <div class="mountain mountain-3"></div>
    <div class="mountain mountain-4"></div>
  </div>

  <!-- Rolling green hills -->
  <div class="hills-back">
    <div class="hill hill-b1"></div>
    <div class="hill hill-b2"></div>
    <div class="hill hill-b3"></div>
    <div class="hill hill-f1"></div>
    <div class="hill hill-f2"></div>
    <div class="hill hill-f3"></div>
  </div>

  <!-- Green floor -->
  <div class="meadow-floor"></div>

  <!-- Lollipop trees -->
  <div class="tree tree-1"><div class="tree-crown"></div><div class="tree-trunk"></div></div>
  <div class="tree tree-2"><div class="tree-crown"></div><div class="tree-trunk"></div></div>
  <div class="tree tree-3"><div class="tree-crown"></div><div class="tree-trunk"></div></div>
  <div class="tree tree-4"><div class="tree-crown"></div><div class="tree-trunk"></div></div>
  <div class="tree tree-5"><div class="tree-crown"></div><div class="tree-trunk"></div></div>
  <div class="tree tree-6"><div class="tree-crown"></div><div class="tree-trunk"></div></div>

  <!-- Grass tufts -->
  <div class="grass-tuft" style="left:12%"><div class="grass-blade"></div><div class="grass-blade"></div><div class="grass-blade"></div><div class="grass-blade"></div></div>
  <div class="grass-tuft" style="left:30%"><div class="grass-blade"></div><div class="grass-blade"></div><div class="grass-blade"></div><div class="grass-blade"></div></div>
  <div class="grass-tuft" style="right:25%"><div class="grass-blade"></div><div class="grass-blade"></div><div class="grass-blade"></div><div class="grass-blade"></div></div>
  <div class="grass-tuft" style="right:12%"><div class="grass-blade"></div><div class="grass-blade"></div><div class="grass-blade"></div><div class="grass-blade"></div></div>
  <div class="grass-tuft" style="left:50%"><div class="grass-blade"></div><div class="grass-blade"></div><div class="grass-blade"></div><div class="grass-blade"></div></div>

  <!-- Small daisies on the hills -->
  <div class="hill-daisy" style="bottom:22%; left:25%;"></div>
  <div class="hill-daisy" style="bottom:24%; left:42%;"></div>
  <div class="hill-daisy" style="bottom:21%; right:30%;"></div>
  <div class="hill-daisy" style="bottom:26%; right:18%;"></div>
  <div class="hill-daisy" style="bottom:23%; left:60%;"></div>

  <!-- Pollen / ambient particles -->
  <div id="pollenContainer"></div>

  <!-- Butterflies -->
  <div id="butterflyContainer">
    <div class="butterfly" style="top: 25%; left: 20%;">
      <div class="butterfly-body"><div class="wing-left"></div><div class="wing-right"></div></div>
    </div>
    <div class="butterfly" style="top: 30%; right: 22%;">
      <div class="butterfly-body"><div class="wing-left"></div><div class="wing-right"></div></div>
    </div>
    <div class="butterfly" style="top: 18%; left: 40%;">
      <div class="butterfly-body"><div class="wing-left"></div><div class="wing-right"></div></div>
    </div>
    <div class="butterfly" style="top: 35%; right: 38%;">
      <div class="butterfly-body"><div class="wing-left"></div><div class="wing-right"></div></div>
    </div>
  </div>

  <!-- Level up flash overlay -->
  <div class="level-up-flash" id="levelUpFlash"></div>
</div>

<!-- Main content -->
<div class="content">
  <div class="quest-header" id="questHeader">
    <div class="quest-title">
      <span class="sun-deco">&#9788;</span>
      Quest Completed!
      <span class="sun-deco">&#9788;</span>
    </div>
  </div>

  <div class="level-section" id="levelSection">
    <div class="level-display">
      <span class="level-badge" id="levelOld">Level 1</span>
      <span class="level-arrow" id="levelArrow">&#10140;</span>
      <span class="level-badge level-new" id="levelNew">Level 2</span>
    </div>
    <div class="rank-title" id="rankTitle">Trainee</div>
  </div>

  <!-- Title Promotion (new for variant 4) -->
  <div class="title-promotion" id="titlePromotion">
    <div style="position:relative; display:inline-block;">
      <div class="title-sunburst" id="titleSunburst"></div>
      <div class="title-promoted-label">Title Promoted!</div>
    </div>
    <div class="title-change" id="titleChange">
      <span class="old-title">Trainee</span>
      <span class="change-arrow">&#10140;</span>
      <span class="new-title">Explorer</span>
    </div>
  </div>

  <div class="xp-section" id="xpSection">
    <div class="flower-row" id="flowerRow"></div>
    <div class="xp-bar-container">
      <div class="xp-bar-fill" id="xpBarFill"></div>
    </div>
    <div class="xp-text" id="xpText">0 / 500 XP</div>
  </div>

  <div class="xp-bonus" id="xpBonus">
    <span class="xp-bonus-text" id="xpBonusText">+500 XP</span>
  </div>
</div>

<!-- Sparkle container for level up effect -->
<div id="sparkleContainer" style="position:fixed;inset:0;pointer-events:none;z-index:20;"></div>

<script>
(function() {
  // === CREATE SUNBEAM RAYS ===
  const sunbeamsEl = document.getElementById('sunbeams');
  for (let i = 0; i < 12; i++) {
    const ray = document.createElement('div');
    ray.className = 'sunbeam-ray';
    ray.style.transform = 'rotate(' + (i * 30) + 'deg)';
    sunbeamsEl.appendChild(ray);
  }

  // === CREATE SUNBURST RAYS FOR TITLE PROMOTION ===
  const titleSunburst = document.getElementById('titleSunburst');
  for (let i = 0; i < 16; i++) {
    const ray = document.createElement('div');
    ray.className = 'sb-ray';
    const angle = (i * 22.5);
    ray.style.setProperty('--ray-angle', angle + 'deg');
    ray.style.transform = 'rotate(' + angle + 'deg)';
    ray.style.animationDelay = (i * 0.1) + 's';
    titleSunburst.appendChild(ray);
  }

  // === CREATE POLLEN PARTICLES ===
  const pollenContainer = document.getElementById('pollenContainer');
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'pollen';
    p.style.left = (5 + Math.random() * 90) + '%';
    p.style.top = (20 + Math.random() * 60) + '%';
    p.style.animationDelay = (Math.random() * 12) + 's';
    p.style.animationDuration = (8 + Math.random() * 8) + 's';
    p.style.width = (3 + Math.random() * 3) + 'px';
    p.style.height = p.style.width;
    pollenContainer.appendChild(p);
  }

  // === CREATE FLOWERS IN ROW ===
  const flowerRow = document.getElementById('flowerRow');
  const flowerColors = [
    'sunny-yellow', 'bright-orange', 'hot-pink', 'pure-white',
    'sunny-yellow', 'bright-orange', 'hot-pink', 'pure-white',
    'sunny-yellow', 'bright-orange', 'hot-pink', 'pure-white'
  ];
  const flowers = [];
  for (let i = 0; i < 12; i++) {
    const f = document.createElement('div');
    f.className = 'bloom-flower ' + flowerColors[i];
    f.innerHTML = '<div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="center"></div>';
    flowerRow.appendChild(f);
    flowers.push(f);
  }

  // === REFS ===
  const meadowScene = document.getElementById('meadowScene');
  const questHeader = document.getElementById('questHeader');
  const levelSection = document.getElementById('levelSection');
  const xpSection = document.getElementById('xpSection');
  const xpBarFill = document.getElementById('xpBarFill');
  const xpText = document.getElementById('xpText');
  const xpBonus = document.getElementById('xpBonus');
  const xpBonusText = document.getElementById('xpBonusText');
  const levelOld = document.getElementById('levelOld');
  const levelArrow = document.getElementById('levelArrow');
  const levelNew = document.getElementById('levelNew');
  const rankTitle = document.getElementById('rankTitle');
  const levelUpFlash = document.getElementById('levelUpFlash');
  const sparkleContainer = document.getElementById('sparkleContainer');
  const titlePromotion = document.getElementById('titlePromotion');
  const titleChange = document.getElementById('titleChange');
  const butterflies = document.querySelectorAll('.butterfly');

  // === HELPERS ===
  function wait(ms) {
    return new Promise(r => setTimeout(r, ms));
  }

  function animateXP(from, to, max, duration) {
    return new Promise(resolve => {
      const start = performance.now();
      function tick(now) {
        const t = Math.min((now - start) / duration, 1);
        const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
        const current = Math.round(from + (to - from) * eased);
        const pct = (current / max) * 100;
        xpBarFill.style.width = pct + '%';
        xpText.textContent = current + ' / ' + max + ' XP';

        // Bloom flowers proportionally
        const flowerIndex = Math.floor((current / max) * flowers.length);
        for (let i = 0; i < flowers.length; i++) {
          if (i <= flowerIndex && current > 0) {
            if (!flowers[i].classList.contains('bloomed')) {
              flowers[i].classList.remove('closed');
              flowers[i].classList.add('bloomed');
            }
          }
        }

        if (t < 1) {
          requestAnimationFrame(tick);
        } else {
          resolve();
        }
      }
      requestAnimationFrame(tick);
    });
  }

  function closeFlowers() {
    flowers.forEach(f => {
      f.classList.remove('bloomed');
      f.classList.add('closed');
    });
  }

  function spawnSparkles(cx, cy, count) {
    for (let i = 0; i < count; i++) {
      const s = document.createElement('div');
      s.className = 'sparkle';
      const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
      const dist = 40 + Math.random() * 80;
      s.style.left = cx + 'px';
      s.style.top = cy + 'px';
      s.style.setProperty('--sx', Math.cos(angle) * dist + 'px');
      s.style.setProperty('--sy', Math.sin(angle) * dist + 'px');
      // Bright gold sparkles
      s.style.background = ['#ffd700', '#ffec80', '#ffaa00', '#fff5cc', '#ffe44d'][Math.floor(Math.random() * 5)];
      sparkleContainer.appendChild(s);
      requestAnimationFrame(() => s.classList.add('burst'));
      setTimeout(() => s.remove(), 1100);
    }
  }

  function spawnLeaves() {
    for (let i = 0; i < 12; i++) {
      const l = document.createElement('div');
      l.className = 'leaf';
      l.style.left = (20 + Math.random() * 60) + '%';
      l.style.top = (10 + Math.random() * 30) + '%';
      l.style.setProperty('--lx', (Math.random() - 0.5) * 100 + 'px');
      l.style.animationDelay = (Math.random() * 0.8) + 's';
      // Vary leaf colors for sunny feel
      const leafColors = ['#88dd30', '#aaee44', '#66cc20', '#ccff55'];
      l.style.background = 'linear-gradient(135deg, ' + leafColors[i % leafColors.length] + ', ' + leafColors[(i + 1) % leafColors.length] + ')';
      sparkleContainer.appendChild(l);
      requestAnimationFrame(() => l.classList.add('falling'));
      setTimeout(() => l.remove(), 4000);
    }
  }

  // === ANIMATION SEQUENCE ===
  async function runSequence() {
    // 1. Scene fades in
    await wait(800);
    meadowScene.classList.add('visible');
    await wait(1200);

    // 2. "Quest Completed!" appears
    questHeader.classList.add('visible');
    await wait(800);

    // 3. Level and XP sections appear
    levelSection.classList.add('visible');
    await wait(400);
    xpSection.classList.add('visible');
    await wait(600);

    // 4. XP bar fills from 0 to 500/500 (100%)
    await animateXP(0, 500, 500, 2200);
    xpBarFill.classList.add('maxed');
    await wait(400);

    // 5. LEVEL UP!
    // Flash - warm yellow/gold
    levelUpFlash.classList.add('active');

    // Sparkles from center (bright gold)
    const rect = levelSection.getBoundingClientRect();
    spawnSparkles(rect.left + rect.width / 2, rect.top + rect.height / 2, 24);
    spawnLeaves();

    // Show butterflies
    butterflies.forEach((b, i) => {
      setTimeout(() => b.classList.add('visible'), i * 150);
    });

    await wait(300);
    levelUpFlash.classList.remove('active');

    // Transition level text: Level 1 -> Level 2
    levelOld.classList.add('highlight');
    await wait(300);
    levelArrow.classList.add('visible');
    await wait(300);
    levelNew.classList.add('visible');
    await wait(200);
    levelNew.classList.add('highlight');
    levelOld.classList.remove('highlight');

    // Change rank in level section
    rankTitle.classList.add('highlight');
    rankTitle.textContent = 'Explorer';

    // More sparkles
    spawnSparkles(rect.left + rect.width / 2, rect.top + rect.height / 2, 16);
    await wait(800);

    // 5b. TITLE PROMOTION (new for variant 4)
    titlePromotion.classList.add('visible');
    titleSunburst.classList.add('visible');

    // Celebratory sparkles around title
    await wait(300);
    const promoRect = titlePromotion.getBoundingClientRect();
    spawnSparkles(promoRect.left + promoRect.width / 2, promoRect.top + promoRect.height / 2, 20);
    await wait(500);

    // Show "Trainee -> Explorer" with own beat
    titleChange.classList.add('visible');
    await wait(200);
    spawnSparkles(promoRect.left + promoRect.width / 2, promoRect.top + promoRect.height, 12);
    await wait(800);

    // 6. XP bar resets, flowers close
    xpBarFill.classList.remove('maxed');
    closeFlowers();
    xpBarFill.style.width = '0%';
    xpText.textContent = '0 / 600 XP';
    await wait(600);

    // 7. Fill to 50% of new level (300/600)
    await animateXP(0, 300, 600, 1600);
    xpText.textContent = '300 / 600 XP';
    await wait(400);

    // 8. +500 XP appears
    xpBonus.classList.add('visible');
    await wait(200);
    xpBonusText.classList.add('glow');

    // Final sparkles around the bonus text
    const bonusRect = xpBonusText.getBoundingClientRect();
    spawnSparkles(bonusRect.left + bonusRect.width / 2, bonusRect.top + bonusRect.height / 2, 12);
  }

  runSequence();
})();
</script>
</body>
</html>
