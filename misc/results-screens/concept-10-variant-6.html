<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quest Completed - Knight's Quest: Math Adventure</title>
<link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&family=Quicksand:wght@400;500;600;700&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #e8f5f0;
  font-family: 'Quicksand', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* === PASTEL GARDEN BACKGROUND === */
.garden-scene {
  position: fixed;
  inset: 0;
  opacity: 0;
  transition: opacity 1.5s ease;
}
.garden-scene.visible { opacity: 1; }

/* Sky gradient - lightest pastel mint to white */
.sky {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, #e8f5f0 0%, #eef8f4 30%, #f5faf8 50%, #fdfefe 70%, #ffffff 100%);
}

/* Sun glow - very soft */
.sun-glow {
  position: absolute;
  top: 6%;
  left: 50%;
  transform: translateX(-50%);
  width: 160px;
  height: 160px;
  background: radial-gradient(circle, rgba(255, 240, 210, 0.5) 0%, rgba(255, 230, 190, 0.2) 40%, transparent 70%);
  border-radius: 50%;
  filter: blur(20px);
}
.sun-glow::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(255, 245, 225, 0.15) 0%, transparent 60%);
  border-radius: 50%;
}

/* Soft light rays */
.light-rays {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 60%;
  opacity: 0.12;
  background:
    linear-gradient(175deg, rgba(255, 220, 200, 0.4) 0%, transparent 50%) no-repeat 15% 0 / 80px 100%,
    linear-gradient(172deg, rgba(220, 200, 255, 0.3) 0%, transparent 45%) no-repeat 35% 0 / 60px 100%,
    linear-gradient(178deg, rgba(200, 240, 220, 0.35) 0%, transparent 55%) no-repeat 60% 0 / 70px 100%,
    linear-gradient(174deg, rgba(255, 210, 220, 0.25) 0%, transparent 40%) no-repeat 82% 0 / 50px 100%;
}

/* Clouds - pure white, soft */
.cloud {
  position: absolute;
  background: white;
  border-radius: 50%;
  filter: blur(2px);
  opacity: 0.8;
}
.cloud::before, .cloud::after {
  content: '';
  position: absolute;
  background: white;
  border-radius: 50%;
}
.cloud-1 {
  width: 100px; height: 40px; top: 8%; left: 12%;
  animation: cloudDrift 30s ease-in-out infinite;
}
.cloud-1::before { width: 50px; height: 30px; top: -15px; left: 20px; }
.cloud-1::after { width: 60px; height: 35px; top: -10px; left: 45px; }
.cloud-2 {
  width: 80px; height: 32px; top: 12%; right: 15%;
  animation: cloudDrift 35s ease-in-out infinite reverse;
}
.cloud-2::before { width: 45px; height: 25px; top: -12px; left: 15px; }
.cloud-2::after { width: 50px; height: 28px; top: -8px; left: 35px; }
.cloud-3 {
  width: 70px; height: 28px; top: 6%; left: 55%;
  animation: cloudDrift 28s ease-in-out infinite;
  animation-delay: -10s;
}
.cloud-3::before { width: 40px; height: 22px; top: -10px; left: 12px; }
.cloud-3::after { width: 45px; height: 24px; top: -8px; left: 30px; }

@keyframes cloudDrift {
  0%, 100% { transform: translateX(0); }
  50% { transform: translateX(30px); }
}

/* Mountains - very soft pastel gray-blue */
.mountains {
  position: absolute;
  bottom: 28%;
  left: 0;
  width: 100%;
  height: 35%;
}
.mountain {
  position: absolute;
  bottom: 0;
  border-left: solid transparent;
  border-right: solid transparent;
  border-bottom-style: solid;
}
.mountain-1 {
  left: 5%;
  border-left-width: 180px;
  border-right-width: 160px;
  border-bottom-width: 200px;
  border-bottom-color: #d5d8e0;
  opacity: 0.5;
}
.mountain-2 {
  left: 25%;
  border-left-width: 200px;
  border-right-width: 220px;
  border-bottom-width: 250px;
  border-bottom-color: #cdd2dc;
  opacity: 0.45;
}
.mountain-3 {
  right: 5%;
  border-left-width: 190px;
  border-right-width: 170px;
  border-bottom-width: 220px;
  border-bottom-color: #d8dce4;
  opacity: 0.4;
}

/* Round trees with pastel green foliage and flower dots */
.tree {
  position: absolute;
  bottom: 22%;
}
.tree-trunk {
  width: 12px;
  height: 40px;
  background: linear-gradient(to right, #c4a882, #d4b892, #c4a882);
  margin: 0 auto;
  border-radius: 0 0 4px 4px;
}
.tree-foliage {
  width: 70px;
  height: 70px;
  background: radial-gradient(circle at 40% 40%, #b8ddc4, #98ccaa);
  border-radius: 50%;
  position: relative;
  margin: 0 auto;
  box-shadow: inset -8px -8px 15px rgba(0,0,0,0.05);
}
.tree-foliage::before {
  content: '';
  position: absolute;
  inset: 5px;
  border-radius: 50%;
  background:
    radial-gradient(circle at 25% 30%, #f5c6d0 3px, transparent 3px),
    radial-gradient(circle at 60% 20%, #d4c4e8 2.5px, transparent 2.5px),
    radial-gradient(circle at 45% 65%, #f5c6d0 2px, transparent 2px),
    radial-gradient(circle at 75% 50%, #d4c4e8 2.5px, transparent 2.5px),
    radial-gradient(circle at 20% 60%, #ffe8a0 2px, transparent 2px),
    radial-gradient(circle at 80% 30%, #f5c6d0 2px, transparent 2px);
}
.tree:nth-child(1) { left: 6%; bottom: 24%; }
.tree:nth-child(1) .tree-foliage { width: 80px; height: 80px; }
.tree:nth-child(2) { left: 16%; bottom: 22%; transform: scale(0.8); }
.tree:nth-child(3) { right: 8%; bottom: 23%; }
.tree:nth-child(3) .tree-foliage { width: 75px; height: 75px; background: radial-gradient(circle at 40% 40%, #aed8ba, #90c8a4); }
.tree:nth-child(4) { right: 20%; bottom: 22%; transform: scale(0.7); }

/* Rolling hills - pastel greens */
.hills {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 35%;
}
.hill {
  position: absolute;
  border-radius: 50%;
  bottom: 0;
}
.hill-back-1 {
  width: 140%;
  height: 250px;
  left: -20%;
  bottom: -80px;
  background: linear-gradient(to bottom, #c8e8d8, #b8ddc8);
}
.hill-back-2 {
  width: 80%;
  height: 200px;
  right: -10%;
  bottom: -60px;
  background: linear-gradient(to bottom, #c2e4d0, #b4d8c2);
}
.hill-front-1 {
  width: 120%;
  height: 200px;
  left: -10%;
  bottom: -100px;
  background: linear-gradient(to bottom, #c8e8d8, #bce0cc);
}
.hill-front-2 {
  width: 70%;
  height: 160px;
  left: 20%;
  bottom: -80px;
  background: linear-gradient(to bottom, #d0eede, #c4e6d2);
}

/* Decorative garden flowers on the ground */
.ground-flower {
  position: absolute;
  z-index: 2;
}
.ground-flower .gf-stem {
  width: 3px;
  height: 30px;
  background: linear-gradient(to bottom, #8cc4a0, #a0d0b0);
  margin: 0 auto;
  border-radius: 2px;
}
.ground-flower .gf-bloom {
  width: 24px;
  height: 24px;
  position: relative;
  margin: 0 auto;
}
.ground-flower .gf-petal {
  position: absolute;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  top: 50%;
  left: 50%;
}
.ground-flower .gf-petal:nth-child(1) { transform: translate(-50%, -110%); }
.ground-flower .gf-petal:nth-child(2) { transform: translate(15%, -75%); }
.ground-flower .gf-petal:nth-child(3) { transform: translate(15%, -15%); }
.ground-flower .gf-petal:nth-child(4) { transform: translate(-50%, 15%); }
.ground-flower .gf-petal:nth-child(5) { transform: translate(-115%, -15%); }
.ground-flower .gf-petal:nth-child(6) { transform: translate(-115%, -75%); }
.ground-flower .gf-center {
  position: absolute;
  width: 8px;
  height: 8px;
  background: #ffe8a0;
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}
.ground-flower:nth-child(1) { bottom: 20%; left: 8%; }
.ground-flower:nth-child(1) .gf-petal { background: #f5c6d0; }
.ground-flower:nth-child(2) { bottom: 18%; left: 25%; transform: scale(0.7); }
.ground-flower:nth-child(2) .gf-petal { background: #d4c4e8; }
.ground-flower:nth-child(3) { bottom: 21%; right: 10%; }
.ground-flower:nth-child(3) .gf-petal { background: #c8e8d8; }
.ground-flower:nth-child(4) { bottom: 17%; right: 25%; transform: scale(0.8); }
.ground-flower:nth-child(4) .gf-petal { background: #f5c6d0; }
.ground-flower:nth-child(5) { bottom: 22%; left: 38%; transform: scale(0.6); }
.ground-flower:nth-child(5) .gf-petal { background: #d4c4e8; }
.ground-flower:nth-child(6) { bottom: 19%; right: 38%; transform: scale(0.75); }
.ground-flower:nth-child(6) .gf-petal { background: #ffe8c0; }

/* Large decorative CSS flowers as bg elements */
.deco-flower {
  position: absolute;
  z-index: 1;
  opacity: 0.25;
}
.deco-flower .df-petal {
  position: absolute;
  border-radius: 50%;
  top: 50%;
  left: 50%;
}
.deco-flower .df-petal:nth-child(1) { transform: translate(-50%, -120%) rotate(0deg); }
.deco-flower .df-petal:nth-child(2) { transform: translate(25%, -85%) rotate(60deg); }
.deco-flower .df-petal:nth-child(3) { transform: translate(25%, -5%) rotate(120deg); }
.deco-flower .df-petal:nth-child(4) { transform: translate(-50%, 25%) rotate(180deg); }
.deco-flower .df-petal:nth-child(5) { transform: translate(-125%, -5%) rotate(240deg); }
.deco-flower .df-petal:nth-child(6) { transform: translate(-125%, -85%) rotate(300deg); }
.deco-flower-1 {
  top: 15%; left: 5%; width: 80px; height: 80px;
}
.deco-flower-1 .df-petal { width: 30px; height: 30px; background: #f5c6d0; }
.deco-flower-2 {
  top: 10%; right: 8%; width: 60px; height: 60px;
}
.deco-flower-2 .df-petal { width: 24px; height: 24px; background: #d4c4e8; }
.deco-flower-3 {
  bottom: 35%; left: 3%; width: 50px; height: 50px;
}
.deco-flower-3 .df-petal { width: 20px; height: 20px; background: #c8e8d8; }
.deco-flower-4 {
  bottom: 38%; right: 4%; width: 65px; height: 65px;
}
.deco-flower-4 .df-petal { width: 26px; height: 26px; background: #f5c6d0; }

/* === BUTTERFLIES === */
.butterfly {
  position: absolute;
  opacity: 0;
  transition: opacity 0.5s ease;
  pointer-events: none;
}
.butterfly.visible { opacity: 1; }

.butterfly-body {
  width: 3px;
  height: 14px;
  background: #a08870;
  border-radius: 2px;
  position: relative;
  margin: 0 auto;
}
.wing-left, .wing-right {
  position: absolute;
  top: 2px;
  width: 14px;
  height: 17px;
  transform-origin: right center;
  animation: wingFlap 0.4s ease-in-out infinite alternate;
}
.wing-left {
  right: 100%;
  border-radius: 50% 50% 0 50%;
  transform-origin: right center;
}
.wing-right {
  left: 100%;
  border-radius: 50% 50% 50% 0;
  transform-origin: left center;
}
@keyframes wingFlap {
  0% { transform: rotateY(0deg) scaleX(1); }
  100% { transform: rotateY(60deg) scaleX(0.4); }
}

.butterfly:nth-child(1) .wing-left, .butterfly:nth-child(1) .wing-right {
  background: linear-gradient(135deg, #f5c6d0, #e8a8b8);
}
.butterfly:nth-child(2) .wing-left, .butterfly:nth-child(2) .wing-right {
  background: linear-gradient(135deg, #d4c4e8, #c0b0d8);
}
.butterfly:nth-child(3) .wing-left, .butterfly:nth-child(3) .wing-right {
  background: linear-gradient(135deg, #c8e8d8, #b0d8c4);
}
.butterfly:nth-child(4) .wing-left, .butterfly:nth-child(4) .wing-right {
  background: linear-gradient(135deg, #f5dcc0, #e8ccaa);
}

.butterfly { animation: butterflyPath 6s ease-in-out infinite; }
.butterfly:nth-child(2) { animation: butterflyPath2 7s ease-in-out infinite; }
.butterfly:nth-child(3) { animation: butterflyPath3 5.5s ease-in-out infinite; }
.butterfly:nth-child(4) { animation: butterflyPath4 6.5s ease-in-out infinite; }

@keyframes butterflyPath {
  0%, 100% { transform: translate(0, 0) rotate(-5deg); }
  25% { transform: translate(60px, -80px) rotate(5deg); }
  50% { transform: translate(-30px, -120px) rotate(-8deg); }
  75% { transform: translate(40px, -50px) rotate(3deg); }
}
@keyframes butterflyPath2 {
  0%, 100% { transform: translate(0, 0) rotate(3deg); }
  25% { transform: translate(-70px, -60px) rotate(-5deg); }
  50% { transform: translate(40px, -100px) rotate(8deg); }
  75% { transform: translate(-50px, -40px) rotate(-3deg); }
}
@keyframes butterflyPath3 {
  0%, 100% { transform: translate(0, 0) rotate(-3deg); }
  33% { transform: translate(50px, -90px) rotate(6deg); }
  66% { transform: translate(-40px, -70px) rotate(-6deg); }
}
@keyframes butterflyPath4 {
  0%, 100% { transform: translate(0, 0) rotate(5deg); }
  33% { transform: translate(-60px, -70px) rotate(-4deg); }
  66% { transform: translate(30px, -110px) rotate(4deg); }
}

/* === FLOWERS ALONG XP PATH === */
.bloom-flower {
  width: 20px;
  height: 20px;
  position: relative;
  transform: scale(0);
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.bloom-flower.bloomed { transform: scale(1); }
.bloom-flower.closed { transform: scale(0); transition: transform 0.3s ease-in; }

.bloom-flower .petal {
  position: absolute;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  top: 50%;
  left: 50%;
}
.bloom-flower .petal:nth-child(1) { transform: translate(-50%, -100%); }
.bloom-flower .petal:nth-child(2) { transform: translate(20%, -70%); }
.bloom-flower .petal:nth-child(3) { transform: translate(20%, -10%); }
.bloom-flower .petal:nth-child(4) { transform: translate(-50%, 15%); }
.bloom-flower .petal:nth-child(5) { transform: translate(-120%, -10%); }
.bloom-flower .petal:nth-child(6) { transform: translate(-120%, -70%); }
.bloom-flower .center {
  position: absolute;
  width: 6px;
  height: 6px;
  background: #ffe8a0;
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* Flower color sets - pastel */
.bloom-flower.pink .petal { background: #f5c6d0; }
.bloom-flower.lavender .petal { background: #d4c4e8; }
.bloom-flower.white .petal { background: #f0ecf4; }
.bloom-flower.softyellow .petal { background: #f5e8c0; }
.bloom-flower.softyellow .center { background: #e0c890; }

/* === MAIN CONTENT === */
.content {
  position: relative;
  z-index: 10;
  text-align: center;
  width: 100%;
  max-width: 560px;
  padding: 0 20px;
}

/* Content panel - soft white/pink tint */
.content-panel {
  background: rgba(255, 252, 254, 0.75);
  border-radius: 24px;
  padding: 36px 32px 32px;
  backdrop-filter: blur(8px);
  border: 2px solid rgba(245, 198, 208, 0.3);
  box-shadow:
    0 4px 30px rgba(212, 196, 232, 0.15),
    0 1px 3px rgba(245, 198, 208, 0.1),
    inset 0 1px 0 rgba(255, 255, 255, 0.8);
}

/* Quest Completed Header */
.quest-header {
  opacity: 0;
  transform: translateY(20px) scale(0.9);
  transition: opacity 0.8s ease, transform 0.8s ease;
  margin-bottom: 24px;
}
.quest-header.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
}

.quest-title {
  font-family: 'Amatic SC', cursive;
  font-weight: 700;
  font-size: 68px;
  color: #9a80b0;
  text-shadow:
    0 0 30px rgba(212, 196, 232, 0.4),
    0 0 60px rgba(245, 198, 208, 0.2),
    0 2px 4px rgba(150, 120, 170, 0.15);
  line-height: 1;
  letter-spacing: 3px;
  position: relative;
}
.quest-title .flower-deco {
  display: inline-block;
  color: #d4c4e8;
  font-size: 36px;
  vertical-align: middle;
  opacity: 0.7;
}

/* Level display */
.level-section {
  opacity: 0;
  transform: translateY(15px);
  transition: opacity 0.6s ease, transform 0.6s ease;
  margin-bottom: 18px;
}
.level-section.visible {
  opacity: 1;
  transform: translateY(0);
}

.level-display {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 6px;
}

.level-badge {
  font-family: 'Patrick Hand', cursive;
  font-size: 32px;
  color: #a090b8;
  text-shadow: 0 1px 3px rgba(160, 140, 180, 0.2);
  transition: all 0.5s ease;
}
.level-badge.highlight {
  color: #c890b0;
  text-shadow: 0 0 15px rgba(245, 198, 208, 0.5), 0 1px 3px rgba(160, 140, 180, 0.2);
  transform: scale(1.15);
}

.level-arrow {
  font-size: 24px;
  color: #d4c4e8;
  opacity: 0;
  transform: scaleX(0);
  transition: opacity 0.4s ease, transform 0.4s ease;
}
.level-arrow.visible {
  opacity: 1;
  transform: scaleX(1);
}

.level-new {
  opacity: 0;
  transform: translateX(-10px);
  transition: opacity 0.4s ease, transform 0.4s ease;
}
.level-new.visible {
  opacity: 1;
  transform: translateX(0);
}

.rank-title {
  font-family: 'Patrick Hand', cursive;
  font-size: 22px;
  color: #b0a0c0;
  text-shadow: 0 1px 2px rgba(160, 140, 180, 0.15);
  transition: all 0.5s ease;
  min-height: 30px;
}
.rank-title.highlight {
  color: #c890b0;
  text-shadow: 0 0 12px rgba(245, 198, 208, 0.4), 0 1px 2px rgba(160, 140, 180, 0.2);
  font-size: 26px;
}

/* Title Promotion banner */
.title-promotion {
  opacity: 0;
  transform: translateY(8px) scale(0.9);
  transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  margin-top: 4px;
  margin-bottom: 8px;
}
.title-promotion.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
}
.title-promotion-label {
  font-family: 'Amatic SC', cursive;
  font-weight: 700;
  font-size: 36px;
  color: #c890b0;
  text-shadow: 0 0 20px rgba(245, 198, 208, 0.4);
  letter-spacing: 2px;
}
.title-promotion-detail {
  font-family: 'Patrick Hand', cursive;
  font-size: 22px;
  color: #b0a0c0;
  margin-top: 2px;
}
.title-promotion-detail .old-title {
  color: #c4b4d4;
  text-decoration: line-through;
  text-decoration-color: rgba(196, 180, 212, 0.5);
}
.title-promotion-detail .promo-arrow {
  color: #d4c4e8;
  margin: 0 8px;
}
.title-promotion-detail .new-title {
  color: #c890b0;
  font-weight: 600;
  text-shadow: 0 0 10px rgba(245, 198, 208, 0.3);
}

/* XP Bar - pastel garden path */
.xp-section {
  opacity: 0;
  transform: translateY(15px);
  transition: opacity 0.6s ease, transform 0.6s ease;
  margin-bottom: 14px;
}
.xp-section.visible {
  opacity: 1;
  transform: translateY(0);
}

.xp-bar-container {
  position: relative;
  width: 100%;
  height: 28px;
  background: rgba(245, 198, 208, 0.25);
  border-radius: 14px;
  border: 2px solid rgba(212, 196, 232, 0.3);
  overflow: hidden;
  box-shadow: inset 0 2px 6px rgba(212, 196, 232, 0.15);
}

.xp-bar-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #d4c4e8, #c8dce8, #c8e8d8);
  border-radius: 12px;
  transition: none;
  position: relative;
  box-shadow: 0 0 10px rgba(200, 232, 216, 0.3);
}
.xp-bar-fill::after {
  content: '';
  position: absolute;
  top: 3px;
  left: 8px;
  right: 8px;
  height: 6px;
  background: linear-gradient(to bottom, rgba(255,255,255,0.4), transparent);
  border-radius: 3px;
}

.xp-bar-fill.maxed {
  background: linear-gradient(90deg, #d4c4e8, #c8e8d8, #bbe8d0);
  box-shadow: 0 0 20px rgba(200, 232, 216, 0.5);
}

.xp-text {
  font-family: 'Quicksand', sans-serif;
  font-weight: 600;
  font-size: 13px;
  color: #a090b8;
  margin-top: 6px;
  text-shadow: 0 1px 2px rgba(160, 140, 180, 0.1);
}

/* Flower track above XP bar */
.flower-row {
  display: flex;
  justify-content: space-around;
  align-items: flex-end;
  width: 100%;
  height: 28px;
  margin-bottom: 4px;
}

/* +500 XP popup */
.xp-bonus {
  opacity: 0;
  transform: translateY(10px) scale(0.8);
  transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  margin-top: 14px;
}
.xp-bonus.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
}

.xp-bonus-text {
  font-family: 'Patrick Hand', cursive;
  font-size: 36px;
  color: #c890b0;
  text-shadow:
    0 0 20px rgba(245, 198, 208, 0.5),
    0 0 40px rgba(212, 196, 232, 0.2),
    0 2px 4px rgba(160, 140, 180, 0.15);
  display: inline-block;
  animation: none;
}
.xp-bonus-text.glow {
  animation: bonusGlow 2s ease-in-out infinite;
}
@keyframes bonusGlow {
  0%, 100% { text-shadow: 0 0 20px rgba(245, 198, 208, 0.5), 0 0 40px rgba(212, 196, 232, 0.2), 0 2px 4px rgba(160, 140, 180, 0.15); }
  50% { text-shadow: 0 0 30px rgba(245, 198, 208, 0.7), 0 0 60px rgba(212, 196, 232, 0.3), 0 2px 4px rgba(160, 140, 180, 0.15); }
}

/* Level up flash - soft pastel pink/lavender */
.level-up-flash {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at 50% 50%, rgba(245, 198, 208, 0.3), rgba(212, 196, 232, 0.15) 40%, transparent 70%);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
  z-index: 5;
}
.level-up-flash.active {
  opacity: 1;
}

/* === AMBIENT PARTICLES (flower petals) === */
.petal-particle {
  position: absolute;
  width: 8px;
  height: 6px;
  border-radius: 50% 0 50% 50%;
  opacity: 0;
  animation: petalDrift 12s linear infinite;
  pointer-events: none;
}
@keyframes petalDrift {
  0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
  8% { opacity: 0.6; }
  85% { opacity: 0.5; }
  100% { transform: translateY(200px) translateX(40px) rotate(360deg); opacity: 0; }
}

/* Sparkle burst for level-up */
.sparkle {
  position: absolute;
  width: 3px;
  height: 3px;
  background: #f5c6d0;
  border-radius: 50%;
  opacity: 0;
  pointer-events: none;
}
.sparkle.burst {
  animation: sparkleBurst 1s ease-out forwards;
}
@keyframes sparkleBurst {
  0% { opacity: 1; transform: translate(0, 0) scale(1); }
  100% { opacity: 0; transform: translate(var(--sx), var(--sy)) scale(0); }
}

/* Leaf (petal) particles during level up */
.leaf {
  position: absolute;
  width: 10px;
  height: 8px;
  border-radius: 50% 0 50% 50%;
  opacity: 0;
  pointer-events: none;
}
.leaf.falling {
  animation: leafFall 3s ease-in forwards;
}
@keyframes leafFall {
  0% { opacity: 0.8; transform: translateY(0) rotate(0deg); }
  100% { opacity: 0; transform: translateY(200px) rotate(360deg) translateX(var(--lx)); }
}

/* Confetti petals for title promotion */
.confetti {
  position: absolute;
  opacity: 0;
  pointer-events: none;
}
.confetti.falling {
  animation: confettiFall 2.5s ease-in forwards;
}
@keyframes confettiFall {
  0% { opacity: 0.9; transform: translateY(0) rotate(0deg) scale(1); }
  100% { opacity: 0; transform: translateY(250px) rotate(720deg) translateX(var(--cx)) scale(0.5); }
}
</style>
</head>
<body>

<!-- Sparkle container for level up effect -->
<div id="sparkleContainer" style="position:fixed;inset:0;pointer-events:none;z-index:20;"></div>

<script>
(function() {
  // === CREATE AMBIENT PETAL PARTICLES ===
  const petalContainer = document.getElementById('petalContainer');
  const petalColors = ['#f5c6d0', '#d4c4e8', '#c8e8d8', '#f5e8c0', '#e8d4e8', '#d0e8d8'];
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'petal-particle';
    p.style.left = (5 + Math.random() * 90) + '%';
    p.style.top = (5 + Math.random() * 50) + '%';
    p.style.background = petalColors[Math.floor(Math.random() * petalColors.length)];
    p.style.animationDelay = (Math.random() * 12) + 's';
    p.style.animationDuration = (10 + Math.random() * 8) + 's';
    p.style.width = (6 + Math.random() * 4) + 'px';
    p.style.height = (4 + Math.random() * 3) + 'px';
    petalContainer.appendChild(p);
  }

  // === CREATE FLOWERS IN ROW ===
  const flowerRow = document.getElementById('flowerRow');
  const flowerColors = ['pink', 'lavender', 'softyellow', 'white', 'pink', 'lavender', 'softyellow', 'pink', 'white', 'lavender', 'pink', 'softyellow'];
  const flowers = [];
  for (let i = 0; i < 12; i++) {
    const f = document.createElement('div');
    f.className = 'bloom-flower ' + flowerColors[i];
    f.innerHTML = '<div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="center"></div>';
    flowerRow.appendChild(f);
    flowers.push(f);
  }

  // === REFS ===
  const gardenScene = document.getElementById('gardenScene');
  const questHeader = document.getElementById('questHeader');
  const levelSection = document.getElementById('levelSection');
  const xpSection = document.getElementById('xpSection');
  const xpBarFill = document.getElementById('xpBarFill');
  const xpText = document.getElementById('xpText');
  const xpBonus = document.getElementById('xpBonus');
  const xpBonusText = document.getElementById('xpBonusText');
  const levelOld = document.getElementById('levelOld');
  const levelArrow = document.getElementById('levelArrow');
  const levelNew = document.getElementById('levelNew');
  const rankTitle = document.getElementById('rankTitle');
  const titlePromotion = document.getElementById('titlePromotion');
  const levelUpFlash = document.getElementById('levelUpFlash');
  const sparkleContainer = document.getElementById('sparkleContainer');
  const butterflies = document.querySelectorAll('.butterfly');

  // === HELPERS ===
  function wait(ms) {
    return new Promise(r => setTimeout(r, ms));
  }

  function animateXP(from, to, max, duration) {
    return new Promise(resolve => {
      const start = performance.now();
      function tick(now) {
        const t = Math.min((now - start) / duration, 1);
        const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
        const current = Math.round(from + (to - from) * eased);
        const pct = (current / max) * 100;
        xpBarFill.style.width = pct + '%';
        xpText.textContent = current + ' / ' + max + ' XP';

        // Bloom flowers proportionally
        const flowerIndex = Math.floor((current / max) * flowers.length);
        for (let i = 0; i < flowers.length; i++) {
          if (i <= flowerIndex && current > 0) {
            if (!flowers[i].classList.contains('bloomed')) {
              flowers[i].classList.remove('closed');
              flowers[i].classList.add('bloomed');
            }
          }
        }

        if (t < 1) {
          requestAnimationFrame(tick);
        } else {
          resolve();
        }
      }
      requestAnimationFrame(tick);
    });
  }

  function closeFlowers() {
    flowers.forEach(f => {
      f.classList.remove('bloomed');
      f.classList.add('closed');
    });
  }

  function spawnSparkles(cx, cy, count) {
    for (let i = 0; i < count; i++) {
      const s = document.createElement('div');
      s.className = 'sparkle';
      const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
      const dist = 40 + Math.random() * 80;
      s.style.left = cx + 'px';
      s.style.top = cy + 'px';
      s.style.setProperty('--sx', Math.cos(angle) * dist + 'px');
      s.style.setProperty('--sy', Math.sin(angle) * dist + 'px');
      s.style.background = ['#f5c6d0', '#d4c4e8', '#c8e8d8', '#ffe8a0', '#f0d0e0'][Math.floor(Math.random() * 5)];
      s.style.width = (2 + Math.random() * 3) + 'px';
      s.style.height = s.style.width;
      sparkleContainer.appendChild(s);
      requestAnimationFrame(() => s.classList.add('burst'));
      setTimeout(() => s.remove(), 1100);
    }
  }

  function spawnPetalBurst() {
    const petalBurstColors = ['#f5c6d0', '#d4c4e8', '#c8e8d8', '#f5e8c0', '#e8d4e8', '#f0d0e0'];
    for (let i = 0; i < 14; i++) {
      const l = document.createElement('div');
      l.className = 'leaf';
      l.style.left = (20 + Math.random() * 60) + '%';
      l.style.top = (10 + Math.random() * 30) + '%';
      l.style.background = petalBurstColors[Math.floor(Math.random() * petalBurstColors.length)];
      l.style.setProperty('--lx', (Math.random() - 0.5) * 100 + 'px');
      l.style.animationDelay = (Math.random() * 0.8) + 's';
      sparkleContainer.appendChild(l);
      requestAnimationFrame(() => l.classList.add('falling'));
      setTimeout(() => l.remove(), 4000);
    }
  }

  function spawnConfetti(cx, cy) {
    const confettiColors = ['#f5c6d0', '#d4c4e8', '#c8e8d8', '#f5e8c0', '#e8d4e8', '#ffe8a0'];
    for (let i = 0; i < 24; i++) {
      const c = document.createElement('div');
      c.className = 'confetti';
      // Mix of tiny petals and circles
      if (i % 3 === 0) {
        c.style.width = '8px';
        c.style.height = '6px';
        c.style.borderRadius = '50% 0 50% 50%';
      } else if (i % 3 === 1) {
        c.style.width = '6px';
        c.style.height = '6px';
        c.style.borderRadius = '50%';
      } else {
        c.style.width = '4px';
        c.style.height = '8px';
        c.style.borderRadius = '2px';
      }
      c.style.background = confettiColors[Math.floor(Math.random() * confettiColors.length)];
      c.style.left = cx + (Math.random() - 0.5) * 200 + 'px';
      c.style.top = cy + (Math.random() - 0.5) * 40 + 'px';
      c.style.setProperty('--cx', (Math.random() - 0.5) * 120 + 'px');
      c.style.animationDelay = (Math.random() * 0.6) + 's';
      sparkleContainer.appendChild(c);
      requestAnimationFrame(() => c.classList.add('falling'));
      setTimeout(() => c.remove(), 3200);
    }
  }

  // === ANIMATION SEQUENCE ===
  async function runSequence() {
    // 1. Garden fades in
    await wait(800);
    gardenScene.classList.add('visible');
    await wait(1200);

    // 2. "Quest Completed!" appears
    questHeader.classList.add('visible');
    await wait(800);

    // 3. Level and XP sections appear
    levelSection.classList.add('visible');
    await wait(400);
    xpSection.classList.add('visible');
    await wait(600);

    // 4. XP bar fills from 0 to 500/500 (100%)
    await animateXP(0, 500, 500, 2200);
    xpBarFill.classList.add('maxed');
    await wait(400);

    // 5. LEVEL UP!
    // Flash - soft pastel pink/lavender wash
    levelUpFlash.classList.add('active');

    // Sparkles from center
    const rect = levelSection.getBoundingClientRect();
    spawnSparkles(rect.left + rect.width / 2, rect.top + rect.height / 2, 24);
    spawnPetalBurst();

    // Show butterflies
    butterflies.forEach((b, i) => {
      setTimeout(() => b.classList.add('visible'), i * 150);
    });

    await wait(300);
    levelUpFlash.classList.remove('active');

    // Transition level text: Level 1 -> 2
    levelOld.classList.add('highlight');
    await wait(300);
    levelArrow.classList.add('visible');
    await wait(300);
    levelNew.classList.add('visible');
    await wait(200);
    levelNew.classList.add('highlight');
    levelOld.classList.remove('highlight');

    // More sparkles
    spawnSparkles(rect.left + rect.width / 2, rect.top + rect.height / 2, 16);
    await wait(500);

    // 5b. TITLE PROMOTION with confetti/flower petals
    titlePromotion.classList.add('visible');
    const promoRect = titlePromotion.getBoundingClientRect();
    spawnConfetti(promoRect.left + promoRect.width / 2, promoRect.top + promoRect.height / 2);
    spawnSparkles(promoRect.left + promoRect.width / 2, promoRect.top, 12);

    // Update rank display
    rankTitle.classList.add('highlight');
    rankTitle.textContent = 'Explorer';

    await wait(1200);

    // Hide title promotion before XP reset
    titlePromotion.classList.remove('visible');
    await wait(400);

    // 6. XP bar resets, flowers close
    xpBarFill.classList.remove('maxed');
    closeFlowers();
    xpBarFill.style.width = '0%';
    xpText.textContent = '0 / 600 XP';
    await wait(600);

    // 7. Fill to 50% of new level (300/600)
    await animateXP(0, 300, 600, 1600);
    xpText.textContent = '300 / 600 XP';
    await wait(400);

    // 8. +500 XP appears
    xpBonus.classList.add('visible');
    await wait(200);
    xpBonusText.classList.add('glow');

    // Final sparkles around the bonus text
    const bonusRect = xpBonusText.getBoundingClientRect();
    spawnSparkles(bonusRect.left + bonusRect.width / 2, bonusRect.top + bonusRect.height / 2, 12);
  }

  runSequence();
})();
</script>
