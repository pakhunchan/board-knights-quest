<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quest Completed - Knight's Quest: Math Adventure</title>
<link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&family=Quicksand:wght@400;500;600;700&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #b8e0d8;
  font-family: 'Quicksand', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* === FLAT LANDSCAPE SCENE === */
.landscape-scene {
  position: fixed;
  inset: 0;
  opacity: 0;
  transition: opacity 1.2s ease;
  overflow: hidden;
}
.landscape-scene.visible { opacity: 1; }

/* Sky - flat mint-teal */
.sky {
  position: absolute;
  inset: 0;
  background: #b8e0d8;
}

/* Clouds - simple white rounded shapes */
.cloud {
  position: absolute;
  background: #ffffff;
  border-radius: 50px;
}
.cloud::before, .cloud::after {
  content: '';
  position: absolute;
  background: #ffffff;
  border-radius: 50%;
}
.cloud-1 {
  width: 120px; height: 40px;
  top: 10%; left: 12%;
}
.cloud-1::before { width: 50px; height: 50px; top: -22px; left: 20px; }
.cloud-1::after { width: 36px; height: 36px; top: -14px; left: 60px; }

.cloud-2 {
  width: 150px; height: 44px;
  top: 8%; right: 15%;
}
.cloud-2::before { width: 60px; height: 60px; top: -28px; left: 28px; }
.cloud-2::after { width: 44px; height: 44px; top: -18px; left: 80px; }

.cloud-3 {
  width: 100px; height: 34px;
  top: 18%; left: 45%;
}
.cloud-3::before { width: 40px; height: 40px; top: -18px; left: 16px; }
.cloud-3::after { width: 30px; height: 30px; top: -10px; left: 52px; }

.cloud-4 {
  width: 90px; height: 30px;
  top: 14%; left: 72%;
}
.cloud-4::before { width: 36px; height: 36px; top: -16px; left: 14px; }
.cloud-4::after { width: 28px; height: 28px; top: -10px; left: 46px; }

/* Mountains - flat triangles with snow caps */
.mountains {
  position: absolute;
  bottom: 28%;
  left: 0;
  width: 100%;
  height: 45%;
}

.mountain {
  position: absolute;
  bottom: 0;
  width: 0; height: 0;
  border-style: solid;
}

/* Tall mountain left-center */
.mt-1 {
  left: 15%;
  border-width: 0 130px 260px 130px;
  border-color: transparent transparent #8a8078 transparent;
}
.mt-1-snow {
  position: absolute;
  left: calc(15% + 130px);
  bottom: calc(28% + 260px - 2px);
  transform: translateX(-50%);
  width: 0; height: 0;
  border-width: 0 30px 50px 30px;
  border-style: solid;
  border-color: transparent transparent #f0ece8 transparent;
}

/* Tallest mountain center-right */
.mt-2 {
  left: 40%;
  border-width: 0 160px 320px 160px;
  border-color: transparent transparent #7a7068 transparent;
}
.mt-2-snow {
  position: absolute;
  left: calc(40% + 160px);
  bottom: calc(28% + 320px - 2px);
  transform: translateX(-50%);
  width: 0; height: 0;
  border-width: 0 36px 60px 36px;
  border-style: solid;
  border-color: transparent transparent #f0ece8 transparent;
}

/* Medium mountain right */
.mt-3 {
  right: 5%;
  border-width: 0 110px 220px 110px;
  border-color: transparent transparent #9a9088 transparent;
}
.mt-3-snow {
  position: absolute;
  right: calc(5% + 110px);
  bottom: calc(28% + 220px - 2px);
  transform: translateX(50%);
  width: 0; height: 0;
  border-width: 0 24px 40px 24px;
  border-style: solid;
  border-color: transparent transparent #f0ece8 transparent;
}

/* Small mountain far left */
.mt-4 {
  left: -3%;
  border-width: 0 100px 180px 100px;
  border-color: transparent transparent #9a9088 transparent;
}
.mt-4-snow {
  position: absolute;
  left: calc(-3% + 100px);
  bottom: calc(28% + 180px - 2px);
  transform: translateX(-50%);
  width: 0; height: 0;
  border-width: 0 20px 34px 20px;
  border-style: solid;
  border-color: transparent transparent #f0ece8 transparent;
}

/* Trees - flat green circles on brown trunks */
.tree-row {
  position: absolute;
  bottom: 26%;
  left: 0;
  width: 100%;
  height: 120px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 12px;
  padding: 0 5%;
}

.tree {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex-shrink: 0;
}
.tree-canopy {
  border-radius: 50%;
  background: #6aaa5a;
}
.tree-trunk {
  background: #8a7a6a;
}

.tree-sm .tree-canopy { width: 32px; height: 32px; }
.tree-sm .tree-trunk { width: 6px; height: 12px; }

.tree-md .tree-canopy { width: 44px; height: 44px; }
.tree-md .tree-trunk { width: 8px; height: 14px; }

.tree-lg .tree-canopy { width: 54px; height: 54px; }
.tree-lg .tree-trunk { width: 10px; height: 16px; }

.tree-dark .tree-canopy { background: #5a9a4a; }
.tree-light .tree-canopy { background: #7aba6a; }

/* Rolling hills - overlapping ellipses */
.hills {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 40%;
}

.hill {
  position: absolute;
  border-radius: 50%;
}

/* Back hill layer */
.hill-1 {
  width: 140%;
  height: 300px;
  background: #5a9a4a;
  bottom: -100px;
  left: -20%;
}
/* Mid hill left */
.hill-2 {
  width: 80%;
  height: 260px;
  background: #6aaa5a;
  bottom: -110px;
  left: -15%;
}
/* Mid hill right */
.hill-3 {
  width: 80%;
  height: 240px;
  background: #6aaa5a;
  bottom: -100px;
  right: -20%;
}
/* Front hill center */
.hill-4 {
  width: 120%;
  height: 220px;
  background: #7aba6a;
  bottom: -130px;
  left: -10%;
}
/* Small foreground bumps */
.hill-5 {
  width: 50%;
  height: 160px;
  background: #7aba6a;
  bottom: -110px;
  right: -5%;
}

/* Flat grass strip at very bottom */
.grass-strip {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 60px;
  background: #6aaa5a;
}

/* === FLOWERS (flat style) === */
.bloom-flower {
  width: 20px;
  height: 20px;
  position: relative;
  transform: scale(0);
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.bloom-flower.bloomed { transform: scale(1); }
.bloom-flower.closed { transform: scale(0); transition: transform 0.3s ease-in; }

.bloom-flower .petal {
  position: absolute;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  top: 50%;
  left: 50%;
}
.bloom-flower .petal:nth-child(1) { transform: translate(-50%, -100%); }
.bloom-flower .petal:nth-child(2) { transform: translate(20%, -70%); }
.bloom-flower .petal:nth-child(3) { transform: translate(20%, -10%); }
.bloom-flower .petal:nth-child(4) { transform: translate(-50%, 15%); }
.bloom-flower .petal:nth-child(5) { transform: translate(-120%, -10%); }
.bloom-flower .petal:nth-child(6) { transform: translate(-120%, -70%); }
.bloom-flower .center {
  position: absolute;
  width: 6px;
  height: 6px;
  background: #e8c840;
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* Flat flower colors - solid, no gradients */
.bloom-flower.pink .petal { background: #e89ab0; }
.bloom-flower.purple .petal { background: #b89ae8; }
.bloom-flower.yellow .petal { background: #e8d070; }
.bloom-flower.yellow .center { background: #c89830; }
.bloom-flower.blue .petal { background: #90b8e0; }
.bloom-flower.white .petal { background: #e0dce8; }

/* === BUTTERFLIES (flat style) === */
.butterfly {
  position: absolute;
  opacity: 0;
  transition: opacity 0.5s ease;
  pointer-events: none;
}
.butterfly.visible { opacity: 1; }

.butterfly-body {
  width: 3px;
  height: 14px;
  background: #4a4040;
  border-radius: 2px;
  position: relative;
  margin: 0 auto;
}
.wing-left, .wing-right {
  position: absolute;
  top: 2px;
  width: 12px;
  height: 16px;
  border-radius: 50% 50% 50% 0;
  transform-origin: right center;
  animation: wingFlap 0.4s ease-in-out infinite alternate;
}
.wing-left {
  right: 100%;
  border-radius: 50% 50% 0 50%;
  transform-origin: right center;
}
.wing-right {
  left: 100%;
  border-radius: 50% 50% 50% 0;
  transform-origin: left center;
}
@keyframes wingFlap {
  0% { transform: rotateY(0deg) scaleX(1); }
  100% { transform: rotateY(60deg) scaleX(0.4); }
}

/* Flat solid wing colors */
.butterfly:nth-child(1) .wing-left, .butterfly:nth-child(1) .wing-right { background: #b89ae8; }
.butterfly:nth-child(2) .wing-left, .butterfly:nth-child(2) .wing-right { background: #90b8e0; }
.butterfly:nth-child(3) .wing-left, .butterfly:nth-child(3) .wing-right { background: #e8b860; }
.butterfly:nth-child(4) .wing-left, .butterfly:nth-child(4) .wing-right { background: #80c8a0; }

.butterfly { animation: butterflyPath 6s ease-in-out infinite; }
.butterfly:nth-child(2) { animation: butterflyPath2 7s ease-in-out infinite; }
.butterfly:nth-child(3) { animation: butterflyPath3 5.5s ease-in-out infinite; }
.butterfly:nth-child(4) { animation: butterflyPath4 6.5s ease-in-out infinite; }

@keyframes butterflyPath {
  0%, 100% { transform: translate(0, 0) rotate(-5deg); }
  25% { transform: translate(60px, -80px) rotate(5deg); }
  50% { transform: translate(-30px, -120px) rotate(-8deg); }
  75% { transform: translate(40px, -50px) rotate(3deg); }
}
@keyframes butterflyPath2 {
  0%, 100% { transform: translate(0, 0) rotate(3deg); }
  25% { transform: translate(-70px, -60px) rotate(-5deg); }
  50% { transform: translate(40px, -100px) rotate(8deg); }
  75% { transform: translate(-50px, -40px) rotate(-3deg); }
}
@keyframes butterflyPath3 {
  0%, 100% { transform: translate(0, 0) rotate(-3deg); }
  33% { transform: translate(50px, -90px) rotate(6deg); }
  66% { transform: translate(-40px, -70px) rotate(-6deg); }
}
@keyframes butterflyPath4 {
  0%, 100% { transform: translate(0, 0) rotate(5deg); }
  33% { transform: translate(-60px, -70px) rotate(-4deg); }
  66% { transform: translate(30px, -110px) rotate(4deg); }
}

/* === MAIN CONTENT === */
.content {
  position: relative;
  z-index: 10;
  text-align: center;
  width: 100%;
  max-width: 560px;
  padding: 0 20px;
}

/* Semi-transparent content panel */
.content-panel {
  background: rgba(255, 255, 255, 0.55);
  border-radius: 24px;
  padding: 32px 36px 28px;
  backdrop-filter: blur(2px);
  border: 2px solid rgba(255, 255, 255, 0.6);
}

/* Quest Completed Header */
.quest-header {
  opacity: 0;
  transform: translateY(20px) scale(0.9);
  transition: opacity 0.8s ease, transform 0.8s ease;
  margin-bottom: 24px;
}
.quest-header.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
}

.quest-title {
  font-family: 'Amatic SC', cursive;
  font-weight: 700;
  font-size: 68px;
  color: #3a6a3a;
  line-height: 1;
  letter-spacing: 3px;
  position: relative;
}
.quest-title .deco {
  display: inline-block;
  color: #6aaa5a;
  font-size: 36px;
  vertical-align: middle;
  opacity: 0.7;
}

/* Level display */
.level-section {
  opacity: 0;
  transform: translateY(15px);
  transition: opacity 0.6s ease, transform 0.6s ease;
  margin-bottom: 18px;
}
.level-section.visible {
  opacity: 1;
  transform: translateY(0);
}

.level-display {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 4px;
}

.level-badge {
  font-family: 'Patrick Hand', cursive;
  font-size: 30px;
  color: #4a7a4a;
  transition: all 0.5s ease;
}
.level-badge.highlight {
  color: #c88a20;
  transform: scale(1.15);
}

.level-arrow {
  font-size: 22px;
  color: #6aaa5a;
  opacity: 0;
  transform: scaleX(0);
  transition: opacity 0.4s ease, transform 0.4s ease;
}
.level-arrow.visible {
  opacity: 1;
  transform: scaleX(1);
}

.level-new {
  opacity: 0;
  transform: translateX(-10px);
  transition: opacity 0.4s ease, transform 0.4s ease;
}
.level-new.visible {
  opacity: 1;
  transform: translateX(0);
}

.rank-title {
  font-family: 'Patrick Hand', cursive;
  font-size: 20px;
  color: #5a8a5a;
  transition: all 0.5s ease;
  min-height: 28px;
}
.rank-title.highlight {
  color: #c88a20;
  font-size: 24px;
}

/* Title promotion banner */
.title-promotion {
  opacity: 0;
  transform: translateY(8px) scale(0.9);
  transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  margin-top: 4px;
  margin-bottom: 2px;
}
.title-promotion.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
}
.title-promoted-label {
  font-family: 'Amatic SC', cursive;
  font-weight: 700;
  font-size: 36px;
  color: #c88a20;
  letter-spacing: 2px;
}
.title-promoted-ranks {
  font-family: 'Patrick Hand', cursive;
  font-size: 22px;
  color: #5a7a5a;
  margin-top: 2px;
}
.title-promoted-ranks .old-rank { opacity: 0.5; }
.title-promoted-ranks .rank-arrow { color: #6aaa5a; margin: 0 8px; }
.title-promoted-ranks .new-rank { color: #c88a20; font-weight: 600; }

/* XP Bar - flat style */
.xp-section {
  opacity: 0;
  transform: translateY(15px);
  transition: opacity 0.6s ease, transform 0.6s ease;
  margin-bottom: 14px;
}
.xp-section.visible {
  opacity: 1;
  transform: translateY(0);
}

.xp-bar-container {
  position: relative;
  width: 100%;
  height: 26px;
  background: #c8ece4;
  border-radius: 13px;
  border: 2px solid #a8d4cc;
  overflow: hidden;
}

.xp-bar-fill {
  height: 100%;
  width: 0%;
  background: #6aaa5a;
  border-radius: 11px;
  transition: none;
  position: relative;
}
.xp-bar-fill.maxed {
  background: #88c868;
}

.xp-text {
  font-family: 'Quicksand', sans-serif;
  font-weight: 600;
  font-size: 13px;
  color: #4a7a4a;
  margin-top: 6px;
}

/* Flower track row */
.flower-row {
  display: flex;
  justify-content: space-around;
  align-items: flex-end;
  width: 100%;
  height: 28px;
  margin-bottom: 4px;
}

/* +500 XP popup */
.xp-bonus {
  opacity: 0;
  transform: translateY(10px) scale(0.8);
  transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  margin-top: 14px;
}
.xp-bonus.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
}

.xp-bonus-text {
  font-family: 'Patrick Hand', cursive;
  font-size: 34px;
  color: #c88a20;
  display: inline-block;
  animation: none;
}
.xp-bonus-text.glow {
  animation: bonusGlow 2s ease-in-out infinite;
}
@keyframes bonusGlow {
  0%, 100% { color: #c88a20; }
  50% { color: #d8a030; }
}

/* Level up flash - flat style, subtle */
.level-up-flash {
  position: fixed;
  inset: 0;
  background: rgba(255, 255, 255, 0.35);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
  z-index: 5;
}
.level-up-flash.active {
  opacity: 1;
}

/* === SPARKLES (flat circles) === */
.sparkle {
  position: absolute;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  opacity: 0;
  pointer-events: none;
}
.sparkle.burst {
  animation: sparkleBurst 1s ease-out forwards;
}
@keyframes sparkleBurst {
  0% { opacity: 1; transform: translate(0, 0) scale(1); }
  50% { opacity: 0.8; }
  100% { opacity: 0; transform: translate(var(--sx), var(--sy)) scale(0.3); }
}

/* Leaf particles - flat shapes */
.leaf {
  position: absolute;
  width: 10px;
  height: 14px;
  background: #5a9a4a;
  border-radius: 0 50% 50% 50%;
  opacity: 0;
  pointer-events: none;
}
.leaf.falling {
  animation: leafFall 3s ease-in forwards;
}
@keyframes leafFall {
  0% { opacity: 0.8; transform: translateY(0) rotate(0deg); }
  100% { opacity: 0; transform: translateY(200px) rotate(360deg) translateX(var(--lx)); }
}

/* Scene grass flowers (static decoration on hills) */
.scene-flower {
  position: absolute;
  z-index: 2;
}
.scene-flower-stem {
  width: 2px;
  height: 14px;
  background: #5a9a4a;
  margin: 0 auto;
}
.scene-flower-head {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  position: relative;
  margin: 0 auto -2px;
}
.scene-flower-head::after {
  content: '';
  position: absolute;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #e8c840;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}
</style>
</head>
<body>

<div class="landscape-scene" id="landscapeScene">
  <div class="sky"></div>

  <!-- Clouds -->
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>
  <div class="cloud cloud-4"></div>

  <!-- Mountains -->
  <div class="mountains">
    <div class="mountain mt-4"></div>
    <div class="mt-4-snow"></div>
    <div class="mountain mt-1"></div>
    <div class="mt-1-snow"></div>
    <div class="mountain mt-2"></div>
    <div class="mt-2-snow"></div>
    <div class="mountain mt-3"></div>
    <div class="mt-3-snow"></div>
  </div>

  <!-- Trees -->
  <div class="tree-row">
    <div class="tree tree-sm tree-dark"><div class="tree-canopy"></div><div class="tree-trunk"></div></div>
    <div class="tree tree-md"><div class="tree-canopy"></div><div class="tree-trunk"></div></div>
    <div class="tree tree-lg tree-dark"><div class="tree-canopy"></div><div class="tree-trunk"></div></div>
    <div class="tree tree-sm tree-light"><div class="tree-canopy"></div><div class="tree-trunk"></div></div>
    <div class="tree tree-md"><div class="tree-canopy"></div><div class="tree-trunk"></div></div>
    <div class="tree tree-lg"><div class="tree-canopy"></div><div class="tree-trunk"></div></div>
    <div class="tree tree-md tree-dark"><div class="tree-canopy"></div><div class="tree-trunk"></div></div>
    <div class="tree tree-sm"><div class="tree-canopy"></div><div class="tree-trunk"></div></div>
    <div class="tree tree-lg tree-light"><div class="tree-canopy"></div><div class="tree-trunk"></div></div>
    <div class="tree tree-md"><div class="tree-canopy"></div><div class="tree-trunk"></div></div>
    <div class="tree tree-sm tree-dark"><div class="tree-canopy"></div><div class="tree-trunk"></div></div>
    <div class="tree tree-md tree-light"><div class="tree-canopy"></div><div class="tree-trunk"></div></div>
    <div class="tree tree-lg"><div class="tree-canopy"></div><div class="tree-trunk"></div></div>
    <div class="tree tree-sm"><div class="tree-canopy"></div><div class="tree-trunk"></div></div>
  </div>

  <!-- Rolling hills -->
  <div class="hills">
    <div class="hill hill-1"></div>
    <div class="hill hill-2"></div>
    <div class="hill hill-3"></div>
    <div class="hill hill-4"></div>
    <div class="hill hill-5"></div>
  </div>
  <div class="grass-strip"></div>

  <!-- Scene flowers on hills -->
  <div id="sceneFlowers"></div>

  <!-- Butterflies -->
  <div id="butterflyContainer">
    <div class="butterfly" style="top: 22%; left: 18%;">
      <div class="butterfly-body"><div class="wing-left"></div><div class="wing-right"></div></div>
    </div>
    <div class="butterfly" style="top: 28%; right: 20%;">
      <div class="butterfly-body"><div class="wing-left"></div><div class="wing-right"></div></div>
    </div>
    <div class="butterfly" style="top: 16%; left: 42%;">
      <div class="butterfly-body"><div class="wing-left"></div><div class="wing-right"></div></div>
    </div>
    <div class="butterfly" style="top: 32%; right: 36%;">
      <div class="butterfly-body"><div class="wing-left"></div><div class="wing-right"></div></div>
    </div>
  </div>

  <!-- Level up flash overlay -->
  <div class="level-up-flash" id="levelUpFlash"></div>
</div>

<!-- Main content -->
<div class="content">
  <div class="content-panel">
    <div class="quest-header" id="questHeader">
      <div class="quest-title">
        <span class="deco">~</span>
        Quest Completed!
        <span class="deco">~</span>
      </div>
    </div>

    <div class="level-section" id="levelSection">
      <div class="level-display">
        <span class="level-badge" id="levelOld">Level 1</span>
        <span class="level-arrow" id="levelArrow">&#10140;</span>
        <span class="level-badge level-new" id="levelNew">Level 2</span>
      </div>
      <div class="rank-title" id="rankTitle">Trainee</div>
      <div class="title-promotion" id="titlePromotion">
        <div class="title-promoted-label">Title Promoted!</div>
        <div class="title-promoted-ranks">
          <span class="old-rank">Trainee</span>
          <span class="rank-arrow">&#10140;</span>
          <span class="new-rank">Explorer</span>
        </div>
      </div>
    </div>

    <div class="xp-section" id="xpSection">
      <div class="flower-row" id="flowerRow"></div>
      <div class="xp-bar-container">
        <div class="xp-bar-fill" id="xpBarFill"></div>
      </div>
      <div class="xp-text" id="xpText">0 / 500 XP</div>
    </div>

    <div class="xp-bonus" id="xpBonus">
      <span class="xp-bonus-text" id="xpBonusText">+500 XP</span>
    </div>
  </div>
</div>

<!-- Sparkle container -->
<div id="sparkleContainer" style="position:fixed;inset:0;pointer-events:none;z-index:20;"></div>

<script>
(function() {
  // === CREATE SCENE FLOWERS ON HILLS ===
  const sceneFlowersContainer = document.getElementById('sceneFlowers');
  const sceneFlowerColors = ['#e89ab0', '#b89ae8', '#e8d070', '#90b8e0', '#e0dce8'];
  for (let i = 0; i < 16; i++) {
    const f = document.createElement('div');
    f.className = 'scene-flower';
    f.style.bottom = (6 + Math.random() * 14) + '%';
    f.style.left = (5 + Math.random() * 90) + '%';
    const scale = 0.6 + Math.random() * 0.6;
    f.style.transform = 'scale(' + scale + ')';
    const color = sceneFlowerColors[Math.floor(Math.random() * sceneFlowerColors.length)];
    f.innerHTML = '<div class="scene-flower-head" style="background:' + color + '"></div><div class="scene-flower-stem"></div>';
    sceneFlowersContainer.appendChild(f);
  }

  // === CREATE FLOWERS IN ROW ===
  const flowerRow = document.getElementById('flowerRow');
  const flowerColors = ['pink', 'purple', 'yellow', 'blue', 'white', 'pink', 'yellow', 'purple', 'blue', 'pink', 'white', 'yellow'];
  const flowers = [];
  for (let i = 0; i < 12; i++) {
    const f = document.createElement('div');
    f.className = 'bloom-flower ' + flowerColors[i];
    f.innerHTML = '<div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="center"></div>';
    flowerRow.appendChild(f);
    flowers.push(f);
  }

  // === REFS ===
  const landscapeScene = document.getElementById('landscapeScene');
  const questHeader = document.getElementById('questHeader');
  const levelSection = document.getElementById('levelSection');
  const xpSection = document.getElementById('xpSection');
  const xpBarFill = document.getElementById('xpBarFill');
  const xpText = document.getElementById('xpText');
  const xpBonus = document.getElementById('xpBonus');
  const xpBonusText = document.getElementById('xpBonusText');
  const levelOld = document.getElementById('levelOld');
  const levelArrow = document.getElementById('levelArrow');
  const levelNew = document.getElementById('levelNew');
  const rankTitle = document.getElementById('rankTitle');
  const titlePromotion = document.getElementById('titlePromotion');
  const levelUpFlash = document.getElementById('levelUpFlash');
  const sparkleContainer = document.getElementById('sparkleContainer');
  const butterflies = document.querySelectorAll('.butterfly');

  // === HELPERS ===
  function wait(ms) {
    return new Promise(r => setTimeout(r, ms));
  }

  function animateXP(from, to, max, duration) {
    return new Promise(resolve => {
      const start = performance.now();
      function tick(now) {
        const t = Math.min((now - start) / duration, 1);
        const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
        const current = Math.round(from + (to - from) * eased);
        const pct = (current / max) * 100;
        xpBarFill.style.width = pct + '%';
        xpText.textContent = current + ' / ' + max + ' XP';

        // Bloom flowers proportionally
        const flowerIndex = Math.floor((current / max) * flowers.length);
        for (let i = 0; i < flowers.length; i++) {
          if (i <= flowerIndex && current > 0) {
            if (!flowers[i].classList.contains('bloomed')) {
              flowers[i].classList.remove('closed');
              flowers[i].classList.add('bloomed');
            }
          }
        }

        if (t < 1) {
          requestAnimationFrame(tick);
        } else {
          resolve();
        }
      }
      requestAnimationFrame(tick);
    });
  }

  function closeFlowers() {
    flowers.forEach(f => {
      f.classList.remove('bloomed');
      f.classList.add('closed');
    });
  }

  function spawnSparkles(cx, cy, count) {
    // Flat colored circles
    const colors = ['#c88a20', '#6aaa5a', '#e89ab0', '#b89ae8', '#90b8e0', '#e8d070'];
    for (let i = 0; i < count; i++) {
      const s = document.createElement('div');
      s.className = 'sparkle';
      const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
      const dist = 40 + Math.random() * 80;
      s.style.left = cx + 'px';
      s.style.top = cy + 'px';
      s.style.setProperty('--sx', Math.cos(angle) * dist + 'px');
      s.style.setProperty('--sy', Math.sin(angle) * dist + 'px');
      s.style.background = colors[Math.floor(Math.random() * colors.length)];
      s.style.width = (5 + Math.random() * 6) + 'px';
      s.style.height = s.style.width;
      sparkleContainer.appendChild(s);
      requestAnimationFrame(() => s.classList.add('burst'));
      setTimeout(() => s.remove(), 1100);
    }
  }

  function spawnLeaves() {
    const greens = ['#5a9a4a', '#6aaa5a', '#7aba6a'];
    for (let i = 0; i < 12; i++) {
      const l = document.createElement('div');
      l.className = 'leaf';
      l.style.left = (20 + Math.random() * 60) + '%';
      l.style.top = (10 + Math.random() * 30) + '%';
      l.style.background = greens[Math.floor(Math.random() * greens.length)];
      l.style.setProperty('--lx', (Math.random() - 0.5) * 100 + 'px');
      l.style.animationDelay = (Math.random() * 0.8) + 's';
      sparkleContainer.appendChild(l);
      requestAnimationFrame(() => l.classList.add('falling'));
      setTimeout(() => l.remove(), 4000);
    }
  }

  // === ANIMATION SEQUENCE ===
  async function runSequence() {
    // 1. Scene fades in
    await wait(800);
    landscapeScene.classList.add('visible');
    await wait(1000);

    // 2. "Quest Completed!" appears
    questHeader.classList.add('visible');
    await wait(800);

    // 3. Level and XP sections appear
    levelSection.classList.add('visible');
    await wait(400);
    xpSection.classList.add('visible');
    await wait(600);

    // 4. XP bar fills from 0 to 500/500 (2.2s)
    await animateXP(0, 500, 500, 2200);
    xpBarFill.classList.add('maxed');
    await wait(400);

    // 5. LEVEL UP!
    // Flash
    levelUpFlash.classList.add('active');

    // Sparkles from center
    const rect = levelSection.getBoundingClientRect();
    spawnSparkles(rect.left + rect.width / 2, rect.top + rect.height / 2, 24);
    spawnLeaves();

    // Show butterflies
    butterflies.forEach((b, i) => {
      setTimeout(() => b.classList.add('visible'), i * 150);
    });

    await wait(300);
    levelUpFlash.classList.remove('active');

    // Transition level text: Level 1 -> Level 2
    levelOld.classList.add('highlight');
    await wait(300);
    levelArrow.classList.add('visible');
    await wait(300);
    levelNew.classList.add('visible');
    await wait(200);
    levelNew.classList.add('highlight');
    levelOld.classList.remove('highlight');

    // Show title promotion
    rankTitle.style.display = 'none';
    titlePromotion.classList.add('visible');

    // More sparkles
    spawnSparkles(rect.left + rect.width / 2, rect.top + rect.height / 2, 16);
    await wait(1200);

    // 6. XP bar resets, flowers close
    xpBarFill.classList.remove('maxed');
    closeFlowers();
    xpBarFill.style.width = '0%';
    xpText.textContent = '0 / 600 XP';
    await wait(600);

    // 7. Fill to 300/600 (50% of new level)
    await animateXP(0, 300, 600, 1600);
    xpText.textContent = '300 / 600 XP';
    await wait(400);

    // 8. +500 XP appears
    xpBonus.classList.add('visible');
    await wait(200);
    xpBonusText.classList.add('glow');

    // Final sparkles around the bonus text
    const bonusRect = xpBonusText.getBoundingClientRect();
    spawnSparkles(bonusRect.left + bonusRect.width / 2, bonusRect.top + bonusRect.height / 2, 12);
  }

  runSequence();
})();
</script>
</body>
</html>
