<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quest Completed - Knight's Quest: Math Adventure (Watercolor Wash)</title>
<link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&family=Quicksand:wght@400;500;600;700&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #f5f0e6;
  font-family: 'Quicksand', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* === PAPER TEXTURE BASE === */
.paper-texture {
  position: fixed;
  inset: 0;
  background:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(180, 160, 130, 0.03) 2px,
      rgba(180, 160, 130, 0.03) 4px
    ),
    repeating-linear-gradient(
      90deg,
      transparent,
      transparent 3px,
      rgba(160, 140, 110, 0.02) 3px,
      rgba(160, 140, 110, 0.02) 6px
    );
  z-index: 0;
  pointer-events: none;
}

/* === WATERCOLOR SCENE === */
.watercolor-scene {
  position: fixed;
  inset: 0;
  opacity: 0;
  transition: opacity 1.5s ease;
  overflow: hidden;
}
.watercolor-scene.visible { opacity: 1; }

/* Sky - soft watercolor wash blobs */
.sky-wash {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 120% 80% at 30% 20%, rgba(176, 216, 200, 0.7) 0%, transparent 60%),
    radial-gradient(ellipse 100% 70% at 70% 15%, rgba(200, 225, 210, 0.6) 0%, transparent 55%),
    radial-gradient(ellipse 140% 60% at 50% 10%, rgba(210, 230, 220, 0.5) 0%, transparent 50%),
    radial-gradient(ellipse 80% 90% at 15% 30%, rgba(230, 225, 200, 0.4) 0%, transparent 50%),
    radial-gradient(ellipse 90% 80% at 85% 25%, rgba(220, 230, 215, 0.5) 0%, transparent 55%);
  filter: blur(20px);
}

/* Warm cream base underneath */
.sky-base {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, #e8e0d0 0%, #ede6d8 30%, #f0ead8 60%, #e8e2d0 100%);
}

/* Watercolor wash blobs - overlapping translucent color areas */
.wash-blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(40px);
  opacity: 0.5;
}
.wash-blob:nth-child(1) {
  width: 500px; height: 400px;
  top: -10%; left: -5%;
  background: radial-gradient(ellipse, rgba(176, 200, 176, 0.6) 0%, transparent 70%);
}
.wash-blob:nth-child(2) {
  width: 600px; height: 350px;
  top: -5%; right: -10%;
  background: radial-gradient(ellipse, rgba(200, 210, 190, 0.5) 0%, transparent 65%);
}
.wash-blob:nth-child(3) {
  width: 400px; height: 300px;
  top: 5%; left: 30%;
  background: radial-gradient(ellipse, rgba(240, 230, 200, 0.5) 0%, transparent 60%);
}
.wash-blob:nth-child(4) {
  width: 350px; height: 250px;
  top: 15%; right: 15%;
  background: radial-gradient(ellipse, rgba(190, 210, 200, 0.4) 0%, transparent 60%);
}

/* Clouds - soft watercolor puffs */
.cloud {
  position: absolute;
  border-radius: 50%;
  filter: blur(18px);
}
.cloud:nth-child(1) {
  width: 200px; height: 80px; top: 10%; left: 15%;
  background: radial-gradient(ellipse, rgba(255, 255, 250, 0.7) 0%, transparent 70%);
}
.cloud:nth-child(2) {
  width: 260px; height: 90px; top: 8%; right: 20%;
  background: radial-gradient(ellipse, rgba(255, 255, 248, 0.6) 0%, transparent 65%);
}
.cloud:nth-child(3) {
  width: 180px; height: 70px; top: 15%; left: 55%;
  background: radial-gradient(ellipse, rgba(255, 252, 245, 0.5) 0%, transparent 60%);
}

/* Mountains - soft triangular watercolor shapes */
.mountains {
  position: absolute;
  bottom: 35%;
  left: 0;
  width: 100%;
  height: 35%;
}
.mountain {
  position: absolute;
  bottom: 0;
  filter: blur(8px);
}
.mountain:nth-child(1) {
  left: 5%;
  width: 0; height: 0;
  border-left: 180px solid transparent;
  border-right: 200px solid transparent;
  border-bottom: 220px solid rgba(160, 150, 140, 0.3);
  filter: blur(12px);
}
.mountain:nth-child(2) {
  left: 25%;
  width: 0; height: 0;
  border-left: 220px solid transparent;
  border-right: 180px solid transparent;
  border-bottom: 260px solid rgba(150, 145, 135, 0.25);
  filter: blur(14px);
}
.mountain:nth-child(3) {
  right: 10%;
  width: 0; height: 0;
  border-left: 200px solid transparent;
  border-right: 160px solid transparent;
  border-bottom: 200px solid rgba(155, 148, 138, 0.28);
  filter: blur(10px);
}

/* Rolling hills - watercolor ellipses */
.hills {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 50%;
}
.hill {
  position: absolute;
  border-radius: 50%;
  filter: blur(6px);
}
.hill:nth-child(1) {
  width: 140%; height: 300px; bottom: -120px; left: -20%;
  background: radial-gradient(ellipse at 50% 30%, rgba(160, 190, 140, 0.7) 0%, rgba(145, 175, 125, 0.5) 40%, transparent 70%);
}
.hill:nth-child(2) {
  width: 80%; height: 260px; bottom: -80px; left: -10%;
  background: radial-gradient(ellipse at 50% 30%, rgba(150, 185, 130, 0.6) 0%, rgba(140, 170, 120, 0.4) 45%, transparent 70%);
}
.hill:nth-child(3) {
  width: 70%; height: 240px; bottom: -90px; right: -10%;
  background: radial-gradient(ellipse at 50% 30%, rgba(155, 188, 135, 0.65) 0%, rgba(142, 172, 122, 0.4) 40%, transparent 70%);
}
.hill:nth-child(4) {
  width: 120%; height: 200px; bottom: -100px; left: -10%;
  background: radial-gradient(ellipse at 50% 20%, rgba(140, 178, 118, 0.7) 0%, rgba(130, 165, 108, 0.5) 35%, transparent 65%);
}

/* Trees - soft circular watercolor shapes */
.wc-tree {
  position: absolute;
  bottom: 20%;
}
.wc-tree-crown {
  border-radius: 50%;
  filter: blur(6px);
}
.wc-tree-trunk {
  margin: -4px auto 0;
  border-radius: 2px;
  filter: blur(2px);
}

.wc-tree:nth-child(1) { left: 8%; bottom: 22%; }
.wc-tree:nth-child(1) .wc-tree-crown {
  width: 70px; height: 65px;
  background: radial-gradient(ellipse, rgba(120, 160, 100, 0.7) 0%, rgba(100, 145, 85, 0.3) 60%, transparent 80%);
}
.wc-tree:nth-child(1) .wc-tree-trunk {
  width: 10px; height: 25px;
  background: rgba(140, 120, 95, 0.5);
}

.wc-tree:nth-child(2) { left: 18%; bottom: 25%; }
.wc-tree:nth-child(2) .wc-tree-crown {
  width: 55px; height: 50px;
  background: radial-gradient(ellipse, rgba(130, 168, 108, 0.65) 0%, rgba(110, 150, 90, 0.3) 55%, transparent 75%);
}
.wc-tree:nth-child(2) .wc-tree-trunk {
  width: 8px; height: 20px;
  background: rgba(145, 125, 100, 0.45);
}

.wc-tree:nth-child(3) { right: 12%; bottom: 24%; }
.wc-tree:nth-child(3) .wc-tree-crown {
  width: 65px; height: 60px;
  background: radial-gradient(ellipse, rgba(125, 165, 105, 0.7) 0%, rgba(105, 148, 88, 0.3) 58%, transparent 78%);
}
.wc-tree:nth-child(3) .wc-tree-trunk {
  width: 9px; height: 22px;
  background: rgba(142, 122, 98, 0.48);
}

.wc-tree:nth-child(4) { right: 25%; bottom: 27%; }
.wc-tree:nth-child(4) .wc-tree-crown {
  width: 48px; height: 45px;
  background: radial-gradient(ellipse, rgba(135, 172, 112, 0.6) 0%, rgba(115, 155, 95, 0.25) 55%, transparent 75%);
}
.wc-tree:nth-child(4) .wc-tree-trunk {
  width: 7px; height: 18px;
  background: rgba(148, 128, 102, 0.42);
}

.wc-tree:nth-child(5) { left: 35%; bottom: 23%; }
.wc-tree:nth-child(5) .wc-tree-crown {
  width: 42px; height: 40px;
  background: radial-gradient(ellipse, rgba(128, 165, 106, 0.55) 0%, rgba(108, 148, 88, 0.2) 50%, transparent 70%);
}
.wc-tree:nth-child(5) .wc-tree-trunk {
  width: 6px; height: 16px;
  background: rgba(144, 124, 99, 0.4);
}

/* Sun glow - warm watercolor diffusion */
.sun-glow {
  position: absolute;
  top: 3%;
  left: 50%;
  transform: translateX(-50%);
  width: 200px;
  height: 200px;
  background: radial-gradient(circle, rgba(255, 240, 200, 0.4) 0%, rgba(255, 230, 180, 0.15) 40%, transparent 65%);
  border-radius: 50%;
  filter: blur(25px);
}

/* === FLOWERS ALONG XP PATH === */
.flower-track {
  position: absolute;
  display: flex;
  align-items: center;
  gap: 4px;
  pointer-events: none;
}

.bloom-flower {
  width: 22px;
  height: 22px;
  position: relative;
  transform: scale(0);
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.bloom-flower.bloomed { transform: scale(1); }
.bloom-flower.closed { transform: scale(0); transition: transform 0.3s ease-in; }

.bloom-flower .petal {
  position: absolute;
  width: 9px;
  height: 9px;
  border-radius: 50%;
  top: 50%;
  left: 50%;
  filter: blur(0.5px);
  opacity: 0.85;
}
.bloom-flower .petal:nth-child(1) { transform: translate(-50%, -100%); }
.bloom-flower .petal:nth-child(2) { transform: translate(20%, -70%); }
.bloom-flower .petal:nth-child(3) { transform: translate(20%, -10%); }
.bloom-flower .petal:nth-child(4) { transform: translate(-50%, 15%); }
.bloom-flower .petal:nth-child(5) { transform: translate(-120%, -10%); }
.bloom-flower .petal:nth-child(6) { transform: translate(-120%, -70%); }
.bloom-flower .center {
  position: absolute;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  filter: blur(0.3px);
}

/* Muted watercolor flower colors */
.bloom-flower.dusty-pink .petal { background: rgba(200, 150, 160, 0.8); }
.bloom-flower.dusty-pink .center { background: rgba(210, 180, 140, 0.9); }
.bloom-flower.lavender .petal { background: rgba(170, 160, 195, 0.8); }
.bloom-flower.lavender .center { background: rgba(200, 185, 150, 0.9); }
.bloom-flower.soft-gold .petal { background: rgba(210, 195, 140, 0.8); }
.bloom-flower.soft-gold .center { background: rgba(180, 140, 100, 0.9); }
.bloom-flower.sage .petal { background: rgba(150, 180, 145, 0.8); }
.bloom-flower.sage .center { background: rgba(200, 185, 140, 0.9); }
.bloom-flower.cream .petal { background: rgba(225, 215, 195, 0.85); }
.bloom-flower.cream .center { background: rgba(195, 170, 130, 0.9); }
.bloom-flower.dusty-rose .petal { background: rgba(190, 140, 145, 0.8); }
.bloom-flower.dusty-rose .center { background: rgba(205, 180, 140, 0.9); }

/* === BUTTERFLIES - watercolor style === */
.butterfly {
  position: absolute;
  opacity: 0;
  transition: opacity 0.6s ease;
  pointer-events: none;
}
.butterfly.visible { opacity: 1; }

.butterfly-body {
  width: 3px;
  height: 14px;
  background: rgba(100, 80, 60, 0.6);
  border-radius: 2px;
  position: relative;
  margin: 0 auto;
  filter: blur(0.3px);
}
.wing-left, .wing-right {
  position: absolute;
  top: 1px;
  width: 14px;
  height: 17px;
  border-radius: 50% 50% 50% 0;
  transform-origin: right center;
  animation: wingFlap 0.45s ease-in-out infinite alternate;
  filter: blur(0.5px);
  opacity: 0.8;
}
.wing-left {
  right: 100%;
  border-radius: 50% 50% 0 50%;
  transform-origin: right center;
}
.wing-right {
  left: 100%;
  border-radius: 50% 50% 50% 0;
  transform-origin: left center;
}
@keyframes wingFlap {
  0% { transform: rotateY(0deg) scaleX(1); }
  100% { transform: rotateY(60deg) scaleX(0.4); }
}

.butterfly:nth-child(1) .wing-left, .butterfly:nth-child(1) .wing-right {
  background: linear-gradient(135deg, rgba(160, 180, 210, 0.7), rgba(130, 155, 190, 0.5));
}
.butterfly:nth-child(2) .wing-left, .butterfly:nth-child(2) .wing-right {
  background: linear-gradient(135deg, rgba(195, 160, 175, 0.7), rgba(170, 140, 155, 0.5));
}
.butterfly:nth-child(3) .wing-left, .butterfly:nth-child(3) .wing-right {
  background: linear-gradient(135deg, rgba(175, 195, 165, 0.7), rgba(150, 175, 140, 0.5));
}
.butterfly:nth-child(4) .wing-left, .butterfly:nth-child(4) .wing-right {
  background: linear-gradient(135deg, rgba(200, 190, 160, 0.7), rgba(180, 170, 140, 0.5));
}

.butterfly { animation: butterflyPath 6s ease-in-out infinite; }
.butterfly:nth-child(2) { animation: butterflyPath2 7s ease-in-out infinite; }
.butterfly:nth-child(3) { animation: butterflyPath3 5.5s ease-in-out infinite; }
.butterfly:nth-child(4) { animation: butterflyPath4 6.5s ease-in-out infinite; }

@keyframes butterflyPath {
  0%, 100% { transform: translate(0, 0) rotate(-5deg); }
  25% { transform: translate(60px, -80px) rotate(5deg); }
  50% { transform: translate(-30px, -120px) rotate(-8deg); }
  75% { transform: translate(40px, -50px) rotate(3deg); }
}
@keyframes butterflyPath2 {
  0%, 100% { transform: translate(0, 0) rotate(3deg); }
  25% { transform: translate(-70px, -60px) rotate(-5deg); }
  50% { transform: translate(40px, -100px) rotate(8deg); }
  75% { transform: translate(-50px, -40px) rotate(-3deg); }
}
@keyframes butterflyPath3 {
  0%, 100% { transform: translate(0, 0) rotate(-3deg); }
  33% { transform: translate(50px, -90px) rotate(6deg); }
  66% { transform: translate(-40px, -70px) rotate(-6deg); }
}
@keyframes butterflyPath4 {
  0%, 100% { transform: translate(0, 0) rotate(5deg); }
  33% { transform: translate(-60px, -70px) rotate(-4deg); }
  66% { transform: translate(30px, -110px) rotate(4deg); }
}

/* === MAIN CONTENT === */
.content {
  position: relative;
  z-index: 10;
  text-align: center;
  width: 100%;
  max-width: 560px;
  padding: 0 20px;
}

/* Quest Completed Header */
.quest-header {
  opacity: 0;
  transform: translateY(20px) scale(0.9);
  transition: opacity 0.8s ease, transform 0.8s ease;
  margin-bottom: 28px;
}
.quest-header.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
}

.quest-title {
  font-family: 'Amatic SC', cursive;
  font-weight: 700;
  font-size: 72px;
  color: #6b7a58;
  line-height: 1;
  letter-spacing: 3px;
  position: relative;
  text-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
}

/* Watercolor wash behind title */
.quest-title-wash {
  position: absolute;
  top: -15px; left: -30px; right: -30px; bottom: -10px;
  background: radial-gradient(ellipse, rgba(200, 215, 180, 0.5) 0%, rgba(210, 220, 190, 0.2) 50%, transparent 75%);
  filter: blur(15px);
  border-radius: 50%;
  z-index: -1;
}

.quest-title .leaf-deco {
  display: inline-block;
  color: rgba(140, 165, 115, 0.6);
  font-size: 38px;
  vertical-align: middle;
}

/* Level display */
.level-section {
  opacity: 0;
  transform: translateY(15px);
  transition: opacity 0.6s ease, transform 0.6s ease;
  margin-bottom: 20px;
}
.level-section.visible {
  opacity: 1;
  transform: translateY(0);
}

.level-display {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 6px;
}

.level-badge {
  font-family: 'Patrick Hand', cursive;
  font-size: 32px;
  color: #7a8a65;
  text-shadow: 0 1px 2px rgba(0,0,0,0.06);
  transition: all 0.5s ease;
}
.level-badge.highlight {
  color: #9a7a40;
  text-shadow: 0 0 12px rgba(190, 160, 80, 0.3), 0 1px 2px rgba(0,0,0,0.08);
  transform: scale(1.15);
}

.level-arrow {
  font-size: 24px;
  color: #8a9a70;
  opacity: 0;
  transform: scaleX(0);
  transition: opacity 0.4s ease, transform 0.4s ease;
}
.level-arrow.visible {
  opacity: 1;
  transform: scaleX(1);
}

.level-new {
  opacity: 0;
  transform: translateX(-10px);
  transition: opacity 0.4s ease, transform 0.4s ease;
}
.level-new.visible {
  opacity: 1;
  transform: translateX(0);
}

.rank-title {
  font-family: 'Patrick Hand', cursive;
  font-size: 22px;
  color: #7a8a65;
  text-shadow: 0 1px 1px rgba(0,0,0,0.05);
  transition: all 0.5s ease;
  min-height: 30px;
}
.rank-title.highlight {
  color: #9a7a40;
  text-shadow: 0 0 10px rgba(190, 160, 80, 0.25), 0 1px 1px rgba(0,0,0,0.06);
  font-size: 26px;
}

/* Title Promotion */
.title-promotion {
  opacity: 0;
  transform: translateY(10px) scale(0.9);
  transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  margin-top: 8px;
  margin-bottom: 12px;
  position: relative;
}
.title-promotion.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
}

.title-promotion-label {
  font-family: 'Amatic SC', cursive;
  font-weight: 700;
  font-size: 36px;
  color: #8a6a35;
  letter-spacing: 2px;
  text-shadow: 0 1px 1px rgba(0,0,0,0.06);
}

.title-promotion-titles {
  font-family: 'Patrick Hand', cursive;
  font-size: 28px;
  color: #7a6a48;
  margin-top: 2px;
}

.title-promotion-titles .old-title {
  color: rgba(130, 120, 100, 0.6);
  text-decoration: line-through;
  text-decoration-color: rgba(130, 120, 100, 0.3);
}

.title-promotion-titles .promo-arrow {
  color: #9a8a60;
  margin: 0 8px;
}

.title-promotion-titles .new-title {
  color: #8a6a35;
}

/* Watercolor splash behind promotion */
.promo-wash {
  position: absolute;
  top: -20px; left: -40px; right: -40px; bottom: -20px;
  z-index: -1;
  filter: blur(18px);
  opacity: 0;
  transition: opacity 0.8s ease;
}
.promo-wash.visible {
  opacity: 1;
}
.promo-wash-inner {
  width: 100%;
  height: 100%;
  background:
    radial-gradient(ellipse 60% 80% at 30% 40%, rgba(210, 195, 150, 0.4) 0%, transparent 70%),
    radial-gradient(ellipse 70% 60% at 70% 50%, rgba(200, 180, 140, 0.35) 0%, transparent 65%),
    radial-gradient(ellipse 50% 70% at 50% 60%, rgba(220, 205, 165, 0.3) 0%, transparent 60%);
  border-radius: 50%;
}

/* XP Bar */
.xp-section {
  opacity: 0;
  transform: translateY(15px);
  transition: opacity 0.6s ease, transform 0.6s ease;
  margin-bottom: 16px;
}
.xp-section.visible {
  opacity: 1;
  transform: translateY(0);
}

.xp-bar-container {
  position: relative;
  width: 100%;
  height: 28px;
  background: rgba(200, 195, 180, 0.4);
  border-radius: 14px;
  border: 2px solid rgba(170, 165, 145, 0.3);
  overflow: hidden;
  box-shadow: inset 0 2px 6px rgba(0,0,0,0.06);
}

.xp-bar-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg,
    rgba(150, 185, 130, 0.8),
    rgba(165, 195, 140, 0.85),
    rgba(180, 205, 155, 0.9),
    rgba(170, 198, 145, 0.85));
  border-radius: 12px;
  transition: none;
  position: relative;
  box-shadow: 0 0 12px rgba(150, 190, 120, 0.15);
}
.xp-bar-fill::after {
  content: '';
  position: absolute;
  top: 3px;
  left: 8px;
  right: 8px;
  height: 6px;
  background: linear-gradient(to bottom, rgba(255,255,255,0.2), transparent);
  border-radius: 3px;
}

.xp-bar-fill.maxed {
  background: linear-gradient(90deg,
    rgba(170, 200, 140, 0.9),
    rgba(185, 210, 150, 0.95),
    rgba(200, 218, 165, 1.0),
    rgba(190, 212, 155, 0.95));
  box-shadow: 0 0 20px rgba(170, 210, 130, 0.3);
}

.xp-text {
  font-family: 'Quicksand', sans-serif;
  font-weight: 600;
  font-size: 13px;
  color: #7a8a65;
  margin-top: 6px;
  text-shadow: 0 1px 1px rgba(255,255,255,0.5);
}

/* Flower row above XP bar */
.flower-row {
  display: flex;
  justify-content: space-around;
  align-items: flex-end;
  width: 100%;
  height: 30px;
  margin-bottom: 4px;
}

/* +500 XP popup */
.xp-bonus {
  opacity: 0;
  transform: translateY(10px) scale(0.8);
  transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  margin-top: 14px;
}
.xp-bonus.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
}

.xp-bonus-text {
  font-family: 'Patrick Hand', cursive;
  font-size: 36px;
  color: #9a7a40;
  text-shadow:
    0 0 15px rgba(190, 165, 80, 0.3),
    0 0 30px rgba(180, 155, 70, 0.12),
    0 1px 2px rgba(0, 0, 0, 0.08);
  display: inline-block;
  animation: none;
}
.xp-bonus-text.glow {
  animation: bonusGlow 2s ease-in-out infinite;
}
@keyframes bonusGlow {
  0%, 100% { text-shadow: 0 0 15px rgba(190, 165, 80, 0.3), 0 0 30px rgba(180, 155, 70, 0.12), 0 1px 2px rgba(0,0,0,0.08); }
  50% { text-shadow: 0 0 25px rgba(200, 175, 90, 0.45), 0 0 50px rgba(190, 165, 80, 0.2), 0 1px 2px rgba(0,0,0,0.08); }
}

/* Level up flash - warm watercolor flash */
.level-up-flash {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at 50% 50%, rgba(230, 220, 180, 0.35), rgba(220, 210, 170, 0.1) 40%, transparent 70%);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
  z-index: 5;
}
.level-up-flash.active {
  opacity: 1;
}

/* === AMBIENT PARTICLES - tiny paint splashes === */
.paint-dot {
  position: absolute;
  border-radius: 50%;
  filter: blur(1px);
  opacity: 0;
  animation: paintFloat 12s linear infinite;
}
@keyframes paintFloat {
  0% { transform: translateY(0) translateX(0) scale(0.5); opacity: 0; }
  15% { opacity: 0.5; transform: scale(1); }
  85% { opacity: 0.4; }
  100% { transform: translateY(-180px) translateX(20px) scale(0.3); opacity: 0; }
}

/* Sparkle burst for level-up - warm tones */
.sparkle {
  position: absolute;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  opacity: 0;
  pointer-events: none;
  filter: blur(0.5px);
}
.sparkle.burst {
  animation: sparkleBurst 1s ease-out forwards;
}
@keyframes sparkleBurst {
  0% { opacity: 0.9; transform: translate(0, 0) scale(1); }
  100% { opacity: 0; transform: translate(var(--sx), var(--sy)) scale(0); }
}

/* Leaf particles during level up */
.leaf {
  position: absolute;
  width: 10px;
  height: 14px;
  background: linear-gradient(135deg, rgba(150, 180, 125, 0.7), rgba(130, 165, 108, 0.5));
  border-radius: 0 50% 50% 50%;
  opacity: 0;
  pointer-events: none;
  filter: blur(0.5px);
}
.leaf.falling {
  animation: leafFall 3s ease-in forwards;
}
@keyframes leafFall {
  0% { opacity: 0.7; transform: translateY(0) rotate(0deg); }
  100% { opacity: 0; transform: translateY(200px) rotate(360deg) translateX(var(--lx)); }
}

/* Paint splash effect for promotion */
.paint-splash {
  position: absolute;
  border-radius: 50%;
  opacity: 0;
  pointer-events: none;
  filter: blur(3px);
}
.paint-splash.active {
  animation: splashAppear 0.8s ease-out forwards;
}
@keyframes splashAppear {
  0% { opacity: 0; transform: scale(0.3); }
  40% { opacity: 0.5; }
  100% { opacity: 0.25; transform: scale(1); }
}
</style>
</head>
<body>

<div class="paper-texture"></div>

<div class="watercolor-scene" id="watercolorScene">
  <!-- Cream base -->
  <div class="sky-base"></div>

  <!-- Watercolor wash blobs -->
  <div class="sky-wash">
    <div class="wash-blob"></div>
    <div class="wash-blob"></div>
    <div class="wash-blob"></div>
    <div class="wash-blob"></div>
  </div>

  <!-- Sun glow -->
  <div class="sun-glow"></div>

  <!-- Clouds -->
  <div class="cloud"></div>
  <div class="cloud"></div>
  <div class="cloud"></div>

  <!-- Mountains -->
  <div class="mountains">
    <div class="mountain"></div>
    <div class="mountain"></div>
    <div class="mountain"></div>
  </div>

  <!-- Trees -->
  <div class="wc-tree"><div class="wc-tree-crown"></div><div class="wc-tree-trunk"></div></div>
  <div class="wc-tree"><div class="wc-tree-crown"></div><div class="wc-tree-trunk"></div></div>
  <div class="wc-tree"><div class="wc-tree-crown"></div><div class="wc-tree-trunk"></div></div>
  <div class="wc-tree"><div class="wc-tree-crown"></div><div class="wc-tree-trunk"></div></div>
  <div class="wc-tree"><div class="wc-tree-crown"></div><div class="wc-tree-trunk"></div></div>

  <!-- Rolling hills -->
  <div class="hills">
    <div class="hill"></div>
    <div class="hill"></div>
    <div class="hill"></div>
    <div class="hill"></div>
  </div>

  <!-- Butterflies -->
  <div id="butterflyContainer">
    <div class="butterfly" style="top: 25%; left: 20%;">
      <div class="butterfly-body"><div class="wing-left"></div><div class="wing-right"></div></div>
    </div>
    <div class="butterfly" style="top: 30%; right: 22%;">
      <div class="butterfly-body"><div class="wing-left"></div><div class="wing-right"></div></div>
    </div>
    <div class="butterfly" style="top: 18%; left: 40%;">
      <div class="butterfly-body"><div class="wing-left"></div><div class="wing-right"></div></div>
    </div>
    <div class="butterfly" style="top: 35%; right: 38%;">
      <div class="butterfly-body"><div class="wing-left"></div><div class="wing-right"></div></div>
    </div>
  </div>

  <!-- Ambient paint dots -->
  <div id="paintDotContainer"></div>

  <!-- Level up flash overlay -->
  <div class="level-up-flash" id="levelUpFlash"></div>
</div>

<!-- Main content -->
<div class="content">
  <div class="quest-header" id="questHeader">
    <div class="quest-title">
      <div class="quest-title-wash"></div>
      <span class="leaf-deco">~</span>
      Quest Completed!
      <span class="leaf-deco">~</span>
    </div>
  </div>

  <div class="level-section" id="levelSection">
    <div class="level-display">
      <span class="level-badge" id="levelOld">Level 1</span>
      <span class="level-arrow" id="levelArrow">&#10140;</span>
      <span class="level-badge level-new" id="levelNew">Level 2</span>
    </div>
    <div class="rank-title" id="rankTitle">Trainee</div>
  </div>

  <!-- Title Promotion (hidden initially) -->
  <div class="title-promotion" id="titlePromotion">
    <div class="promo-wash" id="promoWash">
      <div class="promo-wash-inner"></div>
    </div>
    <div class="title-promotion-label">Title Promoted!</div>
    <div class="title-promotion-titles">
      <span class="old-title">Trainee</span>
      <span class="promo-arrow">&#10140;</span>
      <span class="new-title">Explorer</span>
    </div>
  </div>

  <div class="xp-section" id="xpSection">
    <div class="flower-row" id="flowerRow"></div>
    <div class="xp-bar-container">
      <div class="xp-bar-fill" id="xpBarFill"></div>
    </div>
    <div class="xp-text" id="xpText">0 / 500 XP</div>
  </div>

  <div class="xp-bonus" id="xpBonus">
    <span class="xp-bonus-text" id="xpBonusText">+500 XP</span>
  </div>
</div>

<!-- Sparkle container for level up effect -->
<div id="sparkleContainer" style="position:fixed;inset:0;pointer-events:none;z-index:20;"></div>

<script>
(function() {
  // === CREATE AMBIENT PAINT DOTS ===
  const paintDotContainer = document.getElementById('paintDotContainer');
  const dotColors = [
    'rgba(150, 180, 130, 0.4)',
    'rgba(190, 160, 150, 0.35)',
    'rgba(170, 170, 150, 0.3)',
    'rgba(180, 195, 165, 0.35)',
    'rgba(200, 190, 160, 0.3)',
    'rgba(160, 175, 185, 0.3)'
  ];
  for (let i = 0; i < 20; i++) {
    const d = document.createElement('div');
    d.className = 'paint-dot';
    const size = 3 + Math.random() * 5;
    d.style.width = size + 'px';
    d.style.height = size + 'px';
    d.style.background = dotColors[Math.floor(Math.random() * dotColors.length)];
    d.style.left = (10 + Math.random() * 80) + '%';
    d.style.top = (30 + Math.random() * 55) + '%';
    d.style.animationDelay = (Math.random() * 12) + 's';
    d.style.animationDuration = (10 + Math.random() * 8) + 's';
    paintDotContainer.appendChild(d);
  }

  // === CREATE FLOWERS IN ROW ===
  const flowerRow = document.getElementById('flowerRow');
  const flowerColors = ['dusty-pink', 'lavender', 'soft-gold', 'sage', 'cream', 'dusty-rose',
                         'dusty-pink', 'soft-gold', 'lavender', 'sage', 'cream', 'dusty-rose'];
  const flowers = [];
  for (let i = 0; i < 12; i++) {
    const f = document.createElement('div');
    f.className = 'bloom-flower ' + flowerColors[i];
    f.innerHTML = '<div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="center"></div>';
    flowerRow.appendChild(f);
    flowers.push(f);
  }

  // === REFS ===
  const scene = document.getElementById('watercolorScene');
  const questHeader = document.getElementById('questHeader');
  const levelSection = document.getElementById('levelSection');
  const xpSection = document.getElementById('xpSection');
  const xpBarFill = document.getElementById('xpBarFill');
  const xpText = document.getElementById('xpText');
  const xpBonus = document.getElementById('xpBonus');
  const xpBonusText = document.getElementById('xpBonusText');
  const levelOld = document.getElementById('levelOld');
  const levelArrow = document.getElementById('levelArrow');
  const levelNew = document.getElementById('levelNew');
  const rankTitle = document.getElementById('rankTitle');
  const levelUpFlash = document.getElementById('levelUpFlash');
  const sparkleContainer = document.getElementById('sparkleContainer');
  const butterflies = document.querySelectorAll('.butterfly');
  const titlePromotion = document.getElementById('titlePromotion');
  const promoWash = document.getElementById('promoWash');

  // === HELPERS ===
  function wait(ms) {
    return new Promise(r => setTimeout(r, ms));
  }

  function animateXP(from, to, max, duration) {
    return new Promise(resolve => {
      const start = performance.now();
      function tick(now) {
        const t = Math.min((now - start) / duration, 1);
        const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
        const current = Math.round(from + (to - from) * eased);
        const pct = (current / max) * 100;
        xpBarFill.style.width = pct + '%';
        xpText.textContent = current + ' / ' + max + ' XP';

        // Bloom flowers proportionally
        const flowerIndex = Math.floor((current / max) * flowers.length);
        for (let i = 0; i < flowers.length; i++) {
          if (i <= flowerIndex && current > 0) {
            if (!flowers[i].classList.contains('bloomed')) {
              flowers[i].classList.remove('closed');
              flowers[i].classList.add('bloomed');
            }
          }
        }

        if (t < 1) {
          requestAnimationFrame(tick);
        } else {
          resolve();
        }
      }
      requestAnimationFrame(tick);
    });
  }

  function closeFlowers() {
    flowers.forEach(f => {
      f.classList.remove('bloomed');
      f.classList.add('closed');
    });
  }

  // Watercolor-style sparkle colors
  const sparkleColors = [
    'rgba(210, 195, 150, 0.9)',
    'rgba(180, 200, 155, 0.85)',
    'rgba(195, 165, 160, 0.85)',
    'rgba(170, 170, 195, 0.8)',
    'rgba(200, 185, 140, 0.9)'
  ];

  function spawnSparkles(cx, cy, count) {
    for (let i = 0; i < count; i++) {
      const s = document.createElement('div');
      s.className = 'sparkle';
      const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
      const dist = 40 + Math.random() * 80;
      s.style.left = cx + 'px';
      s.style.top = cy + 'px';
      s.style.setProperty('--sx', Math.cos(angle) * dist + 'px');
      s.style.setProperty('--sy', Math.sin(angle) * dist + 'px');
      s.style.background = sparkleColors[Math.floor(Math.random() * sparkleColors.length)];
      const size = 3 + Math.random() * 4;
      s.style.width = size + 'px';
      s.style.height = size + 'px';
      sparkleContainer.appendChild(s);
      requestAnimationFrame(() => s.classList.add('burst'));
      setTimeout(() => s.remove(), 1100);
    }
  }

  function spawnLeaves() {
    for (let i = 0; i < 12; i++) {
      const l = document.createElement('div');
      l.className = 'leaf';
      l.style.left = (20 + Math.random() * 60) + '%';
      l.style.top = (10 + Math.random() * 30) + '%';
      l.style.setProperty('--lx', (Math.random() - 0.5) * 100 + 'px');
      l.style.animationDelay = (Math.random() * 0.8) + 's';
      sparkleContainer.appendChild(l);
      requestAnimationFrame(() => l.classList.add('falling'));
      setTimeout(() => l.remove(), 4000);
    }
  }

  // Paint splashes for title promotion
  function spawnPaintSplashes(cx, cy) {
    const splashColors = [
      'rgba(210, 195, 150, 0.5)',
      'rgba(190, 180, 140, 0.4)',
      'rgba(200, 185, 155, 0.45)',
      'rgba(175, 195, 160, 0.35)',
      'rgba(195, 170, 150, 0.4)'
    ];
    for (let i = 0; i < 8; i++) {
      const sp = document.createElement('div');
      sp.className = 'paint-splash';
      const size = 30 + Math.random() * 60;
      sp.style.width = size + 'px';
      sp.style.height = size * (0.7 + Math.random() * 0.6) + 'px';
      sp.style.left = (cx - size / 2 + (Math.random() - 0.5) * 120) + 'px';
      sp.style.top = (cy - size / 2 + (Math.random() - 0.5) * 60) + 'px';
      sp.style.background = splashColors[Math.floor(Math.random() * splashColors.length)];
      sp.style.animationDelay = (Math.random() * 0.3) + 's';
      sparkleContainer.appendChild(sp);
      requestAnimationFrame(() => sp.classList.add('active'));
      setTimeout(() => sp.remove(), 3000);
    }
  }

  // === ANIMATION SEQUENCE ===
  async function runSequence() {
    // 1. Scene fades in
    await wait(1000);
    scene.classList.add('visible');
    await wait(1500);

    // 2. "Quest Completed!" appears
    questHeader.classList.add('visible');
    await wait(800);

    // 3. Level section appears
    levelSection.classList.add('visible');
    await wait(400);

    // 4. XP section appears
    xpSection.classList.add('visible');
    await wait(600);

    // 5. XP bar fills from 0 to 500/500 over 2.2s
    await animateXP(0, 500, 500, 2200);
    xpBarFill.classList.add('maxed');
    await wait(400);

    // 6. LEVEL UP! Flash + sparkles + butterflies + leaves
    levelUpFlash.classList.add('active');

    const rect = levelSection.getBoundingClientRect();
    spawnSparkles(rect.left + rect.width / 2, rect.top + rect.height / 2, 24);
    spawnLeaves();

    // Show butterflies
    butterflies.forEach((b, i) => {
      setTimeout(() => b.classList.add('visible'), i * 150);
    });

    await wait(300);
    levelUpFlash.classList.remove('active');

    // Level 1 -> 2 arrow transition
    levelOld.classList.add('highlight');
    await wait(300);
    levelArrow.classList.add('visible');
    await wait(300);
    levelNew.classList.add('visible');
    await wait(200);
    levelNew.classList.add('highlight');
    levelOld.classList.remove('highlight');

    // Change rank text
    rankTitle.classList.add('highlight');
    rankTitle.textContent = 'Explorer';

    // More sparkles
    spawnSparkles(rect.left + rect.width / 2, rect.top + rect.height / 2, 16);
    await wait(800);

    // 7. TITLE PROMOTION - dedicated beat
    const promoRect = titlePromotion.getBoundingClientRect();
    const promoCx = promoRect.left + promoRect.width / 2;
    const promoCy = promoRect.top + promoRect.height / 2;

    // Spawn paint splashes behind
    spawnPaintSplashes(window.innerWidth / 2, rect.top + rect.height + 60);
    promoWash.classList.add('visible');
    await wait(200);
    titlePromotion.classList.add('visible');

    // Sparkles around promotion
    const promoRect2 = titlePromotion.getBoundingClientRect();
    spawnSparkles(promoRect2.left + promoRect2.width / 2, promoRect2.top + promoRect2.height / 2, 16);
    await wait(1200);

    // 8. XP bar resets, flowers close
    xpBarFill.classList.remove('maxed');
    closeFlowers();
    xpBarFill.style.width = '0%';
    xpText.textContent = '0 / 600 XP';

    // Fade out promotion
    titlePromotion.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
    titlePromotion.style.opacity = '0';
    titlePromotion.style.transform = 'translateY(-5px) scale(0.95)';
    promoWash.style.transition = 'opacity 0.5s ease';
    promoWash.style.opacity = '0';
    await wait(600);

    // 9. Fill to 300/600 over 1.6s
    await animateXP(0, 300, 600, 1600);
    xpText.textContent = '300 / 600 XP';
    await wait(400);

    // 10. +500 XP appears
    xpBonus.classList.add('visible');
    await wait(200);
    xpBonusText.classList.add('glow');

    // Final sparkles around bonus text
    const bonusRect = xpBonusText.getBoundingClientRect();
    spawnSparkles(bonusRect.left + bonusRect.width / 2, bonusRect.top + bonusRect.height / 2, 12);
  }

  runSequence();
})();
</script>
</body>
</html>
