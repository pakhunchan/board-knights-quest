<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quest Completed - Knight's Quest: Math Adventure</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=MedievalSharp&family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-deep: #0d0a1a;
    --bg-purple: #1a1033;
    --cyan-glow: #4de8d8;
    --cyan-dim: #2a8a80;
    --amber: #f5c842;
    --amber-warm: #e8a020;
    --gold: #ffd700;
    --gold-dark: #b8960f;
    --leather: #5c3a1e;
    --leather-light: #7a5230;
    --leather-dark: #3d2510;
    --page-cream: #f0e6d0;
    --page-aged: #e8dcc0;
    --ink-dark: #2a1f3d;
    --ink-medium: #4a3860;
    --magical-purple: #9b59b6;
    --magical-blue: #6c5ce7;
  }

  body {
    background: var(--bg-deep);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'EB Garamond', serif;
    overflow: hidden;
    position: relative;
  }

  /* Background magical atmosphere */
  .bg-atmosphere {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 30% 40%, rgba(107, 92, 231, 0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 60%, rgba(77, 232, 216, 0.1) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(155, 89, 182, 0.08) 0%, transparent 70%),
      var(--bg-deep);
    z-index: 0;
  }

  /* Floating particles */
  .particles-container {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  .particle {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    opacity: 0;
  }

  .particle--dust {
    width: 3px;
    height: 3px;
    background: var(--cyan-glow);
    box-shadow: 0 0 6px var(--cyan-glow);
    animation: floatDust linear infinite;
  }

  .particle--sparkle {
    width: 4px;
    height: 4px;
    background: var(--gold);
    box-shadow: 0 0 8px var(--gold), 0 0 16px rgba(255, 215, 0, 0.3);
    animation: floatSparkle ease-in-out infinite;
  }

  @keyframes floatDust {
    0% { transform: translateY(100vh) translateX(0); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.6; }
    100% { transform: translateY(-20px) translateX(40px); opacity: 0; }
  }

  @keyframes floatSparkle {
    0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
    15% { opacity: 0.8; }
    50% { transform: translateY(50vh) scale(1.2); opacity: 1; }
    85% { opacity: 0.8; }
    100% { transform: translateY(-20px) scale(0.5); opacity: 0; }
  }

  /* Book container */
  .book-wrapper {
    position: relative;
    z-index: 10;
    perspective: 1200px;
    opacity: 0;
    transform: scale(0.7);
    transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .book-wrapper.visible {
    opacity: 1;
    transform: scale(1);
  }

  .book {
    position: relative;
    display: flex;
    width: min(880px, 90vw);
    min-height: min(520px, 75vh);
    border-radius: 8px;
    box-shadow:
      0 0 40px rgba(77, 232, 216, 0),
      0 20px 60px rgba(0,0,0,0.6),
      inset 0 0 0 3px var(--leather-dark);
    transition: box-shadow 1s ease;
  }

  .book.glow-pulse {
    box-shadow:
      0 0 60px rgba(77, 232, 216, 0.4),
      0 0 120px rgba(107, 92, 231, 0.3),
      0 20px 60px rgba(0,0,0,0.6),
      inset 0 0 0 3px var(--leather-dark);
  }

  .book.level-up-glow {
    box-shadow:
      0 0 100px rgba(255, 215, 0, 0.5),
      0 0 200px rgba(255, 215, 0, 0.2),
      0 20px 60px rgba(0,0,0,0.6),
      inset 0 0 0 3px var(--leather-dark);
  }

  /* Leather spine */
  .book::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 4px;
    bottom: 4px;
    width: 24px;
    transform: translateX(-50%);
    background: linear-gradient(90deg,
      var(--leather-dark),
      var(--leather),
      var(--leather-light),
      var(--leather),
      var(--leather-dark)
    );
    z-index: 5;
    border-radius: 2px;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
  }

  /* Leather cover edges */
  .book::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 8px;
    border: 6px solid var(--leather);
    background: transparent;
    pointer-events: none;
    z-index: 4;
    box-shadow:
      inset 0 0 20px rgba(0,0,0,0.3),
      inset 0 2px 0 var(--leather-light);
  }

  /* Pages */
  .page {
    flex: 1;
    background: linear-gradient(135deg, var(--page-cream) 0%, var(--page-aged) 100%);
    padding: 40px 36px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .page--left {
    border-radius: 8px 0 0 8px;
    border-right: 1px solid rgba(0,0,0,0.1);
  }

  .page--right {
    border-radius: 0 8px 8px 0;
    border-left: 1px solid rgba(0,0,0,0.1);
  }

  /* Aged paper texture */
  .page::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 28px,
        rgba(0,0,0,0.02) 28px,
        rgba(0,0,0,0.02) 29px
      );
    pointer-events: none;
  }

  /* Stain marks on pages */
  .page::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 80%, rgba(139, 119, 80, 0.08) 0%, transparent 40%),
      radial-gradient(ellipse at 80% 20%, rgba(139, 119, 80, 0.06) 0%, transparent 35%);
    pointer-events: none;
  }

  /* Rune border */
  .rune-border {
    position: absolute;
    inset: 0;
    z-index: 20;
    pointer-events: none;
  }

  .rune {
    position: absolute;
    font-family: 'Cinzel Decorative', serif;
    font-size: 18px;
    color: var(--cyan-dim);
    opacity: 0.2;
    text-shadow: 0 0 0 transparent;
    transition: opacity 0.6s ease, color 0.6s ease, text-shadow 0.6s ease;
  }

  .rune.lit {
    opacity: 1;
    color: var(--cyan-glow);
    text-shadow: 0 0 12px var(--cyan-glow), 0 0 24px rgba(77, 232, 216, 0.4);
  }

  /* Energy flow between pages */
  .energy-flow {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 40px;
    height: 100%;
    z-index: 6;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  .energy-flow.active {
    opacity: 1;
  }

  .energy-strand {
    position: absolute;
    left: 50%;
    width: 2px;
    height: 30px;
    background: linear-gradient(to bottom, transparent, var(--cyan-glow), transparent);
    border-radius: 50%;
    animation: energyFlow 2s ease-in-out infinite;
    opacity: 0.7;
  }

  @keyframes energyFlow {
    0% { transform: translateX(-50%) translateY(-200%); opacity: 0; }
    30% { opacity: 0.7; }
    70% { opacity: 0.7; }
    100% { transform: translateX(-50%) translateY(500%); opacity: 0; }
  }

  /* Left page content */
  .quest-header {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(22px, 3.5vw, 32px);
    color: var(--ink-dark);
    text-align: center;
    margin-bottom: 30px;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.8s ease, transform 0.8s ease, text-shadow 1s ease;
    position: relative;
    z-index: 2;
  }

  .quest-header.visible {
    opacity: 1;
    transform: translateY(0);
    text-shadow: 0 0 20px rgba(77, 232, 216, 0.3);
  }

  .quest-header::after {
    content: '';
    display: block;
    width: 80%;
    height: 2px;
    margin: 10px auto 0;
    background: linear-gradient(90deg, transparent, var(--cyan-dim), var(--amber-warm), var(--cyan-dim), transparent);
    opacity: 0.6;
  }

  /* XP section */
  .xp-section {
    width: 100%;
    max-width: 340px;
    margin-top: 10px;
    position: relative;
    z-index: 2;
  }

  .xp-label {
    font-family: 'MedievalSharp', cursive;
    font-size: 16px;
    color: var(--ink-medium);
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  .xp-label.visible { opacity: 1; }

  .xp-bar-outer {
    width: 100%;
    height: 28px;
    background: linear-gradient(180deg, #c9bca0 0%, #d4c8ae 50%, #c0b498 100%);
    border-radius: 14px;
    border: 2px solid var(--leather);
    position: relative;
    overflow: hidden;
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.2);
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  .xp-bar-outer.visible { opacity: 1; }

  .xp-bar-inner {
    height: 100%;
    width: 0%;
    background: linear-gradient(180deg, var(--cyan-glow) 0%, #3abfb3 50%, var(--cyan-dim) 100%);
    border-radius: 12px;
    transition: width 0.05s linear;
    position: relative;
    box-shadow: 0 0 10px rgba(77, 232, 216, 0.4);
  }

  .xp-bar-inner::after {
    content: '';
    position: absolute;
    top: 3px;
    left: 8px;
    right: 8px;
    height: 4px;
    background: rgba(255,255,255,0.3);
    border-radius: 2px;
  }

  /* Rune markers on XP bar */
  .xp-rune-marker {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 10px;
    color: var(--leather);
    opacity: 0.4;
    z-index: 2;
    font-family: 'Cinzel Decorative', serif;
  }

  .xp-rune-marker.passed {
    color: var(--gold);
    opacity: 1;
    text-shadow: 0 0 6px rgba(255, 215, 0, 0.6);
  }

  .xp-text {
    font-family: 'MedievalSharp', cursive;
    font-size: 14px;
    color: var(--ink-medium);
    text-align: center;
    margin-top: 6px;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  .xp-text.visible { opacity: 1; }

  /* +500 XP display */
  .xp-bonus {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(26px, 4vw, 36px);
    color: var(--gold);
    text-align: center;
    margin-top: 24px;
    opacity: 0;
    transform: scale(0.3) rotate(-10deg);
    transition: opacity 0.6s cubic-bezier(0.34, 1.56, 0.64, 1),
                transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.5), 0 0 40px rgba(255, 215, 0, 0.2);
    position: relative;
    z-index: 2;
  }

  .xp-bonus.visible {
    opacity: 1;
    transform: scale(1) rotate(0deg);
  }

  .xp-bonus .sparkle-burst {
    position: absolute;
    width: 6px;
    height: 6px;
    background: var(--gold);
    border-radius: 50%;
    opacity: 0;
  }

  /* Right page content */
  .level-section {
    text-align: center;
    position: relative;
    z-index: 2;
  }

  .level-label {
    font-family: 'MedievalSharp', cursive;
    font-size: 16px;
    color: var(--ink-medium);
    margin-bottom: 6px;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  .level-label.visible { opacity: 1; }

  .level-display {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(36px, 5vw, 52px);
    font-weight: 700;
    color: var(--ink-dark);
    margin-bottom: 8px;
    opacity: 0;
    transition: opacity 0.5s ease, transform 0.4s ease;
    position: relative;
  }

  .level-display.visible { opacity: 1; }

  .level-display.changing {
    animation: levelChange 0.8s ease;
  }

  @keyframes levelChange {
    0% { transform: scale(1); opacity: 1; }
    30% { transform: scale(1.3); opacity: 0; color: var(--gold); }
    50% { transform: scale(0.8); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .level-arrow {
    font-family: 'Cinzel Decorative', serif;
    font-size: 24px;
    color: var(--gold);
    opacity: 0;
    transition: opacity 0.5s ease;
    margin: 4px 0;
    display: block;
  }

  .level-arrow.visible { opacity: 1; }

  .title-section {
    margin-top: 24px;
    text-align: center;
  }

  .title-label {
    font-family: 'MedievalSharp', cursive;
    font-size: 14px;
    color: var(--ink-medium);
    margin-bottom: 4px;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  .title-label.visible { opacity: 1; }

  .title-display {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(22px, 3vw, 30px);
    font-weight: 700;
    color: var(--magical-purple);
    opacity: 0;
    transition: opacity 0.5s ease;
    position: relative;
  }

  .title-display.visible { opacity: 1; }

  .title-display.changing {
    animation: titleChange 0.8s ease;
  }

  @keyframes titleChange {
    0% { transform: scale(1); opacity: 1; }
    30% { transform: scale(1.2) translateY(-5px); opacity: 0; }
    50% { transform: scale(0.8); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* Celebration effects on right page */
  .celebration-container {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 3;
    overflow: hidden;
  }

  .magic-star {
    position: absolute;
    opacity: 0;
    font-size: 20px;
    animation: none;
  }

  .magic-star.burst {
    animation: starBurst 1.5s ease-out forwards;
  }

  @keyframes starBurst {
    0% { transform: scale(0) rotate(0deg); opacity: 1; }
    50% { opacity: 1; }
    100% { transform: scale(1) rotate(180deg) translateY(-80px); opacity: 0; }
  }

  /* Page flip overlay effect */
  .page-flip {
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 100%;
    background: linear-gradient(90deg, var(--page-cream), rgba(240, 230, 208, 0.9));
    z-index: 10;
    transform-origin: left center;
    transform: scaleX(0);
    border-radius: 0 8px 8px 0;
    pointer-events: none;
  }

  .page-flip.active {
    animation: pageFlip 0.8s ease-in-out;
  }

  @keyframes pageFlip {
    0% { transform: scaleX(0); }
    40% { transform: scaleX(1); }
    60% { transform: scaleX(1); }
    100% { transform: scaleX(0); }
  }

  /* Decorative corner flourishes */
  .corner-flourish {
    position: absolute;
    width: 50px;
    height: 50px;
    z-index: 3;
    opacity: 0.3;
  }

  .page--left .corner-flourish.tl { top: 12px; left: 12px; border-top: 2px solid var(--leather); border-left: 2px solid var(--leather); }
  .page--left .corner-flourish.bl { bottom: 12px; left: 12px; border-bottom: 2px solid var(--leather); border-left: 2px solid var(--leather); }
  .page--right .corner-flourish.tr { top: 12px; right: 12px; border-top: 2px solid var(--leather); border-right: 2px solid var(--leather); }
  .page--right .corner-flourish.br { bottom: 12px; right: 12px; border-bottom: 2px solid var(--leather); border-right: 2px solid var(--leather); }

  /* Responsive adjustments */
  @media (max-width: 768px) {
    .book {
      flex-direction: column;
      width: 90vw;
      min-height: auto;
    }
    .page--left { border-radius: 8px 8px 0 0; border-right: none; border-bottom: 1px solid rgba(0,0,0,0.1); }
    .page--right { border-radius: 0 0 8px 8px; border-left: none; }
    .book::before { left: 4px; right: 4px; top: 50%; width: auto; height: 20px; transform: translateY(-50%); }
    .page { padding: 28px 24px; }
  }
</style>
</head>
<body>

<div class="bg-atmosphere"></div>

<div class="particles-container" id="particles"></div>

<div class="book-wrapper" id="bookWrapper">
  <!-- Rune border -->
  <div class="rune-border" id="runeBorder"></div>

  <!-- Energy flow between pages -->
  <div class="energy-flow" id="energyFlow">
    <div class="energy-strand" style="left: 30%; animation-delay: 0s;"></div>
    <div class="energy-strand" style="left: 50%; animation-delay: 0.4s;"></div>
    <div class="energy-strand" style="left: 70%; animation-delay: 0.8s;"></div>
    <div class="energy-strand" style="left: 40%; animation-delay: 1.2s;"></div>
    <div class="energy-strand" style="left: 60%; animation-delay: 1.6s;"></div>
  </div>

  <div class="book" id="book">
    <!-- Left Page -->
    <div class="page page--left">
      <div class="corner-flourish tl"></div>
      <div class="corner-flourish bl"></div>

      <h1 class="quest-header" id="questHeader">Quest Completed!</h1>

      <div class="xp-section">
        <div class="xp-label" id="xpLabel">
          <span>Experience</span>
          <span id="xpPercent">0%</span>
        </div>
        <div class="xp-bar-outer" id="xpBarOuter">
          <div class="xp-bar-inner" id="xpBarInner"></div>
          <div class="xp-rune-marker" style="left: 25%;">&#10022;</div>
          <div class="xp-rune-marker" style="left: 50%;">&#10023;</div>
          <div class="xp-rune-marker" style="left: 75%;">&#10022;</div>
        </div>
        <div class="xp-text" id="xpText">0 / 1000 XP</div>
      </div>

      <div class="xp-bonus" id="xpBonus">+500 XP</div>
    </div>

    <!-- Right Page -->
    <div class="page page--right">
      <div class="corner-flourish tr"></div>
      <div class="corner-flourish br"></div>
      <div class="celebration-container" id="celebrationContainer"></div>
      <div class="page-flip" id="pageFlip"></div>

      <div class="level-section">
        <div class="level-label" id="levelLabel">Your Level</div>
        <div class="level-display" id="levelDisplay">Level 1</div>
        <div class="level-arrow" id="levelArrow">&#11157;</div>
      </div>

      <div class="title-section">
        <div class="title-label" id="titleLabel">Your Title</div>
        <div class="title-display" id="titleDisplay">Trainee</div>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  // --- Particle system ---
  const particlesEl = document.getElementById('particles');

  function createParticles() {
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      const isDust = Math.random() > 0.4;
      p.classList.add('particle', isDust ? 'particle--dust' : 'particle--sparkle');
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDuration = (6 + Math.random() * 10) + 's';
      p.style.animationDelay = (Math.random() * 12) + 's';
      particlesEl.appendChild(p);
    }
  }
  createParticles();

  // --- Rune system ---
  const runeSymbols = [
    '\u2726', '\u2727', '\u2728', '\u2729', '\u272A',
    '\u2735', '\u2736', '\u2737', '\u2738', '\u2739',
    '\u2742', '\u2743', '\u2749', '\u274B', '\u2756',
    '\u29C8', '\u29BE', '\u25C8', '\u25CA', '\u2662',
    '\u2720', '\u2721', '\u271A', '\u2741', '\u2746'
  ];

  const runeBorder = document.getElementById('runeBorder');
  const runes = [];
  const runeCount = 28;

  for (let i = 0; i < runeCount; i++) {
    const rune = document.createElement('div');
    rune.classList.add('rune');
    rune.textContent = runeSymbols[i % runeSymbols.length];

    const side = Math.floor(i / 7); // 0=top, 1=right, 2=bottom, 3=left
    const pos = (i % 7) / 6;

    switch(side) {
      case 0: // top
        rune.style.top = '6px';
        rune.style.left = (8 + pos * 84) + '%';
        break;
      case 1: // right
        rune.style.right = '8px';
        rune.style.top = (8 + pos * 84) + '%';
        break;
      case 2: // bottom
        rune.style.bottom = '6px';
        rune.style.left = (8 + pos * 84) + '%';
        break;
      case 3: // left
        rune.style.left = '8px';
        rune.style.top = (8 + pos * 84) + '%';
        break;
    }

    runeBorder.appendChild(rune);
    runes.push(rune);
  }

  // --- Animation helpers ---
  function delay(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  function animateXPBar(targetPercent, duration, onUpdate) {
    return new Promise(resolve => {
      const bar = document.getElementById('xpBarInner');
      const startTime = performance.now();
      const startWidth = parseFloat(bar.style.width) || 0;

      function tick(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / duration, 1);
        // Ease out cubic
        const eased = 1 - Math.pow(1 - progress, 3);
        const current = startWidth + (targetPercent - startWidth) * eased;
        bar.style.width = current + '%';
        if (onUpdate) onUpdate(current);

        // Update rune markers
        const markers = document.querySelectorAll('.xp-rune-marker');
        markers.forEach(m => {
          const markerPos = parseFloat(m.style.left);
          m.classList.toggle('passed', current >= markerPos);
        });

        if (progress < 1) {
          requestAnimationFrame(tick);
        } else {
          resolve();
        }
      }
      requestAnimationFrame(tick);
    });
  }

  function spawnCelebrationStars() {
    const container = document.getElementById('celebrationContainer');
    const stars = ['\u2726', '\u2728', '\u2736', '\u2605', '\u2734'];
    const colors = ['#ffd700', '#4de8d8', '#f5c842', '#9b59b6', '#e8a020'];

    for (let i = 0; i < 12; i++) {
      const star = document.createElement('div');
      star.classList.add('magic-star');
      star.textContent = stars[i % stars.length];
      star.style.left = (20 + Math.random() * 60) + '%';
      star.style.top = (30 + Math.random() * 40) + '%';
      star.style.color = colors[i % colors.length];
      star.style.fontSize = (16 + Math.random() * 18) + 'px';
      star.style.textShadow = '0 0 10px ' + colors[i % colors.length];
      container.appendChild(star);

      setTimeout(() => {
        star.classList.add('burst');
      }, i * 80);

      setTimeout(() => {
        star.remove();
      }, 2000 + i * 80);
    }
  }

  // --- Main animation sequence ---
  async function runSequence() {
    const bookWrapper = document.getElementById('bookWrapper');
    const book = document.getElementById('book');
    const questHeader = document.getElementById('questHeader');
    const xpLabel = document.getElementById('xpLabel');
    const xpBarOuter = document.getElementById('xpBarOuter');
    const xpText = document.getElementById('xpText');
    const xpPercent = document.getElementById('xpPercent');
    const xpBonus = document.getElementById('xpBonus');
    const energyFlow = document.getElementById('energyFlow');
    const levelLabel = document.getElementById('levelLabel');
    const levelDisplay = document.getElementById('levelDisplay');
    const levelArrow = document.getElementById('levelArrow');
    const titleLabel = document.getElementById('titleLabel');
    const titleDisplay = document.getElementById('titleDisplay');
    const pageFlip = document.getElementById('pageFlip');
    const xpBarInner = document.getElementById('xpBarInner');

    // Step 1: Book appears with magical pulse
    await delay(1000);
    bookWrapper.classList.add('visible');
    book.classList.add('glow-pulse');
    await delay(800);
    book.classList.remove('glow-pulse');

    // Step 2: Runes light up one by one
    for (let i = 0; i < runes.length; i++) {
      runes[i].classList.add('lit');
      await delay(60);
    }
    await delay(300);

    // Activate energy flow
    energyFlow.classList.add('active');

    // Step 3: "Quest Completed!" appears
    questHeader.classList.add('visible');
    await delay(600);

    // Show level info on right page
    levelLabel.classList.add('visible');
    await delay(200);
    levelDisplay.classList.add('visible');
    await delay(200);
    titleLabel.classList.add('visible');
    await delay(200);
    titleDisplay.classList.add('visible');
    await delay(400);

    // Step 4: XP bar fills 0% to 100%
    xpLabel.classList.add('visible');
    xpBarOuter.classList.add('visible');
    xpText.classList.add('visible');
    await delay(300);

    await animateXPBar(100, 2000, (current) => {
      const rounded = Math.round(current);
      xpPercent.textContent = rounded + '%';
      const xpVal = Math.round(current * 10);
      xpText.textContent = xpVal + ' / 1000 XP';
    });

    await delay(400);

    // Step 5: Level up! Book glows intensely, page flips
    book.classList.add('level-up-glow');
    pageFlip.classList.add('active');
    spawnCelebrationStars();
    await delay(400);

    // Change level
    levelDisplay.classList.add('changing');
    titleDisplay.classList.add('changing');
    levelArrow.classList.add('visible');

    await delay(400);
    levelDisplay.textContent = 'Level 2';
    titleDisplay.textContent = 'Explorer';
    titleDisplay.style.color = 'var(--gold)';

    await delay(600);
    levelDisplay.classList.remove('changing');
    titleDisplay.classList.remove('changing');

    await delay(600);
    book.classList.remove('level-up-glow');

    // Step 6: XP bar resets and fills to 50%
    xpBarInner.style.transition = 'none';
    xpBarInner.style.width = '0%';
    xpPercent.textContent = '0%';
    xpText.textContent = '0 / 1000 XP';

    // Reset rune markers
    document.querySelectorAll('.xp-rune-marker').forEach(m => m.classList.remove('passed'));

    await delay(300);

    await animateXPBar(50, 1500, (current) => {
      const rounded = Math.round(current);
      xpPercent.textContent = rounded + '%';
      const xpVal = Math.round(current * 10);
      xpText.textContent = xpVal + ' / 1000 XP';
    });

    await delay(400);

    // Step 7: +500 XP materializes
    xpBonus.classList.add('visible');
    spawnCelebrationStars();

    // Subtle continuous glow on the book after completion
    await delay(1000);
    book.classList.add('glow-pulse');
  }

  runSequence();
})();
</script>
</body>
</html>
