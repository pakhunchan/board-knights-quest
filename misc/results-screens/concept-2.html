<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quest Completed — Crystal Shield</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: radial-gradient(ellipse at 50% 40%, #1a1040 0%, #0d0a1f 50%, #050312 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cinzel', serif;
  color: #e0d8f0;
}

/* ── particle canvas ── */
#particles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

/* ── main container ── */
.container {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  opacity: 0;
}
.container.visible { opacity: 1; transition: opacity 0.6s ease; }

/* ── header ── */
.header {
  font-family: 'Cinzel', serif;
  font-size: clamp(28px, 4vw, 52px);
  font-weight: 900;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #fff;
  text-shadow: 0 0 20px rgba(160,140,255,0.8), 0 0 60px rgba(120,80,255,0.4);
  opacity: 0;
  transform: translateY(-20px) scale(0.9);
  transition: opacity 0.8s ease, transform 0.8s ease;
}
.header.show {
  opacity: 1;
  transform: translateY(0) scale(1);
}

/* ── shield wrapper ── */
.shield-area {
  position: relative;
  width: clamp(220px, 30vw, 340px);
  height: clamp(260px, 35vw, 400px);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── shield shape (pentagon-ish) ── */
.shield {
  position: relative;
  width: 100%;
  height: 100%;
  filter: drop-shadow(0 0 30px rgba(140,120,255,0.5));
  opacity: 0;
  transform: scale(0.4);
  transition: opacity 1s ease, transform 1s cubic-bezier(0.23,1,0.32,1), filter 0.6s ease;
}
.shield.materialized {
  opacity: 1;
  transform: scale(1);
}
.shield.burst {
  filter: drop-shadow(0 0 60px rgba(255,255,255,0.9)) drop-shadow(0 0 100px rgba(160,120,255,0.8));
}

.shield-svg {
  width: 100%;
  height: 100%;
}

/* glass fill */
.shield-glass {
  fill: rgba(80, 60, 160, 0.25);
  stroke: rgba(180, 160, 255, 0.6);
  stroke-width: 2;
  transition: fill 0.6s ease, stroke 0.6s ease;
}
.shield.burst .shield-glass {
  fill: rgba(140, 120, 255, 0.35);
  stroke: rgba(220, 200, 255, 0.9);
}

/* crystal facets inside shield */
.shield-facet {
  fill: none;
  stroke: rgba(160, 140, 255, 0.2);
  stroke-width: 1;
  transition: stroke 0.6s ease;
}
.shield.burst .shield-facet {
  stroke: rgba(200, 180, 255, 0.5);
}

/* gem accents */
.gem {
  position: absolute;
  width: 18px;
  height: 18px;
  border-radius: 3px;
  transform: rotate(45deg);
  opacity: 0;
  transition: opacity 0.5s ease;
}
.shield.materialized .gem { opacity: 1; }

.gem-emerald {
  background: radial-gradient(circle at 30% 30%, #7fff9b, #1a8a3e);
  box-shadow: 0 0 12px rgba(60,200,100,0.7);
  top: 18%; left: 50%; transform: rotate(45deg) translateX(-50%);
}
.gem-ruby {
  background: radial-gradient(circle at 30% 30%, #ff7088, #a01030);
  box-shadow: 0 0 12px rgba(200,60,80,0.7);
  bottom: 35%; left: 12%;
}
.gem-sapphire {
  background: radial-gradient(circle at 30% 30%, #70a0ff, #1030a0);
  box-shadow: 0 0 12px rgba(60,80,200,0.7);
  bottom: 35%; right: 12%;
}

.gem-pulse {
  animation: gemPulse 2s ease-in-out infinite;
}

@keyframes gemPulse {
  0%, 100% { box-shadow: 0 0 12px rgba(160,140,255,0.5); transform: rotate(45deg) scale(1); }
  50% { box-shadow: 0 0 22px rgba(160,140,255,0.9); transform: rotate(45deg) scale(1.1); }
}

/* crack overlay */
.crack-overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s ease;
}
.crack-overlay.show { opacity: 1; }
.crack-overlay.hide { opacity: 0; transition: opacity 0.6s ease; }

.crack-line {
  fill: none;
  stroke: rgba(255,255,255,0.9);
  stroke-width: 2;
  stroke-dasharray: 200;
  stroke-dashoffset: 200;
  filter: drop-shadow(0 0 6px rgba(255,255,255,0.8));
}
.crack-overlay.show .crack-line {
  stroke-dashoffset: 0;
  transition: stroke-dashoffset 0.4s ease-out;
}

/* ── level + title display ── */
.info-area {
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.level-display {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(16px, 2.2vw, 26px);
  font-weight: 700;
  color: #b8a8e8;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.6s ease, transform 0.6s ease;
  min-height: 1.4em;
}
.level-display.show {
  opacity: 1;
  transform: translateY(0);
}

.title-display {
  font-family: 'Cinzel', serif;
  font-size: clamp(20px, 2.8vw, 36px);
  font-weight: 700;
  background: linear-gradient(135deg, #c8b8ff, #ffffff, #a8d0ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.title-display.show {
  opacity: 1;
  transform: translateY(0);
}

/* level-up flash on text */
.level-flash {
  animation: textFlash 0.5s ease;
}
@keyframes textFlash {
  0% { filter: brightness(1); }
  30% { filter: brightness(3); }
  100% { filter: brightness(1); }
}

/* ── XP bar ── */
.xp-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.xp-section.show {
  opacity: 1;
  transform: translateY(0);
}

.xp-label {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(11px, 1.4vw, 16px);
  color: #9888c8;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.xp-bar-outer {
  width: clamp(240px, 35vw, 420px);
  height: clamp(18px, 2.5vw, 28px);
  background: rgba(40, 30, 80, 0.6);
  border: 1px solid rgba(140, 120, 200, 0.3);
  border-radius: 14px;
  overflow: hidden;
  position: relative;
  backdrop-filter: blur(4px);
}

.xp-bar-inner {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #6040c0, #8060e0, #a080ff, #c0a0ff);
  border-radius: 14px;
  position: relative;
  transition: none; /* controlled by JS */
  box-shadow: inset 0 1px 2px rgba(255,255,255,0.3);
}

.xp-bar-inner::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
  border-radius: 14px;
  animation: barShimmer 2s ease-in-out infinite;
}

@keyframes barShimmer {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(200%); }
}

.xp-bar-glow {
  position: absolute;
  top: -4px; bottom: -4px;
  left: -4px; right: -4px;
  border-radius: 18px;
  pointer-events: none;
  opacity: 0;
  background: rgba(140, 100, 255, 0.2);
  box-shadow: 0 0 20px rgba(140,100,255,0.4);
  transition: opacity 0.3s ease;
}
.xp-bar-outer.glowing .xp-bar-glow { opacity: 1; }

.xp-text {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(10px, 1.2vw, 14px);
  color: #8878b8;
}

/* ── +500 XP badge ── */
.xp-bonus {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(22px, 3vw, 40px);
  font-weight: 900;
  color: #ffd860;
  text-shadow: 0 0 20px rgba(255,200,60,0.6), 0 0 40px rgba(255,180,40,0.3);
  opacity: 0;
  transform: scale(0.5) translateY(20px);
  transition: opacity 0.5s ease, transform 0.6s cubic-bezier(0.23,1,0.32,1);
  letter-spacing: 3px;
}
.xp-bonus.show {
  opacity: 1;
  transform: scale(1) translateY(0);
}

/* ── sparkle bursts ── */
.sparkle-container {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 10;
}

.sparkle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: white;
  clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
}

/* ── assembly particle effect ── */
.assembly-particle {
  position: absolute;
  width: 4px;
  height: 4px;
  border-radius: 1px;
  pointer-events: none;
}

/* ── full-screen flash ── */
.level-up-flash {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at center, rgba(200,180,255,0.8), rgba(100,80,200,0.3), transparent);
  opacity: 0;
  pointer-events: none;
  z-index: 5;
  transition: opacity 0.15s ease;
}
.level-up-flash.show {
  opacity: 1;
}
.level-up-flash.fade {
  opacity: 0;
  transition: opacity 0.8s ease;
}

/* ── subtitle ── */
.subtitle {
  font-family: 'Cinzel', serif;
  font-size: clamp(12px, 1.6vw, 18px);
  color: #8878b8;
  letter-spacing: 3px;
  opacity: 0;
  transition: opacity 0.6s ease;
}
.subtitle.show { opacity: 1; }
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="sparkle-container" id="sparkles"></div>
<div class="level-up-flash" id="levelFlash"></div>

<div class="container" id="main">
  <div class="header" id="header">Quest Completed!</div>

  <div class="shield-area" id="shieldArea">
    <div class="shield" id="shield">
      <svg class="shield-svg" viewBox="0 0 200 240">
        <!-- shield outline -->
        <path class="shield-glass" d="M100 10 L185 55 L185 145 Q185 195 100 230 Q15 195 15 145 L15 55 Z" />
        <!-- facet lines -->
        <line class="shield-facet" x1="100" y1="10" x2="100" y2="230" />
        <line class="shield-facet" x1="100" y1="10" x2="15" y2="145" />
        <line class="shield-facet" x1="100" y1="10" x2="185" y2="145" />
        <line class="shield-facet" x1="15" y1="55" x2="185" y2="145" />
        <line class="shield-facet" x1="185" y1="55" x2="15" y2="145" />
        <line class="shield-facet" x1="100" y1="230" x2="15" y2="55" />
        <line class="shield-facet" x1="100" y1="230" x2="185" y2="55" />
      </svg>
      <div class="gem gem-emerald gem-pulse"></div>
      <div class="gem gem-ruby gem-pulse" style="animation-delay:-0.7s"></div>
      <div class="gem gem-sapphire gem-pulse" style="animation-delay:-1.3s"></div>

      <svg class="crack-overlay" id="cracks" viewBox="0 0 200 240">
        <polyline class="crack-line" points="100,80 110,105 95,120 108,140 100,155" />
        <polyline class="crack-line" points="80,100 95,110 88,130" style="transition-delay:0.05s" />
        <polyline class="crack-line" points="120,95 108,108 115,128" style="transition-delay:0.1s" />
      </svg>
    </div>
  </div>

  <div class="info-area">
    <div class="level-display" id="level">Level 1</div>
    <div class="title-display" id="title">Trainee</div>
  </div>

  <div class="xp-section" id="xpSection">
    <div class="xp-label">Experience</div>
    <div class="xp-bar-outer" id="xpBarOuter">
      <div class="xp-bar-glow"></div>
      <div class="xp-bar-inner" id="xpBar"></div>
    </div>
    <div class="xp-text" id="xpText">0 / 1000 XP</div>
  </div>

  <div class="xp-bonus" id="xpBonus">+500 XP</div>
  <div class="subtitle" id="subtitle">Keep adventuring, brave knight!</div>
</div>

<script>
// ── Particle background ──
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const bgParticles = Array.from({length: 60}, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  r: Math.random() * 2 + 0.5,
  dx: (Math.random() - 0.5) * 0.3,
  dy: (Math.random() - 0.5) * 0.3,
  alpha: Math.random() * 0.4 + 0.1,
  color: ['180,160,255','140,200,255','200,140,255','120,255,180'][Math.floor(Math.random()*4)]
}));

function drawBg() {
  ctx.clearRect(0, 0, W, H);
  for (const p of bgParticles) {
    p.x += p.dx; p.y += p.dy;
    if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${p.color},${p.alpha})`;
    ctx.fill();
  }
  requestAnimationFrame(drawBg);
}
drawBg();

// ── Sparkle burst helper ──
function burstSparkles(cx, cy, count, spread) {
  const container = document.getElementById('sparkles');
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'sparkle';
    const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
    const dist = spread * (0.5 + Math.random() * 0.5);
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist;
    const size = 4 + Math.random() * 8;
    el.style.cssText = `left:${cx}px;top:${cy}px;width:${size}px;height:${size}px;
      background:hsl(${220 + Math.random()*80},${70+Math.random()*30}%,${75+Math.random()*25}%);
      transition: transform ${0.5+Math.random()*0.5}s cubic-bezier(0.2,0.8,0.3,1),
                  opacity ${0.4+Math.random()*0.4}s ease ${0.1+Math.random()*0.2}s;
      transform: translate(-50%,-50%) scale(1); opacity:1;`;
    container.appendChild(el);
    requestAnimationFrame(() => {
      el.style.transform = `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0)`;
      el.style.opacity = '0';
    });
    setTimeout(() => el.remove(), 1200);
  }
}

// ── Assembly particles ──
function assemblyEffect(targetEl, onDone) {
  const rect = targetEl.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const container = document.getElementById('sparkles');
  const count = 40;
  let landed = 0;

  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'assembly-particle';
    const angle = Math.random() * Math.PI * 2;
    const dist = 150 + Math.random() * 200;
    const sx = cx + Math.cos(angle) * dist;
    const sy = cy + Math.sin(angle) * dist;
    const size = 3 + Math.random() * 5;
    const hue = 240 + Math.random() * 60;
    const delay = Math.random() * 600;
    const dur = 600 + Math.random() * 400;

    el.style.cssText = `left:${sx}px;top:${sy}px;width:${size}px;height:${size}px;
      background:hsl(${hue},80%,75%);box-shadow:0 0 8px hsl(${hue},80%,65%);
      border-radius:2px;transform:rotate(${Math.random()*360}deg);
      transition:left ${dur}ms cubic-bezier(0.4,0,0.2,1) ${delay}ms,
                 top ${dur}ms cubic-bezier(0.4,0,0.2,1) ${delay}ms,
                 opacity 200ms ease ${delay + dur - 200}ms;
      opacity:1;`;
    container.appendChild(el);

    requestAnimationFrame(() => {
      el.style.left = cx + (Math.random() - 0.5) * 40 + 'px';
      el.style.top = cy + (Math.random() - 0.5) * 50 + 'px';
      el.style.opacity = '0';
    });

    setTimeout(() => {
      el.remove();
      landed++;
      if (landed === count && onDone) onDone();
    }, delay + dur + 200);
  }
}

// ── Smooth XP bar animation ──
function animateXP(from, to, duration, onTick, onDone) {
  const bar = document.getElementById('xpBar');
  const start = performance.now();
  function step(now) {
    const t = Math.min((now - start) / duration, 1);
    const ease = t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2; // easeInOutQuad
    const val = from + (to - from) * ease;
    bar.style.width = val + '%';
    if (onTick) onTick(val);
    if (t < 1) requestAnimationFrame(step);
    else if (onDone) onDone();
  }
  requestAnimationFrame(step);
}

// ── Main sequence ──
function run() {
  const container = document.getElementById('main');
  const header = document.getElementById('header');
  const shield = document.getElementById('shield');
  const level = document.getElementById('level');
  const title = document.getElementById('title');
  const xpSection = document.getElementById('xpSection');
  const xpText = document.getElementById('xpText');
  const xpBarOuter = document.getElementById('xpBarOuter');
  const cracks = document.getElementById('cracks');
  const levelFlash = document.getElementById('levelFlash');
  const xpBonus = document.getElementById('xpBonus');
  const subtitle = document.getElementById('subtitle');

  container.classList.add('visible');

  const shieldRect = document.getElementById('shieldArea').getBoundingClientRect();
  const shieldCx = shieldRect.left + shieldRect.width / 2;
  const shieldCy = shieldRect.top + shieldRect.height / 2;

  // Step 1: Assembly particles → shield materializes
  assemblyEffect(document.getElementById('shieldArea'), () => {});

  setTimeout(() => {
    shield.classList.add('materialized');
  }, 800);

  // Step 2: Header glows in
  setTimeout(() => {
    header.classList.add('show');
    burstSparkles(window.innerWidth / 2, shieldCy - shieldRect.height / 2 - 40, 12, 60);
  }, 1400);

  // Show level + title
  setTimeout(() => {
    level.classList.add('show');
  }, 1800);
  setTimeout(() => {
    title.classList.add('show');
  }, 2000);

  // Step 3: XP bar appears and fills 0 → 100%
  setTimeout(() => {
    xpSection.classList.add('show');
    xpBarOuter.classList.add('glowing');
  }, 2400);

  setTimeout(() => {
    animateXP(0, 100, 2000,
      (val) => {
        const xpVal = Math.round(val * 10);
        xpText.textContent = `${xpVal} / 1000 XP`;
      },
      () => {
        xpText.textContent = '1000 / 1000 XP';
        // Step 4: Level up!
        setTimeout(() => triggerLevelUp(), 400);
      }
    );
  }, 2800);

  function triggerLevelUp() {
    // Cracks appear
    cracks.classList.add('show');

    setTimeout(() => {
      // Flash
      levelFlash.classList.add('show');
      burstSparkles(shieldCx, shieldCy, 30, 180);
      shield.classList.add('burst');

      // Screen shake
      container.style.animation = 'none';
      container.style.transform = 'translateX(3px)';
      setTimeout(() => container.style.transform = 'translateX(-3px)', 50);
      setTimeout(() => container.style.transform = 'translateX(2px)', 100);
      setTimeout(() => container.style.transform = 'translateX(0)', 150);

      // Hide cracks, fade flash
      setTimeout(() => {
        cracks.classList.remove('show');
        cracks.classList.add('hide');
        levelFlash.classList.add('fade');
        setTimeout(() => {
          levelFlash.classList.remove('show', 'fade');
          shield.classList.remove('burst');
        }, 800);
      }, 300);

      // Update level + title
      setTimeout(() => {
        level.classList.add('level-flash');
        level.textContent = 'Level 2';
        title.classList.add('level-flash');
        title.textContent = 'Explorer';
        burstSparkles(shieldCx, shieldCy + shieldRect.height / 2 + 30, 15, 80);
      }, 200);

      // Step 5: XP resets and fills to 50%
      setTimeout(() => {
        const bar = document.getElementById('xpBar');
        bar.style.width = '0%';
        xpText.textContent = '0 / 1000 XP';

        setTimeout(() => {
          animateXP(0, 50, 1500,
            (val) => {
              const xpVal = Math.round(val * 10);
              xpText.textContent = `${xpVal} / 1000 XP`;
            },
            () => {
              xpText.textContent = '500 / 1000 XP';
              xpBarOuter.classList.remove('glowing');

              // Step 6: +500 XP badge
              setTimeout(() => {
                xpBonus.classList.add('show');
                burstSparkles(window.innerWidth / 2, xpBonus.getBoundingClientRect().top + 20, 18, 100);

                setTimeout(() => subtitle.classList.add('show'), 600);
              }, 300);
            }
          );
        }, 400);
      }, 800);

    }, 500);
  }
}

// Start after 1s delay
setTimeout(run, 1000);
</script>
</body>
</html>
