<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quest Completed! - Knight's Quest: Math Adventure</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #FFD700;
    --gold-dark: #DAA520;
    --gold-light: #FFF3B0;
    --royal-blue: #2B5EA7;
    --royal-blue-dark: #1A3D6E;
    --blue-light: #4A90D9;
    --red-accent: #E8453C;
    --green-accent: #43B581;
    --white: #FFFFFF;
    --off-white: #F8F9FF;
    --bg-dark: #1A1A2E;
  }

  body {
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 50% 30%, #3A4A8A 0%, #1A1A2E 60%, #0D0D1A 100%);
  }

  .scene {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Stadium spotlights */
  .spotlight {
    position: absolute;
    width: 300px;
    height: 100%;
    top: 0;
    opacity: 0;
    transition: opacity 1s ease;
    pointer-events: none;
  }
  .spotlight.left {
    left: 15%;
    background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, transparent 70%);
    transform: perspective(400px) rotateY(-8deg);
  }
  .spotlight.right {
    right: 15%;
    background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, transparent 70%);
    transform: perspective(400px) rotateY(8deg);
  }
  .spotlight.center {
    left: 50%;
    transform: translateX(-50%);
    width: 500px;
    background: radial-gradient(ellipse at 50% 0%, rgba(255,215,0,0.10) 0%, transparent 60%);
  }
  .spotlight.active { opacity: 1; }

  /* Podium */
  .podium-container {
    position: absolute;
    bottom: -200px;
    perspective: 800px;
    transition: bottom 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .podium-container.risen { bottom: 0; }

  .podium {
    width: 360px;
    height: 160px;
    position: relative;
    transform-style: preserve-3d;
    transform: rotateX(8deg);
  }
  .podium-face {
    position: absolute;
    background: linear-gradient(180deg, var(--royal-blue) 0%, var(--royal-blue-dark) 100%);
    border: 2px solid rgba(255,255,255,0.15);
  }
  .podium-front {
    width: 360px;
    height: 160px;
    transform: translateZ(40px);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px 8px 0 0;
    background: linear-gradient(180deg, #3568B2 0%, var(--royal-blue-dark) 100%);
    box-shadow: 0 0 40px rgba(43,94,167,0.4);
  }
  .podium-front::after {
    content: '';
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 80%;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    border-radius: 2px;
  }
  .podium-top {
    width: 360px;
    height: 80px;
    transform: rotateX(90deg) translateZ(-0px) translateY(-40px);
    background: linear-gradient(180deg, #4A7FCC 0%, #3568B2 100%);
    border-radius: 8px 8px 0 0;
  }
  .podium-star {
    font-size: 42px;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(255,215,0,0.5);
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
  }

  /* Content area */
  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    margin-bottom: 80px;
  }

  /* Header */
  .header {
    opacity: 0;
    transform: translateY(-80px) scale(1.3);
    transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .header.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
  .header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(36px, 5vw, 56px);
    color: var(--white);
    text-shadow: 0 3px 0 var(--gold-dark), 0 6px 20px rgba(0,0,0,0.3);
    letter-spacing: 2px;
    text-align: center;
  }

  /* Medal */
  .medal-container {
    position: relative;
    width: 140px;
    height: 200px;
    opacity: 0;
    transform: translateY(-300px);
    transition: all 1s cubic-bezier(0.34, 1.2, 0.64, 1);
  }
  .medal-container.dropped {
    opacity: 1;
    transform: translateY(0);
  }
  .ribbon {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 60px;
    background: linear-gradient(180deg, var(--red-accent), #C0392B);
    border-radius: 2px;
  }
  .ribbon-sides {
    position: absolute;
    top: 50px;
    left: 50%;
    transform: translateX(-50%);
    width: 70px;
    height: 40px;
    overflow: hidden;
  }
  .ribbon-sides::before, .ribbon-sides::after {
    content: '';
    position: absolute;
    top: 0;
    width: 35px;
    height: 40px;
  }
  .ribbon-sides::before {
    left: 0;
    background: var(--red-accent);
    clip-path: polygon(50% 0%, 100% 0%, 100% 100%, 0% 70%);
  }
  .ribbon-sides::after {
    right: 0;
    background: #C0392B;
    clip-path: polygon(0% 0%, 50% 0%, 100% 70%, 0% 100%);
  }
  .medal {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 110px;
    height: 110px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #FFE87C, var(--gold) 40%, var(--gold-dark) 80%, #B8860B);
    box-shadow: 0 4px 15px rgba(0,0,0,0.3), inset 0 2px 4px rgba(255,255,255,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    border: 4px solid var(--gold-dark);
  }
  .medal::before {
    content: '';
    position: absolute;
    inset: 6px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.25);
  }
  .medal-icon {
    font-size: 48px;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.2));
  }
  .medal-shine {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, transparent 50%);
    pointer-events: none;
  }

  /* Level display */
  .level-display {
    display: flex;
    align-items: center;
    gap: 16px;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .level-display.visible { opacity: 1; }

  .level-badge {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 24px;
    border-radius: 12px;
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(4px);
    transition: all 0.6s ease;
  }
  .level-badge.highlight {
    background: rgba(67,181,129,0.15);
    border-color: var(--green-accent);
    box-shadow: 0 0 20px rgba(67,181,129,0.2);
  }
  .level-num {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(28px, 3.5vw, 38px);
    color: var(--white);
    line-height: 1;
  }
  .level-label {
    font-size: clamp(11px, 1.4vw, 14px);
    color: rgba(255,255,255,0.6);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .title-name {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(14px, 1.8vw, 18px);
    color: var(--gold);
    margin-top: 2px;
    transition: all 0.4s ease;
    min-height: 24px;
  }
  .level-arrow {
    font-size: 28px;
    color: rgba(255,255,255,0.3);
    transition: all 0.5s ease;
  }
  .level-arrow.active {
    color: var(--gold);
    text-shadow: 0 0 10px rgba(255,215,0,0.5);
    animation: pulseArrow 0.8s ease infinite;
  }
  @keyframes pulseArrow {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2) translateX(3px); }
  }

  /* XP Bar */
  .xp-section {
    width: clamp(300px, 50vw, 480px);
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .xp-section.visible { opacity: 1; }

  .xp-label {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    font-weight: 700;
    font-size: clamp(12px, 1.5vw, 15px);
    color: rgba(255,255,255,0.7);
  }
  .xp-value {
    color: var(--gold);
    font-family: 'Fredoka One', cursive;
    font-size: clamp(14px, 1.6vw, 17px);
  }
  .xp-bar-track {
    width: 100%;
    height: 28px;
    background: rgba(255,255,255,0.08);
    border-radius: 14px;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.1);
    position: relative;
  }
  .xp-bar-fill {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, var(--blue-light), var(--green-accent));
    border-radius: 12px;
    transition: width 0.05s linear;
    position: relative;
  }
  .xp-bar-fill.maxed {
    background: linear-gradient(90deg, var(--gold), #FFA500);
  }
  .xp-bar-fill::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 8px;
    right: 8px;
    height: 6px;
    background: linear-gradient(180deg, rgba(255,255,255,0.35), transparent);
    border-radius: 3px;
  }
  .xp-bar-glow {
    position: absolute;
    top: -2px;
    right: -2px;
    width: 12px;
    height: calc(100% + 4px);
    background: rgba(255,255,255,0.6);
    border-radius: 50%;
    filter: blur(4px);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .xp-bar-fill.filling .xp-bar-glow { opacity: 1; }

  /* +500 XP popup */
  .xp-popup {
    position: absolute;
    font-family: 'Fredoka One', cursive;
    font-size: clamp(32px, 4vw, 48px);
    color: var(--gold);
    text-shadow: 0 3px 0 var(--gold-dark), 0 0 20px rgba(255,215,0,0.4);
    opacity: 0;
    transform: scale(0) rotate(-10deg);
    transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 20;
    white-space: nowrap;
    pointer-events: none;
  }
  .xp-popup.visible {
    opacity: 1;
    transform: scale(1) rotate(0deg);
  }

  /* Confetti */
  .confetti-piece {
    position: absolute;
    width: 10px;
    height: 10px;
    opacity: 0;
    pointer-events: none;
    z-index: 30;
  }

  /* Floating particles (ambient) */
  .particle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: rgba(255,215,0,0.3);
    border-radius: 50%;
    pointer-events: none;
    animation: float 6s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0) scale(1); opacity: 0.3; }
    50% { transform: translateY(-30px) scale(1.5); opacity: 0.6; }
  }

  /* Scorecard */
  .scorecard {
    display: flex;
    gap: 24px;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.6s ease;
  }
  .scorecard.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .stat-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 20px;
    background: rgba(255,255,255,0.06);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .stat-value {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(22px, 3vw, 30px);
    color: var(--white);
  }
  .stat-label {
    font-size: clamp(10px, 1.2vw, 13px);
    color: rgba(255,255,255,0.5);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Screen flash */
  .flash-overlay {
    position: fixed;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    z-index: 100;
    transition: opacity 0.15s ease;
  }
  .flash-overlay.flash {
    opacity: 0.4;
  }
</style>
</head>
<body>

<div class="scene">
  <!-- Spotlights -->
  <div class="spotlight left" id="spotLeft"></div>
  <div class="spotlight right" id="spotRight"></div>
  <div class="spotlight center" id="spotCenter"></div>

  <!-- Ambient particles -->
  <div id="particles"></div>

  <!-- Flash overlay -->
  <div class="flash-overlay" id="flash"></div>

  <!-- Main content -->
  <div class="content">
    <!-- Medal -->
    <div class="medal-container" id="medalContainer">
      <div class="ribbon"></div>
      <div class="ribbon-sides"></div>
      <div class="medal">
        <span class="medal-icon">&#9876;</span>
        <div class="medal-shine"></div>
      </div>
    </div>

    <!-- Header -->
    <div class="header" id="header">
      <h1>Quest Completed!</h1>
    </div>

    <!-- Level Display -->
    <div class="level-display" id="levelDisplay">
      <div class="level-badge" id="badgeFrom">
        <span class="level-label">Level</span>
        <span class="level-num" id="levelFrom">1</span>
        <span class="title-name" id="titleFrom">Trainee</span>
      </div>
      <span class="level-arrow" id="levelArrow">&#10132;</span>
      <div class="level-badge" id="badgeTo">
        <span class="level-label">Level</span>
        <span class="level-num" id="levelTo">2</span>
        <span class="title-name" id="titleTo">Explorer</span>
      </div>
    </div>

    <!-- Scorecard stats -->
    <div class="scorecard" id="scorecard">
      <div class="stat-card">
        <span class="stat-value">8/10</span>
        <span class="stat-label">Correct</span>
      </div>
      <div class="stat-card">
        <span class="stat-value">92s</span>
        <span class="stat-label">Time</span>
      </div>
      <div class="stat-card">
        <span class="stat-value">3x</span>
        <span class="stat-label">Streak</span>
      </div>
    </div>

    <!-- XP Bar -->
    <div class="xp-section" id="xpSection">
      <div class="xp-label">
        <span>Experience</span>
        <span class="xp-value" id="xpText">0 / 1000 XP</span>
      </div>
      <div class="xp-bar-track">
        <div class="xp-bar-fill" id="xpFill">
          <div class="xp-bar-glow"></div>
        </div>
      </div>
    </div>

    <!-- XP Popup -->
    <div class="xp-popup" id="xpPopup">+500 XP</div>
  </div>

  <!-- Podium -->
  <div class="podium-container" id="podiumContainer">
    <div class="podium">
      <div class="podium-face podium-front">
        <span class="podium-star">&#9733;</span>
      </div>
      <div class="podium-face podium-top"></div>
    </div>
  </div>

  <!-- Confetti container -->
  <div id="confettiContainer"></div>
</div>

<script>
(function() {
  // Create ambient particles
  const particlesEl = document.getElementById('particles');
  for (let i = 0; i < 15; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.top = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 6 + 's';
    p.style.animationDuration = (4 + Math.random() * 4) + 's';
    particlesEl.appendChild(p);
  }

  // Confetti system
  function createConfetti(count) {
    const container = document.getElementById('confettiContainer');
    const colors = ['#FFD700', '#E8453C', '#43B581', '#4A90D9', '#FF6B6B', '#FFE87C', '#FFFFFF'];
    const shapes = ['square', 'rect'];

    for (let i = 0; i < count; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      const color = colors[Math.floor(Math.random() * colors.length)];
      const shape = shapes[Math.floor(Math.random() * shapes.length)];

      piece.style.backgroundColor = color;
      piece.style.left = (30 + Math.random() * 40) + '%';
      piece.style.top = '35%';
      if (shape === 'rect') {
        piece.style.width = (6 + Math.random() * 6) + 'px';
        piece.style.height = (10 + Math.random() * 8) + 'px';
      } else {
        const size = 6 + Math.random() * 8;
        piece.style.width = size + 'px';
        piece.style.height = size + 'px';
      }
      piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';

      container.appendChild(piece);

      const angle = (Math.random() - 0.5) * 120 * (Math.PI / 180);
      const velocity = 400 + Math.random() * 500;
      const vx = Math.sin(angle) * velocity;
      const vy = -Math.cos(angle) * velocity * (0.6 + Math.random() * 0.5);
      const rotSpeed = (Math.random() - 0.5) * 720;
      const gravity = 600;

      let x = 0, y = 0, rot = 0, t = 0, opacity = 1;
      const startTime = performance.now() + Math.random() * 200;

      function animateConfetti(now) {
        const elapsed = (now - startTime) / 1000;
        if (elapsed < 0) { requestAnimationFrame(animateConfetti); return; }
        t = elapsed;
        x = vx * t;
        y = vy * t + 0.5 * gravity * t * t;
        rot = rotSpeed * t;
        opacity = Math.max(0, 1 - t / 2.5);

        piece.style.opacity = opacity;
        piece.style.transform = `translate(${x}px, ${y}px) rotate(${rot}deg)`;

        if (opacity > 0 && t < 3) {
          requestAnimationFrame(animateConfetti);
        } else {
          piece.remove();
        }
      }
      requestAnimationFrame(animateConfetti);
    }
  }

  // Flash effect
  function flash() {
    const el = document.getElementById('flash');
    el.classList.add('flash');
    setTimeout(() => el.classList.remove('flash'), 200);
  }

  // Smooth XP bar animation
  function animateXP(from, to, duration, onUpdate, onDone) {
    const fill = document.getElementById('xpFill');
    const start = performance.now();
    fill.classList.add('filling');

    function tick(now) {
      const elapsed = now - start;
      const progress = Math.min(elapsed / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3); // ease-out cubic
      const current = from + (to - from) * eased;
      fill.style.width = current + '%';
      if (onUpdate) onUpdate(current);

      if (progress < 1) {
        requestAnimationFrame(tick);
      } else {
        fill.classList.remove('filling');
        if (onDone) onDone();
      }
    }
    requestAnimationFrame(tick);
  }

  // Main animation sequence
  const delay = (ms) => new Promise(r => setTimeout(r, ms));

  async function runSequence() {
    await delay(1000);

    // Step 1: Podium rises, spotlights on
    document.getElementById('podiumContainer').classList.add('risen');
    await delay(400);
    document.getElementById('spotLeft').classList.add('active');
    document.getElementById('spotRight').classList.add('active');
    document.getElementById('spotCenter').classList.add('active');
    await delay(800);

    // Step 2: "Quest Completed!" drops in
    document.getElementById('header').classList.add('visible');
    await delay(600);

    // Show level display and scorecard
    document.getElementById('levelDisplay').classList.add('visible');
    await delay(300);
    document.getElementById('scorecard').classList.add('visible');
    await delay(300);

    // Show XP section
    document.getElementById('xpSection').classList.add('visible');
    await delay(400);

    // Step 3: XP bar fills 0% -> 100%
    const xpText = document.getElementById('xpText');
    const xpFill = document.getElementById('xpFill');
    animateXP(0, 100, 2000,
      (val) => {
        const xpVal = Math.round(val * 10);
        xpText.textContent = xpVal + ' / 1000 XP';
      },
      async () => {
        xpText.textContent = '1000 / 1000 XP';
        xpFill.classList.add('maxed');
        await delay(400);

        // Step 4: Level up! Flash + medal + confetti
        flash();
        createConfetti(80);

        // Medal drops
        document.getElementById('medalContainer').classList.add('dropped');

        // Level transition
        const arrow = document.getElementById('levelArrow');
        arrow.classList.add('active');
        document.getElementById('badgeTo').classList.add('highlight');

        // Animate title changes
        const titleFrom = document.getElementById('titleFrom');
        const titleTo = document.getElementById('titleTo');
        titleFrom.style.opacity = '0.5';
        titleTo.style.color = '#43B581';
        titleTo.style.fontSize = 'clamp(16px, 2vw, 20px)';

        await delay(800);

        // Step 5: XP bar resets and fills to 50%
        xpFill.classList.remove('maxed');
        xpFill.style.width = '0%';
        xpText.textContent = '0 / 1000 XP';
        await delay(500);

        animateXP(0, 50, 1200,
          (val) => {
            const xpVal = Math.round(val * 10);
            xpText.textContent = xpVal + ' / 1000 XP';
          },
          async () => {
            xpText.textContent = '500 / 1000 XP';

            await delay(300);

            // Step 6: +500 XP bounces in
            const popup = document.getElementById('xpPopup');
            popup.classList.add('visible');
            createConfetti(30);
          }
        );
      }
    );
  }

  runSequence();
})();
</script>
</body>
</html>
