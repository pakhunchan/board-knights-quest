<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quest Completed! - Knight's Quest: Math Adventure</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #050a1a;
    overflow: hidden;
    font-family: 'Rajdhani', sans-serif;
  }

  /* -- Canvas star field -- */
  #starfield {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  /* -- Nebula overlays -- */
  .nebula {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background:
      radial-gradient(ellipse at 20% 80%, rgba(90, 40, 120, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 75% 20%, rgba(30, 60, 140, 0.12) 0%, transparent 45%),
      radial-gradient(ellipse at 50% 50%, rgba(60, 30, 100, 0.08) 0%, transparent 60%);
    animation: nebulaShift 20s ease-in-out infinite alternate;
  }
  @keyframes nebulaShift {
    0%   { opacity: 0.6; }
    50%  { opacity: 1; }
    100% { opacity: 0.7; }
  }

  /* -- Main container -- */
  .container {
    position: relative;
    z-index: 2;
    width: min(560px, 90vw);
    text-align: center;
    color: #e8e0f0;
    opacity: 0;
    transition: opacity 0.8s ease;
  }
  .container.visible { opacity: 1; }

  /* -- Header -- */
  .header-text {
    font-family: 'Cinzel', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 900;
    color: #fff;
    text-shadow:
      0 0 20px rgba(200, 180, 255, 0.6),
      0 0 40px rgba(150, 120, 255, 0.3),
      0 0 80px rgba(100, 80, 200, 0.15);
    letter-spacing: 0.05em;
    margin-bottom: 0.3em;
    opacity: 0;
    transform: translateY(-20px) scale(0.9);
    transition: opacity 1s ease, transform 1s ease;
  }
  .header-text.show {
    opacity: 1;
    transform: translateY(0) scale(1);
  }

  /* Starlight shimmer on header */
  .header-text .star-char {
    display: inline-block;
    animation: starCharGlow 3s ease-in-out infinite;
  }

  @keyframes starCharGlow {
    0%, 100% { text-shadow: 0 0 20px rgba(200, 180, 255, 0.6), 0 0 40px rgba(150, 120, 255, 0.3); }
    50% { text-shadow: 0 0 30px rgba(220, 200, 255, 0.9), 0 0 60px rgba(180, 150, 255, 0.5), 0 0 100px rgba(140, 100, 255, 0.2); }
  }

  /* -- Level display -- */
  .level-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.8em;
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(1.1rem, 2.5vw, 1.4rem);
    font-weight: 600;
    margin-bottom: 0.15em;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .level-row.show { opacity: 1; }

  .level-badge {
    display: inline-block;
    padding: 0.2em 0.8em;
    border-radius: 999px;
    border: 1.5px solid rgba(200, 180, 255, 0.3);
    background: rgba(80, 60, 140, 0.2);
    color: #c8b8ff;
    transition: all 0.6s ease;
  }
  .level-badge.glow {
    border-color: #ffd866;
    background: rgba(255, 216, 100, 0.15);
    color: #ffd866;
    box-shadow: 0 0 15px rgba(255, 216, 100, 0.3);
  }

  .level-arrow {
    color: rgba(200, 180, 255, 0.4);
    font-size: 1.2em;
    opacity: 0;
    transform: scaleX(0);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .level-arrow.show {
    opacity: 1;
    transform: scaleX(1);
  }

  .level-new {
    opacity: 0;
    transform: translateX(-10px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .level-new.show {
    opacity: 1;
    transform: translateX(0);
  }

  /* -- Title display -- */
  .title-row {
    font-family: 'Cinzel', serif;
    font-size: clamp(0.9rem, 2vw, 1.1rem);
    color: rgba(200, 190, 230, 0.7);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 2em;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .title-row.show { opacity: 1; }

  .title-name {
    display: inline-block;
    transition: all 0.5s ease;
  }
  .title-name.upgraded {
    color: #ffd866;
    text-shadow: 0 0 12px rgba(255, 216, 100, 0.4);
  }

  /* -- Constellation XP bar -- */
  .xp-section {
    position: relative;
    margin: 0 auto 1.5em;
    width: 100%;
    max-width: 440px;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .xp-section.show { opacity: 1; }

  .xp-label-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.85rem;
    color: rgba(200, 190, 230, 0.6);
    margin-bottom: 0.5em;
  }
  .xp-value {
    font-weight: 600;
    color: #c8b8ff;
    font-size: 0.95rem;
    transition: color 0.3s;
  }

  .constellation-track {
    position: relative;
    width: 100%;
    height: 40px;
  }

  /* The SVG constellation path */
  .constellation-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .constellation-line {
    stroke: rgba(100, 80, 180, 0.15);
    stroke-width: 1.5;
    fill: none;
  }

  .constellation-line-fill {
    stroke: url(#constellationGrad);
    stroke-width: 2;
    fill: none;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.05s linear;
  }

  /* Star nodes on the constellation */
  .star-node {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(100, 80, 180, 0.2);
    border: 1px solid rgba(150, 130, 200, 0.2);
    transform: translate(-50%, -50%);
    transition: all 0.4s ease;
  }
  .star-node.lit {
    background: #ffd866;
    border-color: #ffd866;
    box-shadow: 0 0 8px rgba(255, 216, 100, 0.6), 0 0 20px rgba(255, 216, 100, 0.3);
  }
  .star-node.lit::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255, 216, 100, 0.3) 0%, transparent 70%);
    animation: starPulse 2s ease-in-out infinite;
  }

  @keyframes starPulse {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.5); opacity: 1; }
  }

  /* Underlying track bar for visual grounding */
  .xp-track-bg {
    position: absolute;
    left: 0; right: 0;
    top: 50%;
    transform: translateY(-50%);
    height: 4px;
    background: rgba(100, 80, 180, 0.12);
    border-radius: 2px;
  }
  .xp-track-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #7b5ea7, #a78bfa, #ffd866);
    border-radius: 2px;
    transition: width 0.05s linear;
    box-shadow: 0 0 8px rgba(167, 139, 250, 0.3);
  }

  /* -- XP gain badge -- */
  .xp-gain {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(1.4rem, 3vw, 1.8rem);
    font-weight: 700;
    color: #ffd866;
    text-shadow: 0 0 20px rgba(255, 216, 100, 0.5), 0 0 40px rgba(255, 216, 100, 0.2);
    margin-top: 0.5em;
    opacity: 0;
    transform: scale(0.5);
    transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .xp-gain.show {
    opacity: 1;
    transform: scale(1);
  }

  /* -- Supernova flash -- */
  .supernova {
    position: fixed;
    inset: 0;
    z-index: 10;
    pointer-events: none;
    background: radial-gradient(circle at center, rgba(255, 240, 200, 0.9) 0%, rgba(200, 180, 255, 0.4) 30%, transparent 70%);
    opacity: 0;
    transition: opacity 0.15s ease;
  }
  .supernova.flash {
    opacity: 1;
    animation: supernovaFlash 0.8s ease-out forwards;
  }
  @keyframes supernovaFlash {
    0%   { opacity: 1; transform: scale(0.8); }
    20%  { opacity: 0.8; transform: scale(1.2); }
    100% { opacity: 0; transform: scale(2); }
  }

  /* -- Shooting stars -- */
  .shooting-star {
    position: fixed;
    z-index: 5;
    width: 100px;
    height: 2px;
    background: linear-gradient(90deg, rgba(255, 240, 200, 0) 0%, rgba(255, 240, 200, 0.8) 50%, #fff 100%);
    border-radius: 1px;
    opacity: 0;
    pointer-events: none;
  }
  .shooting-star::after {
    content: '';
    position: absolute;
    right: -2px;
    top: -2px;
    width: 6px;
    height: 6px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 0 10px #fff, 0 0 20px rgba(255, 240, 200, 0.5);
  }

  /* -- North Star -- */
  .north-star {
    position: fixed;
    top: 12%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    z-index: 3;
    width: 12px;
    height: 12px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 1s ease, transform 1s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .north-star.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
  .north-star-core {
    width: 12px;
    height: 12px;
    background: #fff;
    border-radius: 50%;
    box-shadow:
      0 0 15px #fff,
      0 0 30px rgba(255, 240, 200, 0.6),
      0 0 60px rgba(255, 216, 100, 0.3);
    animation: northStarPulse 3s ease-in-out infinite;
  }
  .north-star-rays {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 60px;
    height: 60px;
  }
  .north-star-rays::before,
  .north-star-rays::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: linear-gradient(0deg, transparent, rgba(255, 240, 200, 0.4), transparent);
  }
  .north-star-rays::before {
    width: 2px;
    height: 60px;
  }
  .north-star-rays::after {
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(255, 240, 200, 0.4), transparent);
  }

  @keyframes northStarPulse {
    0%, 100% { box-shadow: 0 0 15px #fff, 0 0 30px rgba(255, 240, 200, 0.6), 0 0 60px rgba(255, 216, 100, 0.3); }
    50% { box-shadow: 0 0 20px #fff, 0 0 40px rgba(255, 240, 200, 0.8), 0 0 80px rgba(255, 216, 100, 0.5); }
  }

  /* -- Continue button -- */
  .continue-btn {
    margin-top: 1.8em;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    padding: 0.7em 2.5em;
    border: 1.5px solid rgba(200, 180, 255, 0.3);
    border-radius: 999px;
    background: rgba(80, 60, 140, 0.15);
    color: #c8b8ff;
    cursor: pointer;
    letter-spacing: 0.08em;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.5s ease, transform 0.5s ease, background 0.3s, border-color 0.3s, box-shadow 0.3s;
  }
  .continue-btn.show {
    opacity: 1;
    transform: translateY(0);
  }
  .continue-btn:hover {
    background: rgba(120, 90, 200, 0.25);
    border-color: rgba(200, 180, 255, 0.5);
    box-shadow: 0 0 20px rgba(167, 139, 250, 0.2);
  }
</style>
</head>
<body>

<canvas id="starfield"></canvas>
<div class="nebula"></div>

<div class="north-star" id="northStar">
  <div class="north-star-rays"></div>
  <div class="north-star-core"></div>
</div>

<div class="supernova" id="supernova"></div>

<div class="container" id="container">
  <div class="header-text" id="header">Quest Completed!</div>

  <div class="level-row" id="levelRow">
    <span class="level-badge" id="levelOld">Level 1</span>
    <span class="level-arrow" id="levelArrow">&#10142;</span>
    <span class="level-badge level-new glow" id="levelNew">Level 2</span>
  </div>

  <div class="title-row" id="titleRow">
    <span class="title-name" id="titleName">Trainee</span>
  </div>

  <div class="xp-section" id="xpSection">
    <div class="xp-label-row">
      <span>XP</span>
      <span class="xp-value" id="xpText">0 / 1000</span>
    </div>
    <div class="constellation-track">
      <div class="xp-track-bg">
        <div class="xp-track-fill" id="xpFill"></div>
      </div>
      <svg class="constellation-svg" viewBox="0 0 440 40" preserveAspectRatio="none" id="constellationSvg">
        <defs>
          <linearGradient id="constellationGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#7b5ea7"/>
            <stop offset="60%" stop-color="#a78bfa"/>
            <stop offset="100%" stop-color="#ffd866"/>
          </linearGradient>
        </defs>
      </svg>
      <!-- Star nodes placed by JS -->
    </div>
    <div class="xp-gain" id="xpGain">+500 XP</div>
  </div>

  <button class="continue-btn" id="continueBtn">Continue Quest</button>
</div>

<script>
(function() {
  // ---- Canvas Star Field ----
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let stars = [];
  const STAR_COUNT = 200;
  let canvasReady = false;

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    if (!canvasReady) {
      initStars();
      canvasReady = true;
    }
  }

  function initStars() {
    stars = [];
    for (let i = 0; i < STAR_COUNT; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.5 + 0.3,
        baseAlpha: Math.random() * 0.6 + 0.2,
        alpha: 0,
        targetAlpha: 0,
        twinkleSpeed: Math.random() * 0.02 + 0.005,
        twinklePhase: Math.random() * Math.PI * 2,
        revealed: false,
        revealDelay: Math.random() * 2000
      });
    }
  }

  function drawStars(time) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const s of stars) {
      if (!s.revealed) continue;
      // Twinkle
      const twinkle = Math.sin(time * s.twinkleSpeed + s.twinklePhase) * 0.3 + 0.7;
      s.alpha += (s.targetAlpha * twinkle - s.alpha) * 0.05;
      if (s.alpha < 0.01) continue;

      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(220, 215, 255, ${s.alpha})`;
      ctx.fill();

      // Glow for brighter stars
      if (s.r > 1) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r * 3, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(200, 190, 255, ${s.alpha * 0.15})`;
        ctx.fill();
      }
    }
  }

  function revealStarsGradually(startTime, duration) {
    for (const s of stars) {
      setTimeout(() => {
        s.revealed = true;
        s.targetAlpha = s.baseAlpha;
      }, startTime + s.revealDelay * (duration / 2000));
    }
  }

  let animTime = 0;
  function animateCanvas() {
    animTime += 16;
    drawStars(animTime);
    requestAnimationFrame(animateCanvas);
  }

  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();
  animateCanvas();

  // ---- Constellation stars & path ----
  const CONSTELLATION_STARS = [
    { pct: 0,    y: 22 },
    { pct: 12,   y: 10 },
    { pct: 25,   y: 30 },
    { pct: 37,   y: 14 },
    { pct: 50,   y: 26 },
    { pct: 62,   y: 8  },
    { pct: 75,   y: 20 },
    { pct: 87,   y: 32 },
    { pct: 100,  y: 16 },
  ];

  const track = document.querySelector('.constellation-track');
  const svg = document.getElementById('constellationSvg');
  const starNodes = [];

  // Build SVG path
  const pathPoints = CONSTELLATION_STARS.map(s => `${(s.pct / 100) * 440},${s.y}`).join(' L ');
  const pathD = `M ${pathPoints}`;

  // Background line
  const bgLine = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  bgLine.setAttribute('d', pathD);
  bgLine.setAttribute('class', 'constellation-line');
  svg.appendChild(bgLine);

  // Fill line
  const fillLine = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  fillLine.setAttribute('d', pathD);
  fillLine.setAttribute('class', 'constellation-line-fill');
  svg.appendChild(fillLine);

  const totalLength = fillLine.getTotalLength();
  fillLine.style.strokeDasharray = totalLength;
  fillLine.style.strokeDashoffset = totalLength;

  // Place star node divs
  CONSTELLATION_STARS.forEach((s, i) => {
    const node = document.createElement('div');
    node.className = 'star-node';
    node.style.left = s.pct + '%';
    node.style.top = s.y + 'px';
    track.appendChild(node);
    starNodes.push(node);
  });

  // ---- Shooting star effect ----
  function shootingStar(fromX, fromY, angle, duration) {
    const el = document.createElement('div');
    el.className = 'shooting-star';
    el.style.left = fromX + 'px';
    el.style.top = fromY + 'px';
    el.style.transform = `rotate(${angle}deg)`;
    document.body.appendChild(el);

    el.style.opacity = '1';
    el.style.transition = `transform ${duration}ms linear, opacity ${duration}ms ease-in`;

    requestAnimationFrame(() => {
      const dist = 400 + Math.random() * 300;
      const rad = angle * Math.PI / 180;
      const tx = fromX + Math.cos(rad) * dist;
      const ty = fromY + Math.sin(rad) * dist;
      el.style.transform = `rotate(${angle}deg) translateX(${dist}px)`;
      el.style.opacity = '0';
    });

    setTimeout(() => el.remove(), duration + 100);
  }

  function celebrationShootingStars() {
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2;
    for (let i = 0; i < 5; i++) {
      setTimeout(() => {
        const angle = -60 + Math.random() * 120 - 90;
        const x = cx + (Math.random() - 0.5) * 400;
        const y = cy + (Math.random() - 0.5) * 200;
        shootingStar(x, y, angle, 600 + Math.random() * 400);
      }, i * 150);
    }
  }

  // ---- Animation helpers ----
  function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

  function animateXP(from, to, max, duration) {
    return new Promise(resolve => {
      const start = performance.now();
      const xpFill = document.getElementById('xpFill');
      const xpText = document.getElementById('xpText');

      function tick(now) {
        const elapsed = now - start;
        const t = Math.min(elapsed / duration, 1);
        // Ease out cubic
        const eased = 1 - Math.pow(1 - t, 3);
        const current = Math.round(from + (to - from) * eased);
        const pct = (current / max) * 100;

        xpFill.style.width = pct + '%';
        xpText.textContent = `${current} / ${max}`;

        // Constellation line fill
        const offset = totalLength - (totalLength * (pct / 100));
        fillLine.style.strokeDashoffset = offset;

        // Light up star nodes
        CONSTELLATION_STARS.forEach((s, i) => {
          if (pct >= s.pct && !starNodes[i].classList.contains('lit')) {
            starNodes[i].classList.add('lit');
          } else if (pct < s.pct && starNodes[i].classList.contains('lit')) {
            starNodes[i].classList.remove('lit');
          }
        });

        if (t < 1) {
          requestAnimationFrame(tick);
        } else {
          resolve();
        }
      }
      requestAnimationFrame(tick);
    });
  }

  function resetConstellation() {
    const xpFill = document.getElementById('xpFill');
    xpFill.style.width = '0%';
    fillLine.style.strokeDashoffset = totalLength;
    starNodes.forEach(n => n.classList.remove('lit'));
  }

  // ---- Wrap header chars for staggered glow ----
  function wrapHeaderChars() {
    const header = document.getElementById('header');
    const text = header.textContent;
    header.innerHTML = '';
    for (let i = 0; i < text.length; i++) {
      const span = document.createElement('span');
      span.className = 'star-char';
      span.textContent = text[i] === ' ' ? '\u00A0' : text[i];
      span.style.animationDelay = (i * 0.12) + 's';
      header.appendChild(span);
    }
  }

  // ---- Main sequence ----
  async function playSequence() {
    const container = document.getElementById('container');
    const header = document.getElementById('header');
    const levelRow = document.getElementById('levelRow');
    const levelOld = document.getElementById('levelOld');
    const levelArrow = document.getElementById('levelArrow');
    const levelNew = document.getElementById('levelNew');
    const titleRow = document.getElementById('titleRow');
    const titleName = document.getElementById('titleName');
    const xpSection = document.getElementById('xpSection');
    const xpGain = document.getElementById('xpGain');
    const supernova = document.getElementById('supernova');
    const northStar = document.getElementById('northStar');
    const continueBtn = document.getElementById('continueBtn');

    // Hide level-up elements initially
    levelArrow.classList.remove('show');
    levelNew.classList.remove('show');
    levelNew.style.display = 'none';

    // 1. Stars fade in
    revealStarsGradually(0, 1500);

    await wait(800);

    // Container fades in
    container.classList.add('visible');

    await wait(400);

    // 2. Header appears in starlight
    wrapHeaderChars();
    header.classList.add('show');

    await wait(800);

    // Level and title appear
    levelRow.classList.add('show');
    await wait(300);
    titleRow.classList.add('show');
    await wait(400);

    // XP section appears
    xpSection.classList.add('show');
    await wait(500);

    // 3. XP fills from 0 to 1000 (100%)
    await animateXP(0, 1000, 1000, 2200);

    await wait(400);

    // 4. Level up! Supernova flash + shooting stars
    supernova.classList.add('flash');
    celebrationShootingStars();
    northStar.classList.add('show');

    await wait(200);

    // Update level
    levelOld.textContent = 'Level 2';
    levelOld.classList.add('glow');

    // Show arrow and new level
    levelNew.style.display = '';
    await wait(50);
    levelArrow.classList.add('show');
    await wait(200);
    levelNew.classList.add('show');
    levelNew.textContent = 'Level 2';
    levelOld.textContent = 'Level 1';
    levelOld.classList.remove('glow');

    // Update title
    titleName.textContent = 'Explorer';
    titleName.classList.add('upgraded');

    await wait(600);
    supernova.classList.remove('flash');

    await wait(400);

    // 5. XP bar resets and fills to 50%
    resetConstellation();
    document.getElementById('xpText').textContent = '0 / 1000';
    await wait(300);
    await animateXP(0, 500, 1000, 1500);

    await wait(300);

    // 6. "+500 XP" inscription
    xpGain.classList.add('show');

    // One more shooting star flourish
    setTimeout(() => {
      shootingStar(
        window.innerWidth * 0.2,
        window.innerHeight * 0.15,
        25,
        800
      );
    }, 200);

    await wait(600);

    // Show continue button
    continueBtn.classList.add('show');
  }

  // Start after 1s delay
  setTimeout(playSequence, 1000);
})();
</script>
</body>
</html>
