<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quest Completed! - Knight's Quest: Math Adventure</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=MedievalSharp&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw; height: 100vh; overflow: hidden;
    background: #1a120a;
    font-family: 'Cinzel', serif;
    display: flex; align-items: center; justify-content: center;
    perspective: 800px;
  }

  .scene {
    position: relative;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden;
  }

  /* Stone floor background */
  .bg {
    position: absolute; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 120% 80% at 50% 110%, #2a1f14 0%, transparent 70%),
      radial-gradient(circle at 50% 50%, rgba(180,140,60,0.08) 0%, transparent 60%),
      repeating-conic-gradient(#1e150d 0% 25%, #221a10 0% 50%) 0 0 / 80px 80px;
  }
  .bg::before {
    content: ''; position: absolute; inset: 0;
    background:
      linear-gradient(180deg, #0d0906 0%, transparent 30%, transparent 70%, #0d0906 100%),
      linear-gradient(90deg, #0d0906 0%, transparent 15%, transparent 85%, #0d0906 100%);
  }
  .bg::after {
    content: ''; position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='80' height='80' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='80' height='80' fill='none' stroke='%23ffffff08' stroke-width='1'/%3E%3Crect x='2' y='2' width='76' height='36' rx='2' fill='none' stroke='%23ffffff05' stroke-width='1'/%3E%3Crect x='40' y='40' width='38' height='38' rx='2' fill='none' stroke='%23ffffff05' stroke-width='1'/%3E%3Crect x='2' y='40' width='36' height='38' rx='2' fill='none' stroke='%23ffffff05' stroke-width='1'/%3E%3C/svg%3E");
    opacity: 0.5;
  }

  /* Chest glow on the ground */
  .ground-glow {
    position: absolute;
    bottom: 18%; left: 50%; transform: translateX(-50%);
    width: 500px; height: 120px;
    background: radial-gradient(ellipse, rgba(255,200,50,0.0) 0%, transparent 70%);
    border-radius: 50%;
    z-index: 1;
    transition: background 1.5s ease;
  }
  .ground-glow.active {
    background: radial-gradient(ellipse, rgba(255,200,50,0.25) 0%, transparent 70%);
  }
  .ground-glow.burst {
    background: radial-gradient(ellipse, rgba(255,220,80,0.45) 0%, transparent 70%);
  }

  /* Treasure chest */
  .chest-wrapper {
    position: absolute;
    bottom: 20%; left: 50%; transform: translateX(-50%);
    z-index: 10;
    opacity: 0;
    transition: opacity 0.8s ease;
  }
  .chest-wrapper.visible { opacity: 1; }

  .chest {
    position: relative;
    width: 220px; height: 150px;
  }

  /* Chest body */
  .chest-body {
    position: absolute; bottom: 0; left: 0;
    width: 220px; height: 110px;
    background: linear-gradient(180deg, #8B5E3C 0%, #6B3A1F 40%, #4A2510 100%);
    border-radius: 8px;
    border: 3px solid #A0703C;
    box-shadow:
      inset 0 -10px 20px rgba(0,0,0,0.5),
      inset 0 5px 10px rgba(200,160,80,0.2),
      0 8px 30px rgba(0,0,0,0.7);
  }
  .chest-body::before {
    content: ''; position: absolute;
    top: 35px; left: 50%; transform: translateX(-50%);
    width: 50px; height: 40px;
    background: linear-gradient(180deg, #d4a843, #a07830);
    border-radius: 6px;
    border: 2px solid #c4983a;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  .chest-body::after {
    content: ''; position: absolute;
    top: 48px; left: 50%; transform: translateX(-50%);
    width: 14px; height: 18px;
    background: #1a1005;
    border-radius: 0 0 7px 7px;
    border-top: 3px solid #c4983a;
  }
  /* Metal bands */
  .band {
    position: absolute; left: -3px;
    width: 226px; height: 8px;
    background: linear-gradient(180deg, #c9a44e, #8a6b30, #c9a44e);
    border-radius: 2px;
  }
  .band-1 { top: 10px; }
  .band-2 { top: 85px; }

  /* Chest lid */
  .chest-lid-pivot {
    position: absolute; bottom: 108px; left: 0;
    width: 220px; height: 0;
    transform-origin: bottom center;
    transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 11;
  }
  .chest-lid-pivot.open {
    transform: rotateX(-110deg);
  }
  .chest-lid {
    position: absolute; bottom: 0; left: 0;
    width: 220px; height: 80px;
    transform-origin: bottom center;
  }
  .chest-lid-face {
    width: 220px; height: 80px;
    background: linear-gradient(180deg, #5a3015 0%, #7a4825 30%, #8B5E3C 100%);
    border-radius: 40px 40px 0 0;
    border: 3px solid #A0703C;
    border-bottom: none;
    box-shadow:
      inset 0 10px 20px rgba(200,160,80,0.15),
      inset 0 -5px 10px rgba(0,0,0,0.3);
    position: relative;
  }
  .lid-band {
    position: absolute; left: -3px; top: 30px;
    width: 226px; height: 8px;
    background: linear-gradient(180deg, #c9a44e, #8a6b30, #c9a44e);
    border-radius: 2px;
  }

  /* Inner glow when chest opens */
  .chest-inner-glow {
    position: absolute;
    bottom: 60px; left: 50%; transform: translateX(-50%);
    width: 180px; height: 100px;
    background: radial-gradient(ellipse, rgba(255,220,80,0) 0%, transparent 70%);
    z-index: 9;
    transition: all 0.8s ease;
    pointer-events: none;
  }
  .chest-inner-glow.active {
    background: radial-gradient(ellipse, rgba(255,220,80,0.9) 0%, rgba(255,180,40,0.4) 40%, transparent 70%);
    width: 350px; height: 250px;
    bottom: 30px;
  }
  .chest-inner-glow.burst {
    background: radial-gradient(ellipse, rgba(255,250,200,1) 0%, rgba(255,220,80,0.6) 30%, transparent 60%);
    width: 600px; height: 400px;
    bottom: -30px;
  }

  /* Flying coins/gems container */
  .particles {
    position: absolute; inset: 0;
    z-index: 15;
    pointer-events: none;
  }
  .particle {
    position: absolute;
    font-size: 28px;
    opacity: 0;
    will-change: transform, opacity;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
  }

  /* Sparkle effects */
  .sparkle {
    position: absolute;
    width: 6px; height: 6px;
    background: #ffe88a;
    border-radius: 50%;
    opacity: 0;
    pointer-events: none;
    z-index: 20;
    box-shadow: 0 0 8px 2px rgba(255,220,80,0.8);
  }

  /* Header */
  .header {
    position: absolute;
    top: 12%; left: 50%; transform: translateX(-50%);
    z-index: 30;
    text-align: center;
    opacity: 0;
    transition: opacity 0.6s ease, transform 0.6s ease;
    transform: translateX(-50%) translateY(40px);
  }
  .header.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .header h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(36px, 5vw, 64px);
    font-weight: 900;
    color: #ffd54f;
    text-shadow:
      0 0 20px rgba(255,200,50,0.6),
      0 0 40px rgba(255,180,30,0.3),
      0 2px 0 #b8860b,
      0 4px 0 #8b6508,
      0 6px 15px rgba(0,0,0,0.6);
    letter-spacing: 3px;
  }

  /* Level + Title display */
  .level-display {
    position: absolute;
    top: 26%; left: 50%; transform: translateX(-50%);
    z-index: 30;
    text-align: center;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .level-display.visible { opacity: 1; }

  .level-row {
    display: flex; align-items: center; justify-content: center; gap: 16px;
    margin-bottom: 8px;
  }
  .level-badge {
    font-family: 'Cinzel', serif;
    font-size: clamp(18px, 2.5vw, 28px);
    font-weight: 700;
    color: #e8d5a3;
    background: linear-gradient(180deg, #3a2a18, #2a1a0c);
    border: 2px solid #8a6b30;
    border-radius: 8px;
    padding: 6px 18px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    transition: all 0.5s ease;
    min-width: 120px;
  }
  .level-badge.glow {
    border-color: #ffd54f;
    box-shadow: 0 0 20px rgba(255,200,50,0.4);
    color: #ffd54f;
  }
  .level-arrow {
    font-size: clamp(20px, 2.5vw, 32px);
    color: #8a6b30;
    opacity: 0;
    transition: opacity 0.4s ease, color 0.4s ease;
  }
  .level-arrow.visible { opacity: 1; color: #ffd54f; }
  .new-level {
    opacity: 0;
    transition: opacity 0.4s ease, transform 0.4s ease;
    transform: scale(0.5);
  }
  .new-level.visible { opacity: 1; transform: scale(1); }

  .title-text {
    font-family: 'MedievalSharp', cursive;
    font-size: clamp(22px, 3vw, 36px);
    color: #c9a44e;
    margin-top: 4px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    transition: all 0.4s ease;
  }
  .title-text.upgraded {
    color: #ffd54f;
    text-shadow: 0 0 15px rgba(255,200,50,0.5), 0 2px 8px rgba(0,0,0,0.5);
  }

  /* XP Bar */
  .xp-section {
    position: absolute;
    bottom: 10%; left: 50%; transform: translateX(-50%);
    z-index: 30;
    width: clamp(300px, 50vw, 550px);
    text-align: center;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .xp-section.visible { opacity: 1; }

  .xp-label {
    font-family: 'Cinzel', serif;
    font-size: clamp(12px, 1.5vw, 16px);
    color: #a08650;
    margin-bottom: 6px;
    letter-spacing: 2px;
  }
  .xp-bar-track {
    width: 100%; height: 28px;
    background: linear-gradient(180deg, #1a1005, #2a1a0c);
    border: 2px solid #5a4520;
    border-radius: 14px;
    overflow: hidden;
    position: relative;
    box-shadow: inset 0 3px 8px rgba(0,0,0,0.6);
  }
  .xp-bar-fill {
    height: 100%; width: 0%;
    background: linear-gradient(180deg, #ffd54f, #d4a020, #b8860b);
    border-radius: 12px;
    transition: width 0.05s linear;
    position: relative;
    box-shadow: 0 0 12px rgba(255,200,50,0.4);
  }
  .xp-bar-fill::after {
    content: '';
    position: absolute; top: 3px; left: 8px; right: 8px;
    height: 6px;
    background: linear-gradient(180deg, rgba(255,255,255,0.35), transparent);
    border-radius: 3px;
  }
  .xp-bar-fill.flash {
    background: linear-gradient(180deg, #fff8dc, #ffd54f, #d4a020);
  }
  .xp-values {
    display: flex; justify-content: space-between;
    margin-top: 4px;
    font-family: 'Cinzel', serif;
    font-size: clamp(11px, 1.2vw, 14px);
    color: #7a6540;
  }

  /* +500 XP badge */
  .xp-reward {
    position: absolute;
    top: 38%; left: 50%; transform: translate(-50%, -50%) scale(0);
    z-index: 35;
    opacity: 0;
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
  }
  .xp-reward.visible {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
  .xp-coin {
    width: clamp(90px, 12vw, 130px);
    height: clamp(90px, 12vw, 130px);
    background: radial-gradient(circle at 35% 35%, #ffe88a, #d4a020 50%, #8b6508 100%);
    border-radius: 50%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    border: 4px solid #c9a44e;
    box-shadow:
      0 0 30px rgba(255,200,50,0.5),
      inset 0 -4px 8px rgba(0,0,0,0.3),
      inset 0 4px 8px rgba(255,255,255,0.2),
      0 8px 25px rgba(0,0,0,0.5);
    animation: coinPulse 2s ease-in-out infinite;
  }
  .xp-coin-number {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: clamp(22px, 3vw, 34px);
    color: #3a2200;
    text-shadow: 0 1px 0 rgba(255,255,255,0.3);
    line-height: 1;
  }
  .xp-coin-label {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: clamp(12px, 1.5vw, 18px);
    color: #3a2200;
    text-shadow: 0 1px 0 rgba(255,255,255,0.3);
  }

  @keyframes coinPulse {
    0%, 100% { box-shadow: 0 0 30px rgba(255,200,50,0.5), inset 0 -4px 8px rgba(0,0,0,0.3), inset 0 4px 8px rgba(255,255,255,0.2), 0 8px 25px rgba(0,0,0,0.5); }
    50% { box-shadow: 0 0 45px rgba(255,200,50,0.7), inset 0 -4px 8px rgba(0,0,0,0.3), inset 0 4px 8px rgba(255,255,255,0.2), 0 8px 25px rgba(0,0,0,0.5); }
  }

  /* Level up flash overlay */
  .flash-overlay {
    position: absolute; inset: 0;
    background: rgba(255,250,200,0);
    z-index: 50;
    pointer-events: none;
    transition: background 0.15s ease;
  }
  .flash-overlay.flash {
    background: rgba(255,250,200,0.6);
  }

  /* Treasure pile (base decorations) */
  .treasure-pile {
    position: absolute;
    bottom: 18%; left: 50%; transform: translateX(-50%);
    z-index: 8;
    width: 300px; height: 60px;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .treasure-pile.visible { opacity: 1; }
  .pile-coin {
    position: absolute;
    font-size: 22px;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.6));
  }
</style>
</head>
<body>
<div class="scene">
  <div class="bg"></div>
  <div class="ground-glow" id="groundGlow"></div>
  <div class="flash-overlay" id="flashOverlay"></div>

  <!-- Treasure pile at base -->
  <div class="treasure-pile" id="treasurePile"></div>

  <!-- Chest -->
  <div class="chest-wrapper" id="chestWrapper">
    <div class="chest-inner-glow" id="chestGlow"></div>
    <div class="chest">
      <div class="chest-lid-pivot" id="chestLid">
        <div class="chest-lid">
          <div class="chest-lid-face">
            <div class="lid-band"></div>
          </div>
        </div>
      </div>
      <div class="chest-body">
        <div class="band band-1"></div>
        <div class="band band-2"></div>
      </div>
    </div>
  </div>

  <!-- Particles -->
  <div class="particles" id="particles"></div>

  <!-- Header -->
  <div class="header" id="header">
    <h1>Quest Completed!</h1>
  </div>

  <!-- Level display -->
  <div class="level-display" id="levelDisplay">
    <div class="level-row">
      <div class="level-badge" id="levelOld">Level 1</div>
      <div class="level-arrow" id="levelArrow">&#10148;</div>
      <div class="level-badge new-level" id="levelNew">Level 2</div>
    </div>
    <div class="title-text" id="titleText">Trainee</div>
  </div>

  <!-- XP Bar -->
  <div class="xp-section" id="xpSection">
    <div class="xp-label">EXPERIENCE</div>
    <div class="xp-bar-track">
      <div class="xp-bar-fill" id="xpFill"></div>
    </div>
    <div class="xp-values">
      <span id="xpCurrent">0 / 300 XP</span>
      <span id="xpLevel">Level 1</span>
    </div>
  </div>

  <!-- +500 XP reward -->
  <div class="xp-reward" id="xpReward">
    <div class="xp-coin">
      <div class="xp-coin-number">+500</div>
      <div class="xp-coin-label">XP</div>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

const chestWrapper = $('chestWrapper');
const chestLid = $('chestLid');
const chestGlow = $('chestGlow');
const groundGlow = $('groundGlow');
const header = $('header');
const levelDisplay = $('levelDisplay');
const levelOld = $('levelOld');
const levelArrow = $('levelArrow');
const levelNew = $('levelNew');
const titleText = $('titleText');
const xpSection = $('xpSection');
const xpFill = $('xpFill');
const xpCurrent = $('xpCurrent');
const xpLevel = $('xpLevel');
const xpReward = $('xpReward');
const flashOverlay = $('flashOverlay');
const particlesEl = $('particles');
const treasurePile = $('treasurePile');

const coins = ['🪙'];
const gems = ['💎', '🔴', '🟢', '🔵', '💜'];
const allTreasure = [...coins, ...coins, ...coins, ...gems];

function spawnParticle(originX, originY, type) {
  const el = document.createElement('div');
  el.className = 'particle';
  el.textContent = type || allTreasure[Math.floor(Math.random() * allTreasure.length)];

  const angle = (Math.random() - 0.5) * Math.PI * 1.2;
  const speed = 200 + Math.random() * 350;
  const vx = Math.sin(angle) * speed;
  const vy = -(300 + Math.random() * 400);
  const gravity = 600 + Math.random() * 200;
  const spin = (Math.random() - 0.5) * 720;
  const size = 20 + Math.random() * 18;
  el.style.fontSize = size + 'px';
  el.style.left = originX + 'px';
  el.style.top = originY + 'px';

  particlesEl.appendChild(el);

  let t = 0;
  const startTime = performance.now();
  const duration = 1200 + Math.random() * 800;

  function animate(now) {
    t = (now - startTime) / 1000;
    const progress = (now - startTime) / duration;
    if (progress > 1) {
      el.remove();
      return;
    }
    const x = vx * t;
    const y = vy * t + 0.5 * gravity * t * t;
    const rot = spin * t;
    const fade = progress > 0.7 ? 1 - (progress - 0.7) / 0.3 : 1;
    el.style.opacity = fade;
    el.style.transform = `translate(${x}px, ${y}px) rotate(${rot}deg)`;
    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);
}

function spawnSparkle(x, y) {
  const el = document.createElement('div');
  el.className = 'sparkle';
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  const size = 3 + Math.random() * 6;
  el.style.width = size + 'px';
  el.style.height = size + 'px';
  particlesEl.appendChild(el);

  const startTime = performance.now();
  const duration = 400 + Math.random() * 400;
  const drift = (Math.random() - 0.5) * 40;

  function animate(now) {
    const p = (now - startTime) / duration;
    if (p > 1) { el.remove(); return; }
    const scale = p < 0.3 ? p / 0.3 : 1 - (p - 0.3) / 0.7;
    el.style.opacity = scale;
    el.style.transform = `translate(${drift * p}px, ${-30 * p}px) scale(${scale})`;
    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);
}

function burstParticles(count, originX, originY) {
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      spawnParticle(originX + (Math.random() - 0.5) * 60, originY, null);
    }, Math.random() * 300);
  }
}

function burstSparkles(count, cx, cy, radius) {
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const a = Math.random() * Math.PI * 2;
      const r = Math.random() * radius;
      spawnSparkle(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
    }, Math.random() * 600);
  }
}

function buildTreasurePile() {
  const items = ['🪙','🪙','🪙','🪙','💎','🪙','💎','🪙','🪙','💎','🔴','🟢'];
  items.forEach((item, i) => {
    const el = document.createElement('div');
    el.className = 'pile-coin';
    el.textContent = item;
    el.style.left = (80 + Math.random() * 140) + 'px';
    el.style.bottom = (Math.random() * 25) + 'px';
    el.style.transform = `rotate(${Math.random() * 60 - 30}deg)`;
    el.style.fontSize = (16 + Math.random() * 10) + 'px';
    treasurePile.appendChild(el);
  });
}

function animateXP(startPct, endPct, durationMs, xpStart, xpEnd, maxXp, onDone) {
  const startTime = performance.now();
  function tick(now) {
    const p = Math.min((now - startTime) / durationMs, 1);
    const eased = 1 - Math.pow(1 - p, 2);
    const pct = startPct + (endPct - startPct) * eased;
    const xpVal = Math.round(xpStart + (xpEnd - xpStart) * eased);
    xpFill.style.width = pct + '%';
    xpCurrent.textContent = xpVal + ' / ' + maxXp + ' XP';
    if (p < 1) {
      requestAnimationFrame(tick);
    } else {
      if (onDone) onDone();
    }
  }
  requestAnimationFrame(tick);
}

/* Chest position helper */
function chestCenter() {
  const rect = chestWrapper.getBoundingClientRect();
  return { x: rect.left + rect.width / 2, y: rect.top + rect.height * 0.3 };
}

/* Main sequence */
function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

async function runSequence() {
  buildTreasurePile();

  const cx = window.innerWidth / 2;
  const cy = window.innerHeight * 0.55;

  // Step 1: Chest appears with soft glow
  await wait(1000);
  chestWrapper.classList.add('visible');
  groundGlow.classList.add('active');
  burstSparkles(8, cx, cy, 100);
  await wait(1000);

  // Step 2: Chest lid opens, golden light
  chestLid.classList.add('open');
  chestGlow.classList.add('active');
  await wait(300);
  burstSparkles(15, cx, cy - 40, 80);
  await wait(500);

  // Step 3: "Quest Completed!" rises
  header.classList.add('visible');
  burstSparkles(10, cx, window.innerHeight * 0.15, 120);
  await wait(600);

  // Show level display & XP bar
  levelDisplay.classList.add('visible');
  xpSection.classList.add('visible');
  await wait(400);

  // Step 4: Coins fly out, XP fills to 100% (300/300)
  // Spawn coins during fill
  const fillDuration = 2000;
  const coinInterval = setInterval(() => {
    spawnParticle(cx + (Math.random()-0.5)*40, cy - 20, '🪙');
    if (Math.random() > 0.6) {
      spawnParticle(cx + (Math.random()-0.5)*40, cy - 20, gems[Math.floor(Math.random()*gems.length)]);
    }
    burstSparkles(2, cx + (Math.random()-0.5)*100, cy - 40, 50);
  }, 80);

  animateXP(0, 100, fillDuration, 0, 300, 300, null);
  await wait(fillDuration);
  clearInterval(coinInterval);

  // Step 5: Level up! Flash + burst
  xpFill.classList.add('flash');
  flashOverlay.classList.add('flash');
  chestGlow.classList.add('burst');
  groundGlow.classList.add('burst');

  burstParticles(25, cx, cy - 20);
  burstSparkles(30, cx, cy - 20, 150);

  await wait(200);
  flashOverlay.classList.remove('flash');
  await wait(300);
  xpFill.classList.remove('flash');

  // Animate level transition
  levelOld.classList.add('glow');
  levelArrow.classList.add('visible');
  await wait(300);
  levelNew.classList.add('visible');
  levelNew.classList.add('glow');
  await wait(300);
  titleText.textContent = 'Explorer';
  titleText.classList.add('upgraded');
  xpLevel.textContent = 'Level 2';

  burstSparkles(15, cx, window.innerHeight * 0.28, 100);
  await wait(600);

  // Step 6: XP bar resets, fills to 50% (200/500 on level 2... let's say 150/300)
  chestGlow.classList.remove('burst');
  chestGlow.classList.add('active');
  groundGlow.classList.remove('burst');
  groundGlow.classList.add('active');

  xpFill.style.width = '0%';
  xpCurrent.textContent = '0 / 500 XP';
  await wait(400);

  // More coins as bar fills again
  const fillDuration2 = 1500;
  const coinInterval2 = setInterval(() => {
    spawnParticle(cx + (Math.random()-0.5)*40, cy - 20, '🪙');
    burstSparkles(1, cx + (Math.random()-0.5)*80, cy - 40, 40);
  }, 120);

  animateXP(0, 50, fillDuration2, 0, 250, 500, null);
  xpCurrent.textContent = '0 / 500 XP';
  // Override during animation
  const startFill2 = performance.now();
  function updateXP2(now) {
    const p = Math.min((now - startFill2) / fillDuration2, 1);
    const eased = 1 - Math.pow(1 - p, 2);
    const val = Math.round(250 * eased);
    xpCurrent.textContent = val + ' / 500 XP';
    if (p < 1) requestAnimationFrame(updateXP2);
  }
  requestAnimationFrame(updateXP2);

  await wait(fillDuration2);
  clearInterval(coinInterval2);
  treasurePile.classList.add('visible');

  await wait(300);

  // Step 7: +500 XP coin
  xpReward.classList.add('visible');
  burstSparkles(20, cx, window.innerHeight * 0.38, 80);
  burstParticles(8, cx, window.innerHeight * 0.38);

  // Ongoing gentle sparkles
  setInterval(() => {
    burstSparkles(3, cx + (Math.random()-0.5)*200, cy + (Math.random()-0.5)*100, 30);
  }, 800);
}

runSequence();
</script>
