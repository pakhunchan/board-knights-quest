<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080, initial-scale=1.0">
<title>Knight's Quest: Math Adventures - Intro</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=MedievalSharp&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background-image: url('../../Assets/Textures/landscape_bg_soft.png');
    background-size: cover;
    background-position: center;
    font-family: 'MedievalSharp', cursive;
    position: relative;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      135deg,
      rgba(30, 50, 40, 0.45) 0%,
      rgba(20, 35, 55, 0.40) 50%,
      rgba(40, 50, 35, 0.45) 100%
    );
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
  }

  /* ---- Title (arched above) ---- */
  .title-arch {
    position: absolute;
    top: 50px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 2;
  }

  .title-arch h1 {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 58px;
    background: linear-gradient(180deg, #ffd700 0%, #f0c040 40%, #c8960c 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 3px 6px rgba(0,0,0,0.5));
    letter-spacing: 3px;
    line-height: 1.2;
  }

  .title-arch .subtitle {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 28px;
    background: linear-gradient(180deg, #ffe680, #d4a020);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 5px;
    margin-top: 4px;
  }

  /* ---- Left: Wizard ---- */
  .wizard-area {
    flex: 0 0 520px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    height: 750px;
    margin-top: 80px;
  }

  .wizard-area svg {
    width: 420px;
    height: 700px;
  }

  /* ---- Right: Book Panel ---- */
  .book-panel {
    flex: 0 0 700px;
    height: 560px;
    margin-top: 80px;
    position: relative;
    perspective: 800px;
  }

  .book-outer {
    width: 100%;
    height: 100%;
    position: relative;
    display: flex;
    border-radius: 8px;
    box-shadow: 4px 8px 30px rgba(0,0,0,0.5);
  }

  /* Spine */
  .book-spine {
    width: 36px;
    background: linear-gradient(90deg, #5a3a1a 0%, #7a5030 40%, #6b4424 60%, #4e2e12 100%);
    border-radius: 8px 0 0 8px;
    box-shadow: inset -2px 0 6px rgba(0,0,0,0.3);
    position: relative;
  }
  .book-spine::after {
    content: '';
    position: absolute;
    top: 30px; bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    background: linear-gradient(180deg, #c8960c 0%, #ffd700 50%, #c8960c 100%);
    border-radius: 2px;
  }

  /* Pages */
  .book-pages {
    flex: 1;
    background: linear-gradient(135deg, #faf3e0 0%, #f5ecd0 30%, #f0e6c2 70%, #ebe0b8 100%);
    border-radius: 0 8px 8px 0;
    padding: 50px 55px 50px 45px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Page texture lines */
  .book-pages::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(
        180deg,
        transparent 0px,
        transparent 38px,
        rgba(180,160,120,0.12) 38px,
        rgba(180,160,120,0.12) 39px
      );
    pointer-events: none;
  }

  /* Decorative border */
  .book-pages::after {
    content: '';
    position: absolute;
    top: 18px; right: 18px; bottom: 18px; left: 18px;
    border: 2px solid rgba(180,140,60,0.3);
    border-radius: 4px;
    pointer-events: none;
  }

  /* Corner decorations */
  .corner { position: absolute; width: 40px; height: 40px; }
  .corner svg { width: 100%; height: 100%; }
  .corner-tl { top: 22px; left: 22px; }
  .corner-tr { top: 22px; right: 22px; transform: scaleX(-1); }
  .corner-bl { bottom: 22px; left: 22px; transform: scaleY(-1); }
  .corner-br { bottom: 22px; right: 22px; transform: scale(-1,-1); }

  .script-text {
    font-family: 'MedievalSharp', cursive;
    font-size: 26px;
    line-height: 1.7;
    color: #3a2a14;
    text-align: left;
    position: relative;
    z-index: 1;
  }

  .script-text .drop-cap {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 68px;
    float: left;
    line-height: 0.8;
    margin-right: 6px;
    margin-top: 6px;
    background: linear-gradient(180deg, #c8960c, #8b6914);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ---- CTA Button ---- */
  .cta-area {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
  }

  .cta-button {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 26px;
    color: #ffd700;
    background: linear-gradient(180deg, #6b4424 0%, #4e2e12 50%, #3a1e08 100%);
    border: 3px solid #c8960c;
    padding: 18px 50px;
    cursor: pointer;
    position: relative;
    transform: perspective(400px) rotateY(-2deg);
    transition: transform 0.4s ease, box-shadow 0.3s ease;
    box-shadow:
      3px 5px 15px rgba(0,0,0,0.4),
      inset 0 1px 0 rgba(255,215,0,0.2);
    letter-spacing: 2px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
  }
  .cta-button::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px solid rgba(200,150,12,0.25);
    pointer-events: none;
  }
  .cta-button:hover {
    transform: perspective(400px) rotateY(8deg);
    box-shadow:
      5px 8px 25px rgba(0,0,0,0.5),
      inset 0 1px 0 rgba(255,215,0,0.3);
  }

  /* ---- Animations ---- */

  /* Staff star twinkle */
  @keyframes twinkle {
    0%, 100% { opacity: 0.7; transform: scale(0.9); }
    50% { opacity: 1; transform: scale(1.15); }
  }
  .staff-star {
    animation: twinkle 1.5s ease-in-out infinite;
    transform-origin: center center;
  }

  /* Beard sway */
  @keyframes beardSway {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(3px); }
    75% { transform: translateX(-3px); }
  }
  .beard-group {
    animation: beardSway 4s ease-in-out infinite;
  }

  /* Breathing */
  @keyframes breathe {
    0%, 100% { transform: scaleY(1); }
    50% { transform: scaleY(1.012); }
  }
  .body-group {
    animation: breathe 3s ease-in-out infinite;
    transform-origin: bottom center;
  }

  /* Star glow pulse */
  @keyframes glowPulse {
    0%, 100% { r: 18; opacity: 0.3; }
    50% { r: 28; opacity: 0.5; }
  }

  /* Floating particles near staff */
  @keyframes floatUp {
    0% { opacity: 0; transform: translateY(0) scale(0.5); }
    30% { opacity: 0.8; }
    100% { opacity: 0; transform: translateY(-60px) scale(0); }
  }
  .magic-particle {
    opacity: 0;
  }
  .magic-particle:nth-child(1) { animation: floatUp 2.5s ease-out 0s infinite; }
  .magic-particle:nth-child(2) { animation: floatUp 2.5s ease-out 0.8s infinite; }
  .magic-particle:nth-child(3) { animation: floatUp 2.5s ease-out 1.6s infinite; }
</style>
</head>
<body>
<div class="overlay"></div>
<div class="container">

  <!-- Title Arch -->
  <div class="title-arch">
    <h1>Knight's Quest</h1>
    <div class="subtitle">Math Adventures</div>
  </div>

  <!-- Wizard Character -->
  <div class="wizard-area">
    <svg viewBox="0 0 420 700" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#fffbe6" stop-opacity="0.9"/>
          <stop offset="50%" stop-color="#ffd700" stop-opacity="0.5"/>
          <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="robeGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#4a3a8a"/>
          <stop offset="50%" stop-color="#3a2878"/>
          <stop offset="100%" stop-color="#2a1a5a"/>
        </linearGradient>
        <linearGradient id="hatGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#5a48a0"/>
          <stop offset="100%" stop-color="#3a2878"/>
        </linearGradient>
        <linearGradient id="staffWood" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#6b4a2a"/>
          <stop offset="50%" stop-color="#8b6a3a"/>
          <stop offset="100%" stop-color="#5a3a1a"/>
        </linearGradient>
      </defs>

      <!-- Staff (behind wizard) -->
      <g>
        <!-- Staff pole -->
        <line x1="105" y1="120" x2="90" y2="640" stroke="url(#staffWood)" stroke-width="10" stroke-linecap="round"/>
        <!-- Staff knots -->
        <ellipse cx="98" cy="300" rx="7" ry="5" fill="#5a3a1a"/>
        <ellipse cx="95" cy="480" rx="6" ry="4" fill="#5a3a1a"/>

        <!-- Glowing star at top -->
        <g class="staff-star">
          <circle cx="105" cy="110" r="22" fill="url(#starGlow)"/>
          <!-- Star shape -->
          <polygon points="105,88 109,102 124,102 112,111 116,125 105,116 94,125 98,111 86,102 101,102"
                   fill="#ffd700" opacity="0.9"/>
          <polygon points="105,93 108,103 118,103 110,109 113,120 105,113 97,120 100,109 92,103 102,103"
                   fill="#fff8dc"/>
        </g>

        <!-- Magic particles -->
        <circle class="magic-particle" cx="98" cy="100" r="2.5" fill="#ffd700"/>
        <circle class="magic-particle" cx="115" cy="105" r="2" fill="#fffbe6"/>
        <circle class="magic-particle" cx="102" cy="95" r="1.8" fill="#ffe680"/>
      </g>

      <!-- Body group (breathing) -->
      <g class="body-group">

        <!-- Robe -->
        <path d="M160,330 C160,330 130,380 120,450 C110,520 105,600 95,660 L95,665 L310,665 L310,660 C300,600 285,500 275,430 C265,370 250,330 250,330 Z"
              fill="url(#robeGrad)" stroke="#2a1a5a" stroke-width="1"/>

        <!-- Robe star/moon decorations -->
        <polygon points="180,420 182,426 189,426 184,430 186,437 180,433 174,437 176,430 171,426 178,426" fill="#ffd700" opacity="0.5"/>
        <polygon points="250,480 252,486 259,486 254,490 256,497 250,493 244,497 246,490 241,486 248,486" fill="#ffd700" opacity="0.4"/>
        <circle cx="220" cy="550" r="6" fill="none" stroke="#c8960c" stroke-width="1" opacity="0.4"/>
        <path d="M218,546 A6,6 0 0,1 218,558" fill="#c8960c" opacity="0.3"/>
        <polygon points="155,530 157,534 162,534 158,537 160,542 155,539 150,542 152,537 148,534 153,534" fill="#ffd700" opacity="0.35"/>
        <polygon points="270,550 271,554 275,554 272,556 273,560 270,558 267,560 268,556 265,554 269,554" fill="#ffe680" opacity="0.4"/>
        <circle cx="170" cy="470" r="4" fill="none" stroke="#ffe680" stroke-width="1" opacity="0.35"/>
        <path d="M168,467 A4,4 0 0,1 168,475" fill="#ffe680" opacity="0.3"/>

        <!-- Robe collar / neckline -->
        <path d="M175,330 L205,350 L235,330" fill="none" stroke="#c8960c" stroke-width="2" opacity="0.5"/>
        <path d="M178,333 L205,352 L232,333" fill="none" stroke="#ffd700" stroke-width="1" opacity="0.3"/>

        <!-- Belt/sash -->
        <path d="M140,430 C160,440 240,445 265,430" fill="none" stroke="#c8960c" stroke-width="4" stroke-linecap="round"/>
        <circle cx="200" cy="438" r="8" fill="#c8960c"/>
        <circle cx="200" cy="438" r="4" fill="#ffd700"/>

        <!-- Sleeves -->
        <!-- Left sleeve (reaching toward staff) -->
        <path d="M160,340 C140,360 120,380 110,395 C105,402 108,410 118,408 C130,405 145,390 155,375 Z"
              fill="url(#robeGrad)" stroke="#2a1a5a" stroke-width="1"/>
        <!-- Left hand -->
        <ellipse cx="112" cy="400" rx="10" ry="8" fill="#f5d0b0" stroke="#e0b898" stroke-width="1"/>

        <!-- Right sleeve -->
        <path d="M250,340 C270,360 280,385 278,400 C276,410 268,412 262,405 C255,395 252,370 252,355 Z"
              fill="url(#robeGrad)" stroke="#2a1a5a" stroke-width="1"/>
        <!-- Right hand -->
        <ellipse cx="272" cy="402" rx="9" ry="7" fill="#f5d0b0" stroke="#e0b898" stroke-width="1"/>

        <!-- Shoes peeking out -->
        <ellipse cx="140" cy="665" rx="25" ry="10" fill="#4a2a10" stroke="#3a1a08" stroke-width="1"/>
        <ellipse cx="260" cy="665" rx="25" ry="10" fill="#4a2a10" stroke="#3a1a08" stroke-width="1"/>
        <!-- Shoe tips curling up -->
        <path d="M118,665 C112,660 114,652 122,655" fill="#4a2a10" stroke="#3a1a08" stroke-width="1"/>
        <path d="M282,665 C288,660 286,652 278,655" fill="#4a2a10" stroke="#3a1a08" stroke-width="1"/>

        <!-- Head & Face -->
        <g>
          <!-- Neck -->
          <rect x="195" y="310" width="20" height="25" rx="5" fill="#f5d0b0"/>

          <!-- Face (round, friendly) -->
          <ellipse cx="205" cy="290" rx="52" ry="55" fill="#f5d0b0"/>

          <!-- Rosy cheeks -->
          <ellipse cx="170" cy="298" rx="14" ry="10" fill="#f0a0a0" opacity="0.35"/>
          <ellipse cx="240" cy="298" rx="14" ry="10" fill="#f0a0a0" opacity="0.35"/>

          <!-- Eyebrows (bushy, white, friendly) -->
          <path d="M172,268 C178,260 192,262 196,268" fill="none" stroke="#e8e0d0" stroke-width="4" stroke-linecap="round"/>
          <path d="M214,268 C218,262 232,260 238,268" fill="none" stroke="#e8e0d0" stroke-width="4" stroke-linecap="round"/>

          <!-- Glasses -->
          <!-- Left lens -->
          <circle cx="184" cy="280" r="18" fill="none" stroke="#8b7a5a" stroke-width="2.5"/>
          <circle cx="184" cy="280" r="18" fill="rgba(200,220,255,0.1)"/>
          <!-- Right lens -->
          <circle cx="226" cy="280" r="18" fill="none" stroke="#8b7a5a" stroke-width="2.5"/>
          <circle cx="226" cy="280" r="18" fill="rgba(200,220,255,0.1)"/>
          <!-- Bridge -->
          <path d="M202,280 C204,275 206,275 208,280" fill="none" stroke="#8b7a5a" stroke-width="2"/>
          <!-- Temples -->
          <line x1="166" y1="278" x2="155" y2="272" stroke="#8b7a5a" stroke-width="2"/>
          <line x1="244" y1="278" x2="255" y2="272" stroke="#8b7a5a" stroke-width="2"/>

          <!-- Eyes (kind, twinkling) -->
          <ellipse cx="184" cy="280" rx="5" ry="6" fill="#3a5a3a"/>
          <ellipse cx="184" cy="280" rx="3" ry="4" fill="#1a2a1a"/>
          <circle cx="186" cy="278" r="2" fill="white" opacity="0.7"/>

          <ellipse cx="226" cy="280" rx="5" ry="6" fill="#3a5a3a"/>
          <ellipse cx="226" cy="280" rx="3" ry="4" fill="#1a2a1a"/>
          <circle cx="228" cy="278" r="2" fill="white" opacity="0.7"/>

          <!-- Nose (friendly round) -->
          <ellipse cx="205" cy="300" rx="7" ry="6" fill="#eac0a0" stroke="#ddb090" stroke-width="1"/>

          <!-- Warm smile -->
          <path d="M188,314 C195,324 215,324 222,314" fill="none" stroke="#a06040" stroke-width="2.5" stroke-linecap="round"/>
          <!-- Smile highlight -->
          <path d="M192,316 C198,322 212,322 218,316" fill="none" stroke="#c08060" stroke-width="1" opacity="0.5"/>

          <!-- Ears -->
          <ellipse cx="153" cy="285" rx="8" ry="12" fill="#f0c8a0" stroke="#e0b898" stroke-width="1"/>
          <ellipse cx="257" cy="285" rx="8" ry="12" fill="#f0c8a0" stroke="#e0b898" stroke-width="1"/>
        </g>

        <!-- Beard (flowing, layered) -->
        <g class="beard-group">
          <!-- Main beard shape -->
          <path d="M165,310 C160,320 155,350 158,380 C160,410 170,450 180,470 C188,485 200,490 205,492 C210,490 222,485 230,470 C240,450 250,410 252,380 C255,350 250,320 245,310"
                fill="#eee8dd" stroke="#ddd5c8" stroke-width="1"/>
          <!-- Beard layers for depth -->
          <path d="M170,320 C168,340 165,370 170,400 C175,430 185,460 195,478 C200,484 205,486 205,486"
                fill="none" stroke="#ddd5c8" stroke-width="1.5" opacity="0.6"/>
          <path d="M240,320 C242,340 245,370 240,400 C235,430 225,460 215,478 C210,484 205,486 205,486"
                fill="none" stroke="#ddd5c8" stroke-width="1.5" opacity="0.6"/>
          <!-- Beard wave lines -->
          <path d="M175,350 C180,355 190,348 195,355" fill="none" stroke="#d8d0c2" stroke-width="1" opacity="0.5"/>
          <path d="M215,350 C220,355 230,348 235,355" fill="none" stroke="#d8d0c2" stroke-width="1" opacity="0.5"/>
          <path d="M178,390 C185,396 198,388 205,396 C212,388 225,396 232,390" fill="none" stroke="#d8d0c2" stroke-width="1" opacity="0.4"/>
          <path d="M182,430 C190,438 200,430 205,438 C210,430 220,438 228,430" fill="none" stroke="#d8d0c2" stroke-width="1" opacity="0.35"/>
          <!-- Mustache -->
          <path d="M188,310 C185,318 175,322 168,318" fill="#eee8dd" stroke="#ddd5c8" stroke-width="1"/>
          <path d="M222,310 C225,318 235,322 242,318" fill="#eee8dd" stroke="#ddd5c8" stroke-width="1"/>
        </g>

        <!-- Hat -->
        <g>
          <!-- Hat brim -->
          <ellipse cx="205" cy="243" rx="70" ry="14" fill="url(#hatGrad)" stroke="#2a1a5a" stroke-width="1"/>
          <!-- Hat cone -->
          <path d="M145,245 C150,200 165,150 190,90 C195,78 200,70 205,60 C210,70 215,78 220,90 C245,150 260,200 265,245 Z"
                fill="url(#hatGrad)" stroke="#2a1a5a" stroke-width="1"/>
          <!-- Hat band -->
          <path d="M150,242 C165,232 185,228 205,228 C225,228 245,232 260,242" fill="none" stroke="#c8960c" stroke-width="3"/>
          <!-- Crescent moon on hat -->
          <g transform="translate(195, 130) rotate(-15)">
            <path d="M0,-18 A18,18 0 0,1 0,18 A12,12 0 0,0 0,-18 Z" fill="#ffd700" opacity="0.8"/>
          </g>
          <!-- Hat stars -->
          <polygon points="220,170 222,176 228,176 223,180 225,186 220,182 215,186 217,180 212,176 218,176" fill="#ffd700" opacity="0.5"/>
          <polygon points="175,190 176,194 180,194 177,196 178,200 175,198 172,200 173,196 170,194 174,194" fill="#ffe680" opacity="0.45"/>
          <polygon points="235,210 236,213 239,213 237,215 238,218 235,216 232,218 233,215 231,213 234,213" fill="#ffd700" opacity="0.4"/>
          <!-- Hat tip slightly bent -->
          <path d="M205,60 C210,55 218,58 222,65" fill="url(#hatGrad)" stroke="#2a1a5a" stroke-width="1"/>
        </g>

      </g>
    </svg>
  </div>

  <!-- Book Panel -->
  <div class="book-panel">
    <div class="book-outer">
      <div class="book-spine"></div>
      <div class="book-pages">
        <!-- Corner decorations -->
        <div class="corner corner-tl">
          <svg viewBox="0 0 40 40"><path d="M0,40 L0,8 C0,3 3,0 8,0 L40,0 L36,4 L10,4 C6,4 4,6 4,10 L4,36 Z" fill="#c8960c" opacity="0.4"/></svg>
        </div>
        <div class="corner corner-tr">
          <svg viewBox="0 0 40 40"><path d="M0,40 L0,8 C0,3 3,0 8,0 L40,0 L36,4 L10,4 C6,4 4,6 4,10 L4,36 Z" fill="#c8960c" opacity="0.4"/></svg>
        </div>
        <div class="corner corner-bl">
          <svg viewBox="0 0 40 40"><path d="M0,40 L0,8 C0,3 3,0 8,0 L40,0 L36,4 L10,4 C6,4 4,6 4,10 L4,36 Z" fill="#c8960c" opacity="0.4"/></svg>
        </div>
        <div class="corner corner-br">
          <svg viewBox="0 0 40 40"><path d="M0,40 L0,8 C0,3 3,0 8,0 L40,0 L36,4 L10,4 C6,4 4,6 4,10 L4,36 Z" fill="#c8960c" opacity="0.4"/></svg>
        </div>

        <p class="script-text">
          <span class="drop-cap">B</span>rave adventurer, you've shown courage, curiosity, and a heart ready to learn. Now it's time to begin your greatest quest yet: the challenge of math. Your training begins now.
        </p>
      </div>
    </div>
  </div>

</div>

<!-- CTA Button -->
<div class="cta-area">
  <button class="cta-button">Open the Book!</button>
</div>

</body>
</html>
