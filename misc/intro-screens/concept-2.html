<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knight's Quest: Math Adventures — Wise Owl Mentor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=MedievalSharp&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background-image: url('../../Assets/Textures/landscape_bg_soft.png');
    background-size: cover;
    background-position: center;
    background-color: #7aab6e;
    font-family: 'MedievalSharp', cursive;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Semi-transparent overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: linear-gradient(
      180deg,
      rgba(120, 170, 200, 0.35) 0%,
      rgba(180, 210, 160, 0.4) 40%,
      rgba(240, 230, 200, 0.45) 100%
    );
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    max-width: 960px;
    width: 100%;
  }

  /* Title */
  .title {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 2.8rem;
    text-align: center;
    background: linear-gradient(180deg, #ffd700, #e8a917, #ffd700, #c8922a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
    margin-bottom: 10px;
    letter-spacing: 2px;
  }

  /* Owl area */
  .owl-wrapper {
    display: flex;
    justify-content: center;
    margin-bottom: -10px;
    position: relative;
    z-index: 2;
  }

  .owl-wrapper svg {
    filter: drop-shadow(0 8px 20px rgba(0,0,0,0.25));
  }

  /* Owl animations */
  @keyframes blink {
    0%, 90%, 100% { transform: scaleY(1); }
    95% { transform: scaleY(0.05); }
  }

  @keyframes headTilt {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(5deg); }
    75% { transform: rotate(-5deg); }
  }

  @keyframes featherRuffle {
    0%, 100% { transform: scale(1, 1); }
    50% { transform: scale(1.015, 0.985); }
  }

  .owl-eye-group {
    animation: blink 4s ease-in-out infinite;
    transform-origin: center;
  }

  .owl-head {
    animation: headTilt 6s ease-in-out infinite;
    transform-origin: 175px 130px;
  }

  .owl-body-feathers {
    animation: featherRuffle 3s ease-in-out infinite;
    transform-origin: 175px 250px;
  }

  /* Wooden banner / plaque */
  .banner-area {
    position: relative;
    width: 720px;
    margin-top: 0;
  }

  /* Ropes */
  .rope-left, .rope-right {
    position: absolute;
    top: -30px;
    width: 4px;
    height: 40px;
    z-index: 3;
  }
  .rope-left { left: 60px; }
  .rope-right { right: 60px; }

  .banner {
    position: relative;
    background:
      linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 50%),
      linear-gradient(180deg, #a0784a 0%, #8b6534 8%, #9e7642 15%, #8b6534 30%, #7a572c 50%, #8b6534 70%, #9e7642 85%, #8b6534 92%, #7a572c 100%);
    border: 4px solid #5c3d1e;
    border-radius: 14px;
    padding: 36px 50px 32px;
    box-shadow:
      inset 0 2px 4px rgba(255,255,255,0.15),
      inset 0 -2px 4px rgba(0,0,0,0.2),
      0 8px 24px rgba(0,0,0,0.35);
  }

  /* Wood grain lines */
  .banner::before {
    content: '';
    position: absolute;
    inset: 6px;
    border-radius: 10px;
    background: repeating-linear-gradient(
      90deg,
      transparent,
      transparent 18px,
      rgba(0,0,0,0.04) 18px,
      rgba(0,0,0,0.04) 20px
    );
    pointer-events: none;
  }

  /* Nails / bolts at corners */
  .banner::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .nail {
    position: absolute;
    width: 14px;
    height: 14px;
    background: radial-gradient(circle at 40% 35%, #c0a060, #8a6a30, #5c4a20);
    border-radius: 50%;
    border: 1px solid #4a3518;
    box-shadow: inset 0 1px 2px rgba(255,255,255,0.3), 0 1px 2px rgba(0,0,0,0.3);
  }
  .nail-tl { top: 12px; left: 12px; }
  .nail-tr { top: 12px; right: 12px; }
  .nail-bl { bottom: 12px; left: 12px; }
  .nail-br { bottom: 12px; right: 12px; }

  .script-text {
    font-family: 'MedievalSharp', cursive;
    font-size: 1.35rem;
    line-height: 1.7;
    color: #f5edd4;
    text-align: center;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  }

  /* CTA — wooden signpost button */
  .cta-area {
    margin-top: 28px;
    display: flex;
    justify-content: center;
  }

  .cta-btn {
    position: relative;
    display: inline-block;
    padding: 16px 56px 16px 40px;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 1.4rem;
    color: #f5edd4;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    text-decoration: none;
    cursor: pointer;
    border: 3px solid #5c3d1e;
    border-radius: 6px;
    background:
      linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%),
      linear-gradient(180deg, #a0784a 0%, #8b6534 30%, #7a572c 100%);
    box-shadow:
      inset 0 2px 3px rgba(255,255,255,0.15),
      inset 0 -2px 3px rgba(0,0,0,0.2),
      0 4px 12px rgba(0,0,0,0.3);
    transition: transform 0.3s ease;
    transform-origin: top center;
    /* Pointed end on the right */
    clip-path: polygon(0 0, calc(100% - 24px) 0, 100% 50%, calc(100% - 24px) 100%, 0 100%);
    padding-right: 64px;
  }

  .cta-btn:hover {
    animation: signSwing 0.6s ease-in-out;
  }

  @keyframes signSwing {
    0% { transform: rotate(0deg); }
    20% { transform: rotate(3deg); }
    40% { transform: rotate(-2.5deg); }
    60% { transform: rotate(1.5deg); }
    80% { transform: rotate(-1deg); }
    100% { transform: rotate(0deg); }
  }

  /* Hanging post above button */
  .signpost {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .post-pole {
    width: 10px;
    height: 40px;
    background: linear-gradient(90deg, #6b4c28, #8b6534, #6b4c28);
    border: 1px solid #4a3518;
    border-bottom: none;
    border-radius: 3px 3px 0 0;
  }
</style>
</head>
<body>
<div class="container">
  <h1 class="title">Knight's Quest: Math Adventures</h1>

  <div class="owl-wrapper">
    <svg width="350" height="360" viewBox="0 0 350 360" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Feather pattern gradients -->
        <radialGradient id="bodyGrad" cx="50%" cy="40%" r="55%">
          <stop offset="0%" stop-color="#c9a96e"/>
          <stop offset="50%" stop-color="#a67c4a"/>
          <stop offset="100%" stop-color="#7a572c"/>
        </radialGradient>
        <radialGradient id="faceDisc" cx="50%" cy="45%" r="50%">
          <stop offset="0%" stop-color="#f5edd4"/>
          <stop offset="70%" stop-color="#e8d8b4"/>
          <stop offset="100%" stop-color="#c9a96e"/>
        </radialGradient>
        <radialGradient id="eyeGrad" cx="40%" cy="35%" r="50%">
          <stop offset="0%" stop-color="#ffdd44"/>
          <stop offset="60%" stop-color="#e8a917"/>
          <stop offset="100%" stop-color="#c07a10"/>
        </radialGradient>
        <linearGradient id="hatGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#6a40aa"/>
          <stop offset="50%" stop-color="#4a2a7a"/>
          <stop offset="100%" stop-color="#3a1a6a"/>
        </linearGradient>
        <linearGradient id="branchGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#5c3d1e"/>
          <stop offset="50%" stop-color="#7a572c"/>
          <stop offset="100%" stop-color="#5c3d1e"/>
        </linearGradient>
        <linearGradient id="wingGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#a67c4a"/>
          <stop offset="100%" stop-color="#6b4c28"/>
        </linearGradient>
      </defs>

      <!-- Branch -->
      <g>
        <ellipse cx="175" cy="328" rx="140" ry="12" fill="url(#branchGrad)" stroke="#4a3518" stroke-width="1.5"/>
        <!-- Branch texture bumps -->
        <ellipse cx="100" cy="326" rx="8" ry="4" fill="#6b4c28" opacity="0.5"/>
        <ellipse cx="220" cy="330" rx="10" ry="3" fill="#6b4c28" opacity="0.4"/>
        <ellipse cx="260" cy="325" rx="6" ry="5" fill="#4a3518" opacity="0.3"/>
        <!-- Small twig on left -->
        <line x1="55" y1="328" x2="35" y2="310" stroke="#5c3d1e" stroke-width="4" stroke-linecap="round"/>
        <line x1="40" y1="315" x2="30" y2="305" stroke="#5c3d1e" stroke-width="2.5" stroke-linecap="round"/>
        <!-- Small twig on right -->
        <line x1="300" y1="326" x2="320" y2="312" stroke="#5c3d1e" stroke-width="3.5" stroke-linecap="round"/>
        <!-- Small leaves -->
        <ellipse cx="28" cy="302" rx="7" ry="4" fill="#6a9e50" transform="rotate(-30 28 302)" opacity="0.7"/>
        <ellipse cx="35" cy="306" rx="6" ry="3.5" fill="#7ab860" transform="rotate(15 35 306)" opacity="0.6"/>
        <ellipse cx="322" cy="309" rx="6" ry="3.5" fill="#6a9e50" transform="rotate(20 322 309)" opacity="0.7"/>
      </g>

      <!-- Owl body group with feather ruffle animation -->
      <g class="owl-body-feathers">
        <!-- Tail feathers behind body -->
        <ellipse cx="155" cy="310" rx="18" ry="30" fill="#7a572c" transform="rotate(-8 155 310)"/>
        <ellipse cx="175" cy="312" rx="16" ry="32" fill="#8b6534"/>
        <ellipse cx="195" cy="310" rx="18" ry="30" fill="#7a572c" transform="rotate(8 195 310)"/>

        <!-- Main body -->
        <ellipse cx="175" cy="240" rx="75" ry="95" fill="url(#bodyGrad)" stroke="#6b4c28" stroke-width="1"/>

        <!-- Belly feather layers (chest pattern) -->
        <ellipse cx="175" cy="220" rx="50" ry="40" fill="#d4b880" opacity="0.5"/>
        <ellipse cx="175" cy="240" rx="45" ry="35" fill="#dcc898" opacity="0.4"/>
        <ellipse cx="175" cy="255" rx="40" ry="28" fill="#e8d8b4" opacity="0.4"/>

        <!-- Feather texture — V-shaped chest markings -->
        <g opacity="0.3" stroke="#7a572c" stroke-width="1" fill="none">
          <path d="M160,200 L175,210 L190,200"/>
          <path d="M155,215 L175,227 L195,215"/>
          <path d="M152,232 L175,245 L198,232"/>
          <path d="M155,248 L175,260 L195,248"/>
          <path d="M158,263 L175,274 L192,263"/>
        </g>

        <!-- Left wing -->
        <g>
          <ellipse cx="112" cy="230" rx="32" ry="68" fill="url(#wingGrad)" transform="rotate(12 112 230)" stroke="#5c3d1e" stroke-width="0.8"/>
          <!-- Wing feather lines -->
          <g opacity="0.3" stroke="#5c3d1e" stroke-width="0.8">
            <path d="M95,195 Q112,210 100,250" fill="none"/>
            <path d="M100,190 Q118,208 108,255" fill="none"/>
            <path d="M108,188 Q124,205 115,258" fill="none"/>
          </g>
          <!-- Wing tip feathers -->
          <ellipse cx="100" cy="285" rx="10" ry="18" fill="#6b4c28" transform="rotate(15 100 285)"/>
          <ellipse cx="110" cy="290" rx="9" ry="16" fill="#7a572c" transform="rotate(10 110 290)"/>
          <ellipse cx="118" cy="288" rx="8" ry="14" fill="#8b6534" transform="rotate(5 118 288)"/>
        </g>

        <!-- Right wing -->
        <g>
          <ellipse cx="238" cy="230" rx="32" ry="68" fill="url(#wingGrad)" transform="rotate(-12 238 230)" stroke="#5c3d1e" stroke-width="0.8"/>
          <g opacity="0.3" stroke="#5c3d1e" stroke-width="0.8">
            <path d="M255,195 Q238,210 250,250" fill="none"/>
            <path d="M250,190 Q232,208 242,255" fill="none"/>
            <path d="M242,188 Q226,205 235,258" fill="none"/>
          </g>
          <ellipse cx="250" cy="285" rx="10" ry="18" fill="#6b4c28" transform="rotate(-15 250 285)"/>
          <ellipse cx="240" cy="290" rx="9" ry="16" fill="#7a572c" transform="rotate(-10 240 290)"/>
          <ellipse cx="232" cy="288" rx="8" ry="14" fill="#8b6534" transform="rotate(-5 232 288)"/>
        </g>

        <!-- Feet / talons on branch -->
        <g fill="#c07a10" stroke="#8a5a08" stroke-width="1">
          <!-- Left foot -->
          <ellipse cx="148" cy="325" rx="4" ry="8" transform="rotate(-5 148 325)"/>
          <ellipse cx="140" cy="328" rx="3.5" ry="7" transform="rotate(-15 140 328)"/>
          <ellipse cx="156" cy="328" rx="3.5" ry="7" transform="rotate(10 156 328)"/>
          <!-- Right foot -->
          <ellipse cx="202" cy="325" rx="4" ry="8" transform="rotate(5 202 325)"/>
          <ellipse cx="194" cy="328" rx="3.5" ry="7" transform="rotate(-10 194 328)"/>
          <ellipse cx="210" cy="328" rx="3.5" ry="7" transform="rotate(15 210 328)"/>
        </g>
      </g>

      <!-- Head group with tilt animation -->
      <g class="owl-head">
        <!-- Ear tufts -->
        <g fill="#8b6534">
          <polygon points="130,100 122,65 142,95" fill="#7a572c"/>
          <polygon points="135,95 128,68 145,90" fill="#a67c4a"/>
          <polygon points="220,100 228,65 208,95" fill="#7a572c"/>
          <polygon points="215,95 222,68 205,90" fill="#a67c4a"/>
        </g>

        <!-- Head shape -->
        <ellipse cx="175" cy="130" rx="58" ry="52" fill="url(#bodyGrad)" stroke="#6b4c28" stroke-width="0.8"/>

        <!-- Facial disc (heart-shaped lighter area) -->
        <path d="M175,90 Q205,95 215,125 Q210,165 175,175 Q140,165 135,125 Q145,95 175,90Z"
              fill="url(#faceDisc)" stroke="#c9a96e" stroke-width="0.5" opacity="0.9"/>

        <!-- Eyebrow ridges -->
        <path d="M130,112 Q148,102 162,112" fill="none" stroke="#8b6534" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M188,112 Q202,102 220,112" fill="none" stroke="#8b6534" stroke-width="2.5" stroke-linecap="round"/>

        <!-- Eyes with blink animation -->
        <g class="owl-eye-group" transform="translate(152, 125)">
          <!-- Left eye -->
          <circle cx="0" cy="0" r="16" fill="#222"/>
          <circle cx="0" cy="0" r="14" fill="url(#eyeGrad)"/>
          <circle cx="0" cy="0" r="7" fill="#1a1a1a"/>
          <circle cx="-3" cy="-4" r="4" fill="white" opacity="0.85"/>
          <circle cx="3" cy="2" r="2" fill="white" opacity="0.5"/>
        </g>
        <g class="owl-eye-group" transform="translate(198, 125)">
          <!-- Right eye -->
          <circle cx="0" cy="0" r="16" fill="#222"/>
          <circle cx="0" cy="0" r="14" fill="url(#eyeGrad)"/>
          <circle cx="0" cy="0" r="7" fill="#1a1a1a"/>
          <circle cx="-3" cy="-4" r="4" fill="white" opacity="0.85"/>
          <circle cx="3" cy="2" r="2" fill="white" opacity="0.5"/>
        </g>

        <!-- Beak -->
        <path d="M170,142 L175,155 L180,142 Z" fill="#e8a020" stroke="#c07a10" stroke-width="0.8"/>
        <!-- Beak highlight -->
        <path d="M172,143 L175,150 L178,143 Z" fill="#f0b830" opacity="0.5"/>

        <!-- Small smile lines under beak -->
        <path d="M168,156 Q175,160 182,156" fill="none" stroke="#c9a96e" stroke-width="1" opacity="0.4"/>

        <!-- Wizard hat -->
        <g>
          <!-- Hat brim -->
          <ellipse cx="175" cy="88" rx="42" ry="10" fill="#4a2a7a" stroke="#3a1a6a" stroke-width="1.5"/>
          <!-- Hat cone -->
          <path d="M140,88 Q145,40 172,18 Q175,15 178,18 Q205,40 210,88 Z" fill="url(#hatGrad)" stroke="#3a1a6a" stroke-width="1"/>
          <!-- Hat band -->
          <path d="M140,88 Q175,78 210,88 Q175,82 140,88Z" fill="#c8922a" opacity="0.8"/>
          <!-- Hat tip curl -->
          <path d="M175,18 Q182,12 190,18 Q185,22 178,18" fill="#6a40aa" stroke="#4a2a7a" stroke-width="0.5"/>

          <!-- Stars on hat -->
          <g fill="#ffd700" opacity="0.9">
            <!-- Star 1 -->
            <polygon points="158,50 160,44 162,50 168,51 163,55 165,61 160,57 155,61 157,55 152,51" transform="scale(0.5) translate(158,50)"/>
            <polygon points="155,48 157,43 159,48 163,49 159,52 161,57 157,54 153,57 155,52 151,49"/>
            <!-- Star 2 -->
            <polygon points="185,60 187,55 189,60 193,61 189,64 191,69 187,66 183,69 185,64 181,61"/>
            <!-- Star 3 (small) -->
            <polygon points="170,33 171.5,29 173,33 176,34 173,36 174,39 171.5,37 169,39 170,36 167,34"/>
            <!-- Star 4 (tiny) -->
            <circle cx="195" cy="45" r="2" fill="#ffd700"/>
            <circle cx="150" cy="65" r="1.5" fill="#ffd700" opacity="0.7"/>
          </g>

          <!-- Hat sheen -->
          <path d="M155,75 Q165,45 173,22" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="3" stroke-linecap="round"/>
        </g>
      </g>
    </svg>
  </div>

  <!-- Wooden banner with ropes -->
  <div class="banner-area">
    <!-- Rope SVGs -->
    <svg class="rope-left" viewBox="0 0 4 40">
      <path d="M2,0 Q0,10 3,20 Q1,30 2,40" stroke="#8b7355" stroke-width="3" fill="none" stroke-linecap="round"/>
    </svg>
    <svg class="rope-right" viewBox="0 0 4 40">
      <path d="M2,0 Q4,10 1,20 Q3,30 2,40" stroke="#8b7355" stroke-width="3" fill="none" stroke-linecap="round"/>
    </svg>

    <div class="banner">
      <div class="nail nail-tl"></div>
      <div class="nail nail-tr"></div>
      <div class="nail nail-bl"></div>
      <div class="nail nail-br"></div>
      <p class="script-text">
        Brave adventurer, you've shown courage, curiosity, and a heart ready to learn.
        Now it's time to begin your greatest quest yet: the challenge of math.
        Your training begins now.
      </p>
    </div>
  </div>

  <!-- CTA signpost button -->
  <div class="cta-area">
    <div class="signpost">
      <div class="post-pole"></div>
      <button class="cta-btn" onclick="void(0)">Start Your Quest!</button>
    </div>
  </div>
</div>
</body>
</html>
