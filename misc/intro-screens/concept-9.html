<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080, initial-scale=1">
<title>Knight's Quest: Math Adventures — Intro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=MedievalSharp&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: 'MedievalSharp', cursive;
  }

  body {
    background-image: url('../../Assets/Textures/landscape_bg_soft.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  .overlay {
    position: absolute;
    inset: 0;
    width: 1920px;
    height: 1080px;
    background: linear-gradient(
      135deg,
      rgba(200, 220, 200, 0.45) 0%,
      rgba(180, 210, 235, 0.40) 40%,
      rgba(240, 230, 200, 0.45) 100%
    );
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container {
    width: 1920px;
    height: 1080px;
    position: relative;
  }

  /* ── Title ── */
  .title {
    position: absolute;
    top: 50px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 62px;
    background: linear-gradient(180deg, #ffd700 0%, #e8a800 40%, #ffec80 60%, #c8960a 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
    filter: drop-shadow(0 3px 6px rgba(0,0,0,0.35));
    letter-spacing: 2px;
    white-space: nowrap;
    z-index: 10;
  }

  /* ── Tree Character (right side, integrated into scenery) ── */
  .tree-area {
    position: absolute;
    right: 40px;
    bottom: 0;
    width: 550px;
    height: 100%;
    z-index: 2;
  }

  .tree-wrap {
    position: absolute;
    bottom: 0;
    right: 0;
    transform-origin: bottom center;
    animation: trunkSway 6s ease-in-out infinite;
  }

  @keyframes trunkSway {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(0.8deg); }
    75% { transform: rotate(-0.8deg); }
  }

  /* Face animations */
  .tree-eyebrow-left, .tree-eyebrow-right {
    animation: browRaise 5s ease-in-out infinite;
  }
  .tree-eyebrow-right {
    animation-delay: 0.1s;
  }

  @keyframes browRaise {
    0%, 85%, 100% { transform: translateY(0); }
    90% { transform: translateY(-4px); }
    95% { transform: translateY(-3px); }
  }

  /* Leaf rustle - each leaf gets a slightly different animation */
  .rustle-1 { animation: rustle1 3.2s ease-in-out infinite; }
  .rustle-2 { animation: rustle2 2.8s ease-in-out infinite 0.3s; }
  .rustle-3 { animation: rustle3 3.5s ease-in-out infinite 0.7s; }
  .rustle-4 { animation: rustle1 2.6s ease-in-out infinite 1.1s; }
  .rustle-5 { animation: rustle2 3.0s ease-in-out infinite 0.5s; }
  .rustle-6 { animation: rustle3 3.8s ease-in-out infinite 1.5s; }
  .rustle-7 { animation: rustle1 2.9s ease-in-out infinite 0.9s; }
  .rustle-8 { animation: rustle2 3.3s ease-in-out infinite 1.3s; }

  @keyframes rustle1 {
    0%, 100% { transform: rotate(0deg); }
    30% { transform: rotate(6deg); }
    70% { transform: rotate(-4deg); }
  }
  @keyframes rustle2 {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-5deg); }
    60% { transform: rotate(7deg); }
  }
  @keyframes rustle3 {
    0%, 100% { transform: rotate(0deg); }
    40% { transform: rotate(4deg); }
    80% { transform: rotate(-6deg); }
  }

  /* Butterfly */
  .butterfly {
    animation: butterflyFly 8s ease-in-out infinite;
  }
  .butterfly-wing-l { animation: wingFlap 0.3s ease-in-out infinite alternate; transform-origin: right center; }
  .butterfly-wing-r { animation: wingFlap 0.3s ease-in-out infinite alternate-reverse; transform-origin: left center; }

  @keyframes butterflyFly {
    0%   { transform: translate(0, 0); }
    15%  { transform: translate(-20px, -15px); }
    30%  { transform: translate(-10px, -30px); }
    50%  { transform: translate(15px, -20px); }
    70%  { transform: translate(5px, -5px); }
    85%  { transform: translate(-5px, 10px); }
    100% { transform: translate(0, 0); }
  }
  @keyframes wingFlap {
    0% { transform: scaleX(1); }
    100% { transform: scaleX(0.3); }
  }

  /* ── Text Panel (woodland-framed, left side) ── */
  .text-panel-area {
    position: absolute;
    left: 100px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 5;
  }

  .text-panel {
    position: relative;
    width: 720px;
    padding: 60px 55px 50px;
    background: rgba(255, 250, 235, 0.88);
    border-radius: 18px;
    border: 4px solid #7a6040;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }

  /* Branch frame decoration */
  .branch-frame {
    position: absolute;
    inset: -18px;
    pointer-events: none;
  }

  /* Corner flowers */
  .corner-flower {
    position: absolute;
    width: 40px;
    height: 40px;
  }
  .corner-flower.tl { top: -20px; left: -20px; }
  .corner-flower.tr { top: -20px; right: -20px; }
  .corner-flower.bl { bottom: -20px; left: -20px; }
  .corner-flower.br { bottom: -20px; right: -20px; }

  .script-text {
    font-family: 'MedievalSharp', cursive;
    font-size: 30px;
    line-height: 1.65;
    color: #3a3020;
    text-align: left;
  }

  /* ── CTA Button ── */
  .cta-area {
    text-align: center;
    margin-top: 35px;
  }

  .cta-btn {
    display: inline-block;
    position: relative;
    width: 240px;
    height: 90px;
    border: none;
    background: none;
    cursor: pointer;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 22px;
    color: #fff5e0;
    text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    transition: transform 0.2s;
  }
  .cta-btn:hover {
    transform: scale(1.06);
  }
  .cta-btn:hover .ring-pulse {
    animation: ringPulse 1s ease-out infinite;
  }

  .cta-btn svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  .cta-btn span {
    position: relative;
    z-index: 2;
    line-height: 90px;
  }

  @keyframes ringPulse {
    0% { opacity: 0.6; r: 38; }
    100% { opacity: 0; r: 55; }
  }

  /* Small bunny hop */
  .bunny {
    animation: bunnyHop 4s ease-in-out infinite;
  }
  @keyframes bunnyHop {
    0%, 80%, 100% { transform: translateY(0); }
    85% { transform: translateY(-6px); }
    90% { transform: translateY(0); }
    93% { transform: translateY(-3px); }
    96% { transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="overlay">
<div class="container">

  <!-- Title -->
  <div class="title">Knight's Quest: Math Adventures</div>

  <!-- Text Panel (left side, woodland-framed) -->
  <div class="text-panel-area">
    <div class="text-panel">
      <!-- Branch frame SVG -->
      <svg class="branch-frame" viewBox="0 0 756 500" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <!-- Top branch -->
        <path d="M30 8 Q180 -4 378 6 Q560 -2 726 8" stroke="#6b5030" stroke-width="5" fill="none" stroke-linecap="round"/>

        <path d="M726 8 Q730 3 738 2 Q742 1 746 6" stroke="#6b5030" stroke-width="3" fill="none"/>
        <!-- Small leaves along top -->

        <ellipse cx="300" cy="2" rx="9" ry="4" fill="#8aba68" opacity="0.6" transform="rotate(10 300 2)"/>

        <ellipse cx="600" cy="495" rx="8" ry="5" fill="#6b9e48" opacity="0.7" transform="rotate(5 600 495)"/>
        <!-- Left branch -->
        <path d="M8 30 Q-2 150 4 250 Q-2 350 8 470" stroke="#6b5030" stroke-width="5" fill="none" stroke-linecap="round"/>

      <!-- Corner flowers -->

      <svg class="corner-flower tr" viewBox="0 0 40 40"><circle cx="20" cy="20" r="8" fill="#a0c8f0"/><circle cx="20" cy="10" r="5" fill="#b8d8f4"/><circle cx="28" cy="16" r="5" fill="#b8d8f4"/><circle cx="26" cy="26" r="5" fill="#b8d8f4"/><circle cx="14" cy="26" r="5" fill="#b8d8f4"/><circle cx="12" cy="16" r="5" fill="#b8d8f4"/><circle cx="20" cy="20" r="4" fill="#ffe066"/></svg>
      <svg class="corner-flower bl" viewBox="0 0 40 40"><circle cx="20" cy="20" r="8" fill="#c0d8a0"/><circle cx="20" cy="10" r="5" fill="#d0e4b8"/><circle cx="28" cy="16" r="5" fill="#d0e4b8"/><circle cx="26" cy="26" r="5" fill="#d0e4b8"/><circle cx="14" cy="26" r="5" fill="#d0e4b8"/><circle cx="12" cy="16" r="5" fill="#d0e4b8"/><circle cx="20" cy="20" r="4" fill="#ffe066"/></svg>
      <svg class="corner-flower br" viewBox="0 0 40 40"><circle cx="20" cy="20" r="8" fill="#f0d0a0"/><circle cx="20" cy="10" r="5" fill="#f4e0b8"/><circle cx="28" cy="16" r="5" fill="#f4e0b8"/><circle cx="26" cy="26" r="5" fill="#f4e0b8"/><circle cx="14" cy="26" r="5" fill="#f4e0b8"/><circle cx="12" cy="16" r="5" fill="#f4e0b8"/><circle cx="20" cy="20" r="4" fill="#ffe066"/></svg>

      <p class="script-text">
        Brave adventurer, you've shown courage, curiosity, and a heart ready to learn.
        Now it's time to begin your greatest quest yet: the challenge of math.
        Your training begins now.
      </p>

      <!-- CTA Button -->
      <div class="cta-area">
        <button class="cta-btn" type="button">
          <svg viewBox="0 0 240 90" xmlns="http://www.w3.org/2000/svg">
            <!-- Tree ring button background -->
            <ellipse cx="120" cy="45" rx="118" ry="43" fill="#5a3e1e"/>
            <ellipse cx="120" cy="45" rx="105" ry="38" fill="#6b4c28" stroke="#503218" stroke-width="1"/>
            <ellipse cx="120" cy="45" rx="90" ry="32" fill="none" stroke="#7a5a30" stroke-width="1.5" opacity="0.7"/>
            <ellipse cx="120" cy="45" rx="74" ry="26" fill="none" stroke="#8a6838" stroke-width="1.5" opacity="0.6"/>
            <ellipse cx="120" cy="45" rx="56" ry="20" fill="none" stroke="#9a7840" stroke-width="1.5" opacity="0.5"/>
            <ellipse cx="120" cy="45" rx="38" ry="14" fill="none" stroke="#aa8848" stroke-width="1.5" opacity="0.4"/>
            <ellipse cx="120" cy="45" rx="20" ry="7" fill="none" stroke="#ba9850" stroke-width="1" opacity="0.3"/>

            <ellipse class="ring-pulse" cx="120" cy="45" rx="105" ry="38" fill="none" stroke="#ffe0a0" stroke-width="2" opacity="0"/>

          <span>Enter the Forest!</span>

    </div>
  </div>

  <!-- Tree Elder Character (right side, large, scenery-integrated) -->
  <div class="tree-area">
    <div class="tree-wrap">
      <svg width="520" height="950" viewBox="0 0 520 950" xmlns="http://www.w3.org/2000/svg" style="position:absolute; bottom:0; right:0;">

        <!-- ═══ ROOTS ═══ -->

          <path d="M120 882 Q140 878 160 868" stroke="#4a3018" stroke-width="1" fill="none" opacity="0.5"/>
          <path d="M380 880 Q360 875 340 866" stroke="#4a3018" stroke-width="1" fill="none" opacity="0.5"/>
        </g>

        <!-- ═══ TRUNK ═══ -->
        <g>
          <path d="M200 400 Q190 500 185 600 Q180 700 195 800 Q200 840 210 860 L290 860 Q300 840 305 800 Q320 700 315 600 Q310 500 300 400 Z" fill="#6b4c28"/>

          <ellipse cx="225" cy="750" rx="12" ry="8" fill="#55381c" opacity="0.4"/>

        <!-- ═══ FACE ═══ -->

        <!-- ═══ CANOPY (many leaves in varying greens) ═══ -->

          <!-- Individual leaf clusters with rustle animations -->

          <g class="rustle-1" style="transform-origin: 250px 120px;">

          <!-- Mid left -->

            <ellipse cx="100" cy="230" rx="42" ry="22" fill="#5a9a38"/>

          </g>

          <!-- Mid right -->
          <g class="rustle-5" style="transform-origin: 400px 225px;">
            <ellipse cx="400" cy="225" rx="40" ry="20" fill="#559530"/>
            <ellipse cx="415" cy="215" rx="32" ry="16" fill="#64a444"/>
            <ellipse cx="390" cy="218" rx="28" ry="14" fill="#4e8e2e"/>
          </g>

          <!-- Upper mid left -->
          <g class="rustle-6" style="transform-origin: 130px 180px;">
            <ellipse cx="120" cy="185" rx="36" ry="18" fill="#5ea03a"/>
            <ellipse cx="135" cy="175" rx="28" ry="14" fill="#70b050"/>
            <ellipse cx="108" cy="178" rx="24" ry="12" fill="#4a8a28"/>

          <!-- Upper mid right -->

        <!-- Butterfly (near canopy) -->
        <g class="butterfly" transform="translate(430, 310)">

        <g opacity="0.6">

          <path d="M350 920 Q353 902 356 912 Q360 896 363 918 Q368 900 370 920" stroke="#5a9a38" stroke-width="2" fill="none"/>
          <path d="M420 930 Q423 915 426 925 Q430 910 432 930" stroke="#5a9a38" stroke-width="2" fill="none"/>
        </g>
