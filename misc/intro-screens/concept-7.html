<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080, initial-scale=1">
<title>Knight's Quest: Math Adventures — Intro (Concept 7)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=MedievalSharp&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: 'MedievalSharp', cursive;
  }

  body {
    background-image: url('../../Assets/Textures/landscape_bg_soft.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  /* Semi-transparent overlay */
  .overlay {
    position: absolute;
    inset: 0;
    width: 1920px;
    height: 1080px;
    background: linear-gradient(
      135deg,
      rgba(200, 220, 200, 0.45) 0%,
      rgba(180, 210, 235, 0.40) 40%,
      rgba(240, 230, 200, 0.45) 100%
    );
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container {
    width: 1920px;
    height: 1080px;
    display: flex;
    align-items: center;
    position: relative;
  }

  /* ── Title ── */
  .title {
    position: absolute;
    top: 55px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 62px;
    background: linear-gradient(180deg, #ffd700 0%, #e8a800 40%, #ffec80 60%, #c8960a 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
    filter: drop-shadow(0 3px 6px rgba(0,0,0,0.35));
    letter-spacing: 2px;
    white-space: nowrap;
  }

  /* ── Vine-framed panel (left side) ── */
  .panel-area {
    position: absolute;
    left: 5%;
    top: 50%;
    transform: translateY(-42%);
    width: 52%;
  }

  .vine-panel {
    position: relative;
    background: linear-gradient(
      160deg,
      rgba(255, 252, 240, 0.92) 0%,
      rgba(245, 240, 220, 0.90) 50%,
      rgba(235, 228, 205, 0.92) 100%
    );
    border-radius: 16px;
    padding: 55px 60px 50px 60px;
    box-shadow:
      0 6px 30px rgba(60, 90, 40, 0.25),
      inset 0 0 30px rgba(180, 200, 150, 0.15);
  }

  /* ── Vine border (SVG decorative) ── */
  .vine-border {
    position: absolute;
    inset: -28px;
    pointer-events: none;
  }

  .panel-text {
    font-family: 'MedievalSharp', cursive;
    font-size: 31px;
    line-height: 1.65;
    color: #3a4a2a;
    text-align: left;
  }

  /* ── Trail button ── */
  .cta-area {
    text-align: center;
    margin-top: 40px;
  }

  .trail-btn {
    display: inline-block;
    position: relative;
    background: linear-gradient(135deg, #6b8f3a 0%, #4a7028 40%, #5a8830 70%, #7aa040 100%);
    color: #fff;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 28px;
    letter-spacing: 2px;
    border: 3px solid #3a5a18;
    cursor: pointer;
    padding: 18px 80px;
    border-radius: 40px 50px 40px 50px;
    transition: all 0.35s ease;
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    box-shadow: 0 4px 16px rgba(60, 90, 30, 0.35), inset 0 1px 0 rgba(255,255,255,0.2);
    overflow: hidden;
  }

  .trail-btn::before {
    content: '';
    position: absolute;
    bottom: 6px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    transition: all 0.35s ease;
  }

  .trail-btn:hover {
    background: linear-gradient(135deg, #7aa040 0%, #5a8830 40%, #6b9838 70%, #8ab848 100%);
    transform: scale(1.06);
    padding: 18px 100px;
    box-shadow: 0 6px 24px rgba(60, 90, 30, 0.5), inset 0 1px 0 rgba(255,255,255,0.3);
  }

  /* Footprints on hover */
  .trail-btn:hover .footprint-l,
  .trail-btn:hover .footprint-r {
    opacity: 1;
  }

  .footprint-l, .footprint-r {
    position: absolute;
    bottom: 4px;
    opacity: 0;
    transition: opacity 0.4s ease 0.1s;
    font-size: 14px;
    color: rgba(255,255,255,0.45);
  }
  .footprint-l { left: 18px; transform: rotate(-15deg); }
  .footprint-r { right: 18px; transform: rotate(10deg); }

  .trail-btn:active {
    transform: scale(0.97);
  }

  .divider {
    width: 200px;
    height: 2px;
    margin: 28px auto 0 auto;
    background: linear-gradient(90deg, transparent, #6b8f3a, transparent);
  }

  /* ── Fox character (right side, peeking in) ── */
  .character-area {
    position: absolute;
    right: -40px;
    top: 50%;
    transform: translateY(-48%);
  }

  .character-wrap {
    animation: bodyRock 4s ease-in-out infinite;
  }

  @keyframes bodyRock {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(-6px); }
  }

  /* Ear twitch */
  .ear-left, .ear-right {
    animation: earTwitch 0.25s ease-in-out;
    animation-iteration-count: 1;
  }
  .ear-left { transform-origin: 128px 55px; animation-delay: 0s; }
  .ear-right { transform-origin: 188px 55px; animation-delay: 0.08s; }

  @keyframes earTwitch {
    0%, 100% { transform: rotateZ(0deg); }
    40% { transform: rotateZ(-8deg); }
    70% { transform: rotateZ(4deg); }
  }

  /* Tail wag */
  .fox-tail {
    transform-origin: 200px 310px;
    animation: tailWag 2s ease-in-out infinite;
  }

  @keyframes tailWag {
    0%, 100% { transform: rotateZ(0deg); }
    25% { transform: rotateZ(8deg); }
    75% { transform: rotateZ(-6deg); }
  }
</style>
</head>

<script>
  // Ear twitch: replay animation every 3 seconds
  function triggerEarTwitch() {
    const earL = document.querySelector('.ear-left');
    const earR = document.querySelector('.ear-right');
    if (!earL || !earR) return;

    // Remove and re-add animation
    earL.style.animation = 'none';
    earR.style.animation = 'none';
    // Force reflow
    void earL.offsetWidth;
    void earR.offsetWidth;
    earL.style.animation = 'earTwitch 0.25s ease-in-out 1';
    earR.style.animation = 'earTwitch 0.25s ease-in-out 1 0.08s';
  }

  setInterval(triggerEarTwitch, 3000);
</script>
