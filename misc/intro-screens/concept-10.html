<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knight's Quest: Math Adventures — Knight's Horse Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=MedievalSharp&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background-image: url('../../Assets/Textures/landscape_bg_soft.png');
    background-size: cover;
    background-position: center;
    background-color: #7aab6e;
    font-family: 'MedievalSharp', cursive;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Semi-transparent overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: linear-gradient(
      180deg,
      rgba(120, 170, 200, 0.35) 0%,
      rgba(180, 210, 160, 0.4) 40%,
      rgba(240, 230, 200, 0.45) 100%
    );
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    width: 100%;
    max-width: 1400px;
  }

  /* Title */
  .title {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 2.8rem;
    text-align: center;
    background: linear-gradient(180deg, #ffd700, #e8a917, #ffd700, #c8922a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
    margin-bottom: 20px;
    letter-spacing: 2px;
  }

  /* Main content — horse left, panel right */
  .main-row {
    display: flex;
    align-items: flex-end;
    gap: 30px;
    width: 100%;
    justify-content: center;
    position: relative;
  }

  /* Horse area */
  .horse-area {
    position: relative;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .horse-area svg.horse-svg {
    filter: drop-shadow(0 8px 20px rgba(0,0,0,0.25));
    position: relative;
    z-index: 2;
  }

  /* Rolling hills foreground */
  .hills-layer {
    position: absolute;
    bottom: -40px;
    left: -120px;
    width: 600px;
    height: 120px;
    z-index: 1;
  }

  /* Herald panel (right side) */
  .herald-panel {
    position: relative;
    flex-shrink: 0;
    width: 520px;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 20px;
  }

  /* Pennant top decoration */
  .pennant-top {
    width: 520px;
    height: 50px;
    position: relative;
    z-index: 2;
  }

  /* Panel body */
  .panel-body {
    position: relative;
    width: 480px;
    background:
      linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 50%),
      linear-gradient(180deg, #6b2020 0%, #8b2e2e 10%, #7a2828 30%, #6b2020 60%, #5a1a1a 100%);
    border: 4px solid #3d1010;
    border-top: none;
    border-radius: 0 0 12px 12px;
    padding: 30px 40px 28px;
    box-shadow:
      inset 0 2px 4px rgba(255,255,255,0.1),
      inset 0 -2px 4px rgba(0,0,0,0.2),
      0 8px 24px rgba(0,0,0,0.35);
  }

  /* Ornate frame inner border */
  .panel-body::before {
    content: '';
    position: absolute;
    inset: 10px;
    border: 2px solid rgba(212, 175, 55, 0.35);
    border-radius: 8px;
    pointer-events: none;
  }

  /* Corner ornaments */
  .panel-corner {
    position: absolute;
    width: 20px;
    height: 20px;
  }
  .panel-corner svg { width: 100%; height: 100%; }
  .pc-tl { top: 6px; left: 6px; }
  .pc-tr { top: 6px; right: 6px; transform: scaleX(-1); }
  .pc-bl { bottom: 6px; left: 6px; transform: scaleY(-1); }
  .pc-br { bottom: 6px; right: 6px; transform: scale(-1, -1); }

  .script-text {
    font-family: 'MedievalSharp', cursive;
    font-size: 1.3rem;
    line-height: 1.7;
    color: #f5edd4;
    text-align: center;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    position: relative;
    z-index: 1;
  }

  /* CTA — horseshoe button */
  .cta-area {
    margin-top: 24px;
    display: flex;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  .horseshoe-btn {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 200px;
    height: 200px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    transition: transform 0.3s ease;
    transform-origin: top center;
  }

  .horseshoe-btn:hover {
    animation: horseshoeRock 0.8s ease-in-out;
  }

  @keyframes horseshoeRock {
    0% { transform: rotate(0deg); }
    20% { transform: rotate(4deg); }
    40% { transform: rotate(-3deg); }
    60% { transform: rotate(2deg); }
    80% { transform: rotate(-1deg); }
    100% { transform: rotate(0deg); }
  }

  .horseshoe-btn .btn-text {
    position: absolute;
    top: 52px;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 1.2rem;
    color: #f5edd4;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    text-align: center;
    line-height: 1.2;
    width: 120px;
    pointer-events: none;
    z-index: 2;
  }

  /* Horse animations */
  @keyframes tailSwish {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(12deg); }
    75% { transform: rotate(-10deg); }
  }

  @keyframes earFlick {
    0%, 85%, 100% { transform: rotate(0deg); }
    90% { transform: rotate(-12deg); }
    95% { transform: rotate(5deg); }
  }

  @keyframes hoofPaw {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    30% { transform: translate(8px, -4px) rotate(-10deg); }
    50% { transform: translate(12px, -2px) rotate(-5deg); }
    70% { transform: translate(6px, -3px) rotate(-8deg); }
  }

  .horse-tail {
    animation: tailSwish 2s ease-in-out infinite;
    transform-origin: 58px 170px;
  }

  .horse-ear-left {
    animation: earFlick 4s ease-in-out infinite;
    transform-origin: 240px 30px;
  }

  .horse-ear-right {
    animation: earFlick 4s ease-in-out infinite 0.15s;
    transform-origin: 270px 28px;
  }

  .horse-front-leg-left {
    animation: hoofPaw 3s ease-in-out infinite;
    transform-origin: 215px 270px;
  }
</style>
</head>
<body>
<div class="container">
  <h1 class="title">Knight's Quest: Math Adventures</h1>

  <div class="main-row">

      </svg>

      <div class="panel-body">
        <!-- Corner ornaments -->
        <div class="panel-corner pc-tl"><svg viewBox="0 0 20 20"><path d="M0,0 Q10,0 10,10 Q10,0 20,0" fill="none" stroke="#d4af37" stroke-width="2"/><circle cx="2" cy="2" r="2" fill="#d4af37"/></svg></div>
