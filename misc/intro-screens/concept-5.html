<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080, initial-scale=1">
<title>Knight's Quest: Math Adventures — Concept 5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=MedievalSharp&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background-image: url('../../Assets/Textures/landscape_bg_soft.png');
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'MedievalSharp', cursive;
  }

  /* Semi-transparent overlay */
  .overlay {
    position: fixed;
    inset: 0;
    background: radial-gradient(
      ellipse at center,
      rgba(230, 245, 235, 0.55) 0%,
      rgba(180, 210, 200, 0.65) 50%,
      rgba(120, 170, 160, 0.75) 100%
    );
    z-index: 0;
  }

  /* ── Main layout ── */
  .stage {
    position: relative;
    z-index: 1;
    width: 1100px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }

  /* ── Title ── */
  .title {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 52px;
    background: linear-gradient(180deg, #ffd700 0%, #c8960c 45%, #ffe066 70%, #b8860b 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.35));
    text-align: center;
    line-height: 1.2;
    letter-spacing: 1px;
  }

  /* ── Frame + fairy wrapper ── */
  .frame-area {
    position: relative;
    width: 880px;
    height: 420px;
  }

  /* ── Ornate text frame ── */
  .ornate-frame {
    position: absolute;
    inset: 0;
  }

  .ornate-frame svg {
    width: 100%;
    height: 100%;
  }

  /* Text inside frame */
  .script-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 680px;
    text-align: center;
    font-family: 'MedievalSharp', cursive;
    font-size: 26px;
    line-height: 1.65;
    color: #3a2e1a;
    text-shadow: 0 1px 2px rgba(255,255,255,0.5);
    z-index: 2;
  }

  /* ── Fairy container — figure-8 orbit ── */
  .fairy-orbit {
    position: absolute;
    top: 50%;
    left: -30px;
    width: 180px;
    height: 180px;
    margin-top: -90px;
    z-index: 5;
    animation: figure8 8s ease-in-out infinite;
  }

  @keyframes figure8 {
    0%   { transform: translate(0, 0); }
    12.5%{ transform: translate(40px, -50px); }
    25%  { transform: translate(80px, 0); }
    37.5%{ transform: translate(40px, 50px); }
    50%  { transform: translate(0, 0); }
    62.5%{ transform: translate(-40px, -50px); }
    75%  { transform: translate(-80px, 0); }
    87.5%{ transform: translate(-40px, 50px); }
    100% { transform: translate(0, 0); }
  }

  .fairy-glow {
    position: relative;
    width: 180px;
    height: 180px;
    animation: glowPulse 2s ease-in-out infinite;
    filter: drop-shadow(0 0 18px rgba(255, 200, 255, 0.7));
  }

  @keyframes glowPulse {
    0%, 100% { filter: drop-shadow(0 0 14px rgba(255, 200, 255, 0.5)); }
    50%      { filter: drop-shadow(0 0 30px rgba(255, 180, 255, 0.9)); }
  }

  .fairy-glow svg {
    width: 100%;
    height: 100%;
  }

  /* ── Sparkles ── */
  .sparkle {
    position: absolute;
    z-index: 6;
    animation: sparkleFade 1.6s ease-in-out infinite;
    opacity: 0;
  }

  .sparkle svg {
    width: 100%;
    height: 100%;
  }

  .sparkle:nth-child(1) { width: 18px; height: 18px; top: 10px;  left: 20px;  animation-delay: 0s; }
  .sparkle:nth-child(2) { width: 14px; height: 14px; top: -5px;  left: 90px;  animation-delay: 0.3s; }
  .sparkle:nth-child(3) { width: 20px; height: 20px; top: 30px;  left: 155px; animation-delay: 0.7s; }
  .sparkle:nth-child(4) { width: 12px; height: 12px; top: 100px; left: 170px; animation-delay: 1.0s; }
  .sparkle:nth-child(5) { width: 16px; height: 16px; top: 155px; left: 140px; animation-delay: 0.5s; }
  .sparkle:nth-child(6) { width: 14px; height: 14px; top: 160px; left: 50px;  animation-delay: 1.2s; }
  .sparkle:nth-child(7) { width: 18px; height: 18px; top: 120px; left: -10px; animation-delay: 0.9s; }
  .sparkle:nth-child(8) { width: 12px; height: 12px; top: 55px;  left: -5px;  animation-delay: 0.2s; }

  @keyframes sparkleFade {
    0%   { opacity: 0; transform: scale(0) rotate(0deg); }
    30%  { opacity: 1; transform: scale(1) rotate(90deg); }
    60%  { opacity: 1; transform: scale(1) rotate(180deg); }
    100% { opacity: 0; transform: scale(0) rotate(360deg); }
  }

  /* ── CTA leaf button ── */
  .cta-wrap {
    margin-top: 8px;
  }

  .cta-btn {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 26px;
    color: #fff;
    background: linear-gradient(135deg, #6aad5a 0%, #4a8c3a 50%, #6aad5a 100%);
    border: none;
    cursor: pointer;
    padding: 18px 64px;
    clip-path: polygon(
      10% 0%, 90% 0%, 100% 20%, 98% 50%,
      100% 80%, 90% 100%, 10% 100%, 0% 80%,
      2% 50%, 0% 20%
    );
    position: relative;
    text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    transition: transform 0.3s ease, filter 0.3s ease;
    letter-spacing: 2px;
  }

  /* Gold vein overlay */
  .cta-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(30deg,  transparent 44%, rgba(255,215,0,0.25) 45%, rgba(255,215,0,0.25) 46%, transparent 47%),
      linear-gradient(150deg, transparent 52%, rgba(255,215,0,0.2) 53%, rgba(255,215,0,0.2) 54%, transparent 55%),
      linear-gradient(80deg,  transparent 30%, rgba(255,215,0,0.15) 31%, rgba(255,215,0,0.15) 32%, transparent 33%);
    clip-path: inherit;
    pointer-events: none;
  }

  .cta-btn:hover {
    transform: scale(1.08);
    filter: drop-shadow(0 0 14px rgba(180, 220, 100, 0.7));
  }
</style>
</head>
<body>

<div class="overlay"></div>

<div class="stage">

  <!-- Title -->
  <h1 class="title">Knight's Quest: Math Adventures</h1>

  <!-- Frame area: ornate frame + fairy -->
  <div class="frame-area">

    <!-- Ornate golden filigree frame (SVG) -->
    <div class="ornate-frame">
      <svg viewBox="0 0 880 420" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#ffd700"/>
            <stop offset="40%" stop-color="#c8960c"/>
            <stop offset="70%" stop-color="#ffe066"/>
            <stop offset="100%" stop-color="#b8860b"/>
          </linearGradient>
          <linearGradient id="goldLight" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ffe88a"/>
            <stop offset="100%" stop-color="#c8960c"/>
          </linearGradient>
          <!-- Frame fill -->
          <radialGradient id="frameFill" cx="50%" cy="50%">
            <stop offset="0%" stop-color="rgba(255,252,240,0.88)"/>
            <stop offset="100%" stop-color="rgba(245,238,220,0.82)"/>
          </radialGradient>
        </defs>

        <!-- Background pane -->
        <rect x="40" y="40" width="800" height="340" rx="18"
              fill="url(#frameFill)" stroke="url(#gold)" stroke-width="3"/>

        <!-- Outer decorative border -->
        <rect x="24" y="24" width="832" height="372" rx="26"
              fill="none" stroke="url(#gold)" stroke-width="2.5" stroke-dasharray="8 4"/>

        <!-- Inner decorative border -->
        <rect x="54" y="54" width="772" height="312" rx="12"
              fill="none" stroke="url(#goldLight)" stroke-width="1.5"/>

        <!-- Corner ornaments — top-left -->
        <g transform="translate(24,24)">
          <path d="M0,30 Q0,0 30,0" stroke="url(#gold)" stroke-width="3.5" fill="none"/>
          <circle cx="4" cy="4" r="5" fill="#ffd700"/>
          <path d="M6,26 Q10,10 26,6" stroke="url(#goldLight)" stroke-width="1.5" fill="none"/>
          <path d="M0,50 C5,35 15,20 35,15" stroke="url(#gold)" stroke-width="1" fill="none" opacity="0.6"/>
          <!-- Vine curl -->
          <path d="M30,2 C38,-4 44,6 38,12 C32,18 24,10 30,2Z" fill="#ffd700" opacity="0.5"/>
        </g>

        <!-- Corner ornaments — top-right -->
        <g transform="translate(856,24) scale(-1,1)">
          <path d="M0,30 Q0,0 30,0" stroke="url(#gold)" stroke-width="3.5" fill="none"/>
          <circle cx="4" cy="4" r="5" fill="#ffd700"/>
          <path d="M6,26 Q10,10 26,6" stroke="url(#goldLight)" stroke-width="1.5" fill="none"/>
          <path d="M0,50 C5,35 15,20 35,15" stroke="url(#gold)" stroke-width="1" fill="none" opacity="0.6"/>
          <path d="M30,2 C38,-4 44,6 38,12 C32,18 24,10 30,2Z" fill="#ffd700" opacity="0.5"/>
        </g>

        <!-- Corner ornaments — bottom-left -->
        <g transform="translate(24,396) scale(1,-1)">
          <path d="M0,30 Q0,0 30,0" stroke="url(#gold)" stroke-width="3.5" fill="none"/>
          <circle cx="4" cy="4" r="5" fill="#ffd700"/>
          <path d="M6,26 Q10,10 26,6" stroke="url(#goldLight)" stroke-width="1.5" fill="none"/>
          <path d="M0,50 C5,35 15,20 35,15" stroke="url(#gold)" stroke-width="1" fill="none" opacity="0.6"/>
          <path d="M30,2 C38,-4 44,6 38,12 C32,18 24,10 30,2Z" fill="#ffd700" opacity="0.5"/>
        </g>

        <!-- Corner ornaments — bottom-right -->
        <g transform="translate(856,396) scale(-1,-1)">
          <path d="M0,30 Q0,0 30,0" stroke="url(#gold)" stroke-width="3.5" fill="none"/>
          <circle cx="4" cy="4" r="5" fill="#ffd700"/>
          <path d="M6,26 Q10,10 26,6" stroke="url(#goldLight)" stroke-width="1.5" fill="none"/>
          <path d="M0,50 C5,35 15,20 35,15" stroke="url(#gold)" stroke-width="1" fill="none" opacity="0.6"/>
          <path d="M30,2 C38,-4 44,6 38,12 C32,18 24,10 30,2Z" fill="#ffd700" opacity="0.5"/>
        </g>

        <!-- Top-center vine flourish -->
        <g transform="translate(440,20)">
          <path d="M-60,10 C-30,-8 -10,0 0,6 C10,0 30,-8 60,10"
                stroke="url(#gold)" stroke-width="2" fill="none"/>
          <path d="M-40,8 C-20,-2 0,4 0,4 C0,4 20,-2 40,8"
                stroke="url(#goldLight)" stroke-width="1.2" fill="none"/>
          <circle cx="0" cy="4" r="3.5" fill="#ffe066"/>
          <circle cx="-50" cy="10" r="2" fill="#ffd700" opacity="0.7"/>
          <circle cx="50" cy="10" r="2" fill="#ffd700" opacity="0.7"/>
        </g>

        <!-- Bottom-center vine flourish -->
        <g transform="translate(440,400)">
          <path d="M-60,-10 C-30,8 -10,0 0,-6 C10,0 30,8 60,-10"
                stroke="url(#gold)" stroke-width="2" fill="none"/>
          <path d="M-40,-8 C-20,2 0,-4 0,-4 C0,-4 20,2 40,-8"
                stroke="url(#goldLight)" stroke-width="1.2" fill="none"/>
          <circle cx="0" cy="-4" r="3.5" fill="#ffe066"/>
        </g>

        <!-- Side vine accents — left -->
        <path d="M28,130 C18,160 18,200 18,210 C18,220 18,260 28,290"
              stroke="url(#gold)" stroke-width="1.5" fill="none" opacity="0.5"/>
        <circle cx="20" cy="210" r="2.5" fill="#ffe066" opacity="0.6"/>

        <!-- Side vine accents — right -->
        <path d="M852,130 C862,160 862,200 862,210 C862,220 862,260 852,290"
              stroke="url(#gold)" stroke-width="1.5" fill="none" opacity="0.5"/>
        <circle cx="860" cy="210" r="2.5" fill="#ffe066" opacity="0.6"/>
      </svg>
    </div>

    <!-- Script text -->
    <div class="script-text">
      Brave adventurer, you've shown courage, curiosity, and a heart ready to learn.
      Now it's time to begin your greatest quest yet: the challenge of math.
      Your training begins now.
    </div>

    <!-- Fairy (orbiting) -->
    <div class="fairy-orbit">
      <!-- Sparkle particles -->
      <div class="sparkle">
        <svg viewBox="0 0 20 20"><polygon points="10,0 12,8 20,10 12,12 10,20 8,12 0,10 8,8" fill="#ffe88a"/></svg>
      </div>
      <div class="sparkle">
        <svg viewBox="0 0 20 20"><polygon points="10,2 11.5,8.5 18,10 11.5,11.5 10,18 8.5,11.5 2,10 8.5,8.5" fill="#ffc0eb"/></svg>
      </div>
      <div class="sparkle">
        <svg viewBox="0 0 20 20"><polygon points="10,0 12,8 20,10 12,12 10,20 8,12 0,10 8,8" fill="#c8e6ff"/></svg>
      </div>
      <div class="sparkle">
        <svg viewBox="0 0 20 20"><polygon points="10,2 11.5,8.5 18,10 11.5,11.5 10,18 8.5,11.5 2,10 8.5,8.5" fill="#ffe88a"/></svg>
      </div>
      <div class="sparkle">
        <svg viewBox="0 0 20 20"><polygon points="10,0 12,8 20,10 12,12 10,20 8,12 0,10 8,8" fill="#d4bbff"/></svg>
      </div>
      <div class="sparkle">
        <svg viewBox="0 0 20 20"><polygon points="10,2 11.5,8.5 18,10 11.5,11.5 10,18 8.5,11.5 2,10 8.5,8.5" fill="#ffe88a"/></svg>
      </div>
      <div class="sparkle">
        <svg viewBox="0 0 20 20"><polygon points="10,0 12,8 20,10 12,12 10,20 8,12 0,10 8,8" fill="#ffc0eb"/></svg>
      </div>
      <div class="sparkle">
        <svg viewBox="0 0 20 20"><polygon points="10,2 11.5,8.5 18,10 11.5,11.5 10,18 8.5,11.5 2,10 8.5,8.5" fill="#c8e6ff"/></svg>
      </div>

      <!-- Fairy character -->
      <div class="fairy-glow">
        <svg viewBox="0 0 180 200" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="aura" cx="50%" cy="45%">
              <stop offset="0%" stop-color="rgba(255,200,255,0.35)"/>
              <stop offset="60%" stop-color="rgba(255,200,255,0.1)"/>
              <stop offset="100%" stop-color="rgba(255,200,255,0)"/>
            </radialGradient>
            <linearGradient id="wingLeft" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="rgba(200,230,255,0.7)"/>
              <stop offset="40%" stop-color="rgba(220,180,255,0.5)"/>
              <stop offset="100%" stop-color="rgba(255,200,230,0.3)"/>
            </linearGradient>
            <linearGradient id="wingRight" x1="1" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="rgba(255,200,230,0.7)"/>
              <stop offset="40%" stop-color="rgba(200,230,255,0.5)"/>
              <stop offset="100%" stop-color="rgba(220,180,255,0.3)"/>
            </linearGradient>
            <linearGradient id="dress" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#f0a0d0"/>
              <stop offset="100%" stop-color="#c8a0e8"/>
            </linearGradient>
            <linearGradient id="hair" x1="0" y1="0" x2="0.3" y2="1">
              <stop offset="0%" stop-color="#ffe066"/>
              <stop offset="100%" stop-color="#f0c030"/>
            </linearGradient>
          </defs>

          <!-- Aura glow -->
          <ellipse cx="90" cy="100" rx="80" ry="90" fill="url(#aura)"/>

          <!-- Wings — left upper -->
          <ellipse cx="55" cy="72" rx="32" ry="42"
                   transform="rotate(-20,55,72)"
                   fill="url(#wingLeft)" stroke="rgba(200,180,255,0.5)" stroke-width="0.8"/>
          <!-- Wings — left lower -->
          <ellipse cx="52" cy="105" rx="22" ry="28"
                   transform="rotate(-10,52,105)"
                   fill="url(#wingLeft)" stroke="rgba(200,180,255,0.4)" stroke-width="0.6"/>
          <!-- Wings — right upper -->
          <ellipse cx="125" cy="72" rx="32" ry="42"
                   transform="rotate(20,125,72)"
                   fill="url(#wingRight)" stroke="rgba(255,180,200,0.5)" stroke-width="0.8"/>
          <!-- Wings — right lower -->
          <ellipse cx="128" cy="105" rx="22" ry="28"
                   transform="rotate(10,128,105)"
                   fill="url(#wingRight)" stroke="rgba(255,180,200,0.4)" stroke-width="0.6"/>

          <!-- Wing vein lines -->
          <line x1="58" y1="55" x2="42" y2="42" stroke="rgba(200,200,255,0.3)" stroke-width="0.5"/>
          <line x1="55" y1="65" x2="35" y2="60" stroke="rgba(200,200,255,0.3)" stroke-width="0.5"/>
          <line x1="122" y1="55" x2="138" y2="42" stroke="rgba(255,200,220,0.3)" stroke-width="0.5"/>
          <line x1="125" y1="65" x2="145" y2="60" stroke="rgba(255,200,220,0.3)" stroke-width="0.5"/>

          <!-- Body / dress -->
          <path d="M82,108 Q78,130 72,155 Q90,162 108,155 Q102,130 98,108Z"
                fill="url(#dress)"/>
          <!-- Dress details -->
          <path d="M82,120 Q90,118 98,120" stroke="rgba(255,255,255,0.4)" stroke-width="0.8" fill="none"/>
          <path d="M78,135 Q90,132 102,135" stroke="rgba(255,255,255,0.3)" stroke-width="0.6" fill="none"/>

          <!-- Head -->
          <circle cx="90" cy="82" r="22" fill="#ffe0cc"/>
          <!-- Blush -->
          <ellipse cx="76" cy="88" rx="5" ry="3" fill="rgba(255,150,150,0.3)"/>
          <ellipse cx="104" cy="88" rx="5" ry="3" fill="rgba(255,150,150,0.3)"/>

          <!-- Eyes -->
          <ellipse cx="82" cy="82" rx="3.5" ry="4" fill="#5a3a6a"/>
          <ellipse cx="98" cy="82" rx="3.5" ry="4" fill="#5a3a6a"/>
          <!-- Eye shine -->
          <circle cx="83.5" cy="80.5" r="1.2" fill="white"/>
          <circle cx="99.5" cy="80.5" r="1.2" fill="white"/>

          <!-- Cheerful smile -->
          <path d="M84,91 Q90,97 96,91" stroke="#a06070" stroke-width="1.5" fill="none" stroke-linecap="round"/>

          <!-- Hair (flowing) -->
          <path d="M68,75 Q65,55 75,48 Q85,42 90,42 Q95,42 105,48 Q115,55 112,75"
                fill="url(#hair)"/>
          <!-- Hair flowing strands -->
          <path d="M68,75 Q60,90 58,110" stroke="#f0c030" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <path d="M70,72 Q63,85 62,100" stroke="#ffe066" stroke-width="1.8" fill="none" stroke-linecap="round"/>
          <path d="M112,75 Q120,90 122,110" stroke="#f0c030" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <path d="M110,72 Q117,85 118,100" stroke="#ffe066" stroke-width="1.8" fill="none" stroke-linecap="round"/>

          <!-- Arms -->
          <path d="M82,112 Q70,118 58,110" stroke="#ffe0cc" stroke-width="4" fill="none" stroke-linecap="round"/>
          <!-- Wand arm (right) -->
          <path d="M98,112 Q110,105 120,95" stroke="#ffe0cc" stroke-width="4" fill="none" stroke-linecap="round"/>

          <!-- Wand -->
          <line x1="118" y1="97" x2="138" y2="60" stroke="#c8960c" stroke-width="2.5" stroke-linecap="round"/>
          <!-- Wand star tip -->
          <polygon points="138,48 140,56 148,58 141,62 143,70 138,64 133,70 135,62 128,58 136,56"
                   fill="#ffe066" stroke="#ffd700" stroke-width="0.5"/>
          <!-- Star glow -->
          <circle cx="138" cy="58" r="8" fill="rgba(255,230,100,0.3)"/>

          <!-- Legs / feet -->
          <line x1="82" y1="155" x2="80" y2="170" stroke="#ffe0cc" stroke-width="3" stroke-linecap="round"/>
          <line x1="98" y1="155" x2="100" y2="170" stroke="#ffe0cc" stroke-width="3" stroke-linecap="round"/>
          <!-- Tiny shoes -->
          <ellipse cx="78" cy="172" rx="5" ry="3" fill="#e890c0"/>
          <ellipse cx="102" cy="172" rx="5" ry="3" fill="#e890c0"/>
        </svg>
      </div>
    </div>

  </div>

  <!-- CTA Button -->
  <div class="cta-wrap">
    <button class="cta-btn">Begin!</button>
  </div>

</div>

</body>
</html>
