<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080, initial-scale=1.0">
<title>Knight's Quest: Math Adventures — Intro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=MedievalSharp&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background-image: url('../../Assets/Textures/landscape_bg_soft.png');
    background-size: cover;
    background-position: center;
    font-family: 'MedievalSharp', cursive;
    position: relative;
  }

  /* Semi-transparent overlay */
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      135deg,
      rgba(220, 240, 230, 0.55) 0%,
      rgba(200, 225, 245, 0.50) 40%,
      rgba(245, 235, 210, 0.50) 100%
    );
    z-index: 1;
  }

  .content {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ---- Title ---- */
  .title {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 64px;
    text-align: center;
    margin-top: 60px;
    background: linear-gradient(180deg, #ffd700 0%, #e6ac00 40%, #c8860a 70%, #ffd700 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 3px 6px rgba(0,0,0,0.35));
    letter-spacing: 3px;
    line-height: 1.15;
  }

  /* ---- Main stage: speech bubble left, dragon right ---- */
  .stage {
    flex: 1;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 0 80px;
    margin-top: -10px;
  }

  /* ---- Speech bubble ---- */
  .speech-area {
    flex: 0 0 55%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5;
  }

  .speech-bubble {
    position: relative;
    background: rgba(255, 255, 250, 0.92);
    border-radius: 36px;
    padding: 48px 54px;
    max-width: 740px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12), inset 0 0 60px rgba(255,250,220,0.3);
    border: 3px solid rgba(200, 180, 130, 0.35);
  }

  .speech-bubble p {
    font-family: 'MedievalSharp', cursive;
    font-size: 30px;
    line-height: 1.6;
    color: #3a3328;
    text-align: left;
  }

  /* Bubble tail pointing right toward dragon */
  .speech-bubble::after {
    content: '';
    position: absolute;
    right: -38px;
    top: 50%;
    transform: translateY(-50%);
    width: 0;
    height: 0;
    border-top: 28px solid transparent;
    border-bottom: 28px solid transparent;
    border-left: 42px solid rgba(255, 255, 250, 0.92);
    filter: drop-shadow(4px 2px 4px rgba(0,0,0,0.08));
  }

  /* ---- Dragon area ---- */
  .dragon-area {
    flex: 0 0 45%;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    position: relative;
    height: 100%;
  }

  .dragon-container {
    position: relative;
    z-index: 4;
    margin-bottom: 80px;
    animation: dragonFloat 2.5s ease-in-out infinite;
  }

  @keyframes dragonFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-18px); }
  }

  /* Wing flap */
  .wing-left, .wing-right {
    transform-origin: center bottom;
    animation: wingFlap 1.5s ease-in-out infinite;
  }
  .wing-right {
    animation-delay: 0.1s;
  }
  @keyframes wingFlap {
    0%, 100% { transform: rotateZ(0deg); }
    25% { transform: rotateZ(-15deg); }
    75% { transform: rotateZ(15deg); }
  }

  /* Tail sway */
  .dragon-tail {
    transform-origin: left center;
    animation: tailSway 3s ease-in-out infinite;
  }
  @keyframes tailSway {
    0%, 100% { transform: rotate(0deg); }
    33% { transform: rotate(8deg); }
    66% { transform: rotate(-8deg); }
  }

  /* Smoke puff */
  .smoke-puff {
    animation: smokePuff 2.5s ease-in-out infinite;
  }
  @keyframes smokePuff {
    0% { opacity: 0; transform: translate(0, 0) scale(0.5); }
    30% { opacity: 0.5; }
    100% { opacity: 0; transform: translate(-15px, -25px) scale(1.4); }
  }

  /* Eye blink */
  .eye-lid {
    animation: blink 4s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 92%, 100% { transform: scaleY(0); }
    95%, 97% { transform: scaleY(1); }
  }

  /* ---- Foreground hills ---- */
  .hills {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    z-index: 3;
    pointer-events: none;
  }

  /* ---- CTA Button ---- */
  .cta-area {
    position: relative;
    z-index: 10;
    margin-bottom: 70px;
    display: flex;
    justify-content: center;
  }

  .gem-btn {
    position: relative;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 30px;
    letter-spacing: 3px;
    color: #fff;
    background: linear-gradient(135deg, #7b2ff7 0%, #22d1c3 50%, #7b2ff7 100%);
    background-size: 200% 200%;
    animation: gemShift 3s ease-in-out infinite;
    border: none;
    padding: 22px 64px;
    clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
    cursor: pointer;
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    transition: transform 0.2s;
  }

  .gem-btn:hover {
    transform: scale(1.08);
  }

  .gem-btn-glow {
    position: absolute;
    inset: -18px;
    clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
    background: radial-gradient(ellipse at center, rgba(100, 220, 210, 0.45) 0%, transparent 70%);
    animation: pulseGlow 2s ease-in-out infinite;
    pointer-events: none;
    z-index: -1;
  }

  @keyframes gemShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  @keyframes pulseGlow {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.15); }
  }
</style>
</head>
<body>

<div class="overlay"></div>

<div class="content">
  <!-- Title -->
  <h1 class="title">Knight's Quest: Math Adventures</h1>

  <!-- Stage: speech + dragon -->
  <div class="stage">
    <!-- Speech bubble -->
    <div class="speech-area">
      <div class="speech-bubble">
        <p>Brave adventurer, you've shown courage, curiosity, and a heart ready to learn. Now it's time to begin your greatest quest yet: the challenge of math. Your training begins now.</p>
      </div>
    </div>

    <!-- Dragon -->
    <div class="dragon-area">
      <div class="dragon-container">
        <svg width="340" height="380" viewBox="0 0 340 380" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Tail (sways) -->
          <g class="dragon-tail">
            <path d="M90 260 Q60 280 40 310 Q25 340 50 350 Q65 352 70 340 Q75 320 95 300 Q105 285 100 270Z"
                  fill="#8ecfb5" stroke="#6db89a" stroke-width="2"/>
            <!-- Tail curl tip -->
            <circle cx="55" cy="347" r="8" fill="#a8dcc5" stroke="#6db89a" stroke-width="1.5"/>
          </g>

          <!-- Left leg -->
          <ellipse cx="130" cy="320" rx="22" ry="32" fill="#8ecfb5" stroke="#6db89a" stroke-width="2"/>
          <ellipse cx="130" cy="348" rx="18" ry="10" fill="#a8dcc5" stroke="#6db89a" stroke-width="1.5"/>
          <!-- Left toes -->
          <circle cx="118" cy="355" r="5" fill="#c2e8d8"/>
          <circle cx="130" cy="357" r="5" fill="#c2e8d8"/>
          <circle cx="142" cy="355" r="5" fill="#c2e8d8"/>

          <!-- Right leg -->
          <ellipse cx="210" cy="320" rx="22" ry="32" fill="#7ec4a8" stroke="#6db89a" stroke-width="2"/>
          <ellipse cx="210" cy="348" rx="18" ry="10" fill="#98d4bc" stroke="#6db89a" stroke-width="1.5"/>
          <!-- Right toes -->
          <circle cx="198" cy="355" r="5" fill="#b2dece"/>
          <circle cx="210" cy="357" r="5" fill="#b2dece"/>
          <circle cx="222" cy="355" r="5" fill="#b2dece"/>

          <!-- Left wing (flaps) -->
          <g class="wing-left" style="transform-origin: 110px 170px;">
            <path d="M110 170 Q60 110 40 80 Q35 68 55 75 Q70 80 80 100 Q65 65 55 40 Q52 28 68 38 Q85 55 90 80
                     Q85 50 80 25 Q78 12 95 30 Q108 55 110 100Z"
                  fill="#c4a8e0" stroke="#a88bc7" stroke-width="2" opacity="0.9"/>
            <!-- Wing membrane detail -->
            <path d="M100 110 Q80 85 70 65" stroke="#b599d0" stroke-width="1.5" fill="none" opacity="0.5"/>
            <path d="M105 100 Q90 75 82 50" stroke="#b599d0" stroke-width="1.5" fill="none" opacity="0.5"/>
          </g>

          <!-- Right wing (flaps) -->
          <g class="wing-right" style="transform-origin: 230px 170px;">
            <path d="M230 170 Q280 110 300 80 Q305 68 285 75 Q270 80 260 100 Q275 65 285 40 Q288 28 272 38 Q255 55 250 80
                     Q255 50 260 25 Q262 12 245 30 Q232 55 230 100Z"
                  fill="#c4a8e0" stroke="#a88bc7" stroke-width="2" opacity="0.9"/>
            <path d="M240 110 Q260 85 270 65" stroke="#b599d0" stroke-width="1.5" fill="none" opacity="0.5"/>
            <path d="M235 100 Q250 75 258 50" stroke="#b599d0" stroke-width="1.5" fill="none" opacity="0.5"/>
          </g>

          <!-- Body (round) -->
          <ellipse cx="170" cy="250" rx="95" ry="100" fill="#8ecfb5" stroke="#6db89a" stroke-width="2.5"/>

          <!-- Belly (lighter oval with scales) -->
          <ellipse cx="170" cy="265" rx="60" ry="70" fill="#c2e8d8" stroke="#a8dcc5" stroke-width="1.5"/>
          <!-- Belly scale lines -->
          <path d="M135 230 Q170 238 205 230" stroke="#a8dcc5" stroke-width="1.5" fill="none"/>
          <path d="M128 252 Q170 262 212 252" stroke="#a8dcc5" stroke-width="1.5" fill="none"/>
          <path d="M130 275 Q170 286 210 275" stroke="#a8dcc5" stroke-width="1.5" fill="none"/>
          <path d="M135 298 Q170 308 205 298" stroke="#a8dcc5" stroke-width="1.5" fill="none"/>

          <!-- Left arm -->
          <ellipse cx="100" cy="240" rx="16" ry="24" fill="#8ecfb5" stroke="#6db89a" stroke-width="2" transform="rotate(-15, 100, 240)"/>
          <circle cx="88" cy="258" r="6" fill="#a8dcc5"/>

          <!-- Right arm -->
          <ellipse cx="240" cy="240" rx="16" ry="24" fill="#7ec4a8" stroke="#6db89a" stroke-width="2" transform="rotate(15, 240, 240)"/>
          <circle cx="252" cy="258" r="6" fill="#98d4bc"/>

          <!-- Head -->
          <ellipse cx="170" cy="148" rx="68" ry="60" fill="#8ecfb5" stroke="#6db89a" stroke-width="2.5"/>

          <!-- Snout (rounded) -->
          <ellipse cx="170" cy="182" rx="38" ry="24" fill="#9ad5be" stroke="#6db89a" stroke-width="2"/>

          <!-- Nostrils -->
          <ellipse cx="157" cy="185" rx="5" ry="4" fill="#6db89a"/>
          <ellipse cx="183" cy="185" rx="5" ry="4" fill="#6db89a"/>

          <!-- Smoke puffs from nostrils -->
          <g class="smoke-puff">
            <circle cx="148" cy="178" r="5" fill="rgba(200,200,200,0.4)"/>
            <circle cx="140" cy="170" r="4" fill="rgba(200,200,200,0.3)"/>
            <circle cx="135" cy="163" r="3" fill="rgba(200,200,200,0.2)"/>
          </g>
          <g class="smoke-puff" style="animation-delay: 0.8s;">
            <circle cx="192" cy="178" r="4.5" fill="rgba(200,200,200,0.35)"/>
            <circle cx="198" cy="171" r="3.5" fill="rgba(200,200,200,0.25)"/>
            <circle cx="202" cy="165" r="2.5" fill="rgba(200,200,200,0.15)"/>
          </g>

          <!-- Mouth (cute smile) -->
          <path d="M150 194 Q170 206 190 194" stroke="#5a9e7f" stroke-width="2.5" fill="none" stroke-linecap="round"/>

          <!-- Eyes — left -->
          <g>
            <!-- Eye white -->
            <ellipse cx="142" cy="142" rx="22" ry="24" fill="#fff" stroke="#6db89a" stroke-width="2"/>
            <!-- Iris -->
            <ellipse cx="145" cy="144" rx="14" ry="16" fill="#5a4a32"/>
            <!-- Pupil (large) -->
            <ellipse cx="147" cy="146" rx="9" ry="10" fill="#1a1410"/>
            <!-- Highlight -->
            <circle cx="151" cy="138" r="5" fill="#fff" opacity="0.9"/>
            <circle cx="140" cy="150" r="3" fill="#fff" opacity="0.5"/>
            <!-- Eyelid for blink -->
            <ellipse class="eye-lid" cx="142" cy="142" rx="22" ry="24" fill="#8ecfb5"
                     style="transform-origin: 142px 142px;"/>
          </g>

          <!-- Eyes — right -->
          <g>
            <ellipse cx="198" cy="142" rx="22" ry="24" fill="#fff" stroke="#6db89a" stroke-width="2"/>
            <ellipse cx="201" cy="144" rx="14" ry="16" fill="#5a4a32"/>
            <ellipse cx="203" cy="146" rx="9" ry="10" fill="#1a1410"/>
            <circle cx="207" cy="138" r="5" fill="#fff" opacity="0.9"/>
            <circle cx="196" cy="150" r="3" fill="#fff" opacity="0.5"/>
            <ellipse class="eye-lid" cx="198" cy="142" rx="22" ry="24" fill="#8ecfb5"
                     style="transform-origin: 198px 142px; animation-delay: 0.1s;"/>
          </g>

          <!-- Horn bumps on head -->
          <ellipse cx="140" cy="98" rx="10" ry="14" fill="#d4b896" stroke="#c4a880" stroke-width="1.5" transform="rotate(-10, 140, 98)"/>
          <ellipse cx="170" cy="90" rx="9" ry="15" fill="#d4b896" stroke="#c4a880" stroke-width="1.5"/>
          <ellipse cx="200" cy="98" rx="10" ry="14" fill="#d4b896" stroke="#c4a880" stroke-width="1.5" transform="rotate(10, 200, 98)"/>

          <!-- Cheek blush -->
          <ellipse cx="118" cy="162" rx="14" ry="8" fill="rgba(240,160,160,0.35)"/>
          <ellipse cx="222" cy="162" rx="14" ry="8" fill="rgba(240,160,160,0.35)"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- Foreground hills -->
  <svg class="hills" viewBox="0 0 1920 220" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Back hill layer -->
    <path d="M0 180 Q200 80 500 130 Q750 170 1000 100 Q1250 40 1500 110 Q1700 160 1920 120 L1920 220 L0 220Z"
          fill="rgba(140,200,160,0.45)"/>
    <!-- Middle hill layer -->
    <path d="M0 200 Q300 120 600 160 Q900 200 1100 140 Q1350 90 1600 150 Q1800 190 1920 160 L1920 220 L0 220Z"
          fill="rgba(120,190,145,0.55)"/>
    <!-- Front hill layer -->
    <path d="M0 200 Q250 160 500 185 Q700 210 900 175 Q1150 140 1400 180 Q1650 210 1920 190 L1920 220 L0 220Z"
          fill="rgba(105,180,135,0.65)"/>
    <!-- Grass tufts -->
    <g fill="rgba(85,160,115,0.5)">
      <path d="M100 195 Q105 175 110 195"/>
      <path d="M115 193 Q120 178 125 193"/>
      <path d="M400 182 Q405 165 410 182"/>
      <path d="M415 180 Q420 168 425 180"/>
      <path d="M750 190 Q755 172 760 190"/>
      <path d="M900 170 Q905 155 910 170"/>
      <path d="M1200 175 Q1205 158 1210 175"/>
      <path d="M1500 178 Q1505 162 1510 178"/>
      <path d="M1700 185 Q1705 170 1710 185"/>
    </g>
  </svg>

  <!-- CTA -->
  <div class="cta-area">
    <div style="position: relative; display: inline-block;">
      <div class="gem-btn-glow"></div>
      <button class="gem-btn">Let's Go!</button>
    </div>
  </div>
</div>

</body>
</html>
