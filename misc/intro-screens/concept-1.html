<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080, initial-scale=1">
<title>Knight's Quest: Math Adventures — Intro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=MedievalSharp&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: 'MedievalSharp', cursive;
  }

  body {
    background-image: url('../../Assets/Textures/landscape_bg_soft.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  /* Semi-transparent overlay */
  .overlay {
    position: absolute;
    inset: 0;
    width: 1920px;
    height: 1080px;
    background: linear-gradient(
      135deg,
      rgba(200, 220, 200, 0.45) 0%,
      rgba(180, 210, 235, 0.40) 40%,
      rgba(240, 230, 200, 0.45) 100%
    );
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container {
    width: 1920px;
    height: 1080px;
    display: flex;
    align-items: center;
    position: relative;
  }

  /* ── Title ── */
  .title {
    position: absolute;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 64px;
    background: linear-gradient(180deg, #ffd700 0%, #e8a800 40%, #ffec80 60%, #c8960a 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
    filter: drop-shadow(0 3px 6px rgba(0,0,0,0.35));
    letter-spacing: 2px;
    white-space: nowrap;
  }

  /* ── Character area ── */
  .character-area {
    position: absolute;
    left: 8%;
    top: 50%;
    transform: translateY(-45%);
  }

  .character-wrap {
    animation: bob 3s ease-in-out infinite;
  }

  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-18px); }
  }

  /* Cape sway is applied inside SVG via CSS on the cape group */
  .cape-group {
    transform-origin: 150px 130px;
    animation: capeSway 4s ease-in-out infinite;
  }

  @keyframes capeSway {
    0%, 100% { transform: skewX(0deg); }
    25% { transform: skewX(2.5deg); }
    75% { transform: skewX(-2.5deg); }
  }

  /* ── Parchment ── */
  .parchment-area {
    position: absolute;
    right: 6%;
    top: 50%;
    transform: translateY(-46%);
    width: 56%;
  }

  .parchment {
    background: linear-gradient(
      160deg,
      #f5e6c8 0%, #efe0bf 30%, #f0dab0 60%, #e8d0a0 100%
    );
    border-radius: 12px 12px 18px 18px;
    padding: 60px 65px 55px 65px;
    position: relative;
    box-shadow:
      0 6px 30px rgba(120, 90, 40, 0.35),
      inset 0 0 40px rgba(200, 170, 110, 0.25),
      0 0 0 3px rgba(180, 150, 90, 0.18);
  }

  /* Curled-edge top-left */
  .parchment::before {
    content: '';
    position: absolute;
    top: -8px; left: -4px;
    width: 80px; height: 40px;
    background: linear-gradient(135deg, rgba(210,185,140,0.7) 0%, transparent 60%);
    border-radius: 0 0 60% 0;
    transform: rotate(-3deg);
  }

  /* Curled-edge bottom-right */
  .parchment::after {
    content: '';
    position: absolute;
    bottom: -8px; right: -4px;
    width: 90px; height: 45px;
    background: linear-gradient(315deg, rgba(210,185,140,0.7) 0%, transparent 60%);
    border-radius: 60% 0 0 0;
    transform: rotate(-2deg);
  }

  .parchment-text {
    font-family: 'MedievalSharp', cursive;
    font-size: 32px;
    line-height: 1.65;
    color: #4a3520;
    text-align: left;
  }

  /* ── Shield Button ── */
  .cta-area {
    text-align: center;
    margin-top: 45px;
  }

  .shield-btn {
    display: inline-block;
    position: relative;
    background: linear-gradient(180deg, #ffd54f 0%, #e8a800 50%, #c88a00 100%);
    color: #3e2200;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 30px;
    letter-spacing: 1.5px;
    border: none;
    cursor: pointer;
    padding: 22px 56px 30px 56px;
    clip-path: polygon(50% 0%, 100% 15%, 100% 75%, 50% 100%, 0% 75%, 0% 15%);
    transition: filter 0.3s ease, transform 0.2s ease;
    animation: pulse 2.2s ease-in-out infinite;
    min-width: 280px;
    text-shadow: 0 1px 0 rgba(255,255,200,0.5);
  }

  .shield-btn:hover {
    filter: brightness(1.15) drop-shadow(0 0 18px rgba(255, 210, 60, 0.7));
    transform: scale(1.05);
    animation: none;
  }

  .shield-btn:active {
    transform: scale(0.97);
  }

  @keyframes pulse {
    0%, 100% { filter: brightness(1) drop-shadow(0 0 4px rgba(255,200,40,0.3)); }
    50% { filter: brightness(1.08) drop-shadow(0 0 14px rgba(255,210,60,0.55)); }
  }

  /* Small decorative divider above button */
  .divider {
    width: 200px;
    height: 2px;
    margin: 30px auto 0 auto;
    background: linear-gradient(90deg, transparent, #c4a060, transparent);
  }
</style>
</head>
<body>
<div class="overlay">
<div class="container">

  <!-- Title -->
  <div class="title">Knight's Quest: Math Adventures</div>

  <!-- Character -->
  <div class="character-area">
    <div class="character-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" width="380" height="500">
        <defs>
          <linearGradient id="armorGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#f0ece4"/>
            <stop offset="100%" stop-color="#cdc5b4"/>
          </linearGradient>
          <linearGradient id="helmetGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ffe066"/>
            <stop offset="50%" stop-color="#f0c030"/>
            <stop offset="100%" stop-color="#d4a520"/>
          </linearGradient>
          <linearGradient id="capeGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#7eb8e0"/>
            <stop offset="100%" stop-color="#4a8abf"/>
          </linearGradient>
          <linearGradient id="shieldGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#a0785a"/>
            <stop offset="100%" stop-color="#7a5c3e"/>
          </linearGradient>
          <linearGradient id="swordGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#c8b890"/>
            <stop offset="100%" stop-color="#a89060"/>
          </linearGradient>
          <linearGradient id="skinGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ffe0c0"/>
            <stop offset="100%" stop-color="#f0c8a0"/>
          </linearGradient>
          <linearGradient id="bootGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#8b6f50"/>
            <stop offset="100%" stop-color="#6b5040"/>
          </linearGradient>
          <radialGradient id="cheekGrad">
            <stop offset="0%" stop-color="#ffb0a0" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#ffb0a0" stop-opacity="0"/>
          </radialGradient>
        </defs>

        <!-- Cape (behind body) -->
        <g class="cape-group">
          <path d="M 130 135 Q 125 140 100 260 Q 95 280 105 290 L 115 280 Q 120 200 135 160 Z"
                fill="url(#capeGrad)" opacity="0.9"/>
          <path d="M 170 135 Q 175 140 200 260 Q 205 280 195 295 L 182 282 Q 178 200 165 160 Z"
                fill="url(#capeGrad)" opacity="0.85"/>
          <!-- Cape clasp -->
          <circle cx="150" cy="132" r="6" fill="#ffd700" stroke="#c8960a" stroke-width="1.5"/>
        </g>

        <!-- Legs -->
        <!-- Left leg -->
        <rect x="120" y="290" width="28" height="70" rx="10" fill="url(#armorGrad)" stroke="#b8b0a0" stroke-width="1"/>
        <!-- Right leg -->
        <rect x="155" y="290" width="28" height="70" rx="10" fill="url(#armorGrad)" stroke="#b8b0a0" stroke-width="1"/>

        <!-- Boots -->
        <!-- Left boot -->
        <path d="M 118 348 L 118 372 Q 118 382 128 382 L 155 382 Q 158 382 158 378 L 158 368 Q 152 348 148 348 Z"
              fill="url(#bootGrad)" stroke="#5a4030" stroke-width="1"/>
        <!-- Right boot -->
        <path d="M 153 348 L 153 372 Q 153 382 163 382 L 190 382 Q 193 382 193 378 L 193 368 Q 187 348 183 348 Z"
              fill="url(#bootGrad)" stroke="#5a4030" stroke-width="1"/>

        <!-- Body / Tunic -->
        <path d="M 115 130 Q 108 160 108 200 Q 108 260 115 300 L 190 300 Q 195 260 195 200 Q 195 160 188 130 Z"
              fill="url(#armorGrad)" stroke="#b8b0a0" stroke-width="1.5"/>
        <!-- Belt -->
        <rect x="110" y="230" width="84" height="12" rx="3" fill="#8b6f50" stroke="#6b5040" stroke-width="1"/>
        <!-- Belt buckle -->
        <rect x="142" y="228" width="18" height="16" rx="3" fill="#ffd700" stroke="#c8960a" stroke-width="1"/>
        <rect x="147" y="232" width="8" height="8" rx="1.5" fill="#c8960a"/>

        <!-- Armor cross-straps -->
        <line x1="125" y1="145" x2="150" y2="190" stroke="#c8c0b0" stroke-width="2.5" opacity="0.5"/>
        <line x1="178" y1="145" x2="153" y2="190" stroke="#c8c0b0" stroke-width="2.5" opacity="0.5"/>

        <!-- Left arm (shield arm) -->
        <path d="M 115 140 Q 90 155 78 190 Q 72 210 78 220"
              stroke="url(#armorGrad)" stroke-width="22" stroke-linecap="round" fill="none"/>
        <path d="M 115 140 Q 90 155 78 190 Q 72 210 78 220"
              stroke="#b8b0a0" stroke-width="1" fill="none" opacity="0.5"/>

        <!-- Small shield on left arm -->
        <g transform="translate(48, 180)">
          <path d="M 0 -5 L 35 -5 Q 42 -5 42 2 L 42 35 Q 42 60 21 72 Q 0 60 0 35 Z"
                fill="url(#shieldGrad)" stroke="#5a4030" stroke-width="2"/>
          <!-- Shield cross emblem -->
          <line x1="21" y1="2" x2="21" y2="58" stroke="#d4a520" stroke-width="3"/>
          <line x1="5" y1="25" x2="37" y2="25" stroke="#d4a520" stroke-width="3"/>
          <!-- Shield rim highlight -->
          <path d="M 3 -2 L 39 -2 Q 39 -2 39 5 L 39 10"
                stroke="#c8a870" stroke-width="1.5" fill="none" opacity="0.5"/>
        </g>

        <!-- Right arm (sword arm) -->
        <path d="M 188 140 Q 210 158 218 180 Q 224 200 220 230"
              stroke="url(#armorGrad)" stroke-width="22" stroke-linecap="round" fill="none"/>
        <path d="M 188 140 Q 210 158 218 180 Q 224 200 220 230"
              stroke="#b8b0a0" stroke-width="1" fill="none" opacity="0.5"/>

        <!-- Hand (right) -->
        <circle cx="220" cy="232" r="10" fill="url(#skinGrad)" stroke="#e0b890" stroke-width="1"/>

        <!-- Practice wooden sword -->
        <g transform="translate(215, 160) rotate(15)">
          <!-- Blade -->
          <rect x="-4" y="-80" width="8" height="75" rx="2" fill="url(#swordGrad)" stroke="#907850" stroke-width="1"/>
          <!-- Sword tip (rounded for practice sword) -->
          <ellipse cx="0" cy="-82" rx="4" ry="5" fill="#c8b890"/>
          <!-- Guard -->
          <rect x="-14" y="-8" width="28" height="7" rx="3" fill="#8b7050" stroke="#6b5040" stroke-width="1"/>
          <!-- Handle -->
          <rect x="-3.5" y="-1" width="7" height="28" rx="2" fill="#6b5040"/>
          <!-- Pommel -->
          <circle cx="0" cy="30" r="5" fill="#8b7050" stroke="#6b5040" stroke-width="1"/>
          <!-- Wood grain lines -->
          <line x1="-1" y1="-70" x2="-1" y2="-15" stroke="#a89060" stroke-width="0.8" opacity="0.4"/>
          <line x1="2" y1="-65" x2="2" y2="-20" stroke="#a89060" stroke-width="0.5" opacity="0.3"/>
        </g>

        <!-- Neck -->
        <rect x="138" y="110" width="26" height="25" rx="8" fill="url(#skinGrad)"/>

        <!-- Face (visible below helmet) -->
        <ellipse cx="151" cy="105" rx="32" ry="30" fill="url(#skinGrad)" stroke="#e0b890" stroke-width="1"/>

        <!-- Cheek blush -->
        <ellipse cx="130" cy="108" rx="10" ry="7" fill="url(#cheekGrad)"/>
        <ellipse cx="172" cy="108" rx="10" ry="7" fill="url(#cheekGrad)"/>

        <!-- Eyes — big and round for child-friendliness -->
        <ellipse cx="138" cy="98" rx="7" ry="8" fill="white"/>
        <ellipse cx="164" cy="98" rx="7" ry="8" fill="white"/>
        <circle cx="140" cy="99" r="4.5" fill="#4a6080"/>
        <circle cx="166" cy="99" r="4.5" fill="#4a6080"/>
        <circle cx="141" cy="97" r="1.8" fill="white"/>
        <circle cx="167" cy="97" r="1.8" fill="white"/>
        <!-- Eyelids (friendly half-lid) -->
        <path d="M 130 93 Q 138 90 146 93" stroke="#c8a880" stroke-width="1.5" fill="none"/>
        <path d="M 156 93 Q 164 90 172 93" stroke="#c8a880" stroke-width="1.5" fill="none"/>

        <!-- Small happy mouth -->
        <path d="M 143 112 Q 151 120 159 112" stroke="#c07860" stroke-width="2" fill="none" stroke-linecap="round"/>

        <!-- Tiny nose -->
        <ellipse cx="151" cy="106" rx="3" ry="2" fill="#f0c0a0" opacity="0.7"/>

        <!-- Freckles -->
        <circle cx="133" cy="104" r="1" fill="#d4a880" opacity="0.5"/>
        <circle cx="136" cy="107" r="1" fill="#d4a880" opacity="0.5"/>
        <circle cx="167" cy="104" r="1" fill="#d4a880" opacity="0.5"/>
        <circle cx="170" cy="107" r="1" fill="#d4a880" opacity="0.5"/>

        <!-- Comically oversized helmet -->
        <g>
          <!-- Helmet dome — big! -->
          <ellipse cx="151" cy="68" rx="52" ry="48" fill="url(#helmetGrad)" stroke="#c8960a" stroke-width="2"/>
          <!-- Helmet brim -->
          <ellipse cx="151" cy="88" rx="56" ry="10" fill="#e8b420" stroke="#c8960a" stroke-width="1.5"/>
          <!-- Helmet visor hinge -->
          <circle cx="105" cy="82" r="4" fill="#c8960a" stroke="#a07a10" stroke-width="1"/>
          <circle cx="197" cy="82" r="4" fill="#c8960a" stroke="#a07a10" stroke-width="1"/>
          <!-- Helmet crest / plume -->
          <path d="M 151 22 Q 155 5 165 8 Q 175 12 170 25 Q 180 15 185 22 Q 190 32 178 38 Q 168 28 160 30 Q 155 25 151 30"
                fill="#e04040" stroke="#c03030" stroke-width="1" opacity="0.9"/>
          <path d="M 151 22 Q 147 5 137 8 Q 127 12 132 25 Q 130 20 125 25 Q 122 32 132 36 Q 140 28 145 30 Q 148 25 151 30"
                fill="#d03535" stroke="#b02828" stroke-width="1" opacity="0.85"/>
          <!-- Helmet highlight -->
          <ellipse cx="135" cy="52" rx="18" ry="12" fill="white" opacity="0.15" transform="rotate(-15, 135, 52)"/>
          <!-- Helmet center ridge -->
          <line x1="151" y1="24" x2="151" y2="86" stroke="#d4a520" stroke-width="3" opacity="0.4"/>
          <!-- Helmet is tilted/too big — show it resting on nose almost -->
          <!-- Additional rim detail -->
          <path d="M 98 86 Q 151 100 204 86" stroke="#d4a520" stroke-width="1" fill="none" opacity="0.3"/>
        </g>

        <!-- Hair peeking out from under helmet -->
        <path d="M 108 88 Q 112 95 108 100" stroke="#b07040" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M 194 88 Q 190 95 194 100" stroke="#b07040" stroke-width="3" fill="none" stroke-linecap="round"/>

        <!-- Ground shadow -->
        <ellipse cx="150" cy="390" rx="70" ry="10" fill="rgba(0,0,0,0.12)"/>
      </svg>
    </div>
  </div>

  <!-- Parchment scroll with text -->
  <div class="parchment-area">
    <div class="parchment">
      <p class="parchment-text">
        Brave adventurer, you've shown courage, curiosity, and a heart ready to learn.
        Now it's time to begin your greatest quest yet: the challenge of math.
        Your training begins now.
      </p>
      <div class="divider"></div>
      <div class="cta-area">
        <button class="shield-btn">Begin Training!</button>
      </div>
    </div>
  </div>

</div>
</div>
</body>
</html>
