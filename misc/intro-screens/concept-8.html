<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080, initial-scale=1">
<title>Knight's Quest: Math Adventures — Intro (Concept 8)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=MedievalSharp&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: 'MedievalSharp', cursive;
  }

  body {
    background-image: url('../../Assets/Textures/landscape_bg_soft.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  .overlay {
    position: absolute;
    inset: 0;
    width: 1920px;
    height: 1080px;
    background: linear-gradient(
      135deg,
      rgba(200, 220, 200, 0.45) 0%,
      rgba(180, 210, 235, 0.40) 40%,
      rgba(240, 230, 200, 0.45) 100%
    );
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container {
    width: 1920px;
    height: 1080px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Arched Title (SVG text path) ── */
  .title-area {
    position: absolute;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    width: 900px;
    height: 160px;
  }

  .title-area svg text {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 52px;
    fill: url(#goldGradTitle);
    filter: drop-shadow(0 3px 6px rgba(0,0,0,0.35));
    letter-spacing: 2px;
  }

  /* ── Character ── */
  .character-area {
    position: absolute;
    top: 130px;
    left: 50%;
    transform: translateX(-50%);
  }

  /* Hair sway */
  @keyframes hairSway {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(3px); }
    75% { transform: translateX(-3px); }
  }
  .hair-sway {
    animation: hairSway 3s ease-in-out infinite;
  }

  /* Sword wobble */
  @keyframes swordWobble {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(3deg); }
    75% { transform: rotate(-3deg); }
  }
  .sword-wobble {
    transform-origin: 50% 90%;
    animation: swordWobble 2s ease-in-out infinite;
  }

  /* Stance shift */
  @keyframes stanceShift {
    0%, 100% { transform: translateY(0) translateX(-50%); }
    50% { transform: translateY(-4px) translateX(-50%); }
  }
  .character-area {
    animation: stanceShift 4s ease-in-out infinite;
  }

  /* Flower crown sway */
  @keyframes crownSway {
    0%, 100% { transform: translateX(0) translateY(0); }
    30% { transform: translateX(2px) translateY(-1px); }
    70% { transform: translateX(-2px) translateY(-1px); }
  }
  .crown-sway {
    animation: crownSway 3s ease-in-out infinite;
  }

  /* ── Scroll ── */
  .scroll-area {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    width: 750px;
  }

  .scroll-text {
    font-family: 'MedievalSharp', cursive;
    font-size: 22px;
    color: #3a2e1e;
    line-height: 1.6;
    text-align: center;
    padding: 50px 60px 40px;
  }

  /* ── Crown Button ── */
  .cta-area {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
  }

  .crown-btn {
    position: relative;
    display: inline-block;
    background: linear-gradient(180deg, #f8c8d8 0%, #e8a0b8 50%, #d08098 100%);
    border: 3px solid #d4a843;
    border-radius: 0 0 16px 16px;
    padding: 16px 48px 16px;
    cursor: pointer;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 26px;
    color: #6a3020;
    text-shadow: 0 1px 0 rgba(255,255,255,0.4);
    transition: all 0.3s ease;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.25));
  }

  /* Crown peaks on top of button */
  .crown-peaks {
    position: absolute;
    top: -22px;
    left: -3px;
    right: -3px;
    height: 25px;
    overflow: visible;
  }

  .crown-btn:hover {
    background: linear-gradient(180deg, #ffe0ec 0%, #f0b8d0 50%, #e098b0 100%);
    filter: drop-shadow(0 4px 16px rgba(212, 168, 67, 0.6)) drop-shadow(0 0 20px rgba(255, 200, 100, 0.4));
    transform: translateY(-2px);
  }

  .crown-btn:active {
    transform: translateY(0);
  }

  /* Sparkle on hover */
  @keyframes sparkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: 1; transform: scale(1); }
  }

  .crown-btn:hover .sparkle {
    animation: sparkle 0.6s ease-in-out infinite;
  }

  .sparkle {
    position: absolute;
    width: 8px;
    height: 8px;
    opacity: 0;
  }
  .sparkle:nth-child(1) { top: -10px; left: 10%; animation-delay: 0s; }
  .sparkle:nth-child(2) { top: -15px; right: 15%; animation-delay: 0.2s; }
  .sparkle:nth-child(3) { top: 5px; right: -5px; animation-delay: 0.4s; }
  .sparkle:nth-child(4) { bottom: 5px; left: -5px; animation-delay: 0.1s; }
  .sparkle:nth-child(5) { top: -8px; left: 50%; animation-delay: 0.3s; }

  /* Unfurl animation */
  @keyframes unfurl {
    0% { transform: translateX(-50%) scaleY(0); opacity: 0; }
    60% { transform: translateX(-50%) scaleY(1.03); opacity: 1; }
    100% { transform: translateX(-50%) scaleY(1); opacity: 1; }
  }
  .scroll-area {
    transform-origin: top center;
    animation: unfurl 1.2s ease-out 0.3s both;
    transform: translateX(-50%);
  }

  @keyframes fadeInUp {
    0% { opacity: 0; transform: translateX(-50%) translateY(15px); }
    100% { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
  .cta-area {
    animation: fadeInUp 0.8s ease-out 1.4s both;
  }
</style>
</head>

          <ellipse cx="0" cy="-5" rx="3" ry="5" fill="#f8b0c0" transform="rotate(144,0,0)"/>
          <ellipse cx="0" cy="-5" rx="3" ry="5" fill="#f8b0c0" transform="rotate(216,0,0)"/>
          <ellipse cx="0" cy="-5" rx="3" ry="5" fill="#f8b0c0" transform="rotate(288,0,0)"/>
          <circle cx="0" cy="0" r="3" fill="#ffd700"/>
        </g>

        <!-- Gold wire accents -->
        <path d="M 125,57 Q 130,52 137,49" stroke="#d4a843" stroke-width="1" fill="none" opacity="0.5"/>
        <path d="M 173,49 Q 180,52 185,57" stroke="#d4a843" stroke-width="1" fill="none" opacity="0.5"/>
      </g>
    </svg>
  </div>

  <!-- Scroll with text -->
  <div class="scroll-area">
    <svg width="750" height="280" viewBox="0 0 750 280" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="scrollGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#f5e6c8"/>
          <stop offset="50%" stop-color="#f0ddb8"/>
          <stop offset="100%" stop-color="#e8d0a0"/>
        </linearGradient>
        <linearGradient id="curlShade" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#d8c090"/>
          <stop offset="100%" stop-color="#f0ddb8"/>
        </linearGradient>
        <filter id="scrollShadow">
          <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#00000030"/>
        </filter>
      </defs>

      <!-- Main scroll body -->
      <rect x="30" y="40" width="690" height="200" rx="4" fill="url(#scrollGrad)" filter="url(#scrollShadow)"/>

      <!-- Top curl -->
      <path d="M 20,50 Q 20,25 40,20 L 710,20 Q 730,25 730,50 L 730,55 Q 730,35 710,32 L 40,32 Q 20,35 20,55 Z" fill="url(#curlShade)" stroke="#c8b080" stroke-width="0.5"/>
      <ellipse cx="25" cy="44" rx="12" ry="16" fill="url(#curlShade)" stroke="#c8b080" stroke-width="0.5"/>
      <ellipse cx="725" cy="44" rx="12" ry="16" fill="url(#curlShade)" stroke="#c8b080" stroke-width="0.5"/>

      <!-- Bottom curl -->
      <path d="M 20,230 Q 20,255 40,260 L 710,260 Q 730,255 730,230 L 730,225 Q 730,245 710,248 L 40,248 Q 20,245 20,225 Z" fill="url(#curlShade)" stroke="#c8b080" stroke-width="0.5"/>
      <ellipse cx="25" cy="236" rx="12" ry="16" fill="url(#curlShade)" stroke="#c8b080" stroke-width="0.5"/>
      <ellipse cx="725" cy="236" rx="12" ry="16" fill="url(#curlShade)" stroke="#c8b080" stroke-width="0.5"/>

      <!-- Edge details -->
      <line x1="40" y1="45" x2="710" y2="45" stroke="#c8b080" stroke-width="0.5" opacity="0.6"/>
      <line x1="40" y1="235" x2="710" y2="235" stroke="#c8b080" stroke-width="0.5" opacity="0.6"/>
    </svg>
    <div class="scroll-text" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;">
      <p style="max-width: 580px;">Brave adventurer, you've shown courage, curiosity, and a heart ready to learn. Now it's time to begin your greatest quest yet: the challenge of math. Your training begins now.</p>
    </div>
  </div>

  <!-- Crown-shaped CTA button -->
  <div class="cta-area">
    <button class="crown-btn" onclick="alert('Training begins!')">
      <!-- Crown peaks SVG -->
      <div class="crown-peaks">
        <svg width="100%" height="25" viewBox="0 0 200 25" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="crownPeakGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#d4a843"/>
              <stop offset="100%" stop-color="#f8c8d8"/>
            </linearGradient>
          </defs>
          <path d="M 0,25 L 0,15 L 15,8 L 30,15 L 50,3 L 70,15 L 90,6 L 100,0 L 110,6 L 130,15 L 150,3 L 170,15 L 185,8 L 200,15 L 200,25 Z" fill="url(#crownPeakGrad)" stroke="#d4a843" stroke-width="1.5"/>
          <!-- Jewel dots on peaks -->
          <circle cx="50" cy="6" r="2.5" fill="#ffd700"/>
          <circle cx="100" cy="3" r="3" fill="#ff90b0"/>
          <circle cx="150" cy="6" r="2.5" fill="#ffd700"/>
        </svg>
      </div>

      <!-- Sparkle elements -->
      <svg class="sparkle" viewBox="0 0 10 10"><polygon points="5,0 6,4 10,5 6,6 5,10 4,6 0,5 4,4" fill="#ffd700"/></svg>
      <svg class="sparkle" viewBox="0 0 10 10"><polygon points="5,0 6,4 10,5 6,6 5,10 4,6 0,5 4,4" fill="#fff0c0"/></svg>
      <svg class="sparkle" viewBox="0 0 10 10"><polygon points="5,0 6,4 10,5 6,6 5,10 4,6 0,5 4,4" fill="#ffd700"/></svg>
      <svg class="sparkle" viewBox="0 0 10 10"><polygon points="5,0 6,4 10,5 6,6 5,10 4,6 0,5 4,4" fill="#fff0c0"/></svg>
      <svg class="sparkle" viewBox="0 0 10 10"><polygon points="5,0 6,4 10,5 6,6 5,10 4,6 0,5 4,4" fill="#ffd700"/></svg>

      Start Training!
    </button>
  </div>

</div>
</div>
</body>
